              <button className="btn btn-ghost" onClick={() => setModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={habilitarManual} disabled={saving}>
                {saving ? 'Habilitando...' : 'Habilitar 24hs'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ADMIN AULAS ──────────────────────────────────────────────────────
// Aviso que se muestra en los módulos cuando el admin no eligió un aula.
function SinAula() {
  return (
    <div className="page-content fade-in">
      <div style={{textAlign:'center',padding:'60px 20px'}}>
        <div style={{fontSize:'3.5rem',marginBottom:16}}>🏫</div>
        <div style={{fontWeight:700,fontSize:'1.2rem',marginBottom:8}}>Elegí un aula para continuar</div>
        <div style={{color:'var(--text2)',fontSize:'0.9rem',maxWidth:420,margin:'0 auto'}}>
          Seleccioná un aula en la barra de arriba (o en el módulo <strong>Aulas</strong>) para ver y cargar contenido.
        </div>
      </div>
    </div>
  );
}

function AdminAulas({ aulaActiva, setAulaActiva }) {
  const [aulas, setAulas] = useState([]);
  const [conteos, setConteos] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [confirmCierre, setConfirmCierre] = useState(null);
  const [form, setForm] = useState({ nombre: '', fecha_inicio: '', fecha_fin: '' });
  const toast = useToast();

  const load = async () => {
    const { data } = await supabase.from('aulas').select('*').order('created_at', { ascending: false });
    setAulas(data || []);
    // Contar alumnos por aula (para mostrar cuántos hay en cada una)
    const { data: als } = await supabase.from('alumnos').select('aula_id');
    const c = {};
    (als || []).forEach(a => { if (a.aula_id) c[a.aula_id] = (c[a.aula_id] || 0) + 1; });
    setConteos(c);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const save = async () => {
    if (!form.nombre.trim()) return toast('Poné un nombre al aula', 'error');
    setSaving(true);
    const payload = {
      nombre: form.nombre.trim(),
      fecha_inicio: form.fecha_inicio || null,
      fecha_fin: form.fecha_fin || null,
    };
    const { error } = editing
      ? await supabase.from('aulas').update(payload).eq('id', editing)
      : await supabase.from('aulas').insert({ ...payload, estado: 'activa' });
    setSaving(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(editing ? 'Aula actualizada ✅' : 'Aula creada ✅', 'success');
    setModal(false); setEditing(null);
    setForm({ nombre: '', fecha_inicio: '', fecha_fin: '' });
    load();
  };

  const openNew = () => { setForm({ nombre: '', fecha_inicio: '', fecha_fin: '' }); setEditing(null); setModal(true); };
  const openEdit = a => {
    setForm({ nombre: a.nombre, fecha_inicio: a.fecha_inicio || '', fecha_fin: a.fecha_fin || '' });
    setEditing(a.id); setModal(true);
  };

  // Cerrar o reabrir un aula. Al cerrarla, sus alumnos ya no podrán entrar (se aplica en el login).
  const cambiarEstado = async (aula, nuevoEstado) => {
    const { error } = await supabase.from('aulas').update({ estado: nuevoEstado }).eq('id', aula.id);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(nuevoEstado === 'cerrada' ? `Aula "${aula.nombre}" cerrada 🔒` : `Aula "${aula.nombre}" reabierta ✅`, 'success');
    setConfirmCierre(null);
    if (nuevoEstado === 'cerrada' && aulaActiva === aula.id) setAulaActiva(null);
    load();
  };

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">🏫 Aulas</div>
          <div className="page-subtitle">{aulas.length} aulas · {aulas.filter(a=>a.estado!=='cerrada').length} activas</div>
        </div>
        <button className="btn btn-primary" onClick={openNew}>+ Nueva aula</button>
      </div>

      <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 16px',marginBottom:20,fontSize:'0.85rem',color:'var(--text2)'}}>
        💡 Elegí un aula para trabajar en ella. El contenido que cargues (videos, materiales, evaluaciones) quedará asignado al aula seleccionada.
      </div>

      {aulas.length === 0 ? <Empty icon="🏫" text="Todavía no creaste ninguna aula" /> : (
        <div style={{display:'grid',gap:12}}>
          {aulas.map(a => {
            const cerrada = a.estado === 'cerrada';
            const seleccionada = aulaActiva === a.id;
            return (
              <div key={a.id} className="card" style={{
                borderLeft: `4px solid ${cerrada ? 'var(--danger)' : (seleccionada ? 'var(--accent)' : 'var(--success)')}`,
                opacity: cerrada ? 0.75 : 1
              }}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
                  <div style={{flex:1,minWidth:200}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                      <span style={{fontWeight:700,fontSize:'1.05rem'}}>{a.nombre}</span>
                      {cerrada
                        ? <span className="chip chip-red">🔒 Cerrada</span>
                        : <span className="chip chip-green">Activa</span>}
                      {seleccionada && <span className="chip" style={{background:'var(--accent)',color:'#fff'}}>● Trabajando acá</span>}
                    </div>
                    <div style={{fontSize:'0.82rem',color:'var(--text2)'}}>
                      👥 {conteos[a.id] || 0} alumnos
                      {a.fecha_inicio && ` · Desde ${new Date(a.fecha_inicio+'T00:00:00').toLocaleDateString('es-AR')}`}
                      {a.fecha_fin && ` hasta ${new Date(a.fecha_fin+'T00:00:00').toLocaleDateString('es-AR')}`}
                    </div>
                    {cerrada && (
                      <div style={{fontSize:'0.78rem',color:'var(--danger)',marginTop:6}}>
                        Los alumnos de esta aula no pueden ingresar a la app.
                      </div>
                    )}
                  </div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {!cerrada && (
                      <button
                        className={`btn btn-sm ${seleccionada ? 'btn-ghost' : 'btn-primary'}`}
                        onClick={() => setAulaActiva(seleccionada ? null : a.id)}>
                        {seleccionada ? '✓ Seleccionada' : '📂 Trabajar acá'}
                      </button>
                    )}
                    <button className="btn btn-ghost btn-sm" onClick={() => openEdit(a)}>✏️</button>
                    {cerrada
                      ? <button className="btn btn-ghost btn-sm" onClick={() => cambiarEstado(a, 'activa')}>🔓 Reabrir</button>
                      : <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={() => setConfirmCierre(a)}>🔒 Cerrar</button>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modal && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:460}}>
            <div className="modal-header">
              <h3>{editing ? '✏️ Editar aula' : '🏫 Nueva aula'}</h3>
              <button className="modal-close" onClick={() => setModal(false)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label>Nombre del aula *</label>
                <input value={form.nombre} onChange={e=>setForm(p=>({...p,nombre:e.target.value}))} placeholder="Ej: Agosto 2026" />
              </div>
              <div className="form-group">
                <label>Fecha de inicio (opcional)</label>
                <input type="date" value={form.fecha_inicio} onChange={e=>setForm(p=>({...p,fecha_inicio:e.target.value}))} />
              </div>
              <div className="form-group">
                <label>Fecha de fin (opcional)</label>
                <input type="date" value={form.fecha_fin} onChange={e=>setForm(p=>({...p,fecha_fin:e.target.value}))} />
                <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:4}}>Informativa: el aula se cierra manualmente con el botón "Cerrar"</div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={() => setModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? 'Guardando...' : 'Guardar'}</button>
            </div>
          </div>
        </div>
      )}

      {confirmCierre && (
        <div className="modal-overlay" onClick={() => setConfirmCierre(null)}>
          <div style={{background:'var(--surface)',border:'1px solid var(--danger)',borderRadius:18,width:440,padding:32,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:'3rem',marginBottom:12}}>🔒</div>
            <div style={{fontWeight:700,fontSize:'1.2rem',marginBottom:8}}>¿Cerrar el aula "{confirmCierre.nombre}"?</div>
            <div style={{color:'var(--text2)',fontSize:'0.9rem',marginBottom:16}}>
              Los <strong style={{color:'var(--text)'}}>{conteos[confirmCierre.id] || 0} alumnos</strong> de esta aula ya no van a poder ingresar a la app.
              El contenido no se borra y podés reabrirla cuando quieras.
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={() => setConfirmCierre(null)} style={{flex:1,justifyContent:'center'}}>Cancelar</button>
              <button className="btn btn-danger" onClick={() => cambiarEstado(confirmCierre, 'cerrada')} style={{flex:1,justifyContent:'center'}}>Sí, cerrar aula</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Panel del docente para aprobar las auto-inscripciones de alumnos nuevos.
function AprobarInscripciones() {
  const [pendientes, setPendientes] = useState([]);
  const [aulas, setAulas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [aulaSel, setAulaSel] = useState({});   // { alumnoId: aulaId elegida }
  const [verId, setVerId] = useState(null);      // alumno cuyas fotos se están mirando
  const [urls, setUrls] = useState({});          // URLs firmadas de las fotos
  const [proc, setProc] = useState(false);
  const [refNombres, setRefNombres] = useState({});  // { referido_por: nombre }
  const toast = useToast();

  const load = async () => {
    const [{ data: pend }, { data: aus }] = await Promise.all([
      supabase.from('alumnos').select('*').eq('estado', 'pendiente').order('created_at', { ascending: true }),
      supabase.from('aulas').select('id, nombre, estado').order('created_at', { ascending: false }),
    ]);
    // Resolver nombres de quienes refirieron a estos inscriptos (para mostrarlos).
    try {
      const refIds = [...new Set((pend || []).map(p => p.referido_por).filter(Boolean))];
      if (refIds.length) {
        const { data: refs } = await supabase.from('alumnos').select('id, nombre').in('id', refIds);
        const map = {}; (refs || []).forEach(r => { map[r.id] = r.nombre; }); setRefNombres(map);
      }
    } catch {}
    setPendientes(pend || []);
    setAulas(aus || []);
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, []);

  const verFotos = async (al) => {
    if (verId === al.id) { setVerId(null); return; }
    setVerId(al.id); setUrls({});
    const firmar = async (path) => {
      if (!path) return null;
      const { data } = await supabase.storage.from(BUCKET_DOCS).createSignedUrl(path, 600);
      return data?.signedUrl || null;
    };
    const [selfie, frente, dorso] = await Promise.all([firmar(al.selfie_path), firmar(al.dni_frente_path), firmar(al.dni_dorso_path)]);
    setUrls({ selfie, frente, dorso });
  };

  const aprobar = async (al) => {
    const aulaId = aulaSel[al.id];
    if (!aulaId) return toast('Elegí a qué aula lo mandás', 'error');
    setProc(true);
    const { error } = await supabase.from('alumnos').update({ estado: 'activo', aula_id: aulaId }).eq('id', al.id);
    setProc(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(`${al.nombre} aprobado ✅`, 'success');
    setVerId(null); load();
  };

  const rechazar = async (al) => {
    if (!confirm(`¿Rechazar la inscripción de ${al.nombre}?\n\nSe borran sus fotos y no podrá ingresar.`)) return;
    setProc(true);
    const paths = [al.selfie_path, al.dni_frente_path, al.dni_dorso_path].filter(Boolean);
    if (paths.length) { try { await supabase.storage.from(BUCKET_DOCS).remove(paths); } catch {} }
    const { error } = await supabase.from('alumnos').update({ estado: 'rechazado' }).eq('id', al.id);
    setProc(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast('Inscripción rechazada', 'info');
    setVerId(null); load();
  };

  const fmtFecha = (v) => { try { return new Date(v).toLocaleString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires' }); } catch { return ''; } };
  const imgBox = { width:'100%', borderRadius:8, border:'1px solid var(--border)', display:'block' };

  return (
    <div className="page-content fade-in">
      <div className="page-header"><div>
        <div className="page-title">🆕 Inscripciones</div>
        <div className="page-subtitle">Alumnos que se registraron y esperan tu aprobación</div>
      </div></div>

      {loading ? <div style={{padding:30,textAlign:'center',color:'var(--text2)'}}>Cargando…</div>
      : pendientes.length === 0 ? (
        <div className="card" style={{textAlign:'center',padding:'50px 20px',color:'var(--text2)'}}>
          <div style={{fontSize:'2.6rem',marginBottom:10}}>✅</div>
          No hay inscripciones pendientes por ahora.
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {pendientes.map(al => (
            <div key={al.id} className="card" style={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
                <div>
                  <div style={{fontWeight:700,fontSize:'1rem'}}>{al.nombre}</div>
                  <div style={{fontSize:'0.82rem',color:'var(--text2)'}}>📧 {al.email}</div>
                  <div style={{fontSize:'0.82rem',color:'var(--text2)'}}>🪪 DNI: {al.dni || '—'}</div>
                  <div style={{fontSize:'0.72rem',color:'var(--text2)',marginTop:4}}>Inscripto: {fmtFecha(al.created_at)}{al.tyc_aceptado ? ' · ✅ aceptó T&C' : ''}</div>
                  {Array.isArray(al.dispositivos) && al.dispositivos.length > 0 && (
                    <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:6}}>
                      <b>Dispositivos:</b>
                      {al.dispositivos.map((d, i) => (
                        <div key={i} style={{marginLeft:4}}>{d.tipo === 'celular' ? '📱 IMEI: ' : '💻 MAC: '}{d.id}</div>
                      ))}
                    </div>
                  )}
                  {al.referido_por && (
                    <div style={{fontSize:'0.75rem',color:'var(--success)',marginTop:6,fontWeight:600}}>🎁 Lo refirió: {refNombres[al.referido_por] || '(alumno)'}</div>
                  )}
                </div>
                <button className="btn btn-ghost btn-sm" onClick={() => verFotos(al)}>{verId === al.id ? 'Ocultar fotos' : '🖼️ Ver fotos'}</button>
              </div>

              {verId === al.id && (
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:10,marginTop:12}}>
                  {[['Selfie','selfie'],['DNI frente','frente'],['DNI dorso','dorso']].map(([lbl,k]) => (
                    <div key={k}>
                      <div style={{fontSize:'0.72rem',color:'var(--text2)',fontWeight:600,marginBottom:4}}>{lbl}</div>
                      {urls[k]
                        ? <a href={urls[k]} target="_blank" rel="noreferrer"><img src={urls[k]} alt={lbl} style={imgBox} /></a>
                        : <div style={{fontSize:'0.75rem',color:'var(--text2)'}}>Cargando…</div>}
                    </div>
                  ))}
                </div>
              )}

              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginTop:14,borderTop:'1px solid var(--border)',paddingTop:12}}>
                <span style={{fontSize:'0.8rem',color:'var(--text2)'}}>Aula:</span>
                <select value={aulaSel[al.id] || ''} onChange={e => setAulaSel(s => ({ ...s, [al.id]: e.target.value }))}
                  style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)'}}>
                  <option value="">Elegí un aula…</option>
                  {aulas.map(a => <option key={a.id} value={a.id}>{a.nombre}{a.estado === 'cerrada' ? ' (cerrada)' : ''}</option>)}
                </select>
                <button className="btn btn-success btn-sm" onClick={() => aprobar(al)} disabled={proc}>✅ Aprobar</button>
                <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={() => rechazar(al)} disabled={proc}>🚫 Rechazar</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AdminAlumnos({ aulaActiva }) {
  const [alumnos, setAlumnos] = useState([]);
  const [pagosMap, setPagosMap] = useState({});   // { alumno_id: total_pagado }
  const [orden, setOrden] = useState('az');         // 'az' o 'za'
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(false);
  const [pwModal, setPwModal] = useState(null);
  const [newPw, setNewPw] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [form, setForm] = useState({ nombre: '', email: '', telefono: '', estado: 'activo', password: '' });
  const [editing, setEditing] = useState(null);
  const toast = useToast();
  const fileRef = useRef();

  const load = async () => {
    if (!aulaActiva) { setLoading(false); return; }
    const [al, pg] = await Promise.all([
      supabase.from('alumnos').select('*').eq('aula_id', aulaActiva).order('created_at', { ascending: false }),
      supabase.from('pagos').select('alumno_id, monto'),
    ]);
    setAlumnos(al.data || []);
    const mapa = {};
    (pg.data || []).forEach(p => {
      if (!p.alumno_id) return;
      mapa[p.alumno_id] = (mapa[p.alumno_id] || 0) + (parseFloat(p.monto) || 0);
    });
    setPagosMap(mapa);
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [aulaActiva]);

  const callEdge = async (action, payload) => {
    const { data: { session } } = await supabase.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/manage-users`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session?.access_token}` },
      body: JSON.stringify({ action, ...payload })
    });
    return res.json();
  };

  const save = async () => {
    if (!form.nombre || !form.email) return toast('Nombre y email requeridos', 'error');
    if (!editing && !form.password) return toast('La contraseña es requerida', 'error');
    if (!editing && form.password.length < 6) return toast('Mínimo 6 caracteres', 'error');
    setSaving(true);
    try {
      if (editing) {
        const updatePayload = { nombre: form.nombre, estado: form.estado };
        if (form.telefono) updatePayload.telefono = form.telefono;
        const { error } = await supabase.from('alumnos').update(updatePayload).eq('id', editing);
        if (error) throw new Error(error.message);
        toast('Alumno actualizado ✏️', 'success');
      } else {
        const { data: { session: adminSession } } = await supabase.auth.getSession();
        const { data, error: authError } = await supabase.auth.signUp({
          email: form.email,
          password: form.password,
          options: { data: { nombre: form.nombre } }
        });
        if (authError) throw new Error(authError.message);
        if (adminSession) {
          await supabase.auth.setSession({ access_token: adminSession.access_token, refresh_token: adminSession.refresh_token });
        }
        const insertPayload = { nombre: form.nombre, email: form.email, estado: form.estado || 'activo', aula_id: aulaActiva };
        if (form.telefono) insertPayload.telefono = form.telefono;
        const { error: dbError } = await supabase.from('alumnos').insert(insertPayload);
        if (dbError) throw new Error(dbError.message);
        toast('Alumno creado ✅', 'success');
      }
      setModal(false); setEditing(null); setForm({ nombre: '', email: '', telefono: '', estado: 'activo', password: '' });
      load();
    } catch (err) { toast(err.message, 'error'); }
    finally { setSaving(false); }
  };


  const changePassword = async () => {
    if (!newPw || newPw.length < 6) return toast('Mínimo 6 caracteres', 'error');
    setSaving(true);
    try {
      toast('Para cambiar la contraseña de un alumno, hacelo desde Supabase → Authentication → Users → click en el usuario → Change password', 'info');
      setPwModal(null); setNewPw('');
    } catch (err) { toast(err.message, 'error'); }
    finally { setSaving(false); }
  };

  const remove = async id => {
    if (!confirm('¿Eliminar alumno?')) return;
    await supabase.from('alumnos').delete().eq('id', id);
    toast('Alumno eliminado', 'info'); load();
  };

  const importExcel = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const wb = XLSX.read(ev.target.result, { type: 'binary' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws);
        const mapped = rows.map(r => ({
          nombre: r.nombre || r.Nombre || r.NOMBRE || '',
          email: (r.email || r.Email || r.EMAIL || '').toString().trim().toLowerCase(),
          telefono: r.dni || r.DNI || r.telefono || r.Telefono || '',
          estado: r.estado || r.Estado || 'activo',
          password: (r.password || r.contraseña || r.Contraseña || r.PASSWORD || '123456').toString(),
        })).filter(r => r.email);

        if (!mapped.length) return toast('No se encontraron datos válidos. Verificá que el Excel tenga columnas: nombre, email, telefono, password', 'error');

        // Guardar sesión admin
        const { data: { session: adminSession } } = await supabase.auth.getSession();

        let creados = 0, errores = 0, omitidos = 0;
        const resultados = [];

        toast(`⏳ Procesando ${mapped.length} alumnos...`, 'info');

        for (const alumno of mapped) {
          try {
            // 1. Crear en Supabase Auth
            const { error: authError } = await supabase.auth.signUp({
              email: alumno.email,
              password: alumno.password,
              options: { data: { nombre: alumno.nombre } }
            });

            // Restaurar sesión admin después de cada signUp
            if (adminSession) {
              await supabase.auth.setSession({
                access_token: adminSession.access_token,
                refresh_token: adminSession.refresh_token
              });
            }

            if (authError && !authError.message.includes('already registered')) {
              errores++;
              resultados.push(`❌ ${alumno.email}: ${authError.message}`);
              continue;
            }
            if (authError?.message.includes('already registered')) {
              omitidos++;
            }

            // 2. Insertar en tabla alumnos (si no existe)
            const { error: dbError } = await supabase.from('alumnos').insert({
              nombre: alumno.nombre,
              email: alumno.email,
              telefono: alumno.telefono || null,
              estado: alumno.estado || 'activo',
              aula_id: aulaActiva,
            });

            if (dbError && !dbError.message.includes('duplicate')) {
              errores++;
              resultados.push(`❌ DB ${alumno.email}: ${dbError.message}`);
            } else {
              creados++;
            }

            // Pequeña pausa para no saturar la API
            await new Promise(r => setTimeout(r, 300));

          } catch (err) {
            errores++;
            resultados.push(`❌ ${alumno.email}: ${err.message}`);
          }
        }

        // Mostrar resumen
        const resumen = `✅ ${creados} creados${omitidos ? `, ⚠️ ${omitidos} ya existían` : ''}${errores ? `, ❌ ${errores} errores` : ''}`;
        toast(resumen, errores > 0 ? 'error' : 'success');
        if (resultados.length) console.log('Detalle importación:', resultados);
        load();

      } catch (err) {
        toast('Error al leer el archivo: ' + err.message, 'error');
      }
    };
    reader.readAsBinaryString(file);
    e.target.value = '';
  };

  const downloadTemplate = () => {
    const ws = XLSX.utils.aoa_to_sheet([
      ['nombre', 'email', 'telefono', 'estado', 'password'],
      ['Juan Pérez', 'juan@ejemplo.com', '11-2345-6789', 'activo', 'clave123'],
      ['María López', 'maria@ejemplo.com', '11-9876-5432', 'activo', 'clave456'],
    ]);
    ws['!cols'] = [{ wch: 25 }, { wch: 30 }, { wch: 18 }, { wch: 10 }, { wch: 15 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Alumnos');
    XLSX.writeFile(wb, 'plantilla_alumnos.xlsx');
  };

  const openEdit = a => { setForm({ nombre: a.nombre, email: a.email, telefono: a.telefono || '', estado: a.estado, password: '' }); setEditing(a.id); setModal(true); };

  const fmtPesos = n => '$' + (n || 0).toLocaleString('es-AR');

  const filtered = alumnos
    .filter(a => `${a.nombre} ${a.email}`.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => {
      const cmp = (a.nombre || '').localeCompare(b.nombre || '', 'es', { sensitivity: 'base' });
      return orden === 'az' ? cmp : -cmp;
    });

  const exportarExcel = () => {
    if (!filtered.length) return toast('No hay alumnos para exportar', 'error');
    const datos = filtered.map(a => ({
      Nombre: a.nombre || '',
      Email: a.email || '',
      DNI: a.telefono || '',
      Estado: a.estado || '',
      'Total pagado': pagosMap[a.id] || 0,
    }));
    const ws = XLSX.utils.json_to_sheet(datos);
    ws['!cols'] = [{ wch: 28 }, { wch: 30 }, { wch: 14 }, { wch: 10 }, { wch: 16 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Alumnos');
    const hoy = new Date();
    const fecha = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;
    XLSX.writeFile(wb, `alumnos_${fecha}.xlsx`);
    toast('Listado exportado 📤', 'success');
  };

  if (!aulaActiva) return <SinAula />;
  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">👥 Alumnos</div>
          <div className="page-subtitle">{alumnos.length} alumnos registrados</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importExcel} />
          <button className="btn btn-ghost" onClick={downloadTemplate}>📋 Plantilla</button>
          <button className="btn btn-ghost" onClick={() => fileRef.current.click()}>📥 Importar Excel</button>
          <button className="btn btn-ghost" onClick={exportarExcel}>📤 Exportar Excel</button>
          <button className="btn btn-primary" onClick={() => { setForm({ nombre: '', email: '', telefono: '', estado: 'activo', password: '' }); setEditing(null); setModal(true); }}>➕ Nuevo alumno</button>
        </div>
      </div>
      <div className="search-bar" style={{marginBottom:16}}>
        <span className="search-icon">🔍</span>
        <input placeholder="Buscar por nombre o email..." value={search} onChange={e => setSearch(e.target.value)} />
      </div>
      <div className="table-wrap">
        {filtered.length === 0 ? <Empty icon="👥" text="No hay alumnos" /> : (
          <table>
            <thead><tr>
              <th style={{cursor:'pointer',userSelect:'none'}} onClick={() => setOrden(o => o === 'az' ? 'za' : 'az')} title="Ordenar por nombre">
                Nombre {orden === 'az' ? '▲' : '▼'}
              </th>
              <th>Email</th><th>DNI</th><th>Estado</th><th>Total pagado</th><th>Acciones</th>
            </tr></thead>
            <tbody>
              {filtered.map(a => (
                <tr key={a.id}>
                  <td><strong>{a.nombre}</strong></td>
                  <td style={{color:'var(--text2)'}}>{a.email}</td>
                  <td style={{color:'var(--text2)'}}>{a.telefono || '—'}</td>
                  <td><span className={`chip ${a.estado === 'activo' ? 'chip-green' : 'chip-red'}`}>{a.estado}</span></td>
                  <td>
                    {pagosMap[a.id]
                      ? <strong style={{color:'var(--success)'}}>{fmtPesos(pagosMap[a.id])}</strong>
                      : <span style={{color:'var(--text2)'}}>$0</span>}
                  </td>
                  <td>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-ghost btn-sm" onClick={() => openEdit(a)}>✏️ Editar</button>
                      <button className="btn btn-ghost btn-sm" title="Cambiar contraseña" onClick={() => { setPwModal(a); setNewPw(''); setShowPw(false); }}>🔑</button>
                      <button className="btn btn-danger btn-sm" onClick={() => remove(a.id)}>🗑️</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {modal && (
        <Modal title={editing ? '✏️ Editar alumno' : '➕ Nuevo alumno'} onClose={() => setModal(false)}>
          {!editing && (
            <div style={{background:'rgba(108,99,255,0.08)',border:'1px solid rgba(108,99,255,0.25)',borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:'0.82rem',color:'var(--text2)'}}>
              🔐 Se creará el usuario en Supabase Auth y el registro en la plataforma automáticamente.
            </div>
          )}
          <div className="form-group">
            <label>Nombre completo</label>
            <input value={form.nombre} onChange={e => setForm(p => ({ ...p, nombre: e.target.value }))} placeholder="Ej: Juan Pérez" />
          </div>
          <div className="form-group">
            <label>Email</label>
            <input type="email" value={form.email} onChange={e => setForm(p => ({ ...p, email: e.target.value }))} placeholder="alumno@email.com" disabled={!!editing} style={editing ? {opacity:0.5,cursor:'not-allowed'} : {}} />
          </div>
          <div className="form-group">
            <label>DNI</label>
            <input value={form.telefono} onChange={e => setForm(p => ({ ...p, telefono: e.target.value }))} placeholder="Ej: 12345678" />
          </div>
          {!editing && (
            <div className="form-group">
              <label>🔑 Contraseña de acceso</label>
              <div style={{position:'relative'}}>
                <input type={showPw ? 'text' : 'password'} value={form.password} onChange={e => setForm(p => ({ ...p, password: e.target.value }))} placeholder="Mínimo 6 caracteres" style={{paddingRight:44}} />
                <button type="button" onClick={() => setShowPw(v => !v)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:'1.1rem'}}>{showPw ? '🙈' : '👁️'}</button>
              </div>
            </div>
          )}
          {editing && (
            <div className="form-group">
              <label>Estado</label>
              <select value={form.estado} onChange={e => setForm(p => ({ ...p, estado: e.target.value }))}>
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
              </select>
            </div>
          )}
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => setModal(false)} disabled={saving}>Cancelar</button>
            <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? '⏳ Guardando...' : '💾 Guardar'}</button>
          </div>
        </Modal>
      )}

      {pwModal && (
        <Modal title={`🔑 Cambiar contraseña`} onClose={() => setPwModal(null)}>
          <div style={{color:'var(--text2)',fontSize:'0.84rem',marginBottom:16}}>
            Nueva contraseña para <strong style={{color:'var(--text)'}}>{pwModal.nombre}</strong> ({pwModal.email})
          </div>
          <div className="form-group">
            <label>Nueva contraseña</label>
            <div style={{position:'relative'}}>
              <input type={showPw ? 'text' : 'password'} value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="Mínimo 6 caracteres" style={{paddingRight:44}} autoFocus />
              <button type="button" onClick={() => setShowPw(v => !v)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:'1.1rem'}}>{showPw ? '🙈' : '👁️'}</button>
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => setPwModal(null)} disabled={saving}>Cancelar</button>
            <button className="btn btn-primary" onClick={changePassword} disabled={saving}>{saving ? '⏳ Cambiando...' : '🔑 Actualizar contraseña'}</button>
          </div>
        </Modal>
      )}
    </div>
  );

}
// ─── ADMIN PAGOS ──────────────────────────────────────────────────────
function AdminPagos({ aulaActiva }) {
  const today = new Date().toISOString().split('T')[0];
  const PLANES = ['Parcial', 'Final', 'Cursado Completo'];
  const emptyForm = { alumno_id: '', plan: 'Cursado Completo', monto: '', fecha_pago: today, proximo_pago: '', notas: '' };

  const [pagos, setPagos] = useState([]);
  const [alumnos, setAlumnos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState(emptyForm);
  const [filterAlumno, setFilterAlumno] = useState('');
  const [filterMes, setFilterMes] = useState('');
  const [soloSinFacturar, setSoloSinFacturar] = useState(false);
  const [precios, setPrecios] = useState({});         // precio por plan de esta aula
  const [preciosModal, setPreciosModal] = useState(false);
  const [preciosForm, setPreciosForm] = useState({});
  const [arcaProbando, setArcaProbando] = useState(false);
  const [arcaMsg, setArcaMsg] = useState(null);
  const [facturandoId, setFacturandoId] = useState(null);
  const [facturaVer, setFacturaVer] = useState(null);
  const [refCount, setRefCount] = useState({});       // { referrerId: cant referidos que ya pagaron }
  const [aplicarDesc, setAplicarDesc] = useState(false); // aplicar descuento por referidos al pago que se registra
  const toast = useToast();

  const load = async () => {
    if (!aulaActiva) { setLoading(false); return; }
    // Los pagos no tienen aula: se filtran por los alumnos que pertenecen al aula activa.
    // Se intenta traer las columnas de referidos; si aún no existen (SQL sin correr), se cae al set básico.
    let aData = null;
    {
      const r1 = await supabase.from('alumnos').select('id, nombre, estado, referido_por, ref_desc_usados').eq('aula_id', aulaActiva).order('nombre');
      if (r1.error) {
        const r2 = await supabase.from('alumnos').select('id, nombre, estado').eq('aula_id', aulaActiva).order('nombre');
        aData = r2.data;
      } else aData = r1.data;
    }
    const { data: aulaRow } = await supabase.from('aulas').select('precios').eq('id', aulaActiva).single();
    setPrecios(aulaRow?.precios || {});
    const idsAula = (aData || []).map(a => a.id);
    let pData = [];
    if (idsAula.length) {
      const { data } = await supabase.from('pagos').select('*, alumnos(nombre, email)').in('alumno_id', idsAula).order('fecha_pago', { ascending: false });
      pData = data || [];
    }
    // Referidos: contar, por cada alumno de esta aula, cuántos referidos suyos YA hicieron al menos un pago.
    const refMap = {};
    try {
      if (idsAula.length) {
        const { data: referidos } = await supabase.from('alumnos').select('id, referido_por').in('referido_por', idsAula);
        const refIds = (referidos || []).map(r => r.id);
        const conPago = new Set();
        if (refIds.length) {
          const { data: pagosRef } = await supabase.from('pagos').select('alumno_id').in('alumno_id', refIds);
          (pagosRef || []).forEach(p => conPago.add(p.alumno_id));
        }
        (referidos || []).forEach(r => { if (conPago.has(r.id)) refMap[r.referido_por] = (refMap[r.referido_por] || 0) + 1; });
      }
    } catch {}
    setRefCount(refMap);
    setPagos(pData); setAlumnos(aData || []); setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [aulaActiva]);

  const save = async () => {
    if (!form.alumno_id) return toast('Seleccioná un alumno', 'error');
    if (!form.monto || isNaN(parseFloat(form.monto))) return toast('Ingresá un importe válido', 'error');
    if (!form.plan) return toast('Seleccioná el tipo de plan', 'error');

    // Descuento por referidos (solo en pagos nuevos, si el docente lo activó y hay crédito disponible).
    const nDesc = (!editing && aplicarDesc) ? descRefDisponible(form.alumno_id) : 0;
    const montoDesc = montoDescRef(form.plan, nDesc);
    let montoFinal = parseFloat(form.monto);
    let notasFinal = form.notas || null;
    if (nDesc > 0 && montoDesc > 0) {
      montoFinal = Math.max(0, montoFinal - montoDesc);
      notasFinal = `${notasFinal ? notasFinal + ' · ' : ''}Descuento ${nDesc * 5}% por referidos (-$${montoDesc.toLocaleString('es-AR')})`;
    }

    const payload = {
      alumno_id: form.alumno_id,
      plan: form.plan,
      monto: montoFinal,
      fecha_pago: form.fecha_pago || today,
      proximo_pago: form.proximo_pago || null,
      notas: notasFinal,
    };
    const { error } = editing
      ? await supabase.from('pagos').update(payload).eq('id', editing)
      : await supabase.from('pagos').insert(payload);
    if (error) return toast(error.message, 'error');
    // Descontar el crédito de referidos usado.
    if (nDesc > 0 && montoDesc > 0) {
      try {
        const al = alumnos.find(a => a.id === form.alumno_id);
        await supabase.from('alumnos').update({ ref_desc_usados: (al?.ref_desc_usados || 0) + nDesc }).eq('id', form.alumno_id);
      } catch {}
    }
    // Si tiene próximo pago, crear recordatorio automático
    if (!editing && form.proximo_pago && form.alumno_id) {
      await supabase.from('recordatorios').insert({
        alumno_id: form.alumno_id,
        fecha: form.proximo_pago,
        mensaje: `Próximo pago — ${form.plan} — $${montoFinal.toLocaleString('es-AR')}`,
      });
    }
    toast(editing ? 'Pago actualizado ✏️' : 'Pago registrado 💳', 'success');
    setModal(false); setEditing(null); setForm(emptyForm); setAplicarDesc(false); load();
  };

  const remove = async id => {
    if (!confirm('¿Eliminar este pago?')) return;
    await supabase.from('pagos').delete().eq('id', id);
    toast('Pago eliminado', 'info'); load();
  };

  // Prueba de conexión con ARCA (etapa 1: solo autenticación).
  const probarArca = async () => {
    setArcaProbando(true); setArcaMsg(null);
    try {
      const { data: { session } } = await supabase.auth.getSession();
      const res = await fetch(`${SUPABASE_URL}/functions/v1/facturar-arca?action=auth-test`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY, Authorization: `Bearer ${session?.access_token}` },
      });
      const txt = await res.text();
      let j = null; try { j = JSON.parse(txt); } catch {}
      console.log('[ARCA auth-test]', res.status, txt);
      if (j && j.ok) setArcaMsg({ ok: true, txt: j.mensaje || 'Autenticación OK' });
      else setArcaMsg({ ok: false, txt: (j && j.error) ? j.error : `HTTP ${res.status}: ${txt.slice(0, 400) || '(respuesta vacía)'}` });
    } catch (e) {
      setArcaMsg({ ok: false, txt: 'No se pudo llamar a la función: ' + (e?.message || e) });
    } finally { setArcaProbando(false); }
  };

  // Emitir la Factura C de un pago (etapa 2).
  const facturarPago = async (pago) => {
    if (pago.factura_cae) return;
    if (!confirm(`¿Emitir Factura C por $ ${parseFloat(pago.monto).toLocaleString('es-AR')} de ${pago.alumnos?.nombre || 'este alumno'}?`)) return;
    setFacturandoId(pago.id); setArcaMsg(null);
    try {
      const { data: { session } } = await supabase.auth.getSession();
      const res = await fetch(`${SUPABASE_URL}/functions/v1/facturar-arca?action=facturar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY, Authorization: `Bearer ${session?.access_token}` },
        body: JSON.stringify({ pago_id: pago.id }),
      });
      const txt = await res.text();
      let j = null; try { j = JSON.parse(txt); } catch {}
      console.log('[ARCA facturar]', res.status, txt);
      if (j && j.ok) {
        setArcaMsg({ ok: true, txt: `Factura C ${j.nroFmt || j.nro || ''} emitida. CAE: ${j.cae}${j.caeVto ? ' (vto ' + j.caeVto + ')' : ''}` });
        load();
      } else {
        setArcaMsg({ ok: false, txt: (j && j.error) ? j.error : `HTTP ${res.status}: ${txt.slice(0, 500)}` });
      }
    } catch (e) {
      setArcaMsg({ ok: false, txt: 'No se pudo llamar a la función: ' + (e?.message || e) });
    } finally { setFacturandoId(null); }
  };

  const guardarPrecios = async () => {
    const limpio = {};
    PLANES.forEach(pl => {
      const f = preciosForm[pl] || {};
      const u = parseFloat(f.unico), c = parseFloat(f.cuotas);
      const obj = {};
      if (!isNaN(u) && u > 0) obj.unico = u;
      if (!isNaN(c) && c > 0) obj.cuotas = c;
      if (Object.keys(obj).length) limpio[pl] = obj;
    });
    const { error } = await supabase.from('aulas').update({ precios: limpio }).eq('id', aulaActiva);
    if (error) return toast('Error: ' + error.message, 'error');
    setPrecios(limpio); setPreciosModal(false);
    toast('Precios guardados ✅', 'success');
  };

  const openEdit = p => {
    setForm({
      alumno_id: p.alumno_id,
      plan: p.plan || 'Cursado Completo',
      monto: p.monto?.toString() || '',
      fecha_pago: p.fecha_pago || today,
      proximo_pago: p.proximo_pago || '',
      notas: p.notas || '',
    });
    setEditing(p.id); setAplicarDesc(false); setModal(true);
  };

  const totalCobrado = pagos.reduce((s, p) => s + (parseFloat(p.monto) || 0), 0);
  const proximosVenc = pagos.filter(p => p.proximo_pago && p.proximo_pago >= today);
  const meses = [...new Set(pagos.filter(p => p.fecha_pago).map(p => p.fecha_pago.slice(0, 7)))].sort().reverse();
  const mesLabel = (ym) => { const [y, m] = ym.split('-'); const s = new Date(parseInt(y), parseInt(m) - 1, 1).toLocaleDateString('es-AR', { month: 'long', year: 'numeric' }); return s.charAt(0).toUpperCase() + s.slice(1); };
  let filtered = pagos;
  if (filterAlumno) filtered = filtered.filter(p => p.alumno_id === filterAlumno);
  if (filterMes) filtered = filtered.filter(p => (p.fecha_pago || '').slice(0, 7) === filterMes);
  if (soloSinFacturar) filtered = filtered.filter(p => !p.factura_cae);
  const sinFacturar = pagos.filter(p => !p.factura_cae).length;

  // Alumnos que no tienen ningún pago registrado
  const idsConPago = new Set(pagos.map(p => p.alumno_id));
  const alumnosSinPago = alumnos.filter(a => !idsConPago.has(a.id));

  // Precio de un plan y resumen de pago de un alumno (helpers compartidos con los recordatorios).
  const precioPlan = (plan) => precioDePlan(precios, plan);
  const resumenAlumno = (alumnoId) => resumenPagoDe(pagos.filter(p => p.alumno_id === alumnoId), precios);
  // Descuento por referidos: cuántos 5% le quedan disponibles a un alumno (tope 2, menos los ya usados).
  const descRefDisponible = (alumnoId) => {
    const al = alumnos.find(a => a.id === alumnoId);
    if (!al) return 0;
    const califican = Math.min(2, refCount[al.id] || 0);
    return Math.max(0, califican - (al.ref_desc_usados || 0));
  };
  // Monto en $ del descuento por referidos = 5% del total del plan × cantidad de referidos aplicados.
  const montoDescRef = (plan, n) => {
    if (!n) return 0;
    const pp = precioPlan(plan);
    const base = pp.cuotas || pp.unico || 0;
    return Math.round(base * 0.05 * n);
  };
  const hayPrecios = PLANES.some(pl => { const o = precioPlan(pl); return o.unico > 0 || o.cuotas > 0; });
  const incompletos = alumnos
    .map(a => ({ a, r: resumenAlumno(a.id) }))
    .filter(x => x.r.cant > 0 && x.r.esperado > 0 && x.r.completo === false);
  const completos = alumnos
    .map(a => ({ a, r: resumenAlumno(a.id) }))
    .filter(x => x.r.cant > 0 && x.r.completo === true);

  // Al abrir Pagos, generar (si toca hoy) los recordatorios de vencimiento de los incompletos.
  useEffect(() => {
    if (loading || !aulaActiva) return;
    incompletos.forEach(({ a }) => generarRecordatorioPagoAlumno(a.id, aulaActiva));
  }, [loading, aulaActiva]);

  const planColor = plan => {
    if (plan === 'Parcial') return 'chip-yellow';
    if (plan === 'Final') return 'chip-green';
    return 'chip-blue';
  };

  if (!aulaActiva) return <SinAula />;
  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">💳 Pagos</div>
          <div className="page-subtitle">Total cobrado: <strong style={{color:'var(--success)'}}>$ {totalCobrado.toLocaleString('es-AR', {minimumFractionDigits:2})}</strong></div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-ghost" onClick={() => {
            const f = {};
            PLANES.forEach(pl => {
              const v = precios[pl];
              if (v == null) f[pl] = { unico: '', cuotas: '' };
              else if (typeof v === 'number') f[pl] = { unico: String(v), cuotas: '' };
              else f[pl] = { unico: v.unico != null ? String(v.unico) : '', cuotas: v.cuotas != null ? String(v.cuotas) : '' };
            });
            setPreciosForm(f); setPreciosModal(true);
          }}>⚙️ Precios de planes</button>
          <button className="btn btn-ghost" onClick={probarArca} disabled={arcaProbando} title="Probar la conexión con ARCA (facturación)">{arcaProbando ? '⏳ Probando...' : '🔌 Probar ARCA'}</button>
          <button className="btn btn-primary" onClick={() => { setForm(emptyForm); setEditing(null); setAplicarDesc(false); setModal(true); }}>➕ Registrar pago</button>
        </div>
      </div>

      {arcaMsg && (
        <div className="card" style={{padding:'12px 16px',marginBottom:16,borderColor: arcaMsg.ok?'var(--success)':'var(--danger)',background: arcaMsg.ok?'rgba(67,233,123,0.08)':'rgba(255,71,87,0.08)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
            <div style={{fontWeight:700,color: arcaMsg.ok?'var(--success)':'var(--danger)'}}>{arcaMsg.ok?'ARCA ✅ Conexión OK':'ARCA ❌ Error'}</div>
            <button className="btn btn-ghost btn-sm" onClick={() => setArcaMsg(null)}>✕</button>
          </div>
          <div style={{fontSize:'0.82rem',whiteSpace:'pre-wrap',wordBreak:'break-word',marginTop:6}}>{arcaMsg.txt}</div>
        </div>
      )}

      {/* Stats rápidas */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}}>
        {PLANES.map(plan => {
          const planPagos = pagos.filter(p => p.plan === plan);
          const planTotal = planPagos.reduce((s,p) => s + (parseFloat(p.monto)||0), 0);
          return (
            <div key={plan} className="card" style={{padding:'14px 18px'}}>
              <div style={{fontSize:'0.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)',marginBottom:6}}>{plan}</div>
              <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.1rem'}}>$ {planTotal.toLocaleString('es-AR',{minimumFractionDigits:2})}</div>
              <div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:2}}>{planPagos.length} pago{planPagos.length!==1?'s':''}</div>
            </div>
          );
        })}
        {proximosVenc.length > 0 && (
          <div className="card" style={{padding:'14px 18px',borderColor:'var(--accent2)'}}>
            <div style={{fontSize:'0.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--accent2)',marginBottom:6}}>🔔 Próximos pagos</div>
            <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.1rem'}}>{proximosVenc.length}</div>
            <div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:2}}>pendientes</div>
          </div>
        )}
        <div className="card" onClick={() => setSoloSinFacturar(v => !v)} title="Ver los pagos que faltan facturar"
          style={{padding:'14px 18px',cursor:'pointer',borderColor: soloSinFacturar ? 'var(--accent)' : (sinFacturar>0 ? 'var(--warning)' : 'var(--border)')}}>
          <div style={{fontSize:'0.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color: sinFacturar>0 ? 'var(--warning)' : 'var(--text2)',marginBottom:6}}>🧾 Sin facturar</div>
          <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.1rem'}}>{sinFacturar}</div>
          <div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:2}}>pago{sinFacturar!==1?'s':''} sin factura</div>
        </div>
      </div>

      {/* Alumnos sin ningún pago registrado */}
      {alumnosSinPago.length > 0 && (
        <div className="card" style={{padding:'16px 20px',marginBottom:20,borderColor:'var(--warning)',background:'rgba(255,165,2,0.06)'}}>
          <div style={{fontSize:'0.82rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--warning)',marginBottom:10}}>⚠️ Alumnos sin pagos registrados ({alumnosSinPago.length})</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {alumnosSinPago.map(a => (
              <button key={a.id} onClick={() => { setForm({ ...emptyForm, alumno_id: a.id }); setEditing(null); setAplicarDesc(false); setModal(true); }} className="btn btn-ghost btn-sm" title="Registrar un pago para este alumno" style={{display:'flex',alignItems:'center',gap:6}}>
                {a.nombre} <span style={{color:'var(--warning)',fontWeight:700}}>+</span>
              </button>
            ))}
          </div>
          <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:10}}>Tocá un alumno para registrarle un pago directamente.</div>
        </div>
      )}

      {/* Alumnos que pagaron una parte pero les falta completar */}
      {hayPrecios && incompletos.length > 0 && (
        <div className="card" style={{padding:'16px 20px',marginBottom:20,borderColor:'var(--accent2)',background:'rgba(255,101,132,0.06)'}}>
          <div style={{fontSize:'0.82rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--accent2)',marginBottom:10}}>💸 Pagos incompletos ({incompletos.length})</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {incompletos.map(({ a, r }) => (
              <button key={a.id} onClick={() => { setForm({ ...emptyForm, alumno_id: a.id, plan: r.plan || 'Cursado Completo' }); setEditing(null); setAplicarDesc(false); setModal(true); }} className="btn btn-ghost btn-sm" title="Registrar el pago que falta" style={{display:'flex',alignItems:'center',gap:6}}>
                {a.nombre} <span style={{color:'var(--accent2)',fontWeight:700}}>falta $ {r.falta.toLocaleString('es-AR')}</span>
              </button>
            ))}
          </div>
          <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:10}}>Pagaron una parte pero no el total del plan. Tocá uno para registrarle el pago que falta.</div>
        </div>
      )}

      {/* Alumnos que ya completaron el pago del plan */}
      {hayPrecios && completos.length > 0 && (
        <div className="card" style={{padding:'16px 20px',marginBottom:20,borderColor:'var(--success)',background:'rgba(67,233,123,0.06)'}}>
          <div style={{fontSize:'0.82rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--success)',marginBottom:10}}>✅ Pagos completos ({completos.length})</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {completos.map(({ a, r }) => (
              <button key={a.id} onClick={() => setFilterAlumno(a.id)} className="btn btn-ghost btn-sm" title="Ver detalle del alumno" style={{display:'flex',alignItems:'center',gap:6}}>
                {a.nombre} <span style={{color:'var(--success)',fontWeight:700}}>$ {r.paid.toLocaleString('es-AR')}</span>
              </button>
            ))}
          </div>
          <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:10}}>Ya pagaron el total de su plan. Tocá uno para ver su detalle.</div>
        </div>
      )}
      {!hayPrecios && (
        <div className="card" style={{padding:'12px 18px',marginBottom:20,borderColor:'var(--border)',fontSize:'0.82rem',color:'var(--text2)'}}>
          💡 Configurá el precio de cada plan con el botón <strong>⚙️ Precios de planes</strong> para ver quién completó el pago y a quién le falta.
        </div>
      )}
      <div style={{display:'flex',gap:10,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
        <select value={filterAlumno} onChange={e => setFilterAlumno(e.target.value)} style={{flex:1,minWidth:170,maxWidth:280}}>
          <option value="">Todos los alumnos</option>
          {alumnos.map(a => <option key={a.id} value={a.id}>{a.nombre}</option>)}
        </select>
        <select value={filterMes} onChange={e => setFilterMes(e.target.value)} style={{minWidth:150}}>
          <option value="">Todos los meses</option>
          {meses.map(ym => <option key={ym} value={ym}>{mesLabel(ym)}</option>)}
        </select>
        <button className={`btn btn-sm ${soloSinFacturar ? 'btn-primary' : 'btn-ghost'}`} onClick={() => setSoloSinFacturar(v => !v)}>🧾 Sin facturar</button>
        {(filterAlumno || filterMes || soloSinFacturar) && <button className="btn btn-ghost btn-sm" onClick={() => { setFilterAlumno(''); setFilterMes(''); setSoloSinFacturar(false); }}>✕ Quitar filtros</button>}
        <span style={{fontSize:'0.82rem',color:'var(--text2)'}}>{filtered.length} registros</span>
      </div>

      {/* Resumen del alumno filtrado: cuánto pagó, cuánto es el plan, si completó o cuánto falta */}
      {filterAlumno && (() => {
        const r = resumenAlumno(filterAlumno);
        const al = alumnos.find(a => a.id === filterAlumno);
        return (
          <div className="card" style={{padding:'14px 18px',marginBottom:16,borderColor: r.completo ? 'var(--success)' : (r.completo===false ? 'var(--warning)' : 'var(--border)')}}>
            <div style={{display:'flex',flexWrap:'wrap',gap:16,alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontWeight:700}}>{al?.nombre || '—'}</div>
                <div style={{fontSize:'0.8rem',color:'var(--text2)'}}>Plan: {r.plan || '—'} · {r.cant} pago{r.cant!==1?'s':''}</div>
              </div>
              <div style={{display:'flex',gap:22,flexWrap:'wrap',alignItems:'center'}}>
                <div><div style={{fontSize:'0.68rem',color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.05em'}}>Pagó</div><div style={{fontFamily:'Space Mono',fontWeight:700}}>$ {r.paid.toLocaleString('es-AR',{minimumFractionDigits:2})}</div></div>
                <div><div style={{fontSize:'0.68rem',color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.05em'}}>Total a pagar</div><div style={{fontFamily:'Space Mono',fontWeight:700}}>{r.esperado>0 ? '$ '+r.esperado.toLocaleString('es-AR',{minimumFractionDigits:2}) : '—'}</div></div>
                <div>
                  {r.esperado<=0
                    ? <span className="chip" style={{background:'var(--surface2)',color:'var(--text2)'}}>Configurá el precio del plan</span>
                    : r.completo
                      ? <span className="chip chip-green">✅ Completó el pago</span>
                      : <span className="chip chip-yellow">⚠️ Falta $ {r.falta.toLocaleString('es-AR',{minimumFractionDigits:2})}</span>}
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Tabla */}
      <div className="table-wrap">
        {filtered.length === 0 ? <Empty icon="💳" text="No hay pagos registrados" /> : (
          <table>
            <thead>
              <tr>
                <th>Alumno</th>
                <th>Plan</th>
                <th>Importe</th>
                <th>Fecha de pago</th>
                <th>Próximo pago</th>
                <th>Notas</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => {
                const vencHoy = p.proximo_pago === today;
                const vencProx = p.proximo_pago && p.proximo_pago > today;
                const vencPasado = p.proximo_pago && p.proximo_pago < today;
                return (
                  <tr key={p.id}>
                    <td>
                      <strong>{p.alumnos?.nombre || '—'}</strong>
                      <br/><span style={{fontSize:'0.73rem',color:'var(--text2)'}}>{p.alumnos?.email}</span>
                    </td>
                    <td><span className={`chip ${planColor(p.plan)}`}>{p.plan || '—'}</span></td>
                    <td style={{fontFamily:'Space Mono',fontWeight:700,color:'var(--success)'}}>
                      {p.monto ? `$ ${parseFloat(p.monto).toLocaleString('es-AR',{minimumFractionDigits:2})}` : '—'}
                    </td>
                    <td style={{color:'var(--text2)',fontSize:'0.84rem'}}>
                      {p.fecha_pago ? new Date(p.fecha_pago+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'}) : '—'}
                    </td>
                    <td>
                      {p.proximo_pago ? (
                        <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:'0.82rem',fontWeight:600,color:vencHoy?'var(--danger)':vencPasado?'var(--text2)':'var(--accent2)'}}>
                          {vencHoy?'🔴':vencPasado?'✅':' 🔔'}
                          {new Date(p.proximo_pago+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})}
                        </span>
                      ) : <span style={{color:'var(--text2)',fontSize:'0.82rem'}}>—</span>}
                    </td>
                    <td style={{maxWidth:160,color:'var(--text2)',fontSize:'0.8rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.notas||'—'}</td>
                    <td>
                      <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                        {p.factura_cae
                          ? <button className="btn btn-ghost btn-sm" title="Ver / imprimir factura" onClick={() => setFacturaVer(p)} style={{color:'var(--success)',fontWeight:700,fontSize:'0.72rem',whiteSpace:'nowrap'}}>🧾 {p.factura_nro}</button>
                          : <button className="btn btn-ghost btn-sm" disabled={facturandoId===p.id} onClick={() => facturarPago(p)}>{facturandoId===p.id ? '⏳...' : '🧾 Facturar'}</button>}
                        <button className="btn btn-ghost btn-sm" onClick={() => openEdit(p)}>✏️</button>
                        <button className="btn btn-danger btn-sm" onClick={() => remove(p.id)}>🗑️</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {facturaVer && <FacturaModal pago={facturaVer} onClose={() => setFacturaVer(null)} />}

      {preciosModal && (
        <Modal title="⚙️ Precios de los planes (esta aula)" onClose={() => setPreciosModal(false)}>
          <div style={{fontSize:'0.8rem',color:'var(--text2)',marginBottom:14}}>Por cada plan, poné el precio <strong>en 1 pago</strong> (contado) y el <strong>total en cuotas</strong> si paga en partes. Ej: Parcial = 110.000 en 1 pago / 120.000 total en cuotas. Si es el mismo, dejá vacío el de cuotas.</div>
          {PLANES.map(pl => (
            <div key={pl} style={{marginBottom:14,borderBottom:'1px solid var(--border)',paddingBottom:12}}>
              <div style={{fontWeight:700,marginBottom:8}}>{pl}</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div className="form-group" style={{margin:0}}>
                  <label style={{fontSize:'0.76rem'}}>En 1 pago</label>
                  <input type="number" min="0" value={preciosForm[pl]?.unico ?? ''} onChange={e => setPreciosForm(f => ({ ...f, [pl]: { ...(f[pl]||{}), unico: e.target.value } }))} placeholder="0" />
                </div>
                <div className="form-group" style={{margin:0}}>
                  <label style={{fontSize:'0.76rem'}}>Total en cuotas</label>
                  <input type="number" min="0" value={preciosForm[pl]?.cuotas ?? ''} onChange={e => setPreciosForm(f => ({ ...f, [pl]: { ...(f[pl]||{}), cuotas: e.target.value } }))} placeholder="(opcional)" />
                </div>
              </div>
            </div>
          ))}
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={guardarPrecios}>💾 Guardar precios</button>
        </Modal>
      )}

      {modal && (
        <Modal title={editing ? '✏️ Editar pago' : '➕ Registrar pago'} onClose={() => { setModal(false); setEditing(null); setForm(emptyForm); setAplicarDesc(false); }}>
          {/* Alumno */}
          <div className="form-group">
            <label>Alumno</label>
            <select value={form.alumno_id} onChange={e => { const v = e.target.value; setForm(p => ({ ...p, alumno_id: v })); setAplicarDesc(false); }}>
              <option value="">-- Seleccionar alumno --</option>
              {alumnos.map(a => <option key={a.id} value={a.id}>{a.nombre}</option>)}
            </select>
          </div>

          {/* Plan */}
          <div className="form-group">
            <label>Tipo de plan</label>
            <div style={{display:'flex',gap:8,marginTop:4}}>
              {PLANES.map(plan => (
                <label key={plan} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'10px 14px',border:`2px solid ${form.plan===plan?'var(--accent)':'var(--border)'}`,borderRadius:10,flex:1,justifyContent:'center',background:form.plan===plan?'rgba(108,99,255,0.1)':'transparent',fontSize:'0.84rem',fontWeight:600,transition:'all 0.15s'}}>
                  <input type="radio" name="plan" value={plan} checked={form.plan===plan} onChange={() => setForm(p=>({...p,plan}))} style={{width:'auto',margin:0}} />
                  {plan === 'Parcial' ? '💰' : plan === 'Final' ? '✅' : '📚'} {plan}
                </label>
              ))}
            </div>
          </div>

          {/* Importe */}
          <div className="form-group">
            <label>💵 Importe ($)</label>
            <div style={{position:'relative'}}>
              <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',fontFamily:'Space Mono',fontWeight:700}}>$</span>
              <input type="number" min="0" step="0.01" placeholder="0.00" value={form.monto} onChange={e => setForm(p => ({ ...p, monto: e.target.value }))} style={{paddingLeft:28}} />
            </div>
          </div>

          {/* Descuento por referidos (solo pagos nuevos, si tiene crédito disponible) */}
          {!editing && form.alumno_id && descRefDisponible(form.alumno_id) > 0 && (() => {
            const n = descRefDisponible(form.alumno_id);
            const md = montoDescRef(form.plan, n);
            const bruto = parseFloat(form.monto) || 0;
            return (
              <div style={{border:'1px solid var(--success)',background:'rgba(67,233,123,0.08)',borderRadius:10,padding:'12px 14px',marginBottom:14}}>
                <label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer'}}>
                  <input type="checkbox" checked={aplicarDesc} onChange={e => setAplicarDesc(e.target.checked)} style={{width:'auto',marginTop:3}} />
                  <span style={{fontSize:'0.84rem'}}>
                    🎁 <b>Descuento por referidos:</b> tiene <b>{n}</b> referido{n!==1?'s':''} que ya pagó{n!==1?'ron':''}. Aplicar <b>{n*5}% de su plan</b>{md>0 ? <> (<b>–$ {md.toLocaleString('es-AR')}</b>)</> : ''}.
                    {md<=0 && <span style={{color:'var(--warning)',display:'block',marginTop:4}}>⚠️ Configurá el precio del plan (⚙️) para calcular el monto del descuento.</span>}
                  </span>
                </label>
                {aplicarDesc && md>0 && (
                  <div style={{marginTop:8,fontSize:'0.82rem',fontWeight:700}}>
                    Total con descuento: <span style={{color:'var(--success)'}}>$ {Math.max(0, bruto - md).toLocaleString('es-AR')}</span>
                    <span style={{fontSize:'0.72rem',color:'var(--text2)',fontWeight:400}}> · la factura de ARCA sale por este monto</span>
                  </div>
                )}
              </div>
            );
          })()}

          {/* Fechas en grid */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="form-group">
              <label>📅 Fecha de pago</label>
              <input type="date" value={form.fecha_pago} onChange={e => setForm(p => ({ ...p, fecha_pago: e.target.value }))} />
            </div>
            <div className="form-group">
              <label>🔔 Próximo pago</label>
              <input type="date" value={form.proximo_pago} onChange={e => setForm(p => ({ ...p, proximo_pago: e.target.value }))} />
              <div style={{fontSize:'0.72rem',color:'var(--text2)',marginTop:3}}>Se crea un recordatorio automático</div>
            </div>
          </div>

          {/* Notas */}
          <div className="form-group">
            <label>📝 Notas (opcional)</label>
            <textarea placeholder="Ej: Pago primera cuota, descuento especial..." value={form.notas} onChange={e => setForm(p => ({ ...p, notas: e.target.value }))} style={{minHeight:70}} />
          </div>

          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => { setModal(false); setEditing(null); setForm(emptyForm); setAplicarDesc(false); }}>Cancelar</button>
            <button className="btn btn-primary" onClick={save}>💾 Guardar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── ADMIN VIDEOS ─────────────────────────────────────────────────────
function AdminVideos({ aulaActiva }) {
  const TEMA_COLORS = ['#6c63ff','#ff6584','#43e97b','#f9ca24','#06b6d4','#f97316','#a78bfa','#ec4899'];

  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);

  const [uploadPct, setUploadPct] = useState(0);
  const [modal, setModal] = useState(false);
  const [temaModal, setTemaModal] = useState(false);
  const [statsModal, setStatsModal] = useState(null); // video seleccionado para ver stats
  const [statsData, setStatsData] = useState([]);
  const [statsLoading, setStatsLoading] = useState(false);

  const [listaAlumnos, setListaAlumnos] = useState([]);

  const [editing, setEditing] = useState(null);
  const [editingTema, setEditingTema] = useState(null);
  const [bunnyVideos, setBunnyVideos] = useState([]);
  const [tab, setTab] = useState('bunny');
  const [vistaTab, setVistaTab] = useState('temas');
  const [expandedTemas, setExpandedTemas] = useState({});
  const [selectedFile, setSelectedFile] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [dragTema, setDragTema] = useState(null);
  const [dragOverTema, setDragOverTema] = useState(null);
  const fileRef = useRef();
  const toast = useToast();

  const load = async () => {
    if (!aulaActiva) { setLoading(false); return; }
    const [{ data: tData }, { data: vData }, { data: aData }] = await Promise.all([
      supabase.from('temas_videos').select('*').eq('aula_id', aulaActiva).order('orden'),
      supabase.from('videos').select('*').eq('aula_id', aulaActiva).order('orden'),
      supabase.from('alumnos').select('id, nombre, email').eq('aula_id', aulaActiva).order('nombre'),
    ]);
    setTemas(tData || []); setVideos(vData || []); setListaAlumnos(aData || []); setLoading(false);
    // Temas cerrados por defecto (el usuario los abre tocando cada uno).
  };

  const loadBunny = async () => {
    try {
      const res = await fetch(`https://video.bunnycdn.com/library/${BUNNY_LIBRARY}/videos?page=1&itemsPerPage=50`, {
        headers: { AccessKey: BUNNY_API_KEY }
      });
      const d = await res.json();
      setBunnyVideos(d.items || []);
    } catch { toast('No se pudo conectar con Bunny CDN', 'error'); }
  };

  useEffect(() => { setLoading(true); load(); loadBunny(); }, [aulaActiva]);

  const uploadToBunny = async (file) => {
    if (!file) return null;
    setUploading(true); setUploadPct(5);
    try {
      // 1. Crear video en Bunny
      const createRes = await fetch(`https://video.bunnycdn.com/library/${BUNNY_LIBRARY}/videos`, {
        method: 'POST',
        headers: { AccessKey: BUNNY_API_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: form.titulo || file.name })
      });
      const created = await createRes.json();
      if (!created.guid) throw new Error('No se pudo crear el video en Bunny');
      setUploadPct(20);
      // 2. Subir el archivo
      const uploadRes = await fetch(`https://video.bunnycdn.com/library/${BUNNY_LIBRARY}/videos/${created.guid}`, {
        method: 'PUT',
        headers: { AccessKey: BUNNY_API_KEY, 'Content-Type': 'application/octet-stream' },
        body: file
      });
      setUploadPct(90);
      if (!uploadRes.ok) throw new Error('Error al subir el video');
      setUploadPct(100);
      toast('Video subido a Bunny ✅', 'success');
      await loadBunny();
      return created.guid;
    } catch (err) {
      toast(err.message, 'error'); return null;
    } finally {
      setTimeout(() => { setUploading(false); setUploadPct(0); }, 600);
    }
  };

  const save = async () => {
    if (!form.titulo) return toast('Título requerido', 'error');
    let bunny_id = form.bunny_id;
    let url_externa = form.url_externa;

    if (tab === 'upload' && selectedFile) {
      bunny_id = await uploadToBunny(selectedFile);
      if (!bunny_id) return;
    }
    if (tab === 'bunny' && !bunny_id) return toast('Seleccioná un video de Bunny', 'error');
    if (tab === 'url' && !url_externa) return toast('Ingresá una URL', 'error');

    const payload = { titulo: form.titulo, descripcion: form.descripcion, bunny_id, bunny_video_id: bunny_id, url_externa, orden: form.orden, tema_id: form.tema_id || null, max_vistas: form.max_vistas ? parseInt(form.max_vistas) : null, publicar_en: form.publicar_en ? new Date(form.publicar_en).toISOString() : null, vence_en: form.vence_en ? new Date(form.vence_en).toISOString() : null, precio_extension: form.precio_extension ? parseFloat(form.precio_extension) : null, para_todos: form.para_todos, aula_id: aulaActiva };

    let videoId = editing;
    if (editing) {
      const { error } = await supabase.from('videos').update(payload).eq('id', editing);
      if (error) return toast(error.message, 'error');
    } else {
      const { data: inserted, error } = await supabase.from('videos').insert(payload).select('id').single();
      if (error) return toast(error.message, 'error');
      videoId = inserted?.id;
    }

    // Guardar la asignación de alumnos (solo si NO es para todos)
    if (videoId) {
      // Borrar asignaciones anteriores de este video (por si se está editando)
      await supabase.from('videos_alumnos').delete().eq('video_id', videoId);
      if (!form.para_todos && form.alumnos_ids.length) {
        const filas = form.alumnos_ids.map(aid => ({ video_id: videoId, alumno_id: aid }));
        const { error: errAsig } = await supabase.from('videos_alumnos').insert(filas);
        if (errAsig) return toast('Video guardado, pero hubo un error asignando alumnos: ' + errAsig.message, 'error');
      }
    }

    if (!editing) notificarAlumnos('🎬 Nuevo video disponible', form.titulo);
    if (!editing && !(form.publicar_en && new Date(form.publicar_en) > new Date()))
      crearNovedadAuto(aulaActiva, { titulo: '🎬 Nuevo video: ' + form.titulo, contenido: 'Se subió un nuevo video: ' + form.titulo + '. Entrá a la sección Videos para verlo.' });
    toast(editing ? 'Video actualizado ✏️' : 'Video agregado 🎬', 'success');
    setModal(false); setEditing(null); setSelectedFile(null);
    setForm({ titulo: '', descripcion: '', bunny_id: '', url_externa: '', orden: 0, tema_id: '', max_vistas: '', publicar_en: '', vence_en: '', precio_extension: '', para_todos: true, alumnos_ids: [] }); load();
  };

  const saveTema = async () => {
    if (!temaForm.nombre) return toast('Nombre requerido', 'error');
    const { error } = editingTema
      ? await supabase.from('temas_videos').update(temaForm).eq('id', editingTema)
      : await supabase.from('temas_videos').insert({ ...temaForm, aula_id: aulaActiva });
    if (error) return toast(error.message, 'error');
    toast(editingTema ? 'Tema actualizado ✏️' : 'Tema creado ✅', 'success');
    setTemaModal(false); setEditingTema(null); setTemaForm({ nombre: '', descripcion: '', color: '#6c63ff', orden: 0 }); load();
  };

  const deleteTema = async id => {
    if (!confirm('¿Eliminar tema? Los videos asociados quedarán sin tema.')) return;
    await supabase.from('temas_videos').delete().eq('id', id);
    toast('Tema eliminado', 'info'); load();
  };

  const openEditTema = t => {
    setTemaForm({ nombre: t.nombre, descripcion: t.descripcion || '', color: t.color || '#6c63ff', orden: t.orden || 0 });
    setEditingTema(t.id); setTemaModal(true);
  };

  const toggleTema = id => setExpandedTemas(p => ({ ...p, [id]: !p[id] }));

  const reorderTemas = async (fromId, toId) => {
    if (fromId === toId) return;
    const fromIdx = temas.findIndex(t => t.id === fromId);
    const toIdx = temas.findIndex(t => t.id === toId);
    const newOrder = [...temas];
    const [moved] = newOrder.splice(fromIdx, 1);
    newOrder.splice(toIdx, 0, moved);
    setTemas(newOrder);
    await Promise.all(newOrder.map((t, i) =>
      supabase.from('temas_videos').update({ orden: i }).eq('id', t.id)
    ));
  };

  const remove = async id => {
    if (!confirm('¿Eliminar video?')) return;
    await supabase.from('videos').delete().eq('id', id);
    toast('Video eliminado', 'info'); load();
  };

  const openEdit = async v => {
    // Traer los alumnos ya asignados a este video (si los hay)
    const { data: asignados } = await supabase.from('videos_alumnos').select('alumno_id').eq('video_id', v.id);
    const alumnosIds = (asignados || []).map(a => a.alumno_id);
    // Convierte a formato del input datetime-local usando la hora LOCAL (no UTC, que correría la hora).
    const aInputLocal = (valor) => {
      if (!valor) return '';
      const d = new Date(valor);
      const p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
    };
    setForm({ titulo: v.titulo, descripcion: v.descripcion || '', bunny_id: v.bunny_id || v.bunny_video_id || '', url_externa: v.url_externa || '', orden: v.orden || 0, tema_id: v.tema_id || '', max_vistas: v.max_vistas != null ? String(v.max_vistas) : '', publicar_en: aInputLocal(v.publicar_en), vence_en: aInputLocal(v.vence_en), precio_extension: v.precio_extension != null ? String(v.precio_extension) : '', para_todos: v.para_todos !== false, alumnos_ids: alumnosIds });
    setEditing(v.id); setSelectedFile(null);
    setTab(v.url_externa ? 'url' : 'bunny');
    setModal(true);
  };

  const verStats = async (video) => {
    setStatsModal(video);
    setStatsLoading(true);
    setStatsData([]);
    const { data } = await supabase
      .from('visualizaciones')
      .select('*, alumnos(nombre, email)')
      .eq('video_id', video.id)
      .order('created_at', { ascending: false });
    setStatsData(data || []);
    setStatsLoading(false);
  };

  if (!aulaActiva) return <SinAula />;
  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>

        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost" onClick={() => { setTemaForm({nombre:'',descripcion:'',color:'#6c63ff',orden:temas.length}); setEditingTema(null); setTemaModal(true); }}>📂 Nuevo tema</button>
          <button className="btn btn-primary" onClick={() => { setForm({titulo:'',descripcion:'',bunny_id:'',url_externa:'',orden:videos.length,tema_id:'',max_vistas:'',publicar_en:'',vence_en:'',precio_extension:'',para_todos:true,alumnos_ids:[]}); setEditing(null); setSelectedFile(null); setTab('bunny'); setModal(true); }}>➕ Agregar video</button>
        </div>
      </div>

      <div className="tabs">
        <button className={`tab ${vistaTab==='temas'?'active':''}`} onClick={() => setVistaTab('temas')}>📂 Por Temas</button>

      </div>

      {vistaTab === 'temas' && (
        <div>
          {temas.length === 0 && videos.length === 0 && <Empty icon="🎬" text="No hay videos. Crea un tema para empezar a organizar." />}

            const tVids = videos.filter(v => v.tema_id === t.id);
            const isOpen = expandedTemas[t.id];
            const isDragging = dragTema === t.id;
            const isDragOver = dragOverTema === t.id && dragTema !== t.id;
            return (
              <div
                key={t.id}
