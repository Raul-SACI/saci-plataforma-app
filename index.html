  { key: 'prueba',          okKey: 'prueba_ok',          icon: '📝', label: 'Prueba Virtual' },
  { key: 'ejercicio',       okKey: 'ejercicio_ok',       icon: '✏️', label: 'Ejercicio' },
  { key: 'otros',           okKey: 'otros_ok',           icon: '📌', label: 'Otros' },
];
const PLAN_MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const PLAN_DIAS  = ['Lu','Ma','Mi','Ju','Vi','Sa','Do'];
const planDiasEnMes = (m,y) => new Date(y, m+1, 0).getDate();
const planPrimerDia = (m,y) => { const d = new Date(y,m,1).getDay(); return d===0?6:d-1; };

function AdminPlanificacion({ aulaActiva }) {
  const today = new Date();
  const [mes, setMes] = useState(today.getMonth());
  const [año, setAño] = useState(today.getFullYear());
  const [planDocente, setPlanDocente] = useState({});
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const PLAN_COLORES = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4'];
  const [form, setForm] = useState({ videos:'', videos_grabados:'', material:'', prueba:'', ejercicio:'', otros:'', color:'', horario_especial:'' });
  const [saving, setSaving] = useState(false);
  const toast = useToast();

  const load = async () => {
    setLoading(true);
    const desde = `${año}-${String(mes+1).padStart(2,'0')}-01`;
    const hasta = `${año}-${String(mes+1).padStart(2,'0')}-${String(new Date(año, mes+1, 0).getDate()).padStart(2,'0')}`;
    const { data } = await supabase.from('planificacion_docente').select('*').eq('aula_id', aulaActiva).gte('fecha',desde).lte('fecha',hasta);
    const map = {};
    (data||[]).forEach(d => { map[d.fecha] = d; });
    setPlanDocente(map); setLoading(false);
  };
  useEffect(() => { load(); }, [mes, año, aulaActiva]);

  const fmtFecha = d => `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const navMes = dir => { let m=mes+dir,y=año; if(m<0){m=11;y--;} if(m>11){m=0;y++;} setMes(m);setAño(y); };

  const openDay = fecha => {
    const ex = planDocente[fecha];
    setModal({ fecha, id: ex?.id||null });
    setForm({ videos: ex?.videos||'', videos_grabados: ex?.videos_grabados||'', material: ex?.material||'', prueba: ex?.prueba||'', ejercicio: ex?.ejercicio||'', otros: ex?.otros||'', color: ex?.color||'', horario_especial: ex?.horario_especial||'' });
  };

  const save = async () => {
    setSaving(true);
    const isEmpty = !form.color && !form.horario_especial.trim() && !form.videos.trim() && !form.videos_grabados.trim() && !form.material.trim() && !form.prueba.trim() && !form.ejercicio.trim() && !form.otros.trim();
    if (isEmpty) {
      if (modal.id) { await supabase.from('planificacion_docente').delete().eq('id',modal.id); toast('Planificación eliminada','info'); }
      setSaving(false); setModal(null); load(); return;
    }
    const payload = { fecha: modal.fecha, color: form.color||null, horario_especial: form.horario_especial.trim()||null, videos: form.videos.trim()||null, videos_grabados: form.videos_grabados.trim()||null, material: form.material.trim()||null, prueba: form.prueba.trim()||null, ejercicio: form.ejercicio.trim()||null, otros: form.otros.trim()||null, aula_id: aulaActiva };
    // Buscamos por fecha Y aula: la misma fecha puede estar planificada en otras aulas.
    const { data: existing } = await supabase.from('planificacion_docente').select('id').eq('fecha', modal.fecha).eq('aula_id', aulaActiva).maybeSingle();
    const { error } = existing
      ? await supabase.from('planificacion_docente').update(payload).eq('id', existing.id)
      : await supabase.from('planificacion_docente').insert(payload);
    if (error) { toast(error.message,'error'); setSaving(false); return; }
    toast('Guardado ✅','success'); setSaving(false); setModal(null); load();
  };

  const cells = [];
  for (let i=0; i<planPrimerDia(mes,año); i++) cells.push(null);
  for (let d=1; d<=planDiasEnMes(mes,año); d++) cells.push(d);

  if (!aulaActiva) return <SinAula />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div><div className="page-title">📅 Planificación</div><div className="page-subtitle">Cronograma mensual del curso</div></div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20,justifyContent:'center'}}>
        <button className="btn btn-ghost" onClick={() => navMes(-1)}>◀</button>
        <div style={{fontWeight:700,fontSize:'1.15rem',minWidth:200,textAlign:'center'}}>{PLAN_MESES[mes]} {año}</div>
        <button className="btn btn-ghost" onClick={() => navMes(1)}>▶</button>
      </div>
      <div style={{overflowX:'auto'}}>
        <div style={{minWidth:560}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:4}}>
            {PLAN_DIAS.map(d => <div key={d} style={{textAlign:'center',fontSize:'0.7rem',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',padding:'6px 0'}}>{d}</div>)}
          </div>
          {loading ? <Loading /> : (
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
              {cells.map((d,i) => {
                if (!d) return <div key={`e-${i}`} />;
                const fecha = fmtFecha(d);
                const plan = planDocente[fecha];
                const hasContent = plan && PLAN_CAMPOS.some(c => plan[c.key]);
                const isToday = fecha === todayStr;
                const cellColor = plan?.color;
                const cellBg = cellColor ? cellColor+'28' : hasContent ? 'rgba(108,99,255,0.09)' : 'var(--surface)';
                const cellBgHover = cellColor ? cellColor+'55' : hasContent ? 'rgba(108,99,255,0.18)' : 'var(--surface2)';
                const cellBorder = cellColor ? `2px solid ${cellColor}` : isToday ? '2px solid var(--accent)' : '1px solid var(--border)';
                return (
                  <div key={fecha} onClick={() => openDay(fecha)}
                    style={{minHeight:96,borderRadius:10,border:cellBorder,background:cellBg,padding:'8px 8px',cursor:'pointer',transition:'background 0.15s'}}
                    onMouseOver={e=>e.currentTarget.style.background=cellBgHover}
                    onMouseOut={e=>e.currentTarget.style.background=cellBg}
                  >
                    <div style={{fontWeight:700,fontSize:'0.88rem',color:isToday?'var(--accent)':'var(--text)',marginBottom:6}}>{d}</div>
                    {plan?.horario_especial && (
                      <div title={`Horario especial: ${plan.horario_especial}`} style={{display:'flex',alignItems:'center',gap:2,background:'#ff6b35',color:'#fff',borderRadius:6,padding:'1px 5px',fontSize:'0.56rem',fontWeight:700,marginBottom:5,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>
                        ⏰ {plan.horario_especial}
                      </div>
                    )}
                    {hasContent ? (
                      <div style={{display:'flex',flexDirection:'column',gap:2}}>
                        {PLAN_CAMPOS.map(c => plan[c.key] ? (
                          <div key={c.key} style={{display:'flex',alignItems:'center',gap:3}}>
                            <span style={{fontSize:'0.65rem'}}>{c.icon}</span>
                            <span style={{fontSize:'0.6rem',color:'var(--text2)',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',maxWidth:'100%'}}>{plan[c.key].slice(0,18)}{plan[c.key].length>18?'…':''}</span>
                          </div>
                        ) : null)}
                      </div>
                    ) : (
                      <div style={{fontSize:'0.8rem',color:'var(--border)',textAlign:'center',marginTop:10}}>+</div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
      {modal && (
        <Modal title={`📅 ${String(parseInt(modal.fecha.split('-')[2])).padStart(2,'0')} de ${PLAN_MESES[mes]} ${año}`} onClose={() => setModal(null)}>
          {PLAN_CAMPOS.map((c,idx) => (
            <div key={c.key} className="form-group">
              <label>{c.icon} {c.label}</label>
              <input
                value={form[c.key]}
                onChange={e => setForm(p=>({...p,[c.key]:e.target.value}))}
                placeholder={`Detalle de ${c.label.toLowerCase()} para este día...`}
                autoFocus={idx===0}
              />
            </div>
          ))}
          <div className="form-group">
            <label>⏰ Horario especial de clase en vivo</label>
            <input
              value={form.horario_especial}
              onChange={e => setForm(p=>({...p,horario_especial:e.target.value}))}
              placeholder="Ej: Hoy 20:00 hs (solo si cambia el horario habitual)"
            />
            <div style={{fontSize:'0.72rem',color:'var(--text2)',marginTop:3}}>Si lo cargás, el alumno ve un aviso ⏰ destacado en ese día. Dejalo vacío si la clase es en el horario de siempre.</div>
          </div>
          <div className="form-group">
            <label>🎨 Color del día</label>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <button onClick={()=>setForm(p=>({...p,color:''}))}
                style={{width:28,height:28,borderRadius:'50%',border:!form.color?'3px solid var(--text)':'2px solid var(--border)',background:'var(--surface2)',cursor:'pointer',fontSize:'0.7rem',color:'var(--text2)',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
              {PLAN_COLORES.map(c=>(
                <button key={c} onClick={()=>setForm(p=>({...p,color:p.color===c?'':c}))}
                  style={{width:28,height:28,borderRadius:'50%',border:form.color===c?'3px solid var(--text)':'2px solid transparent',background:c,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 1px 4px rgba(0,0,0,0.25)'}}>
                  {form.color===c&&<span style={{fontSize:'0.7rem',color:'#fff',fontWeight:700,textShadow:'0 1px 2px rgba(0,0,0,0.5)'}}>✓</span>}
                </button>
              ))}
            </div>
          </div>
          <div style={{fontSize:'0.74rem',color:'var(--text2)',marginTop:2,marginBottom:8}}>Dejá todos los campos vacíos para eliminar la planificación de este día.</div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'⏳...':'💾 Guardar'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// ALUMNO PLANIFICACIÓN MENSUAL
// ═══════════════════════════════════════════════════════════════════════
function AlumnoPlanificacion({ alumno }) {
  const today = new Date();
  const [mes, setMes] = useState(today.getMonth());
  const [año, setAño] = useState(today.getFullYear());
  const [planDocente, setPlanDocente] = useState({});
  const [planAlumno, setPlanAlumno] = useState({});
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  // modal = { fecha, items: [{campo, okKey, icon, label, texto, fechaOriginal, ok, nuevaFecha}] }
  const [saving, setSaving] = useState(false);
  const [moviendo, setMoviendo] = useState(null); // "campo-fechaOriginal" key
  const toast = useToast();

  const load = async () => {
    setLoading(true);
    const desde = `${año}-${String(mes+1).padStart(2,'0')}-01`;
    const hasta = `${año}-${String(mes+1).padStart(2,'0')}-${String(new Date(año, mes+1, 0).getDate()).padStart(2,'0')}`;
    // La planificación del docente se filtra por el aula del alumno.
    const miAula = alumno?.aula_id;
    const [{ data: docData }, { data: alumData }] = await Promise.all([
      miAula
        ? supabase.from('planificacion_docente').select('*').eq('aula_id', miAula).gte('fecha',desde).lte('fecha',hasta)
        : { data: [] },
      alumno?.id
        ? supabase.from('planificacion_alumnos').select('*').eq('alumno_id',alumno.id).gte('fecha',desde).lte('fecha',hasta)
        : { data: [] },
    ]);
    const dMap={}, aMap={};
    (docData||[]).forEach(d=>{ dMap[d.fecha]=d; });
    (alumData||[]).forEach(d=>{ aMap[d.fecha]={...d, reasignaciones: d.reasignaciones||{}}; });
    setPlanDocente(dMap); setPlanAlumno(aMap); setLoading(false);
  };
  useEffect(() => { load(); }, [mes, año]);

  const fmtFecha = d => `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const navMes = dir => { let m=mes+dir,y=año; if(m<0){m=11;y--;} if(m>11){m=0;y++;} setMes(m);setAño(y); };
  const diasMes = Array.from({length: planDiasEnMes(mes,año)}, (_,i) => i+1);

  // Build personal view: maps each date to items the student assigned there
  const buildPersonalView = () => {
    const view = {};
    Object.entries(planDocente).forEach(([fecha, doc]) => {
      const alumRow = planAlumno[fecha];
      const reasig = alumRow?.reasignaciones || {};
      PLAN_CAMPOS.forEach(c => {
        if (!doc[c.key]) return;
        const dest = reasig[c.key] || fecha;
        if (!view[dest]) view[dest] = [];
        view[dest].push({
          campo: c.key, okKey: c.okKey, icon: c.icon, label: c.label,
          texto: doc[c.key], fechaOriginal: fecha,
          ok: !!(alumRow?.[c.okKey]),
          reasignada: !!reasig[c.key],
        });
      });
    });
    return view;
  };
  const personalView = buildPersonalView();

  const openDay = fecha => {
    const items = personalView[fecha] || [];
    const alumRow = planAlumno[fecha];
    setModal({
      fecha,
      items: items.map(it => ({ ...it, nuevaFecha: it.reasignada ? fecha : null })),
      notas: (alumRow?.notas || []).map(n => ({...n})),
      nuevaNota: '',
    });
    setMoviendo(null);
  };

  const save = async () => {
    if (!alumno?.id) return toast('No se encontró tu perfil','error');
    setSaving(true);
    const notasLimpias = modal.notas.filter(n => n.texto.trim());

    // Group teacher-task items by fechaOriginal (each group = one DB row)
    const byOrig = {};
    modal.items.forEach(item => {
      if (!byOrig[item.fechaOriginal]) byOrig[item.fechaOriginal] = [];
      byOrig[item.fechaOriginal].push(item);
    });

    for (const [fechaOrig, items] of Object.entries(byOrig)) {
      const existing = planAlumno[fechaOrig];
      const reasig = { ...(existing?.reasignaciones||{}) };
      items.forEach(item => {
        if (item.nuevaFecha && item.nuevaFecha !== fechaOrig) reasig[item.campo] = item.nuevaFecha;
        else delete reasig[item.campo];
      });
      const okFlags = {};
      PLAN_CAMPOS.forEach(c => {
        const mi = items.find(i=>i.campo===c.key);
        okFlags[c.okKey] = mi ? mi.ok : (existing?.[c.okKey]||false);
      });
      // Notes live on the row for modal.fecha; only attach if same date
      const notas = fechaOrig === modal.fecha ? notasLimpias : (existing?.notas||[]);
      const payload = { alumno_id: alumno.id, fecha: fechaOrig, reasignaciones: reasig, notas, ...okFlags };
      const { error } = existing?.id
        ? await supabase.from('planificacion_alumnos').update(payload).eq('id',existing.id)
        : await supabase.from('planificacion_alumnos').insert(payload);
      if (error) { toast(error.message,'error'); setSaving(false); return; }
    }

    // If modal.fecha has no teacher tasks, still save notes for that date
    if (!byOrig[modal.fecha]) {
      const existing = planAlumno[modal.fecha];
      if (notasLimpias.length > 0 || existing?.id) {
        const okFlags = {};
        PLAN_CAMPOS.forEach(c => { okFlags[c.okKey] = existing?.[c.okKey]||false; });
        const payload = { alumno_id: alumno.id, fecha: modal.fecha, reasignaciones: existing?.reasignaciones||{}, notas: notasLimpias, ...okFlags };
        const { error } = existing?.id
          ? await supabase.from('planificacion_alumnos').update(payload).eq('id',existing.id)
          : await supabase.from('planificacion_alumnos').insert(payload);
        if (error) { toast(error.message,'error'); setSaving(false); return; }
      }
    }

    toast('Guardado ✅','success'); setSaving(false); setModal(null); load();
  };

  const cells = [];
  for (let i=0; i<planPrimerDia(mes,año); i++) cells.push(null);
  for (let d=1; d<=planDiasEnMes(mes,año); d++) cells.push(d);

  const totalCampos = Object.values(planDocente).reduce((acc,d) => acc + PLAN_CAMPOS.filter(c=>d[c.key]).length, 0);
  const cumplidos = Object.values(planAlumno).reduce((acc,a) => acc + PLAN_CAMPOS.filter(c=>a[c.okKey]).length, 0);

  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div><div className="page-title">📅 Mi Planificación</div><div className="page-subtitle">Organizá tu estudio mes a mes · Tocá un día para ver o reorganizar tareas</div></div>
      </div>

      {totalCampos > 0 && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
          <div className="card" style={{textAlign:'center',padding:'14px 10px'}}>
            <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.5rem',color:'var(--accent)'}}>{totalCampos}</div>
            <div style={{fontSize:'0.7rem',color:'var(--text2)',marginTop:2}}>Actividades del mes</div>
          </div>
          <div className="card" style={{textAlign:'center',padding:'14px 10px'}}>
            <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.5rem',color:'var(--success)'}}>{cumplidos}</div>
            <div style={{fontSize:'0.7rem',color:'var(--text2)',marginTop:2}}>Cumplidas ✅</div>
          </div>
          <div className="card" style={{textAlign:'center',padding:'14px 10px'}}>
            <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.5rem',color:'var(--accent2)'}}>{totalCampos-cumplidos}</div>
            <div style={{fontSize:'0.7rem',color:'var(--text2)',marginTop:2}}>Pendientes</div>
          </div>
        </div>
      )}

      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20,justifyContent:'center'}}>
        <button className="btn btn-ghost" onClick={()=>navMes(-1)}>◀</button>
        <div style={{fontWeight:700,fontSize:'1.1rem',minWidth:200,textAlign:'center'}}>{PLAN_MESES[mes]} {año}</div>
        <button className="btn btn-ghost" onClick={()=>navMes(1)}>▶</button>
      </div>

      <div style={{overflowX:'auto'}}>
        <div style={{minWidth:560}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:4}}>
            {PLAN_DIAS.map(d => <div key={d} style={{textAlign:'center',fontSize:'0.7rem',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',padding:'6px 0'}}>{d}</div>)}
          </div>
          {loading ? <Loading /> : (
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
              {cells.map((d,i) => {
                if (!d) return <div key={`e-${i}`} />;
                const fecha = fmtFecha(d);
                const items = personalView[fecha] || [];
                const notas = (planAlumno[fecha]?.notas || []).filter(n=>n.texto);
                const isToday = fecha === todayStr;
                const isPast = fecha < todayStr;
                const allDone = items.length > 0 && items.every(it=>it.ok) && notas.every(n=>n.ok);
                const someDone = items.some(it=>it.ok) || notas.some(n=>n.ok);
                const hasContent = items.length > 0 || notas.length > 0;
                const docenteColor = planDocente[fecha]?.color;
                let bg='var(--surface)', bdr='var(--border)';
                if (allDone && hasContent){ bg='rgba(67,233,123,0.2)'; bdr='var(--success)'; }
                else if (someDone){ bg='rgba(67,233,123,0.08)'; bdr='var(--success)'; }
                else if (items.length){ bg='rgba(108,99,255,0.08)'; bdr='var(--accent)'; }
                else if (notas.length){ bg='rgba(249,202,36,0.07)'; bdr='var(--gold)'; }
                if (docenteColor){ bg=docenteColor+'28'; bdr=docenteColor; }
                return (
                  <div key={fecha} onClick={()=>openDay(fecha)}
                    style={{minHeight:96,borderRadius:10,border:isToday?`2px solid ${bdr}`:`1px solid ${bdr}`,background:bg,padding:'6px 8px',cursor:'pointer',transition:'background 0.15s',opacity:isPast&&!hasContent?0.4:1}}
                  >
                    <div style={{fontWeight:700,fontSize:'0.88rem',color:isToday?'var(--accent)':isPast?'var(--text2)':'var(--text)',marginBottom:5}}>{d}</div>
                    {planDocente[fecha]?.horario_especial && (
                      <div title={`Horario especial: ${planDocente[fecha].horario_especial}`} style={{display:'flex',alignItems:'center',gap:2,background:'#ff6b35',color:'#fff',borderRadius:6,padding:'1px 5px',fontSize:'0.56rem',fontWeight:700,marginBottom:5,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>
                        ⏰ {planDocente[fecha].horario_especial}
                      </div>
                    )}
                    {items.length > 0 && (
                      <div style={{display:'flex',flexDirection:'column',gap:3,overflow:'hidden'}}>
                        {items.map((it,idx) => (
                          <div key={`${it.campo}-${it.fechaOriginal}-${idx}`} style={{display:'flex',alignItems:'center',gap:3,overflow:'hidden',minWidth:0}}>
                            <span style={{fontSize:'0.62rem',flexShrink:0,filter:it.ok?'none':'grayscale(0.5) opacity(0.6)'}}>{it.ok?'✅':it.icon}</span>
                            <span style={{fontSize:'0.58rem',color:it.ok?'var(--success)':'var(--text2)',flex:1,minWidth:0,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',textDecoration:it.ok?'line-through':'none',opacity:it.ok?0.7:1}}>
                              {it.texto.slice(0,13)}{it.texto.length>13?'…':''}
                            </span>
                            {it.reasignada && <span style={{fontSize:'0.55rem',color:'var(--accent)',flexShrink:0}}>↩</span>}
                          </div>
                        ))}
                      </div>
                    )}
                    {notas.length > 0 && (
                      <div style={{marginTop: items.length?4:0, display:'flex',alignItems:'center',gap:3}}>
                        <span style={{fontSize:'0.6rem'}}>📝</span>
                        <span style={{fontSize:'0.55rem',color:'var(--text2)',whiteSpace:'nowrap'}}>{notas.length} nota{notas.length>1?'s':''}</span>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {modal && (
        <Modal title={`📅 ${String(parseInt(modal.fecha.split('-')[2])).padStart(2,'0')} de ${PLAN_MESES[mes]} ${año}`} onClose={()=>setModal(null)}>
          {planDocente[modal.fecha]?.horario_especial && (
            <div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,107,53,0.14)',border:'1px solid #ff6b35',borderRadius:8,padding:'8px 12px',marginBottom:14,fontSize:'0.84rem',fontWeight:600}}>
              ⏰ <span><b>Horario especial de clase en vivo:</b> {planDocente[modal.fecha].horario_especial}</span>
            </div>
          )}
          {modal.items.length > 0 && (
            <div style={{fontSize:'0.78rem',color:'var(--text2)',marginBottom:14,lineHeight:1.5}}>
              Marcá lo que ya hiciste o usá <strong>↔ Mover</strong> para reorganizar una tarea a otro día del mes.
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:modal.items.length?16:0}}>
            {modal.items.map((item, idx) => {
              const mKey = `${item.campo}-${item.fechaOriginal}`;
              const estaMoviendo = moviendo === mKey;
              const movido = item.nuevaFecha && item.nuevaFecha !== item.fechaOriginal;
              return (
                <div key={mKey} style={{background:'var(--surface2)',borderRadius:10,padding:'12px 14px',border:`1px solid ${item.ok?'var(--success)':movido?'var(--accent)':'var(--border)'}`,transition:'border 0.15s'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,flexWrap:'wrap'}}>
                        <span style={{fontSize:'0.72rem',fontWeight:700,color:'var(--text2)'}}>{item.icon} {item.label}</span>
                        {item.reasignada && !movido && (
                          <span style={{fontSize:'0.62rem',color:'var(--accent)',background:'rgba(108,99,255,0.1)',padding:'1px 7px',borderRadius:20,whiteSpace:'nowrap'}}>
                            del día {parseInt(item.fechaOriginal.split('-')[2])}
                          </span>
                        )}
                        {movido && (
                          <span style={{fontSize:'0.62rem',color:'var(--accent)',background:'rgba(108,99,255,0.1)',padding:'1px 7px',borderRadius:20,whiteSpace:'nowrap'}}>
                            → día {parseInt(item.nuevaFecha.split('-')[2])}
                          </span>
                        )}
                      </div>
                      <div style={{fontSize:'0.88rem',color:'var(--text)',lineHeight:1.5,textDecoration:item.ok?'line-through':'none',opacity:item.ok?0.55:1,marginBottom:8,wordBreak:'break-word'}}>
                        {item.texto}
                      </div>
                      {estaMoviendo ? (
                        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                          <span style={{fontSize:'0.75rem',color:'var(--text2)',whiteSpace:'nowrap'}}>Mover al día:</span>
                          <select
                            value={item.nuevaFecha || item.fechaOriginal}
                            onChange={e => {
                              const val = e.target.value;
                              setModal(p => ({...p, items: p.items.map((it,i2) =>
                                i2===idx ? {...it, nuevaFecha: val===it.fechaOriginal ? null : val} : it
                              )}));
                            }}
                            style={{padding:'4px 8px',borderRadius:6,fontSize:'0.82rem',flex:1,minWidth:0}}
                          >
                            {diasMes.map(d => {
                              const f = fmtFecha(d);
                              return <option key={f} value={f}>Día {d}{f===item.fechaOriginal?' (original)':''}</option>;
                            })}
                          </select>
                          <div style={{display:'flex',gap:6}}>
                            <button className="btn btn-sm btn-primary" onClick={()=>setMoviendo(null)}>✓ Listo</button>
                            {movido && (
                              <button className="btn btn-sm btn-ghost" style={{fontSize:'0.72rem'}} onClick={()=>{
                                setModal(p=>({...p,items:p.items.map((it,i2)=>i2===idx?{...it,nuevaFecha:null}:it)}));
                                setMoviendo(null);
                              }}>Restaurar</button>
                            )}
                          </div>
                        </div>
                      ) : (
                        <button
                          onClick={()=>setMoviendo(mKey)}
                          style={{fontSize:'0.72rem',color:movido?'var(--accent)':'var(--text2)',background:movido?'rgba(108,99,255,0.1)':'var(--surface)',border:`1px solid ${movido?'rgba(108,99,255,0.3)':'var(--border)'}`,borderRadius:6,padding:'3px 10px',cursor:'pointer',fontFamily:'inherit',fontWeight:600,transition:'all 0.15s'}}
                        >
                          ↔ {movido ? `Movido al día ${parseInt(item.nuevaFecha.split('-')[2])}` : 'Mover a otro día'}
                        </button>
                      )}
                    </div>
                    <label style={{display:'flex',flexDirection:'row',alignItems:'center',gap:6,cursor:'pointer',flexShrink:0,background:item.ok?'rgba(67,233,123,0.12)':'var(--surface)',border:`1px solid ${item.ok?'var(--success)':'var(--border)'}`,borderRadius:8,padding:'6px 10px',transition:'all 0.15s'}}>
                      <input type="checkbox" checked={item.ok}
                        onChange={e=>setModal(p=>({...p,items:p.items.map((it,i2)=>i2===idx?{...it,ok:e.target.checked}:it)}))}
                        style={{width:'auto',margin:0,accentColor:'var(--success)',transform:'scale(1.3)',cursor:'pointer'}} />
                      <span style={{fontSize:'0.72rem',color:item.ok?'var(--success)':'var(--text2)',fontWeight:600,whiteSpace:'nowrap'}}>{item.ok?'✓ Hecho':'Marcar'}</span>
                    </label>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Notas personales */}
          <div style={{borderTop: modal.items.length ? '1px solid var(--border)' : 'none', paddingTop: modal.items.length ? 16 : 0, marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:'0.82rem',color:'var(--text2)',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
              📝 Mis notas personales
            </div>
            {modal.notas.length === 0 && (
              <div style={{fontSize:'0.8rem',color:'var(--text2)',marginBottom:10,fontStyle:'italic'}}>
                Sin notas para este día. Agregá lo que quieras recordar o estudiar.
              </div>
            )}
            {modal.notas.map((nota, idx) => (
              <div key={nota.id} style={{display:'grid',gridTemplateColumns:'22px 1fr 28px',alignItems:'start',gap:'0 8px',marginBottom:8,background:'var(--surface2)',borderRadius:8,padding:'10px 12px',border:`1px solid ${nota.ok?'var(--success)':'var(--border)'}`}}>
                <input type="checkbox" checked={nota.ok}
                  onChange={e=>setModal(p=>({...p,notas:p.notas.map((n,i)=>i===idx?{...n,ok:e.target.checked}:n)}))}
                  style={{marginTop:3,accentColor:'var(--success)',cursor:'pointer',width:16,height:16}} />
                <span style={{fontSize:'0.88rem',color:'var(--text)',textDecoration:nota.ok?'line-through':'none',opacity:nota.ok?0.5:1,wordBreak:'break-word',lineHeight:1.5,overflowWrap:'anywhere'}}>
                  {nota.texto}
                </span>
                <button onClick={()=>setModal(p=>({...p,notas:p.notas.filter((_,i)=>i!==idx)}))}
                  style={{background:'none',border:'none',color:'var(--danger)',cursor:'pointer',fontSize:'1.1rem',padding:'2px 4px',borderRadius:4,lineHeight:1,justifySelf:'end'}}>×</button>
              </div>
            ))}
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <input
                type="text"
                placeholder="Ej: Repasar cursograma 2..."
                value={modal.nuevaNota}
                onChange={e=>setModal(p=>({...p,nuevaNota:e.target.value}))}
                onKeyDown={e=>{
                  if (e.key==='Enter' && modal.nuevaNota.trim()) {
                    setModal(p=>({...p, notas:[...p.notas,{id:Date.now()+'',texto:p.nuevaNota.trim(),ok:false}], nuevaNota:''}));
                  }
                }}
                style={{flex:1}}
              />
              <button className="btn btn-sm btn-ghost"
                onClick={()=>{
                  if (!modal.nuevaNota.trim()) return;
                  setModal(p=>({...p, notas:[...p.notas,{id:Date.now()+'',texto:p.nuevaNota.trim(),ok:false}], nuevaNota:''}));
                }}
                style={{flexShrink:0}}>+ Agregar</button>
            </div>
          </div>

          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'⏳...':'💾 Guardar'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── LEGACY (conservado por compatibilidad) ───────────────────────────
function GanttChart({ isAdmin }) {
  const SEMANAS = ['Semana 1','Semana 2','Semana 3','Semana 4','Semana 5','Semana 6'];
  const COLORS = {
    videos:      { bg: 'rgba(108,99,255,0.25)', border: '#6c63ff', icon: '🎬', label: 'Videos' },
    materiales:  { bg: 'rgba(67,233,123,0.2)',  border: '#43e97b', icon: '📄', label: 'Materiales' },
    evaluaciones:{ bg: 'rgba(255,101,132,0.2)', border: '#ff6584', icon: '📝', label: 'Evaluaciones' },
  };

  const [data, setData] = useState({ videos: [], materiales: [], evaluaciones: [] });
  const [loading, setLoading] = useState(true);
  const [hover, setHover] = useState(null);

  useEffect(() => {
    (async () => {
      const [v, m, e] = await Promise.all([
        supabase.from('videos').select('titulo, semana'),
        supabase.from('materiales').select('unidad, semana'),
        supabase.from('evaluaciones').select('titulo, semana').not('semana', 'is', null),
      ]);
      setData({ videos: v.data || [], materiales: m.data || [], evaluaciones: e.data || [] });
      setLoading(false);
    })();
  }, []);

  const countBySemana = (items, semana) => items.filter(i => i.semana === semana);

  if (loading) return <div style={{padding:20,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}} /></div>;

  const hasAnyData = data.videos.length > 0 || data.materiales.length > 0 || data.evaluaciones.length > 0;

  return (
    <div className="card" style={{marginBottom:28}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontWeight:700,fontSize:'1.05rem'}}>📅 Diagrama de Gantt — Planificación semanal</div>
          <div style={{fontSize:'0.8rem',color:'var(--text2)',marginTop:2}}>Distribución de contenidos por semana</div>
        </div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          {Object.entries(COLORS).map(([k,v]) => (
            <div key={k} style={{display:'flex',alignItems:'center',gap:6,fontSize:'0.78rem'}}>
              <div style={{width:12,height:12,borderRadius:3,background:v.bg,border:`2px solid ${v.border}`}} />
              {v.icon} {v.label}
            </div>
          ))}
        </div>
      </div>

      {!hasAnyData ? (
        <div style={{textAlign:'center',padding:'30px 0',color:'var(--text2)',fontSize:'0.88rem'}}>
          📭 No hay contenidos asignados a semanas aún
        </div>
      ) : (
        <div style={{overflowX:'auto'}}>
          {/* Header semanas */}
          <div style={{display:'grid',gridTemplateColumns:'120px repeat(6, 1fr)',gap:4,marginBottom:8}}>
            <div />
            {SEMANAS.map((s,i) => (
              <div key={s} style={{textAlign:'center',fontSize:'0.72rem',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',padding:'4px 2px',borderRadius:6,background:'var(--surface2)'}}>
                S{i+1}
                <div style={{fontSize:'0.65rem',fontWeight:400,marginTop:1}}>Sem {i+1}</div>
              </div>
            ))}
          </div>

          {/* Rows */}
          {Object.entries(COLORS).map(([tipo, cfg]) => (
            <div key={tipo} style={{display:'grid',gridTemplateColumns:'120px repeat(6, 1fr)',gap:4,marginBottom:4,alignItems:'center'}}>
              {/* Label */}
              <div style={{fontSize:'0.78rem',fontWeight:600,color:'var(--text2)',display:'flex',alignItems:'center',gap:6}}>
                <span>{cfg.icon}</span> {cfg.label}
              </div>
              {/* Cells */}
              {SEMANAS.map((semana, si) => {
                const items = countBySemana(data[tipo], semana);
                const hasItems = items.length > 0;
                const hKey = `${tipo}-${si}`;
                return (
                  <div
                    key={semana}
                    onMouseEnter={() => setHover(hKey)}
                    onMouseLeave={() => setHover(null)}
                    style={{
                      height:44,
                      borderRadius:8,
                      background: hasItems ? cfg.bg : 'var(--surface2)',
                      border: `2px solid ${hasItems ? cfg.border : 'var(--border)'}`,
                      display:'flex',
                      alignItems:'center',
                      justifyContent:'center',
                      cursor: hasItems ? 'pointer' : 'default',
                      transition:'all 0.2s',
                      position:'relative',
                      transform: hover === hKey && hasItems ? 'scale(1.05)' : 'scale(1)',
                      boxShadow: hover === hKey && hasItems ? `0 4px 16px ${cfg.border}44` : 'none',
                    }}
                  >
                    {hasItems ? (
                      <>
                        <div style={{textAlign:'center'}}>
                          <div style={{fontSize:'1rem',lineHeight:1}}>{cfg.icon}</div>
                          <div style={{fontSize:'0.65rem',fontWeight:700,color:cfg.border,marginTop:2}}>{items.length} {items.length === 1 ? 'ítem' : 'ítems'}</div>
                        </div>
                        {/* Tooltip */}
                        {hover === hKey && (
                          <div style={{
                            position:'absolute',
                            bottom:'calc(100% + 8px)',
                            left:'50%',
                            transform:'translateX(-50%)',
                            background:'var(--surface)',
                            border:`1px solid ${cfg.border}`,
                            borderRadius:10,
                            padding:'10px 14px',
                            zIndex:100,
                            minWidth:160,
                            boxShadow:'0 8px 24px rgba(0,0,0,0.4)',
                            animation:'fadeInScale 0.15s ease',
                          }}>
                            <div style={{fontWeight:700,fontSize:'0.78rem',color:cfg.border,marginBottom:8}}>{semana} — {cfg.label}</div>
                            {items.map((it,idx) => (
                              <div key={idx} style={{fontSize:'0.74rem',color:'var(--text2)',padding:'2px 0',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:6}}>
                                <span style={{color:cfg.border}}>•</span> {(it.titulo||it.unidad)?.slice(0,30)}{(it.titulo||it.unidad)?.length > 30 ? '…' : ''}
                              </div>
                            ))}
                          </div>
                        )}
                      </>
                    ) : (
                      <div style={{fontSize:'0.7rem',color:'var(--border)'}}>—</div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}

          {/* Progress bar total */}
          <div style={{marginTop:16,padding:'12px 0',borderTop:'1px solid var(--border)'}}>
            <div style={{fontSize:'0.75rem',color:'var(--text2)',marginBottom:8,fontWeight:600}}>PROGRESO GENERAL DEL CURSO</div>
            <div style={{display:'grid',gridTemplateColumns:'120px repeat(6, 1fr)',gap:4}}>
              <div />
              {SEMANAS.map((semana, si) => {
                const total = countBySemana(data.videos, semana).length +
                              countBySemana(data.materiales, semana).length +
                              countBySemana(data.evaluaciones, semana).length;
                const maxTotal = Math.max(...SEMANAS.map(s =>
                  countBySemana(data.videos, s).length +
                  countBySemana(data.materiales, s).length +
                  countBySemana(data.evaluaciones, s).length
                ), 1);
                const pct = Math.round((total / maxTotal) * 100);
                return (
                  <div key={semana} style={{textAlign:'center'}}>
                    <div style={{height:6,background:'var(--surface2)',borderRadius:3,overflow:'hidden',marginBottom:4}}>
                      <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg, #6c63ff, #ff6584)`,borderRadius:3,transition:'width 0.5s ease'}} />
                    </div>
                    <div style={{fontSize:'0.65rem',color:'var(--text2)'}}>{total} ítems</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ADMIN DASHBOARD ─────────────────────────────────────────────────
function AdminDashboard({ setPage, aulaActiva }) {
  const _today = new Date();
  const [stats, setStats] = useState({ alumnos: 0, pagos: 0, videos: 0, materiales: 0, vistas: 0 });
  const [topVideos, setTopVideos] = useState([]);
  const [ultimasVistas, setUltimasVistas] = useState([]);
  const [alumnosList, setAlumnosList] = useState([]);
  const [planFiltro, setPlanFiltro] = useState({ alumno_id: '', mes: _today.getMonth(), año: _today.getFullYear() });
  const [planRows, setPlanRows] = useState([]);
  const [planLoading, setPlanLoading] = useState(false);
  const [loading, setLoading] = useState(true);
  const [verIngresos, setVerIngresos] = useState(false);   // ojito: importe oculto por defecto

  useEffect(() => {
    (async () => {
      if (!aulaActiva) { setLoading(false); return; }
      setLoading(true);

      // Alumnos, videos y materiales del aula activa.
      const [alsAll, vidsAula, matsAula] = await Promise.all([
        supabase.from('alumnos').select('id, nombre, estado').eq('aula_id', aulaActiva).order('nombre'),
        supabase.from('videos').select('id').eq('aula_id', aulaActiva),
        supabase.from('materiales').select('id', { count: 'exact', head: true }).eq('aula_id', aulaActiva),
      ]);
      const alumnosAula = alsAll.data || [];
      const idsAlumnos = alumnosAula.map(a => a.id);
      const idsVideos = (vidsAula.data || []).map(v => v.id);

      // Los pagos y las visualizaciones no tienen aula: se acotan por los alumnos/videos del aula.
      let totalPagos = 0;
      if (idsAlumnos.length) {
        const { data: pData } = await supabase.from('pagos').select('monto').in('alumno_id', idsAlumnos);
        totalPagos = (pData || []).reduce((s, r) => s + (parseFloat(r.monto) || 0), 0);
      }
      let totalVistas = 0;
      if (idsVideos.length) {
        const { count } = await supabase.from('visualizaciones').select('id', { count: 'exact', head: true }).in('video_id', idsVideos);
        totalVistas = count || 0;
      }

      setStats({
        alumnos: alumnosAula.length,
        pagos: totalPagos,
        videos: idsVideos.length,
        materiales: matsAula.count || 0,
        vistas: totalVistas,
      });
      setAlumnosList(alumnosAula.filter(a => a.estado === 'activo'));

      if (idsVideos.length) {
        const { data: visData } = await supabase
          .from('visualizaciones')
          .select('video_id, videos(titulo, bunny_id, bunny_video_id)')
          .in('video_id', idsVideos)
          .order('created_at', { ascending: false });
        if (visData) {
          const counts = {}, videoInfo = {};
          visData.forEach(v => {
            if (!v.video_id) return;
            counts[v.video_id] = (counts[v.video_id] || 0) + 1;
            if (v.videos) videoInfo[v.video_id] = v.videos;
          });
          setTopVideos(Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,count])=>({id,count,video:videoInfo[id]})));
        }

        const { data: ultimas } = await supabase
          .from('visualizaciones')
          .select('*, videos(titulo), alumnos(nombre, email)')
          .in('video_id', idsVideos)
          .order('created_at', { ascending: false })
          .limit(8);
        setUltimasVistas(ultimas || []);
      } else {
        setTopVideos([]); setUltimasVistas([]);
      }
      setLoading(false);
    })();
  }, [aulaActiva]);

  useEffect(() => {
    const loadPlan = async () => {
      setPlanLoading(true);
      const { mes, año, alumno_id } = planFiltro;
      const desde = `${año}-${String(mes+1).padStart(2,'0')}-01`;
      const hasta = `${año}-${String(mes+1).padStart(2,'0')}-${String(new Date(año, mes+1, 0).getDate()).padStart(2,'0')}`;
      const [{ data: docDays }, { data: alumDays }, { data: allAlumnos }] = await Promise.all([
        supabase.from('planificacion_docente').select('*').eq('aula_id', aulaActiva).gte('fecha',desde).lte('fecha',hasta).order('fecha'),
        (() => { let q = supabase.from('planificacion_alumnos').select('*').gte('fecha',desde).lte('fecha',hasta); if (alumno_id) q=q.eq('alumno_id',alumno_id); return q; })(),
        supabase.from('alumnos').select('id, nombre').eq('aula_id', aulaActiva).eq('estado','activo').order('nombre'),
      ]);
      const docMap = {};
      (docDays||[]).forEach(d => { docMap[d.fecha] = d; });
      const alumMap = {};
      (alumDays||[]).forEach(r => { if (!alumMap[r.alumno_id]) alumMap[r.alumno_id]={}; alumMap[r.alumno_id][r.fecha]=r; });
      const alumnosToShow = alumno_id ? (allAlumnos||[]).filter(a=>a.id===alumno_id) : (allAlumnos||[]);
      const rows = [];
      (docDays||[]).forEach(doc => {
        alumnosToShow.forEach(al => {
          rows.push({ fecha: doc.fecha, alumno: al.nombre, doc, plan: alumMap[al.id]?.[doc.fecha]||null });
        });
      });
      setPlanRows(rows);
      setPlanLoading(false);
    };
    loadPlan();
  }, [planFiltro, aulaActiva]);

  const quickActions = [
    { label: 'Agregar alumno', page: 'alumnos', icon: '👥' },
    { label: 'Registrar pago', page: 'pagos', icon: '💳' },
    { label: 'Subir video', page: 'videos', icon: '🎬' },
    { label: 'Nuevo material', page: 'materiales', icon: '📄' },
  ];

  const fmtDate = iso => {
    if (!iso) return '—';
    const d = new Date(iso);
    const now = new Date();
    const diff = Math.floor((now - d) / 60000); // minutos
    if (diff < 1) return 'ahora mismo';
    if (diff < 60) return `hace ${diff} min`;
    if (diff < 1440) return `hace ${Math.floor(diff/60)}h`;
    return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short' });
  };

  if (!aulaActiva) return <SinAula />;
  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">📊 Dashboard</div>
          <div className="page-subtitle">Resumen del aula seleccionada</div>
