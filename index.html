// ─── ALUMNO VIDEOS ────────────────────────────────────────────────────
function AlumnoVideos({ alumno, user }) {
  const [temas, setTemas] = useState([]);
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [current, setCurrent] = useState(null);
  const [expandedTemas, setExpandedTemas] = useState({});
  const [accesoError, setAccesoError] = useState(null);
  const [vencidoAviso, setVencidoAviso] = useState(null);
  const [confirmVista, setConfirmVista] = useState(null);
  const [contadoresVistas, setContadoresVistas] = useState({});
  const [agrandado, setAgrandado] = useState(false);   // modo video grande dentro de la app (mantiene marca de agua)
  const [extensiones, setExtensiones] = useState({});  // { video_id: { vence_en, compras } } — extensiones pagadas
  const [comprando, setComprando] = useState(false);   // mientras se genera el link de pago
  const toast = useToast();

  // Al volver de Mercado Pago, la URL trae ?pago=ok / error / pendiente.
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const pago = params.get('pago');
    if (!pago) return;

    if (pago === 'ok') {
      toast('¡Pago acreditado! Ya tenés 24hs más 🎉', 'success');
    } else if (pago === 'pendiente') {
      toast('El pago quedó pendiente de acreditación', 'info');
    } else if (pago === 'error') {
      toast('El pago no se completó', 'error');
    }

    // Limpiamos el parámetro para que el aviso no se repita al recargar.
    window.history.replaceState({}, '', window.location.pathname);
  }, []);

  // Al salir del módulo de videos (cambiar a otra sección), se limpian las marcas
  // de sesión, de modo que al volver cuente como un acceso nuevo.
  useEffect(() => {
    return () => {
      Object.keys(sessionStorage).forEach(k => {
        if (k.startsWith('vista_')) sessionStorage.removeItem(k);
      });
    };
  }, []);

  const cargarContadores = async (videoIds, alumnoId) => {
    if (!alumnoId || !videoIds.length) return {};
    const { data } = await supabase
      .from('visualizaciones')
      .select('video_id')
      .eq('alumno_id', alumnoId)
      .in('video_id', videoIds);
    const contadores = {};
    (data || []).forEach(v => {
      contadores[v.video_id] = (contadores[v.video_id] || 0) + 1;
    });
    setContadoresVistas(contadores);
    return contadores;
  };

  useEffect(() => {
    // El alumno solo ve el contenido de SU aula.
    const miAula = alumno?.aula_id;
    if (!miAula) { setTemas([]); setVideos([]); setLoading(false); return; }
    Promise.all([
      supabase.from('temas_videos').select('*').eq('aula_id', miAula).order('orden'),
      supabase.from('videos').select('*').eq('aula_id', miAula).order('orden'),
      supabase.from('videos_alumnos').select('video_id').eq('alumno_id', alumno?.id || ''),
      supabase.from('extensiones_video').select('video_id, vence_en').eq('alumno_id', alumno?.id || '').eq('estado', 'pagado'),
    ]).then(async ([{ data: tData }, { data: vData }, { data: asignData }, { data: extData }]) => {
      const now = new Date().toISOString();
      const idsAsignados = new Set((asignData || []).map(a => a.video_id));
      const vFiltered = (vData || [])
        .filter(v => !v.publicar_en || v.publicar_en <= now)
        .filter(v => v.para_todos !== false || idsAsignados.has(v.id));

      // Extensiones compradas: guardamos cuántas compró y hasta cuándo llega la más lejana.
      const mapaExt = {};
      (extData || []).forEach(e => {
        if (!mapaExt[e.video_id]) mapaExt[e.video_id] = { vence_en: e.vence_en, compras: 0 };
        mapaExt[e.video_id].compras += 1;
        if (new Date(e.vence_en) > new Date(mapaExt[e.video_id].vence_en)) {
          mapaExt[e.video_id].vence_en = e.vence_en;
        }
      });
      setExtensiones(mapaExt);

      setTemas(tData || []); setVideos(vFiltered); setLoading(false);
      // Temas cerrados por defecto (el alumno abre el que quiera).

      if (vFiltered.length) {
        // Cargar contadores de todos los videos del alumno de una sola query
        const videoIds = vFiltered.map(v => v.id);
        await cargarContadores(videoIds, alumno?.id);
        // No se autoselecciona ningún video: el alumno elige de la lista.
      }
    });
  }, []);

  const getEmbedUrl = v => {
    const bid = v.bunny_id || v.bunny_video_id;
    if (bid) return `https://iframe.mediadelivery.net/embed/${BUNNY_LIBRARY}/${bid}?autoplay=false&loop=false&muted=false&preload=false`;
    if (v.url_externa) {
      const ytM = v.url_externa.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)+([\w-]+)/);
      if (ytM) return `https://www.youtube.com/embed/${ytM[1]}`;
      const vmM = v.url_externa.match(/vimeo\.com\/(\d+)/);
      if (vmM) return `https://player.vimeo.com/video/${vmM[1]}`;
      const gdM = v.url_externa.match(/drive\.google\.com\/file\/d\/([\w-]+)/);
      if (gdM) return `https://drive.google.com/file/d/${gdM[1]}/preview`;
      return v.url_externa;
    }
    return null;
  };

  const toggleTema = id => setExpandedTemas(p => ({ ...p, [id]: !p[id] }));

  const registrarVista = async (video, alumnoData) => {
    const alumnoId = (alumnoData || alumno)?.id || null;
    if (!video?.id || !alumnoId) {
      console.warn('No se puede registrar vista - video:', video?.id, 'alumno:', alumnoId);
      return;
    }
    // Usar sessionStorage para evitar duplicar dentro de la misma sesión/pestaña
    const key = `vista_${video.id}_${alumnoId}`;
    if (sessionStorage.getItem(key)) {
      console.log('Ya registrado en esta sesión:', video.titulo);
      return;
    }
    console.log('Registrando vista:', video.titulo, 'alumno id:', alumnoId);
    const { error } = await supabase.from('visualizaciones').insert({ video_id: video.id, alumno_id: alumnoId });
    if (error) console.error('Error registrando vista:', error);
    else {
      sessionStorage.setItem(key, '1');
      setContadoresVistas(p => ({ ...p, [video.id]: (p[video.id] || 0) + 1 }));
      console.log('Vista registrada OK ✅');
    }
  };

  // ¿Tiene una extensión paga y todavía vigente para este video?
  const extensionVigente = (v) => {
    const e = extensiones[v.id];
    return !!(e && new Date(e.vence_en) > new Date());
  };
  // Cuántas extensiones compró ya para este video (el tope es 2).
  const comprasHechas = (v) => extensiones[v.id]?.compras || 0;

  // ¿El video ya venció? Una extensión paga vigente lo mantiene disponible.
  const estaVencido = (v) => {
    if (!v.vence_en) return false;
    if (new Date(v.vence_en) >= new Date()) return false;  // todavía no venció
    return !extensionVigente(v);                            // venció, salvo que haya comprado tiempo extra
  };

  // ¿Se le puede ofrecer comprar 24hs más? Solo si venció, tiene precio,
  // le quedan visualizaciones y no llegó al tope de compras.
  const puedeComprarExtension = (v) => {
    if (!estaVencido(v)) return false;
    if (!v.precio_extension || v.precio_extension <= 0) return false;
    if (comprasHechas(v) >= 2) return false;
    // Sin usos disponibles, un día extra no le serviría de nada.
    if (v.max_vistas != null && (contadoresVistas[v.id] || 0) >= v.max_vistas) return false;
    return true;
  };

  // Pide el link de pago a la Edge Function y lleva al alumno a Mercado Pago.
  const comprarExtension = async (v) => {
    if (!alumno?.id) return;
    setComprando(true);
    try {
      const { data, error } = await supabase.functions.invoke('crear-pago-extension', {
        body: { video_id: v.id, alumno_id: alumno.id },
      });
      if (error) throw new Error('No se pudo iniciar el pago');
      if (data?.error) throw new Error(data.error);

      const link = data?.init_point || data?.sandbox_init_point;
      if (!link) throw new Error('No se recibió el link de pago');

      window.location.href = link;   // se va a Mercado Pago
    } catch (err) {
      setComprando(false);
      toast(err.message || 'No se pudo iniciar el pago', 'error');
    }
  };

  // ¿Vence pronto? (dentro de los próximos 3 días)
  const venceProximo = (v) => !!(v.vence_en && !estaVencido(v) && new Date(v.vence_en) <= new Date(Date.now() + 3*24*60*60*1000));
  // Muestra la fecha de vencimiento siempre en horario de Argentina.
  const fmtVence = (valor, conAnio = false) => {
    const d = new Date(valor);
    const tz = 'America/Argentina/Buenos_Aires';
    const fecha = d.toLocaleDateString('es-AR', conAnio
      ? {day:'2-digit',month:'long',year:'numeric',timeZone:tz}
      : {day:'2-digit',month:'2-digit',timeZone:tz});
    const hora = d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',timeZone:tz});
    return `${fecha} ${hora} hs`;
  };

  const seleccionarVideo = async (v) => {
    setAccesoError(null);
    // Si el video venció, no se reproduce: se avisa al alumno.
    if (estaVencido(v)) {
      setVencidoAviso(v);
      return;
    }
    if (alumno?.id && v.max_vistas != null) {
      const sessionKey = `vista_${v.id}_${alumno.id}`;
      const yaRegistradoEstaSesion = !!sessionStorage.getItem(sessionKey);
      if (!yaRegistradoEstaSesion) {
        let vistas = contadoresVistas[v.id];
        if (vistas === undefined) {
          const { count } = await supabase
            .from('visualizaciones')
            .select('id', { count: 'exact', head: true })
            .eq('video_id', v.id)
            .eq('alumno_id', alumno.id);
          vistas = count || 0;
          setContadoresVistas(p => ({ ...p, [v.id]: vistas }));
        }
        if (vistas >= v.max_vistas) {
          setAccesoError({ video: v, count: vistas });
          return;
        }
        // Tiene límite y va a gastar una vista: pedir confirmación antes de reproducir.
        setConfirmVista({ video: v, restantes: v.max_vistas - vistas });
        return;
      }
    }
    // Sin límite, o ya registrado en esta sesión: reproducir directo.
    reproducirVideo(v);
  };

  const reproducirVideo = (v) => {
    setConfirmVista(null);
    setCurrent(v);
    registrarVista(v);
    // Subir automáticamente hasta el reproductor para que el alumno vea que el video se abrió.
    setTimeout(() => {
      if (videoContRef.current) {
        videoContRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 100);
  };

  const embedUrl = current ? getEmbedUrl(current) : null;
  const esDrive = !!(embedUrl && embedUrl.includes('drive.google.com'));
  // iOS (iPhone/iPad) no soporta el fullscreen del contenedor; usa el reproductor nativo.
  const esIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const esMobil = (typeof window !== 'undefined') && (window.innerWidth <= 768 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent));
  const watermarkName = alumno?.nombre || user?.email?.split('@')[0] || 'SACi';
  const videoContRef = useRef();
  const pantallaCompleta = () => {
    const el = videoContRef.current;
    if (!el) return;
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else if (el.requestFullscreen) {
      el.requestFullscreen();
    } else if (el.webkitRequestFullscreen) {
      el.webkitRequestFullscreen();
    }
  };

  const VideoItem = ({ v }) => {
    const bid = v.bunny_id || v.bunny_video_id;
    return (
      <div onClick={() => seleccionarVideo(v)} style={{display:'flex',gap:10,padding:'8px 10px',borderRadius:8,cursor:'pointer',background:current?.id===v.id?'var(--surface2)':'transparent',border:current?.id===v.id?'1px solid var(--accent)':'1px solid transparent',marginBottom:3,transition:'all 0.2s'}}>
        {bid ? <img src={`https://${BUNNY_CDN}/${bid}/thumbnail.jpg`} style={{width:58,height:36,borderRadius:5,objectFit:'cover',flexShrink:0}} onError={e=>e.target.style.display='none'} />
          : <div style={{width:58,height:36,borderRadius:5,background:'var(--surface2)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>🎬</div>}
        <div style={{overflow:'hidden',flex:1}}>
          <div style={{fontSize:'0.8rem',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:current?.id===v.id?'var(--accent)':(estaVencido(v)?'var(--text2)':'var(--text)')}}>
            {v.titulo}
            {estaVencido(v) && <span className="chip chip-red" style={{marginLeft:6,fontSize:'0.62rem'}}>⌛ Vencido</span>}
            {extensionVigente(v) && <span className="chip chip-green" style={{marginLeft:6,fontSize:'0.62rem'}}>⏱️ +24hs</span>}
          </div>
          {v.vence_en && !estaVencido(v) && (
            <div style={{fontSize:'0.68rem',marginTop:2,color:venceProximo(v)?'var(--warning)':'var(--text2)',fontWeight:venceProximo(v)?700:500}}>
              {venceProximo(v) ? '⚠️ Vence' : '⌛ Disponible hasta'} el {fmtVence(v.vence_en)}
            </div>
          )}
        </div>
      </div>
    );
  };

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in videos-page">
      <div className="page-header">
        <div><div className="page-title">🎬 Mis Videos</div><div className="page-subtitle">{videos.length} videos disponibles</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr',gap:20}} className="video-grid">
        <div>
          {current ? (
            <>
              <div className={`video-container video-stage${agrandado ? ' video-agrandado' : ''}`} ref={videoContRef} style={{marginBottom:16,maxWidth:1000,marginLeft:'auto',marginRight:'auto'}}>
                {embedUrl ? <iframe src={embedUrl} style={{width:'100%',height:'100%',border:'none'}} allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture; fullscreen" allowFullScreen={!esDrive} />
                  : <Empty icon="🎬" text="Video no disponible" />}
                {esDrive && (
                  <div style={{position:'absolute',top:0,right:0,width:72,height:72,background:'#000',zIndex:13,cursor:'default'}} title="" onClick={e=>e.preventDefault()} onContextMenu={e=>e.preventDefault()} />
                )}
                {esDrive && !esMobil && (
                  <button onClick={pantallaCompleta} title="Pantalla completa" style={{position:'absolute',bottom:6,right:6,zIndex:12,background:'#000',color:'#fff',border:'none',borderRadius:8,padding:'10px 14px',cursor:'pointer',fontSize:'0.85rem',display:'flex',alignItems:'center',gap:6,fontWeight:600}}>⛶ Pantalla completa</button>
                )}
                {/* Botón propio de agrandar/salir (mantiene la marca de agua, sin fullscreen del sistema) */}
                {!esDrive && (
                  <button onClick={() => setAgrandado(a => !a)} title={agrandado ? 'Salir' : 'Agrandar'} style={{position:'absolute',top:10,right:10,zIndex:14,background:'rgba(0,0,0,0.75)',color:'#fff',border:'1px solid rgba(255,255,255,0.4)',borderRadius:8,padding:'9px 14px',cursor:'pointer',fontSize:'0.85rem',display:'flex',alignItems:'center',gap:6,fontWeight:700}}>
                    {agrandado ? '✕ Salir' : '⤢ Agrandar'}
                  </button>
                )}
                {/* Cartelito chico permanente con el nombre del alumno (identificación) */}
                <div style={{position:'absolute',top:6,left:6,zIndex:10,background:'rgba(0,0,0,0.45)',color:'rgba(249,202,36,0.9)',padding:'3px 8px',borderRadius:6,fontSize:'0.7rem',fontWeight:600,fontFamily:"'Space Mono', monospace",pointerEvents:'none',letterSpacing:'0.03em',textShadow:'0 1px 3px rgba(0,0,0,0.9)'}}>
                  {watermarkName}
                </div>
                <div className="video-watermark">
                  <div className="video-watermark-text">{watermarkName}</div>
                  <div className="video-watermark-sub">{alumno?.email || user?.email || ''}</div>
                </div>
              </div>
              <div className="card">
                <div style={{fontWeight:700,fontSize:'1.1rem',marginBottom:6}}>{current.titulo}</div>
                {current.max_vistas != null && alumno?.id && (() => {
                  const vistas = contadoresVistas[current.id] || 0;
                  const restantes = Math.max(0, current.max_vistas - vistas);
                  return (
                    <div style={{fontSize:'0.82rem',color:restantes===0?'var(--danger)':'var(--text2)',marginBottom:6}}>
                      {restantes === 0 ? `Llegaste al límite de ${current.max_vistas} vistas` : `Te quedan ${restantes} intentos de los ${current.max_vistas} posibles`}
                    </div>
                  );
                })()}
                {current.vence_en && (
                  <div style={{
                    fontSize:'0.82rem',
                    marginBottom:6,
                    padding:'6px 10px',
                    borderRadius:8,
                    display:'inline-block',
                    background: estaVencido(current) ? 'rgba(255,71,87,0.12)' : (venceProximo(current) ? 'rgba(255,176,32,0.12)' : 'var(--surface2)'),
                    color: estaVencido(current) ? 'var(--danger)' : (venceProximo(current) ? 'var(--warning)' : 'var(--text2)'),
                    fontWeight: 600
                  }}>
                    {estaVencido(current)
                      ? `⌛ Venció el ${fmtVence(current.vence_en, true)}`
                      : `⌛ Disponible hasta el ${fmtVence(current.vence_en, true)}`}
                  </div>
                )}
                {current.descripcion && <div style={{color:'var(--text2)',fontSize:'0.88rem'}}>{current.descripcion}</div>}
              </div>
            </>
          ) : (videos.length ? <Empty icon="🎬" text="Elegí un video de la lista para reproducirlo" /> : <Empty icon="🎬" text="No hay videos disponibles" />)}
        </div>
        <div>
          <div style={{fontWeight:700,marginBottom:10,color:'var(--text2)',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.08em'}}>Contenido</div>
          {temas.map(t => {
            const tVids = videos.filter(v => v.tema_id === t.id);
            if (!tVids.length) return null;
            const isOpen = expandedTemas[t.id];
            return (
              <div key={t.id} style={{marginBottom:8}}>
                <div onClick={() => toggleTema(t.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',padding:'8px 10px',borderRadius:8,background:'var(--surface2)',marginBottom:isOpen?4:0,borderLeft:`3px solid ${t.color||'var(--accent)'}`}}>
                  <span style={{fontSize:'0.8rem',fontWeight:700,color:t.color||'var(--accent)'}}>{t.nombre}</span>
                  <span style={{color:'var(--text2)',fontSize:'0.75rem'}}>{isOpen?'▲':'▼'} {tVids.length}</span>
                </div>
                {isOpen && tVids.map(v => <VideoItem key={v.id} v={v} />)}
              </div>
            );
          })}
          {videos.filter(v=>!v.tema_id).length > 0 && (
            <div style={{marginBottom:8}}>
              <div onClick={() => toggleTema('sin-tema')} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',padding:'8px 10px',borderRadius:8,background:'var(--surface2)',marginBottom:expandedTemas['sin-tema']?4:0}}>
                <span style={{fontSize:'0.8rem',fontWeight:700,color:'var(--text2)'}}>Videos generales</span>
                <span style={{color:'var(--text2)',fontSize:'0.75rem'}}>{expandedTemas['sin-tema']?'▲':'▼'}</span>
              </div>
              {expandedTemas['sin-tema'] && videos.filter(v=>!v.tema_id).map(v => <VideoItem key={v.id} v={v} />)}
            </div>
          )}
        </div>
      </div>
      {accesoError && (
        <div className="modal-overlay" onClick={() => setAccesoError(null)}>
          <div style={{background:'var(--surface)',border:'1px solid var(--danger)',borderRadius:18,width:420,padding:32,textAlign:'center',animation:'fadeInScale 0.3s ease'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:'3rem',marginBottom:12}}>🔒</div>
            <div style={{fontWeight:700,fontSize:'1.2rem',marginBottom:8}}>Acceso limitado</div>
            <div style={{color:'var(--text2)',fontSize:'0.9rem',marginBottom:16}}>Ya accediste a <strong style={{color:'var(--text)'}}>{accesoError.video.titulo}</strong> el máximo de veces permitidas.</div>
            <div style={{background:'rgba(255,71,87,0.1)',border:'1px solid var(--danger)',borderRadius:10,padding:'10px 16px',marginBottom:16,fontSize:'0.85rem',color:'var(--danger)'}}>
              Límite: {accesoError.video.max_vistas} accesos · Usados: {accesoError.count}
            </div>
            <div style={{color:'var(--text2)',fontSize:'0.82rem',marginBottom:20}}>Contactá al docente si necesitás acceso adicional.</div>
            <button className="btn btn-ghost" onClick={() => setAccesoError(null)} style={{width:'100%',justifyContent:'center'}}>Cerrar</button>
          </div>
        </div>
      )}
      {vencidoAviso && (
        <div className="modal-overlay" onClick={() => !comprando && setVencidoAviso(null)}>
          <div style={{background:'var(--surface)',border:'1px solid var(--danger)',borderRadius:18,width:440,padding:32,textAlign:'center',animation:'fadeInScale 0.3s ease'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:'3rem',marginBottom:12}}>⌛</div>
            <div style={{fontWeight:700,fontSize:'1.2rem',marginBottom:8}}>Video vencido</div>
            <div style={{color:'var(--text2)',fontSize:'0.9rem',marginBottom:16}}>
              <strong style={{color:'var(--text)'}}>{vencidoAviso.titulo}</strong> ya no está disponible.
            </div>
            <div style={{background:'rgba(255,71,87,0.1)',border:'1px solid var(--danger)',borderRadius:10,padding:'10px 16px',marginBottom:16,fontSize:'0.85rem',color:'var(--danger)'}}>
              Venció el {fmtVence(vencidoAviso.vence_en, true)}
            </div>

            {puedeComprarExtension(vencidoAviso) ? (
              <>
                <div style={{background:'var(--surface2)',border:'1px solid var(--accent)',borderRadius:12,padding:16,marginBottom:16}}>
                  <div style={{fontSize:'0.9rem',fontWeight:600,marginBottom:6}}>
                    ¿Necesitás más tiempo?
                  </div>
                  <div style={{color:'var(--text2)',fontSize:'0.84rem',marginBottom:10,lineHeight:1.5}}>
                    Podés comprar <strong style={{color:'var(--text)'}}>24 horas más</strong> de acceso a este video.
                    Tus visualizaciones disponibles no cambian.
                  </div>
                  <div style={{fontSize:'1.5rem',fontWeight:800,color:'var(--success)'}}>
                    ${Number(vencidoAviso.precio_extension).toLocaleString('es-AR')}
                  </div>
                  {comprasHechas(vencidoAviso) > 0 && (
                    <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:6}}>
                      Ya compraste {comprasHechas(vencidoAviso)} de 2 extensiones posibles
                    </div>
                  )}
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-ghost" disabled={comprando}
                    onClick={() => setVencidoAviso(null)}
                    style={{flex:1,justifyContent:'center'}}>
                    Cancelar
                  </button>
                  <button className="btn btn-primary" disabled={comprando}
                    onClick={() => comprarExtension(vencidoAviso)}
                    style={{flex:1.4,justifyContent:'center'}}>
                    {comprando ? 'Abriendo pago...' : '💳 Comprar 24hs'}
                  </button>
                </div>
                <div style={{fontSize:'0.72rem',color:'var(--text2)',marginTop:10}}>
                  Vas a ser redirigido a Mercado Pago
                </div>
              </>
            ) : (
              <>
                <div style={{color:'var(--text2)',fontSize:'0.82rem',marginBottom:20}}>
                  {comprasHechas(vencidoAviso) >= 2
                    ? 'Ya usaste las 2 extensiones disponibles para este video. Contactá al docente.'
                    : (vencidoAviso.max_vistas != null && (contadoresVistas[vencidoAviso.id] || 0) >= vencidoAviso.max_vistas)
                      ? 'Ya usaste todas tus visualizaciones de este video, así que extender el plazo no te serviría. Contactá al docente.'
                      : 'Contactá al docente si necesitás acceso.'}
                </div>
                <button className="btn btn-ghost" onClick={() => setVencidoAviso(null)} style={{width:'100%',justifyContent:'center'}}>Cerrar</button>
              </>
            )}
          </div>
        </div>
      )}
      {confirmVista && (
        <div className="modal-overlay" onClick={() => setConfirmVista(null)}>
          <div style={{background:'var(--surface)',border:'1px solid var(--accent)',borderRadius:18,width:420,padding:32,textAlign:'center',animation:'fadeInScale 0.3s ease'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:'3rem',marginBottom:12}}>👁️</div>
            <div style={{fontWeight:700,fontSize:'1.2rem',marginBottom:8}}>¿Reproducir este video?</div>
            <div style={{color:'var(--text2)',fontSize:'0.9rem',marginBottom:16}}>Vas a usar 1 visualización de <strong style={{color:'var(--text)'}}>{confirmVista.video.titulo}</strong>.</div>
            <div style={{background:'rgba(108,99,255,0.1)',border:'1px solid var(--accent)',borderRadius:10,padding:'10px 16px',marginBottom:20,fontSize:'0.85rem',color:'var(--accent)'}}>
              Después de reproducir te quedarán {confirmVista.restantes - 1} de {confirmVista.video.max_vistas} visualizaciones.
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" onClick={() => setConfirmVista(null)} style={{flex:1,justifyContent:'center'}}>Cancelar</button>
              <button className="btn btn-primary" onClick={() => reproducirVideo(confirmVista.video)} style={{flex:1,justifyContent:'center'}}>Sí, reproducir</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ALUMNO MATERIALES ────────────────────────────────────────────────
function WatermarkOverlay({ name, email }) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="280" height="110"><text x="50%" y="38%" text-anchor="middle" dominant-baseline="middle" transform="rotate(-35,140,42)" font-size="16" font-weight="700" font-family="monospace" fill="#ff6584" opacity="0.22">${name}</text><text x="50%" y="65%" text-anchor="middle" dominant-baseline="middle" transform="rotate(-35,140,72)" font-size="11" font-family="monospace" fill="#6c63ff" opacity="0.18">${email}</text></svg>`;
  return (
    <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:10,userSelect:'none',backgroundImage:`url("data:image/svg+xml,${encodeURIComponent(svg)}")`,backgroundRepeat:'repeat'}} />
  );
}

function AlumnoMateriales({ alumno, user }) {
  const TIPO_INFO = { pdf:'📕', word:'📘', excel:'📗', link:'🔗', video:'🎬', imagen:'🖼️', doc:'📝', otro:'📦' };
  const [temas, setTemas] = useState([]);
  const [mats, setMats] = useState([]);
  const [loading, setLoading] = useState(true);
  const [preview, setPreview] = useState(null);
  const [previewFull, setPreviewFull] = useState(false);   // visor de material en pantalla completa
  const [expanded, setExpanded] = useState({});
  const [subCerr, setSubCerr] = useState({});   // subtemas cerrados (por defecto abiertos)
  const [contadoresVistasMat, setContadoresVistasMat] = useState({});
  const [accesoErrorMat, setAccesoErrorMat] = useState(null);
  const toast = useToast();
  const watermarkName = alumno?.nombre || user?.email?.split('@')[0] || 'SACi';
  const watermarkEmail = alumno?.email || user?.email || '';

  const registrarVistaMaterial = async (mat) => {
    if (!mat?.id || !alumno?.id) return;
    const key = `mat_${mat.id}_${alumno.id}`;
    if (sessionStorage.getItem(key)) return;
    await supabase.from('visualizaciones_materiales').insert({ material_id: mat.id, alumno_id: alumno.id });
    sessionStorage.setItem(key, '1');
    if (mat.max_vistas != null) {
      setContadoresVistasMat(p => ({ ...p, [mat.id]: (p[mat.id] || 0) + 1 }));
    }
  };

  useEffect(() => {
    // El alumno solo ve el contenido de SU aula.
    const miAula = alumno?.aula_id;
    if (!miAula) { setTemas([]); setMats([]); setLoading(false); return; }
    Promise.all([
      supabase.from('temas_materiales').select('*').eq('aula_id', miAula).order('orden'),
      supabase.from('materiales').select('*').eq('aula_id', miAula).order('orden'),
    ]).then(async ([{ data: tData }, { data: mData }]) => {
      const now = new Date().toISOString();
      const mFiltered = (mData || []).filter(m => !m.publicar_en || m.publicar_en <= now);
      setTemas(tData || []); setMats(mFiltered); setLoading(false);
      // Temas cerrados por defecto (el alumno abre el que quiera).
      if (mData?.length && alumno?.id) {
        const matIds = (mData || []).filter(m => m.max_vistas != null).map(m => m.id);
        if (matIds.length) {
          const { data: vData } = await supabase
            .from('visualizaciones_materiales')
            .select('material_id')
            .eq('alumno_id', alumno.id)
            .in('material_id', matIds);
          const contadores = {};
          (vData || []).forEach(v => { contadores[v.material_id] = (contadores[v.material_id] || 0) + 1; });
          setContadoresVistasMat(contadores);
        }
      }
    });
  }, []);

  const toggleTema = id => setExpanded(p => ({ ...p, [id]: !p[id] }));

  const download = async m => {
    try {
      const res = await fetch(m.url);
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = m.unidad || m.titulo || 'archivo';
      a.click();
      URL.revokeObjectURL(a.href);
    } catch { toast('Error al descargar', 'error'); }
  };

  const abrirPreview = async (m) => {
    setAccesoErrorMat(null);
    if (alumno?.id && m.max_vistas != null) {
      const sessionKey = `mat_${m.id}_${alumno.id}`;
      const yaRegistradoEstaSesion = !!sessionStorage.getItem(sessionKey);
      if (!yaRegistradoEstaSesion) {
        let vistas = contadoresVistasMat[m.id];
        if (vistas === undefined) {
          const { count } = await supabase
            .from('visualizaciones_materiales')
            .select('id', { count: 'exact', head: true })
            .eq('material_id', m.id)
            .eq('alumno_id', alumno.id);
          vistas = count || 0;
          setContadoresVistasMat(p => ({ ...p, [m.id]: vistas }));
        }
        if (vistas >= m.max_vistas) {
          setAccesoErrorMat({ mat: m, count: vistas });
          return;
        }
      }
    }
    setPreview(m);
    registrarVistaMaterial(m);
  };

  const MatCard = ({ m }) => {
    const icon = TIPO_INFO[m.tipo] || '📦';
    const puedeDescargar = m.permite_descarga !== false;
    return (
      <div className="card card-hover">
        <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
          <div style={{fontSize:'2.2rem',lineHeight:1,flexShrink:0}}>{icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:'0.95rem'}}>{m.unidad || m.titulo}</div>
            {m.descripcion && <div style={{fontSize:'0.8rem',color:'var(--text2)',marginTop:3}}>{m.descripcion}</div>}
            {m.max_vistas != null && alumno?.id && (() => {
              const vistas = contadoresVistasMat[m.id] || 0;
              const restantes = Math.max(0, m.max_vistas - vistas);
              return (
                <div style={{fontSize:'0.75rem',color:restantes===0?'var(--danger)':'var(--text2)',marginTop:4}}>
                  {restantes === 0 ? `Llegaste al límite de ${m.max_vistas} vistas` : `Te quedan ${restantes} intentos de los ${m.max_vistas} posibles`}
                </div>
              );
            })()}
            <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
              <span className="chip chip-blue">{m.tipo?.toUpperCase()}</span>
              {!puedeDescargar && <span className="chip chip-yellow" style={{fontSize:'0.68rem'}}>🔒 Solo visualización</span>}
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginTop:14,borderTop:'1px solid var(--border)',paddingTop:12}}>
          {['pdf','imagen','video','link','excel','word'].includes(m.tipo) && (
            <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center'}} onClick={() => abrirPreview(m)}>👁️ Visualizar</button>
          )}
          {puedeDescargar && (
            <button className="btn btn-success btn-sm" style={{flex:1,justifyContent:'center'}} onClick={() => download(m)}>⬇️ Descargar</button>
          )}
          {!['pdf','imagen','video','link','excel','word'].includes(m.tipo) && !puedeDescargar && (
            <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:'center'}} onClick={() => window.open(m.url,'_blank')}>↗️ Abrir</button>
          )}
        </div>
      </div>
    );
  };

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header"><div><div className="page-title">📄 Materiales</div><div className="page-subtitle">{mats.length} materiales disponibles</div></div></div>
      {mats.length === 0 && <Empty icon="📄" text="No hay materiales disponibles aún" />}
      {temas.map(t => {
        const tMats = mats.filter(m => m.tema_id === t.id);
        if (!tMats.length) return null;
        const isOpen = expanded[t.id];
        return (
          <div key={t.id} style={{marginBottom:14}}>
            <div onClick={() => toggleTema(t.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px',borderRadius:isOpen?'12px 12px 0 0':'12px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:`4px solid ${t.color||'var(--accent)'}`,cursor:'pointer'}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:'1.3rem'}}>📂</span>
                <div>
                  <div style={{fontWeight:700,color:t.color||'var(--accent)'}}>{t.nombre}</div>
                  {t.descripcion && <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:2}}>{t.descripcion}</div>}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span className="chip chip-blue">{tMats.length} materiales</span>
                <span style={{color:'var(--text2)',fontSize:'1rem'}}>{isOpen?'▲':'▼'}</span>
              </div>
            </div>
            {isOpen && (
              <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',padding:16,background:'var(--surface)'}}>
                {agruparPorSubtema(tMats).map(g => {
                  const subKey = `${t.id}__${g.subtema}`;
                  const subAbierto = g.subtema === '' || !subCerr[subKey];
                  return (
                  <div key={g.subtema || '_sin_'} style={{marginBottom:12}}>
                    {g.subtema && (
                      <div onClick={() => setSubCerr(s => ({ ...s, [subKey]: !s[subKey] }))} style={{fontWeight:700,fontSize:'0.82rem',color:t.color||'var(--accent)',margin:'2px 0 8px',cursor:'pointer',userSelect:'none'}}>
                        {subAbierto ? '▼' : '▶'} 📁 {g.subtema} <span style={{color:'var(--text2)',fontWeight:400}}>({g.items.length})</span>
                      </div>
                    )}
                    {subAbierto && <div className="grid-2">{g.items.map(m => <MatCard key={m.id} m={m} />)}</div>}
                  </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
      {mats.filter(m=>!m.tema_id).length > 0 && (
        <div style={{marginBottom:14}}>
          <div onClick={() => toggleTema('sin-tema')} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px',borderRadius:expanded['sin-tema']?'12px 12px 0 0':'12px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:'4px solid var(--border)',cursor:'pointer'}}>
            <div style={{fontWeight:600,color:'var(--text2)'}}>📁 Otros materiales</div>
            <span style={{color:'var(--text2)',fontSize:'1rem'}}>{expanded['sin-tema']?'▲':'▼'}</span>
          </div>
          {expanded['sin-tema'] && (
            <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',padding:16,background:'var(--surface)'}}>
              <div className="grid-2">{mats.filter(m=>!m.tema_id).map(m => <MatCard key={m.id} m={m} />)}</div>
            </div>
          )}
        </div>
      )}

      {/* Preview modal - sin opción de descarga cuando está bloqueado */}
      {preview && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setPreview(null)}>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius: previewFull?0:18, width: previewFull?'100vw':'95vw', maxWidth: previewFull?'none':1400, height: previewFull?'100vh':'92vh', display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 20px',borderBottom:'1px solid var(--border)'}}>
              <div style={{fontWeight:700}}>{preview.unidad||preview.titulo}</div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                {preview.permite_descarga !== false && (
                  <button className="btn btn-success btn-sm" onClick={() => download(preview)}>⬇️ Descargar</button>
                )}
                <button className="btn btn-ghost btn-sm" onClick={() => setPreviewFull(f => !f)} title={previewFull?'Reducir':'Pantalla completa'}>
                  {previewFull ? '🗗 Reducir' : '⛶ Pantalla completa'}
                </button>
                <button className="modal-close" onClick={() => { setPreview(null); setPreviewFull(false); }}>✕</button>
              </div>
            </div>
            <div style={{flex:1,overflow:'hidden',borderRadius: previewFull?0:'0 0 18px 18px',position:'relative'}}>
              {preview.tipo === 'pdf' ? (
                <>
                  <iframe
                    src={preview.permite_descarga === false
                      ? `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(preview.url)}#toolbar=0&navpanes=0`
                      : preview.url}
                    style={{width:'100%',height:'100%',border:'none'}}
                    {...(preview.permite_descarga === false ? {sandbox:'allow-scripts allow-same-origin'} : {})}
                  />
                  <WatermarkOverlay name={watermarkName} email={watermarkEmail} />
                </>
              ) : preview.tipo === 'imagen' ? (
                <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#000',position:'relative'}}>
                  <img src={preview.url} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}} alt={preview.titulo} />
                  <WatermarkOverlay name={watermarkName} email={watermarkEmail} />
                </div>
              ) : preview.tipo === 'link' ? (
                <div style={{textAlign:'center',padding:40}}>
                  <a href={preview.url} target="_blank" rel="noreferrer" className="btn btn-primary">↗️ Abrir enlace</a>
                </div>
              ) : (preview.tipo === 'excel' || preview.tipo === 'word') ? (
                <>
                  <iframe
                    src={`https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(preview.url)}`}
                    style={{width:'100%',height:'100%',border:'none'}}
                  />
                  {/* Parche que bloquea SOLO la esquina inferior derecha del visor de Office (botones de abrir/descargar en Office), dejando libres las pestañas de hojas de la izquierda */}
                  <div style={{position:'absolute',bottom:0,right:0,width:160,height:44,background:'transparent',zIndex:11}} onClick={e=>e.preventDefault()} onContextMenu={e=>e.preventDefault()} />
                  <WatermarkOverlay name={watermarkName} email={watermarkEmail} />
                </>
              ) : null}
            </div>
          </div>
        </div>
      )}
      {accesoErrorMat && (
        <div className="modal-overlay" onClick={() => setAccesoErrorMat(null)}>
          <div style={{background:'var(--surface)',border:'1px solid var(--danger)',borderRadius:18,width:420,padding:32,textAlign:'center',animation:'fadeInScale 0.3s ease'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:'3rem',marginBottom:12}}>🔒</div>
            <div style={{fontWeight:700,fontSize:'1.2rem',marginBottom:8}}>Acceso limitado</div>
            <div style={{color:'var(--text2)',fontSize:'0.9rem',marginBottom:16}}>Ya accediste a <strong style={{color:'var(--text)'}}>{accesoErrorMat.mat.unidad||accesoErrorMat.mat.titulo}</strong> el máximo de veces permitidas.</div>
            <div style={{background:'rgba(255,71,87,0.1)',border:'1px solid var(--danger)',borderRadius:10,padding:'10px 16px',marginBottom:16,fontSize:'0.85rem',color:'var(--danger)'}}>
              Límite: {accesoErrorMat.mat.max_vistas} accesos · Usados: {accesoErrorMat.count}
            </div>
            <div style={{color:'var(--text2)',fontSize:'0.82rem',marginBottom:20}}>Contactá al docente si necesitás acceso adicional.</div>
            <button className="btn btn-ghost" onClick={() => setAccesoErrorMat(null)} style={{width:'100%',justifyContent:'center'}}>Cerrar</button>
          </div>
        </div>
      )}
    </div>
  );
}

function AlumnoEvaluaciones({ alumno }) {
  const [evals, setEvals] = useState([]);
  const [loading, setLoading] = useState(true);
  const today = new Date().toISOString().split('T')[0];

  useEffect(() => {
    // El alumno solo ve las evaluaciones de SU aula.
    const miAula = alumno?.aula_id;
    if (!miAula) { setEvals([]); setLoading(false); return; }
    supabase.from('evaluaciones')
      .select('id, titulo, descripcion, link_google, fecha_limite, tema, visible, estado, publicar_en')
      .eq('aula_id', miAula)
      .neq('visible', false)
      .order('id', { ascending: false })
      .then(({ data }) => {
        const now = new Date().toISOString();
        setEvals((data || []).filter(ev => !ev.publicar_en || ev.publicar_en <= now));
        setLoading(false);
      });
  }, []);

  const isVencida = ev => ev.fecha_limite && new Date(ev.fecha_limite) < new Date();
  const isProxVencer = ev => ev.fecha_limite && new Date(ev.fecha_limite) >= new Date() && new Date(ev.fecha_limite) <= new Date(Date.now() + 3*24*60*60*1000);

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header"><div><div className="page-title">📝 Evaluaciones</div><div className="page-subtitle">{evals.filter(e=>!isVencida(e)).length} disponibles</div></div></div>

      {evals.length === 0 ? <Empty icon="📝" text="No hay evaluaciones disponibles" /> : (
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {evals.map(ev => {
            const vencida = isVencida(ev);
            const proxVencer = isProxVencer(ev);
            return (
              <div key={ev.id} className="card" style={{borderLeft:`4px solid ${vencida?'var(--danger)':proxVencer?'var(--warning)':'var(--accent)'}`,opacity:vencida?0.7:1}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16,flexWrap:'wrap'}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:6}}>
                      <div style={{fontWeight:700,fontSize:'1rem'}}>{ev.titulo}</div>
                      {ev.tema && <span className="chip chip-blue">{ev.tema}</span>}
                      {vencida && <span className="chip chip-red">⏰ Vencida</span>}
                      {proxVencer && !vencida && <span className="chip chip-yellow">⚠️ Vence pronto</span>}
                    </div>
                    {ev.descripcion && <div style={{fontSize:'0.88rem',color:'var(--text2)',marginBottom:10,lineHeight:1.5}}>{ev.descripcion}</div>}
                    {ev.fecha_limite && (
                      <div style={{fontSize:'0.82rem',color:vencida?'var(--danger)':proxVencer?'var(--warning)':'var(--text2)',marginBottom:10}}>
                        📅 {vencida ? 'Venció el' : 'Disponible hasta'}: <strong>{new Date(ev.fecha_limite).toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric',timeZone:'America/Argentina/Buenos_Aires'})} a las {new Date(ev.fecha_limite).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Argentina/Buenos_Aires'})} hs</strong>
                      </div>
                    )}
                  </div>
                  <div style={{flexShrink:0}}>
                    {vencida ? (
                      <div style={{padding:'10px 20px',borderRadius:10,background:'var(--surface2)',color:'var(--text2)',fontSize:'0.84rem',textAlign:'center'}}>
                        ⏰ Plazo vencido
                      </div>
                    ) : (
                      <a href={ev.link_google} target="_blank" rel="noreferrer" className="btn btn-primary" style={{textDecoration:'none',display:'inline-flex',alignItems:'center',gap:8}}>
                        📋 Ir a la evaluación
                      </a>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AlumnoPagos({ alumno }) {
  const [pagos, setPagos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [facturaVer, setFacturaVer] = useState(null);
  const today = new Date().toISOString().split('T')[0];

  useEffect(() => {
    if (!alumno?.id) { setLoading(false); return; }
    supabase.from('pagos').select('*').eq('alumno_id', alumno.id)
      .order('fecha_pago', { ascending: false })
      .then(({ data }) => { setPagos(data || []); setLoading(false); });
  }, [alumno]);

  const totalPagado = pagos.reduce((s, p) => s + (parseFloat(p.monto) || 0), 0);
  const proximosPagos = pagos.filter(p => p.proximo_pago && p.proximo_pago >= today);

  const planColor = plan => {
    if (plan === 'Parcial') return 'chip-yellow';
    if (plan === 'Final') return 'chip-green';
    return 'chip-blue';
  };

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header"><div><div className="page-title">💳 Mis Pagos</div></div></div>

      <div className="stats-grid" style={{maxWidth:500,marginBottom:20}}>
        <div className="stat-card green"><span className="stat-icon">💵</span><div className="stat-value" style={{fontSize:'1.1rem'}}>$ {totalPagado.toLocaleString('es-AR',{minimumFractionDigits:2})}</div><div className="stat-label">Total abonado</div></div>
        <div className="stat-card gold"><span className="stat-icon">📋</span><div className="stat-value">{pagos.length}</div><div className="stat-label">Pagos registrados</div></div>
      </div>

      {/* Próximos vencimientos */}
      {proximosPagos.length > 0 && (
        <div className="card" style={{marginBottom:20,borderColor:'var(--accent2)',background:'rgba(255,101,132,0.05)'}}>
          <div style={{fontWeight:700,marginBottom:12,color:'var(--accent2)',display:'flex',alignItems:'center',gap:8}}>🔔 Próximos vencimientos</div>
          {proximosPagos.map(p => (
            <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
              <div>
                <span className={`chip ${planColor(p.plan)}`} style={{marginRight:8}}>{p.plan}</span>
                {p.notas && <span style={{fontSize:'0.82rem',color:'var(--text2)'}}>{p.notas}</span>}
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'Space Mono',fontWeight:700,color:'var(--accent2)'}}>
                  {new Date(p.proximo_pago+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})}
                </div>
                {p.proximo_pago === today && <div style={{fontSize:'0.72rem',color:'var(--danger)',fontWeight:700}}>🔴 ¡Hoy!</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Historial de pagos */}
      {pagos.length === 0 ? <Empty icon="💳" text="No hay registros de pagos aún" /> : (
        <div>
          <div style={{fontWeight:700,marginBottom:12,color:'var(--text2)',fontSize:'0.8rem',textTransform:'uppercase',letterSpacing:'0.08em'}}>Historial de pagos</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {pagos.map(p => (
              <div key={p.id} className="card" style={{padding:'14px 18px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
                  <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                    <span className={`chip ${planColor(p.plan)}`}>{p.plan === 'Parcial' ? '💰' : p.plan === 'Final' ? '✅' : '📚'} {p.plan || '—'}</span>
                    {p.notas && <span style={{fontSize:'0.82rem',color:'var(--text2)'}}>{p.notas}</span>}
                  </div>
                  <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.1rem',color:'var(--success)'}}>
                    {p.monto ? `$ ${parseFloat(p.monto).toLocaleString('es-AR',{minimumFractionDigits:2})}` : '—'}
                  </div>
                </div>
                <div style={{display:'flex',gap:20,marginTop:10,flexWrap:'wrap'}}>
                  <div style={{fontSize:'0.8rem',color:'var(--text2)'}}>
                    <span style={{fontWeight:600}}>Fecha de pago:</span>{' '}
                    {p.fecha_pago ? new Date(p.fecha_pago+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}) : '—'}
                  </div>
                  {p.proximo_pago && (
                    <div style={{fontSize:'0.8rem',color:p.proximo_pago < today ? 'var(--text2)' : 'var(--accent2)'}}>
                      <span style={{fontWeight:600}}>Próximo pago:</span>{' '}
                      {new Date(p.proximo_pago+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})}
                      {p.proximo_pago < today && ' ✅'}
                    </div>
                  )}
                </div>
                {p.factura_cae && (
                  <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',fontSize:'0.8rem',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                    <div>
                      <span style={{fontWeight:700,color:'var(--success)'}}>🧾 Factura {p.factura_tipo || 'C'} {p.factura_nro}</span>
                      <span style={{color:'var(--text2)',marginLeft:10}}>CAE: {p.factura_cae}{p.factura_cae_vto ? ` · vto ${new Date(p.factura_cae_vto+'T00:00:00').toLocaleDateString('es-AR')}` : ''}</span>
                    </div>
                    <button className="btn btn-ghost btn-sm" onClick={() => setFacturaVer(p)}>👁️ Ver factura</button>
                  </div>
                )}
              </div>
            ))}
            {facturaVer && <FacturaModal pago={facturaVer} onClose={() => setFacturaVer(null)} />}
          </div>
        </div>
      )}
    </div>
  );
}
