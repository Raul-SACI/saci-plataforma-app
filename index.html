              <label style={{fontSize:'0.78rem',color:'var(--text2)',fontWeight:600}}>Publicadas por el profesor</label>
              <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:6,maxHeight:140,overflowY:'auto'}}>
                {publicadas.length === 0 && <span style={{fontSize:'0.82rem',color:'var(--text2)'}}>Todavía no hay ninguna</span>}
                {publicadas.map(m => (
                  <button key={m.id} className="btn btn-ghost btn-sm" style={{justifyContent:'flex-start',gap:8}} onClick={() => cargarMatriz(m.id, true)}>
                    👁️ {m.titulo}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {soloLectura && (
        <div style={{background:'rgba(108,92,231,0.12)',border:'1px solid var(--accent)',borderRadius:10,padding:'8px 14px',marginBottom:12,fontSize:'0.85rem'}}>
          👁️ Estás viendo una matriz del profesor (solo lectura). Para practicar, tocá "+ Nueva MSA".
        </div>
      )}

      {/* Banco de piezas */}
      {!soloLectura && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:verBanco?12:0}}>
            <strong style={{fontSize:'0.9rem'}}>📦 Banco de piezas</strong>
            <button className="btn btn-ghost btn-sm" onClick={() => setVerBanco(v => !v)}>{verBanco ? 'Ocultar' : 'Mostrar'}</button>
          </div>
          {verBanco && (
            <>
              <div style={{fontSize:'0.75rem',color:'var(--text2)',marginBottom:8}}>Arrastrá una pieza a una celda, o hacé <b>clic en una pieza</b> y después <b>clic en la celda</b> donde va.</div>
              {piezaSel && <div style={{fontSize:'0.78rem',color:'var(--accent)',fontWeight:700,marginBottom:8}}>✋ Elegiste "{piezaSel.nombre}" — ahora tocá una celda para colocarla (o tocá la pieza otra vez para soltar).</div>}
              <div style={{maxHeight: bancoExp ? 460 : 128, overflowY:'auto', paddingRight:4, transition:'max-height 0.2s'}}>
              {[['archivo','🛢️ Archivos (bases de datos)'],['doc_cuadrado','▭ Documentos Manuales'],['doc_pancita','📄 Documentos generados por Sistema'],['elemento','🔤 Elementos']].map(([tipo,label]) => (
                <div key={tipo} style={{marginBottom:12}}>
                  <div style={{fontSize:'0.72rem',color:'var(--text2)',fontWeight:600,marginBottom:6}}>{label}</div>
                  <div className="msa-banco">
                    {bancoPorTipo(tipo).map(p => {
                      const elegida = piezaSel && piezaSel.nombre === p.nombre && piezaSel.tipo === p.tipo;
                      return (
                      <div key={p.id} style={{display:'inline-flex',flexDirection:'column',alignItems:'center',gap:2}}>
                        <div onClick={() => setPiezaSel(s => (s && s.nombre === p.nombre && s.tipo === p.tipo) ? null : { nombre: p.nombre, tipo: p.tipo })}
                          style={{cursor:'pointer',borderRadius:8,outline: elegida ? '2px solid var(--accent)' : 'none',outlineOffset:2}}>
                          <MsaPieza pieza={p} onDragStart={onDragStart} />
                        </div>
                        <div style={{display:'flex',gap:4}}>
                          <button onClick={() => editarPieza(p)} title="Editar"
                            style={{background:'none',border:'none',cursor:'pointer',fontSize:'0.7rem',opacity:0.6,padding:0}}>✏️</button>
                          <button onClick={() => eliminarPieza(p)} title="Eliminar"
                            style={{background:'none',border:'none',cursor:'pointer',fontSize:'0.7rem',opacity:0.6,padding:0}}>🗑️</button>
                        </div>
                      </div>
                      );
                    })}
                    {bancoPorTipo(tipo).length === 0 && <span style={{fontSize:'0.78rem',color:'var(--text2)'}}>—</span>}
                  </div>
                </div>
              ))}
              </div>
              <div style={{textAlign:'center',marginTop:6}}>
                <button className="btn btn-ghost btn-sm" onClick={() => setBancoExp(v => !v)}>{bancoExp ? 'Ver menos ▴' : 'Ver más ▾'}</button>
              </div>
              {/* Crear pieza nueva */}
              <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap',alignItems:'center',borderTop:'1px solid var(--border)',paddingTop:12}}>
                <input placeholder="Nombre nueva pieza" value={nuevaPieza.nombre}
                  onChange={e => setNuevaPieza(p => ({...p, nombre: e.target.value}))}
                  style={{flex:1,minWidth:140,padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)'}} />
                <select value={nuevaPieza.tipo} onChange={e => setNuevaPieza(p => ({...p, tipo: e.target.value}))}
                  style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)'}}>
                  <option value="archivo">🛢️ Archivo</option>
                  <option value="doc_cuadrado">▭ Documento Manual</option>
                  <option value="doc_pancita">📄 Documento generado por Sistema</option>
                  <option value="elemento">🔤 Elemento</option>
                </select>
                <button className="btn btn-ghost btn-sm" onClick={crearPieza}>+ Crear pieza</button>
              </div>
              {esAdmin && (
                <div style={{display:'flex',gap:8,marginTop:10,flexWrap:'wrap',alignItems:'center'}}>
                  <span style={{fontSize:'0.75rem',color:'var(--text2)'}}>Cargar muchas de una vez:</span>
                  <button className="btn btn-ghost btn-sm" onClick={descargarPlantillaPiezas}>📋 Plantilla</button>
                  <button className="btn btn-ghost btn-sm" onClick={() => fileImportRef.current.click()}>📥 Importar Excel</button>
                  <input ref={fileImportRef} type="file" accept=".xlsx,.xls" style={{display:'none'}}
                    onChange={e => { if (e.target.files[0]) { importarPiezas(e.target.files[0]); e.target.value=''; } }} />
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* Título + acciones */}
      {!soloLectura && (
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
          <input placeholder="Título de la matriz (ej: Compras con contrato)" value={titulo}
            onChange={e => setTitulo(e.target.value)}
            style={{flex:1,minWidth:200,padding:'8px 12px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)',fontWeight:600}} />
          <button className="btn btn-primary" onClick={() => guardar()} disabled={saving}>{saving ? 'Guardando...' : '💾 Guardar'}</button>
          {esAdmin && actual?.id && !actual?.publicada && <button className="btn btn-success" onClick={() => guardar(true)} disabled={saving}>📢 Publicar</button>}
          {esAdmin && actual?.publicada && <button className="btn btn-ghost" onClick={() => guardar(false)} disabled={saving}>Despublicar</button>}
        </div>
      )}

      {/* La matriz */}
      <div className="card" style={{overflowX:'auto',padding:0}}>
        <table className="msa-tabla">
          <thead>
            <tr>
              {MSA_COLS.map(c => (
                <th key={c.key} style={{position:'relative', width: anchos[c.key] ? anchos[c.key]+'px' : undefined, minWidth: anchos[c.key] ? anchos[c.key]+'px' : undefined}}>
                  {c.label}
                  {!soloLectura && (
                    <span
                      onMouseDown={(e) => iniciarResize(e, c.key)}
                      title="Arrastrá para cambiar el ancho"
                      style={{position:'absolute',top:0,right:0,width:8,height:'100%',cursor:'col-resize',userSelect:'none'}} />
                  )}
                </th>
              ))}
              {!soloLectura && <th style={{width:36}}></th>}
            </tr>
          </thead>
          <tbody>
            {filas.map(fila => (
              <tr key={fila.id}>
                {MSA_COLS.map(col => (
                  <td key={col.key} style={{minWidth: col.tipo==='piezas' ? 130 : 110}}>
                    {col.tipo === 'texto' ? (() => {
                      const cellKey = `${fila.id}_${col.key}`;
                      const colorActual = colores[cellKey] || null;
                      const abierto = colorAbierto === cellKey;
                      return (
                      <div>
                        <div style={{position:'relative'}}>
                          <textarea
                            value={fila[col.key]}
                            readOnly={soloLectura}
                            onChange={e => setTexto(fila.id, col.key, e.target.value)}
                            placeholder={soloLectura ? '' : '...'}
                            rows={2}
                            style={{width:'100%',border:'none',background:'transparent',color: colorActual || 'var(--text)',resize:'vertical',fontSize:'0.8rem',padding:6,fontFamily:'inherit',fontWeight: colorActual ? 600 : 400}} />
                          {!soloLectura && (
                            <button type="button"
                              title="Color del texto"
                              onClick={() => setColorAbierto(abierto ? null : cellKey)}
                              style={{position:'absolute',bottom:4,right:4,width:16,height:16,borderRadius:'50%',border:'1px solid var(--border)',background: colorActual || 'var(--text)',cursor:'pointer',padding:0,display:'block'}} />
                          )}
                        </div>
                        {!soloLectura && abierto && (
                          <div style={{display:'flex',gap:6,justifyContent:'flex-end',padding:'4px 4px 2px',flexWrap:'wrap'}}>
                            {MSA_PALETA.map(c => (
                              <button key={c.label} type="button" title={c.label}
                                onClick={() => setColorCelda(fila.id, col.key, c.hex)}
                                style={{width:20,height:20,borderRadius:'50%',cursor:'pointer',padding:0,position:'relative',
                                  background: c.hex || 'var(--text)',
                                  border: colorActual === c.hex ? '2px solid var(--text)' : '1px solid var(--border)'}}>
                                {c.hex === null && <span style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,lineHeight:1,color:'var(--surface)'}}>✕</span>}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                      );
                    })() : (
                      <div
                        className={`msa-celda ${dragOver === fila.id+col.key ? 'msa-drop' : ''}`}
                        onDragOver={soloLectura ? undefined : (e) => { e.preventDefault(); setDragOver(fila.id+col.key); }}
                        onDragLeave={() => setDragOver(null)}
                        onDrop={soloLectura ? undefined : (e) => onDrop(e, fila.id, col.key)}
                        onClick={() => colocarPieza(fila.id, col.key)}
                        style={{cursor: (!soloLectura && piezaSel) ? 'pointer' : 'default'}}>
                        {fila[col.key].map(p => (
                          <MsaPieza key={p.uid} pieza={p}
                            onRemove={soloLectura ? undefined : () => quitarPieza(fila.id, col.key, p.uid)} />
                        ))}
                      </div>
                    )}
                  </td>
                ))}
                {!soloLectura && (
                  <td style={{textAlign:'center'}}>
                    <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={() => quitarFila(fila.id)}>🗑️</button>
                  </td>
                )}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {!soloLectura && (
        <button className="btn btn-ghost" style={{marginTop:12}} onClick={agregarFila}>+ Agregar fila</button>
      )}
    </div>
  );
}

// ─── DIAGRAMA DE CONTABILIDAD ─────────────────────────────────────────
// Arriba se arma el asiento contable; abajo un diagrama de 5 filas fijas
// donde se ubican piezas (reusa el banco de la MSA) y se conectan con flechas.
const DIAG_FILAS = ['DOCUMENTOS', 'ARCHIVOS TRANSACC', 'ARCHIVOS VALORES', 'ARCHIVOS GESTIÓN', 'REPORTES'];
const DIAG_COLS = 9;
const DIAG_CW = 118;   // ancho de celda (px)
const DIAG_CH = 90;    // alto de fila (px)
const DIAG_CONT_FILA = 3;                        // ARCHIVOS GESTIÓN
const DIAG_CONT_COL = Math.floor(DIAG_COLS / 2); // columna del medio
const diagContId = () => `${DIAG_CONT_FILA}_${DIAG_CONT_COL}`;
const asientoVacio = () => ({ cuenta: '', debe: '', haber: '' });
const diagInicial = () => ({ [diagContId()]: { nombre: 'CONT', tipo: 'archivo', fijo: true } });

function DiagramaContab({ alumno, aulaActiva, esAdmin }) {
  const [piezas, setPiezas] = useState([]);
  const [diagramas, setDiagramas] = useState([]);
  const [publicadas, setPublicadas] = useState([]);
  const [actual, setActual] = useState(null);
  const [titulo, setTitulo] = useState('');
  const [asiento, setAsiento] = useState([asientoVacio(), asientoVacio()]);
  const [celdas, setCeldas] = useState(diagInicial());
  const [conexiones, setConexiones] = useState([]);
  const [modoConectar, setModoConectar] = useState(false);
  const [conFrom, setConFrom] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [verBanco, setVerBanco] = useState(true);
  const [nuevaPieza, setNuevaPieza] = useState({ nombre: '', tipo: 'archivo' });
  const [piezaSel, setPiezaSel] = useState(null); // pieza elegida por clic para colocar tocando una celda
  const [bancoExp, setBancoExp] = useState(false); // banco desplegado (ver más) o compacto (par de filas)
  const toast = useToast();
  const miAula = esAdmin ? aulaActiva : alumno?.aula_id;
  const soloLectura = actual?.soloLectura;

  const load = async () => {
    if (!miAula) { setLoading(false); return; }
    const { data: pz } = await supabase.from('msa_piezas').select('*').order('created_at');
    setPiezas((pz || []).filter(p => p.es_base || p.creado_por === alumno?.id));
    if (esAdmin) {
      const { data } = await supabase.from('contab_diagramas').select('id, titulo, publicada, updated_at')
        .eq('es_admin', true).eq('aula_id', miAula).order('updated_at', { ascending: false });
      setDiagramas(data || []);
    } else {
      const [mios, pub] = await Promise.all([
        supabase.from('contab_diagramas').select('id, titulo, updated_at').eq('alumno_id', alumno?.id).order('updated_at', { ascending: false }),
        supabase.from('contab_diagramas').select('id, titulo, updated_at').eq('es_admin', true).eq('publicada', true).eq('aula_id', miAula).order('updated_at', { ascending: false }),
      ]);
      setDiagramas(mios.data || []);
      setPublicadas(pub.data || []);
    }
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [miAula]);

  // Mientras se arrastra una pieza, si el cursor se acerca al borde de la pantalla,
  // deslizamos la página sola para poder llegar al diagrama aunque esté más abajo.
  useEffect(() => {
    const onDrag = (e) => {
      const m = 90, v = 22, h = window.innerHeight;
      if (e.clientY < m) window.scrollBy(0, -v);
      else if (e.clientY > h - m) window.scrollBy(0, v);
    };
    document.addEventListener('dragover', onDrag);
    return () => document.removeEventListener('dragover', onDrag);
  }, []);

  const bancoPorTipo = (t) => piezas.filter(p => p.tipo === t);

  // Colocar en una celda la pieza elegida por clic (alternativa al arrastre).
  const colocarPieza = (cellId) => {
    if (!piezaSel || soloLectura || cellId === diagContId() || celdas[cellId]) return;
    setCeldas(prev => ({ ...prev, [cellId]: { nombre: piezaSel.nombre, tipo: piezaSel.tipo } }));
    setPiezaSel(null);
  };

  const crearPieza = async () => {
    if (!nuevaPieza.nombre.trim()) return toast('Poné un nombre', 'error');
    const { data, error } = await supabase.from('msa_piezas').insert({
      nombre: nuevaPieza.nombre.trim().toUpperCase(),
      tipo: nuevaPieza.tipo,
      es_base: esAdmin,
      creado_por: esAdmin ? null : alumno?.id,
    }).select('*').single();
    if (error) return toast('Error: ' + error.message, 'error');
    setPiezas(p => [...p, data]);
    setNuevaPieza({ nombre: '', tipo: nuevaPieza.tipo });
  };

  // ── Arrastre: desde el banco (origen null) o mover una pieza ya ubicada ──
  const onDragBanco = (e, pieza) => {
    e.dataTransfer.setData('application/json', JSON.stringify({ nombre: pieza.nombre, tipo: pieza.tipo, origen: null }));
    e.dataTransfer.effectAllowed = 'copy';
  };
  const onDragCelda = (e, cellId) => {
    const c = celdas[cellId];
    if (!c || c.fijo) { e.preventDefault(); return; }
    e.dataTransfer.setData('application/json', JSON.stringify({ nombre: c.nombre, tipo: c.tipo, origen: cellId }));
    e.dataTransfer.effectAllowed = 'move';
  };
  const onDropCelda = (e, cellId) => {
    e.preventDefault();
    if (soloLectura || cellId === diagContId() || celdas[cellId]) return;
    let p; try { p = JSON.parse(e.dataTransfer.getData('application/json')); } catch { return; }
    if (!p || !p.nombre) return;
    setCeldas(prev => {
      const n = { ...prev };
      n[cellId] = { nombre: p.nombre, tipo: p.tipo };
      if (p.origen && p.origen !== cellId) delete n[p.origen];
      return n;
    });
    if (p.origen && p.origen !== cellId) {
      setConexiones(cx => cx.map(k => ({
        from: k.from === p.origen ? cellId : k.from,
        to: k.to === p.origen ? cellId : k.to,
      })));
    }
  };
  const quitarCelda = (cellId) => {
    if (cellId === diagContId()) return;
    setCeldas(prev => { const n = { ...prev }; delete n[cellId]; return n; });
    setConexiones(cx => cx.filter(k => k.from !== cellId && k.to !== cellId));
  };

  // ── Flechas: en modo conectar, clic en origen y luego en destino ──
  const clickConectar = (cellId) => {
    if (!modoConectar || !celdas[cellId]) return;
    if (!conFrom) { setConFrom(cellId); return; }
    if (conFrom === cellId) { setConFrom(null); return; }
    const from = conFrom, to = cellId;
    setConexiones(cx => {
      const ya = cx.some(k => k.from === from && k.to === to);
      return ya ? cx.filter(k => !(k.from === from && k.to === to)) : [...cx, { from, to }];
    });
    setConFrom(null);
  };

  const coord = (cellId) => {
    const [f, c] = cellId.split('_').map(Number);
    return { cx: c * DIAG_CW + DIAG_CW / 2, cy: f * DIAG_CH + DIAG_CH / 2, f, c };
  };
  const flecha = (from, to) => {
    const a = coord(from), b = coord(to), bh = 46, bw = 82;
    let x1 = a.cx, y1 = a.cy, x2 = b.cx, y2 = b.cy;
    if (b.f > a.f) { y1 = a.cy + bh / 2; y2 = b.cy - bh / 2; }
    else if (b.f < a.f) { y1 = a.cy - bh / 2; y2 = b.cy + bh / 2; }
    else if (b.c > a.c) { x1 = a.cx + bw / 2; x2 = b.cx - bw / 2; }
    else { x1 = a.cx - bw / 2; x2 = b.cx + bw / 2; }
    return { x1, y1, x2, y2 };
  };

  // ── Nuevo / cargar / guardar / eliminar ──
  const nuevoDiagrama = () => {
    setActual(null); setTitulo(''); setAsiento([asientoVacio(), asientoVacio()]);
    setCeldas(diagInicial()); setConexiones([]); setConFrom(null); setModoConectar(false);
  };
  const cargarDiagrama = async (id, lectura = false) => {
    const { data } = await supabase.from('contab_diagramas').select('*').eq('id', id).single();
    if (!data) return;
    setActual(lectura ? { ...data, soloLectura: true } : data);
    setTitulo(data.titulo || '');
    setAsiento(Array.isArray(data.asiento) && data.asiento.length ? data.asiento : [asientoVacio(), asientoVacio()]);
    const cel = (data.celdas && typeof data.celdas === 'object' && !Array.isArray(data.celdas)) ? { ...data.celdas } : {};
    if (!cel[diagContId()]) cel[diagContId()] = { nombre: 'CONT', tipo: 'archivo', fijo: true };
    setCeldas(cel);
    setConexiones(Array.isArray(data.conexiones) ? data.conexiones : []);
    setConFrom(null); setModoConectar(false);
  };
  const guardar = async (publicar = null) => {
    if (!titulo.trim()) return toast('Ponele un título al diagrama', 'error');
    setSaving(true);
    const payload = { titulo: titulo.trim(), asiento, celdas, conexiones, aula_id: miAula, updated_at: new Date().toISOString() };
    if (esAdmin) { payload.es_admin = true; if (publicar !== null) payload.publicada = publicar; }
    else { payload.alumno_id = alumno?.id; }
    let error;
    if (actual?.id && !actual?.soloLectura) {
      ({ error } = await supabase.from('contab_diagramas').update(payload).eq('id', actual.id));
    } else {
      const { data, error: e2 } = await supabase.from('contab_diagramas').insert(payload).select('id').single();
      error = e2;
      if (data) setActual({ id: data.id, ...payload });
    }
    setSaving(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(publicar === true ? 'Diagrama publicado ✅' : (publicar === false ? 'Diagrama despublicado' : 'Diagrama guardado ✅'), 'success');
    load();
  };
  const eliminarDiagrama = async (id) => {
    if (!confirm('¿Eliminar este diagrama?')) return;
    const { error } = await supabase.from('contab_diagramas').delete().eq('id', id);
    if (error) return toast('Error: ' + error.message, 'error');
    if (actual?.id === id) nuevoDiagrama();
    load();
  };

  const setCampo = (i, campo, val) => setAsiento(a => a.map((r, j) => j === i ? { ...r, [campo]: val } : r));
  const agregarRenglon = () => setAsiento(a => [...a, asientoVacio()]);
  const quitarRenglon = (i) => setAsiento(a => a.length > 1 ? a.filter((_, j) => j !== i) : a);
  const totalDebe = asiento.reduce((s, r) => s + (parseFloat(r.debe) || 0), 0);
  const totalHaber = asiento.reduce((s, r) => s + (parseFloat(r.haber) || 0), 0);

  if (loading) return <div style={{padding:30,textAlign:'center',color:'var(--text2)'}}>Cargando…</div>;
  if (!miAula) return <div style={{padding:30,textAlign:'center',color:'var(--text2)'}}>{esAdmin ? 'Elegí un aula para trabajar.' : 'Todavía no estás en un aula.'}</div>;

  const svgW = DIAG_COLS * DIAG_CW, svgH = DIAG_FILAS.length * DIAG_CH;
  const inpAsiento = { width:'100%', border:'none', background:'transparent', color:'var(--text)', fontSize:'0.85rem', padding:'6px 8px', fontFamily:'inherit' };

  return (
    <div className="page-content fade-in" style={{paddingTop:8}}>
      {/* Diagramas guardados */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:12}}>
        <button className="btn btn-primary btn-sm" onClick={nuevoDiagrama}>+ Nuevo diagrama</button>
        {diagramas.map(d => (
          <span key={d.id} style={{display:'inline-flex',alignItems:'center',gap:2,border:'1px solid var(--border)',borderRadius:8,padding:'2px 4px 2px 8px',background: actual?.id===d.id?'var(--surface2)':'transparent'}}>
            <span onClick={() => cargarDiagrama(d.id)} style={{cursor:'pointer',fontSize:'0.82rem',fontWeight: actual?.id===d.id?700:500}}>
              {d.titulo || '(sin título)'}{d.publicada ? ' 📢' : ''}
            </span>
            {esAdmin && <button onClick={() => eliminarDiagrama(d.id)} title="Eliminar" style={{background:'none',border:'none',cursor:'pointer',fontSize:'0.72rem',opacity:0.6,padding:0}}>🗑️</button>}
          </span>
        ))}
      </div>

      {/* Publicadas por el profe (alumno) */}
      {!esAdmin && publicadas.length > 0 && (
        <div style={{marginBottom:12}}>
          <div style={{fontSize:'0.75rem',color:'var(--text2)',fontWeight:600,marginBottom:4}}>📢 Publicadas por el profe (para ver):</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {publicadas.map(d => (
              <button key={d.id} className="btn btn-ghost btn-sm" onClick={() => cargarDiagrama(d.id, true)}>{d.titulo || '(sin título)'}</button>
            ))}
          </div>
        </div>
      )}

      {/* Título + acciones */}
      {!soloLectura && (
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
          <input placeholder="Título del diagrama (ej: Devolución de compra)" value={titulo}
            onChange={e => setTitulo(e.target.value)}
            style={{flex:1,minWidth:200,padding:'8px 12px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)',fontWeight:600}} />
          <button className="btn btn-primary" onClick={() => guardar()} disabled={saving}>{saving ? 'Guardando...' : '💾 Guardar'}</button>
          {esAdmin && actual?.id && !actual?.publicada && <button className="btn btn-success" onClick={() => guardar(true)} disabled={saving}>📢 Publicar</button>}
          {esAdmin && actual?.publicada && <button className="btn btn-ghost" onClick={() => guardar(false)} disabled={saving}>Despublicar</button>}
        </div>
      )}
      {soloLectura && <div style={{fontWeight:700,fontSize:'1.05rem',marginBottom:10}}>{titulo}</div>}

      {/* Asiento contable */}
      <div className="card" style={{marginBottom:14,padding:14}}>
        <div style={{fontWeight:700,fontSize:'0.9rem',marginBottom:8}}>🧾 Asiento contable</div>
        <table className="msa-tabla" style={{maxWidth:520}}>
          <thead><tr>
            <th style={{textAlign:'left'}}>Cuentas</th>
            <th style={{width:100}}>Debe</th>
            <th style={{width:100}}>Haber</th>
            {!soloLectura && <th style={{width:34}}></th>}
          </tr></thead>
          <tbody>
            {asiento.map((r, i) => (
              <tr key={i}>
                <td><input value={r.cuenta} readOnly={soloLectura} onChange={e => setCampo(i, 'cuenta', e.target.value)} placeholder="Cuenta" style={inpAsiento} /></td>
                <td><input value={r.debe} readOnly={soloLectura} onChange={e => setCampo(i, 'debe', e.target.value)} placeholder="0" inputMode="decimal" style={{...inpAsiento, textAlign:'right'}} /></td>
                <td><input value={r.haber} readOnly={soloLectura} onChange={e => setCampo(i, 'haber', e.target.value)} placeholder="0" inputMode="decimal" style={{...inpAsiento, textAlign:'right'}} /></td>
                {!soloLectura && <td style={{textAlign:'center'}}><button className="btn btn-ghost btn-sm" style={{color:'var(--danger)',padding:'2px 6px'}} onClick={() => quitarRenglon(i)}>🗑️</button></td>}
              </tr>
            ))}
            <tr>
              <td style={{textAlign:'right',fontWeight:700,fontSize:'0.8rem'}}>Totales</td>
              <td style={{textAlign:'right',fontWeight:700,fontSize:'0.8rem',color: totalDebe===totalHaber?'var(--text)':'var(--danger)'}}>{totalDebe.toLocaleString('es-AR')}</td>
              <td style={{textAlign:'right',fontWeight:700,fontSize:'0.8rem',color: totalDebe===totalHaber?'var(--text)':'var(--danger)'}}>{totalHaber.toLocaleString('es-AR')}</td>
              {!soloLectura && <td></td>}
            </tr>
          </tbody>
        </table>
        {!soloLectura && (
          <div style={{marginTop:8,display:'flex',gap:10,alignItems:'center'}}>
            <button className="btn btn-ghost btn-sm" onClick={agregarRenglon}>+ Agregar renglón</button>
            {totalDebe !== totalHaber && <span style={{fontSize:'0.75rem',color:'var(--danger)'}}>⚠️ El asiento no balancea (Debe ≠ Haber)</span>}
          </div>
        )}
      </div>

      {/* Banco de piezas (reusa el de la MSA) */}
      {!soloLectura && (
        <div className="card" style={{marginBottom:14,padding:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:verBanco?10:0}}>
            <strong style={{fontSize:'0.9rem'}}>📦 Banco de piezas</strong>
            <button className="btn btn-ghost btn-sm" onClick={() => setVerBanco(v => !v)}>{verBanco ? 'Ocultar' : 'Mostrar'}</button>
          </div>
          {verBanco && (
            <>
              <div style={{fontSize:'0.75rem',color:'var(--text2)',marginBottom:8}}>Arrastrá una pieza a una celda del diagrama, o hacé <b>clic en una pieza</b> y después <b>clic en la celda</b> donde va.</div>
              {piezaSel && <div style={{fontSize:'0.78rem',color:'var(--accent)',fontWeight:700,marginBottom:8}}>✋ Elegiste "{piezaSel.nombre}" — ahora tocá una celda del diagrama para colocarla (o tocá la pieza otra vez para soltar).</div>}
              <div style={{maxHeight: bancoExp ? 460 : 128, overflowY:'auto', paddingRight:4, transition:'max-height 0.2s'}}>
              {[['archivo','🛢️ Archivos (bases de datos)'],['doc_cuadrado','▭ Documentos Manuales'],['doc_pancita','📄 Documentos generados por Sistema'],['elemento','🔤 Elementos']].map(([tipo,label]) => (
                <div key={tipo} style={{marginBottom:10}}>
                  <div style={{fontSize:'0.72rem',color:'var(--text2)',fontWeight:600,marginBottom:6}}>{label}</div>
                  <div className="msa-banco">
                    {bancoPorTipo(tipo).map(p => {
                      const elegida = piezaSel && piezaSel.nombre === p.nombre && piezaSel.tipo === p.tipo;
                      return (
                        <div key={p.id}
                          onClick={() => setPiezaSel(s => (s && s.nombre === p.nombre && s.tipo === p.tipo) ? null : { nombre: p.nombre, tipo: p.tipo })}
                          style={{cursor:'pointer',borderRadius:8,outline: elegida ? '2px solid var(--accent)' : 'none',outlineOffset:2}}>
                          <MsaPieza pieza={p} onDragStart={onDragBanco} />
                        </div>
                      );
                    })}
                    {bancoPorTipo(tipo).length === 0 && <span style={{fontSize:'0.78rem',color:'var(--text2)'}}>—</span>}
                  </div>
                </div>
              ))}
              </div>
              <div style={{textAlign:'center',marginTop:6}}>
                <button className="btn btn-ghost btn-sm" onClick={() => setBancoExp(v => !v)}>{bancoExp ? 'Ver menos ▴' : 'Ver más ▾'}</button>
              </div>
              <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap',alignItems:'center',borderTop:'1px solid var(--border)',paddingTop:12}}>
                <input placeholder="Nombre nueva pieza" value={nuevaPieza.nombre}
                  onChange={e => setNuevaPieza(p => ({...p, nombre: e.target.value}))}
                  style={{flex:1,minWidth:140,padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)'}} />
                <select value={nuevaPieza.tipo} onChange={e => setNuevaPieza(p => ({...p, tipo: e.target.value}))}
                  style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)'}}>
                  <option value="archivo">🛢️ Archivo</option>
                  <option value="doc_cuadrado">▭ Documento Manual</option>
                  <option value="doc_pancita">📄 Documento generado por Sistema</option>
                  <option value="elemento">🔤 Elemento</option>
                </select>
                <button className="btn btn-ghost btn-sm" onClick={crearPieza}>+ Crear pieza</button>
              </div>
            </>
          )}
        </div>
      )}

      {/* Diagrama */}
      <div className="card" style={{padding:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8,marginBottom:10}}>
          <strong style={{fontSize:'0.9rem'}}>📊 Diagrama</strong>
          {!soloLectura && (
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {modoConectar && <span style={{fontSize:'0.72rem',color:'var(--text2)'}}>Clic en la pieza de <b>origen</b> y luego en la de <b>destino</b> (o repetí para borrar la flecha).</span>}
              <button className={`btn btn-sm ${modoConectar?'btn-primary':'btn-ghost'}`} onClick={() => { setModoConectar(m => !m); setConFrom(null); }}>
                {modoConectar ? '✓ Conectando' : '🔗 Conectar con flechas'}
              </button>
              {conexiones.length > 0 && <button className="btn btn-ghost btn-sm" onClick={() => { setConexiones([]); setConFrom(null); }}>Borrar flechas</button>}
            </div>
          )}
        </div>
        <div style={{overflowX:'auto'}}>
          <div style={{display:'flex',minWidth:'min-content'}}>
            {/* Etiquetas de filas */}
            <div style={{display:'flex',flexDirection:'column',flex:'0 0 auto'}}>
              {DIAG_FILAS.map((lbl, f) => <div key={f} className="diag-lbl" style={{width:150,height:DIAG_CH}}>{lbl}</div>)}
            </div>
            {/* Grilla + flechas */}
            <div style={{position:'relative',width:svgW,height:svgH,flex:'0 0 auto'}}>
              <svg width={svgW} height={svgH} style={{position:'absolute',top:0,left:0,pointerEvents:'none',zIndex:2}}>
                <defs>
                  <marker id="diag-arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
                    <path d="M0,0 L8,4 L0,8 Z" fill="#5b6472" />
                  </marker>
                </defs>
                {conexiones.map((k, idx) => {
                  if (!celdas[k.from] || !celdas[k.to]) return null;
                  const l = flecha(k.from, k.to);
                  return <line key={idx} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke="#5b6472" strokeWidth="2" markerEnd="url(#diag-arrow)" />;
                })}
              </svg>
              <div style={{position:'relative',zIndex:1,display:'grid',gridTemplateColumns:`repeat(${DIAG_COLS}, ${DIAG_CW}px)`,gridAutoRows:`${DIAG_CH}px`}}>
                {DIAG_FILAS.map((_, f) => Array.from({length: DIAG_COLS}).map((_, c) => {
                  const id = `${f}_${c}`; const cel = celdas[id]; const esFrom = conFrom === id;
                  return (
                    <div key={id}
                      className={`diag-cell ${esFrom ? 'diag-from' : ''}`}
                      onDragOver={soloLectura ? undefined : (e) => e.preventDefault()}
                      onDrop={soloLectura ? undefined : (e) => onDropCelda(e, id)}
                      onClick={() => { if (modoConectar) clickConectar(id); else colocarPieza(id); }}
                      style={{cursor: ((modoConectar && cel) || (!modoConectar && piezaSel && !cel)) ? 'pointer' : 'default'}}>
                      {cel && (
                        <div draggable={!soloLectura && !cel.fijo} onDragStart={(e) => onDragCelda(e, id)}>
                          <MsaPieza pieza={cel}
                            onRemove={(!soloLectura && !cel.fijo) ? () => quitarCelda(id) : undefined}
                            extra={cel.fijo ? 'msa-cont' : ''}
                            style={{maxWidth: DIAG_CW - 16, minWidth: 0}} />
                        </div>
                      )}
                    </div>
                  );
                }))}
              </div>
            </div>
          </div>
        </div>
        {!soloLectura && <div style={{fontSize:'0.72rem',color:'var(--text2)',marginTop:8}}>💡 CONT (contabilidad) está fijo al medio de Archivos de Gestión. Podés mover las demás piezas arrastrándolas a otra celda.</div>}
      </div>
    </div>
  );
}

// ─── FRAGMENTACIONES ──────────────────────────────────────────────────
// Tira horizontal de fichas tipo flecha (chevron). Cada ficha tiene texto y
// color, y se puede reordenar. Se guarda igual que la MSA.
const FRAG_COLORES = [
  { key: 'normal',  label: 'Normal',  bg: '#ffffff', border: '#2b6a7a', text: '#12333c' },
  { key: 'naranja', label: 'Naranja', bg: '#e5824a', border: '#c4652f', text: '#ffffff' },
  { key: 'verde',   label: 'Verde',   bg: '#3d9aa1', border: '#2b6a7a', text: '#ffffff' },
  { key: 'azul',    label: 'Azul',    bg: '#3b82f6', border: '#1e5fd0', text: '#ffffff' },
  { key: 'violeta', label: 'Violeta', bg: '#8b5cf6', border: '#6d3fd6', text: '#ffffff' },
  { key: 'gris',    label: 'Gris',    bg: '#cbd5e1', border: '#94a3b8', text: '#12333c' },
];
const fragColor = (k) => FRAG_COLORES.find(c => c.key === k) || FRAG_COLORES[0];
const nuevaFicha = () => ({ id: Math.random().toString(36).slice(2), texto: '', color: 'normal' });

function Fragmentaciones({ alumno, aulaActiva, esAdmin }) {
  const [flujos, setFlujos] = useState([]);
  const [publicados, setPublicados] = useState([]);
  const [actual, setActual] = useState(null);
  const [titulo, setTitulo] = useState('');
  const [fichas, setFichas] = useState([nuevaFicha()]);
  const [colorAbierto, setColorAbierto] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const toast = useToast();
  const miAula = esAdmin ? aulaActiva : alumno?.aula_id;
  const soloLectura = actual?.soloLectura;

  const load = async () => {
    if (!miAula) { setLoading(false); return; }
    if (esAdmin) {
      const { data } = await supabase.from('frag_flujos').select('id, titulo, publicada, updated_at')
        .eq('es_admin', true).eq('aula_id', miAula).order('updated_at', { ascending: false });
      setFlujos(data || []);
    } else {
      const [mios, pub] = await Promise.all([
        supabase.from('frag_flujos').select('id, titulo, updated_at').eq('alumno_id', alumno?.id).order('updated_at', { ascending: false }),
        supabase.from('frag_flujos').select('id, titulo, updated_at').eq('es_admin', true).eq('publicada', true).eq('aula_id', miAula).order('updated_at', { ascending: false }),
      ]);
      setFlujos(mios.data || []);
      setPublicados(pub.data || []);
    }
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [miAula]);

  const setTextoFicha = (id, texto) => setFichas(fs => fs.map(f => f.id === id ? { ...f, texto } : f));
  const setColorFicha = (id, color) => { setFichas(fs => fs.map(f => f.id === id ? { ...f, color } : f)); setColorAbierto(null); };
  const agregarFicha = () => setFichas(fs => [...fs, nuevaFicha()]);
  const quitarFicha = (id) => setFichas(fs => fs.length > 1 ? fs.filter(f => f.id !== id) : fs);
  const moverFicha = (id, dir) => setFichas(fs => {
    const i = fs.findIndex(f => f.id === id), j = i + dir;
    if (i < 0 || j < 0 || j >= fs.length) return fs;
    const n = [...fs]; const tmp = n[i]; n[i] = n[j]; n[j] = tmp; return n;
  });

  const nuevoFlujo = () => { setActual(null); setTitulo(''); setFichas([nuevaFicha()]); setColorAbierto(null); };
  const cargarFlujo = async (id, lectura = false) => {
    const { data } = await supabase.from('frag_flujos').select('*').eq('id', id).single();
    if (!data) return;
    setActual(lectura ? { ...data, soloLectura: true } : data);
    setTitulo(data.titulo || '');
    setFichas(Array.isArray(data.fichas) && data.fichas.length ? data.fichas : [nuevaFicha()]);
    setColorAbierto(null);
  };
  const guardar = async (publicar = null) => {
    if (!titulo.trim()) return toast('Ponele un título al gráfico', 'error');
    setSaving(true);
    const payload = { titulo: titulo.trim(), fichas, aula_id: miAula, updated_at: new Date().toISOString() };
    if (esAdmin) { payload.es_admin = true; if (publicar !== null) payload.publicada = publicar; }
    else { payload.alumno_id = alumno?.id; }
    let error;
    if (actual?.id && !actual?.soloLectura) {
      ({ error } = await supabase.from('frag_flujos').update(payload).eq('id', actual.id));
    } else {
      const { data, error: e2 } = await supabase.from('frag_flujos').insert(payload).select('id').single();
      error = e2; if (data) setActual({ id: data.id, ...payload });
    }
    setSaving(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(publicar === true ? 'Gráfico publicado ✅' : (publicar === false ? 'Gráfico despublicado' : 'Gráfico guardado ✅'), 'success');
    load();
  };
  const eliminarFlujo = async (id) => {
    if (!confirm('¿Eliminar este gráfico?')) return;
    const { error } = await supabase.from('frag_flujos').delete().eq('id', id);
    if (error) return toast('Error: ' + error.message, 'error');
    if (actual?.id === id) nuevoFlujo();
    load();
  };

  if (loading) return <div style={{padding:30,textAlign:'center',color:'var(--text2)'}}>Cargando…</div>;
  if (!miAula) return <div style={{padding:30,textAlign:'center',color:'var(--text2)'}}>{esAdmin ? 'Elegí un aula para trabajar.' : 'Todavía no estás en un aula.'}</div>;

  const W = 158, H = 66, K = 17;
  const chevPoints = (primera) => primera
    ? `0,0 ${W-K},0 ${W},${H/2} ${W-K},${H} 0,${H}`
    : `0,0 ${W-K},0 ${W},${H/2} ${W-K},${H} 0,${H} ${K},${H/2}`;
  const btnMini = { background:'none', border:'none', cursor:'pointer', fontSize:'0.72rem', padding:'0 2px', color:'var(--text2)', lineHeight:1 };

  return (
    <div className="page-content fade-in" style={{paddingTop:8}}>
      {/* Gráficos guardados */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:12}}>
        <button className="btn btn-primary btn-sm" onClick={nuevoFlujo}>+ Nuevo gráfico</button>
        {flujos.map(d => (
          <span key={d.id} style={{display:'inline-flex',alignItems:'center',gap:2,border:'1px solid var(--border)',borderRadius:8,padding:'2px 4px 2px 8px',background: actual?.id===d.id?'var(--surface2)':'transparent'}}>
            <span onClick={() => cargarFlujo(d.id)} style={{cursor:'pointer',fontSize:'0.82rem',fontWeight: actual?.id===d.id?700:500}}>
              {d.titulo || '(sin título)'}{d.publicada ? ' 📢' : ''}
            </span>
            {esAdmin && <button onClick={() => eliminarFlujo(d.id)} title="Eliminar" style={{background:'none',border:'none',cursor:'pointer',fontSize:'0.72rem',opacity:0.6,padding:0}}>🗑️</button>}
          </span>
        ))}
      </div>

      {/* Publicados por el profe (alumno) */}
      {!esAdmin && publicados.length > 0 && (
        <div style={{marginBottom:12}}>
          <div style={{fontSize:'0.75rem',color:'var(--text2)',fontWeight:600,marginBottom:4}}>📢 Publicados por el profe (para ver):</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {publicados.map(d => (
              <button key={d.id} className="btn btn-ghost btn-sm" onClick={() => cargarFlujo(d.id, true)}>{d.titulo || '(sin título)'}</button>
            ))}
          </div>
        </div>
      )}

      {/* Título + acciones */}
      {!soloLectura && (
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
          <input placeholder="Título (ej: Subsistema de Compras)" value={titulo}
            onChange={e => setTitulo(e.target.value)}
            style={{flex:1,minWidth:200,padding:'8px 12px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)',fontWeight:600}} />
          <button className="btn btn-primary" onClick={() => guardar()} disabled={saving}>{saving ? 'Guardando...' : '💾 Guardar'}</button>
          {esAdmin && actual?.id && !actual?.publicada && <button className="btn btn-success" onClick={() => guardar(true)} disabled={saving}>📢 Publicar</button>}
          {esAdmin && actual?.publicada && <button className="btn btn-ghost" onClick={() => guardar(false)} disabled={saving}>Despublicar</button>}
        </div>
      )}
      {soloLectura && <div style={{fontWeight:700,fontSize:'1.05rem',marginBottom:10}}>{titulo}</div>}

      {/* La tira de fichas */}
      <div className="card" style={{padding:16, overflowX:'auto'}}>
        {!soloLectura && <div style={{fontSize:'0.75rem',color:'var(--text2)',marginBottom:12}}>Escribí el nombre en cada ficha. Usá ◀ ▶ para cambiar el orden, el círculo para el color y 🗑️ para borrarla.</div>}
        <div style={{display:'flex', alignItems:'flex-start', minWidth:'min-content', paddingBottom:8}}>
          {fichas.map((f, i) => {
            const col = fragColor(f.color);
            const abierto = colorAbierto === f.id;
            return (
              <div key={f.id} style={{display:'flex', flexDirection:'column', alignItems:'center', marginLeft: i>0 ? -K : 0}}>
                <div style={{position:'relative', width:W, height:H}}>
                  <svg width={W} height={H} style={{position:'absolute', top:0, left:0}}>
                    <polygon points={chevPoints(i===0)} fill={col.bg} stroke={col.border} strokeWidth="2" />
                  </svg>
                  <textarea
                    value={f.texto}
                    readOnly={soloLectura}
                    onChange={e => setTextoFicha(f.id, e.target.value)}
                    placeholder={soloLectura ? '' : '...'}
                    rows={2}
                    style={{position:'absolute', top:10, left:K, width:W-2*K, height:H-20,
                      border:'none', background:'transparent', color:col.text, textAlign:'center',
                      resize:'none', fontSize:'0.72rem', fontWeight:700, lineHeight:1.12, overflow:'hidden', fontFamily:'inherit'}} />
                </div>
                {!soloLectura && (
                  <div style={{display:'flex', gap:3, marginTop:5, alignItems:'center', position:'relative'}}>
                    <button title="Mover a la izquierda" onClick={() => moverFicha(f.id,-1)} style={btnMini}>◀</button>
                    <button title="Color de la ficha" onClick={() => setColorAbierto(a => a===f.id ? null : f.id)}
                      style={{width:16, height:16, borderRadius:'50%', background:col.bg, border:`1px solid ${col.border}`, cursor:'pointer', padding:0}} />
                    <button title="Eliminar ficha" onClick={() => quitarFicha(f.id)} style={{...btnMini, color:'var(--danger)'}}>🗑️</button>
                    <button title="Mover a la derecha" onClick={() => moverFicha(f.id,1)} style={btnMini}>▶</button>
                    {abierto && (
                      <div style={{position:'absolute', top:24, left:'50%', transform:'translateX(-50%)', zIndex:20, display:'flex', gap:4, padding:6, borderRadius:10, background:'var(--surface)', border:'1px solid var(--border)', boxShadow:'0 4px 14px rgba(0,0,0,0.25)'}}>
                        {FRAG_COLORES.map(c => (
                          <button key={c.key} title={c.label} onClick={() => setColorFicha(f.id, c.key)}
                            style={{width:20, height:20, borderRadius:'50%', cursor:'pointer', padding:0, background:c.bg, border: f.color===c.key ? '2px solid var(--text)' : `1px solid ${c.border}`}} />
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
          {!soloLectura && (
            <button className="btn btn-ghost btn-sm" onClick={agregarFicha} style={{marginLeft:14, marginTop:20, whiteSpace:'nowrap'}}>➕ Ficha</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── ORGANIGRAMAS ─────────────────────────────────────────────────────
// Árbol jerárquico de cajas conectadas de arriba hacia abajo (CSS puro).
const ORG_COLORES = [
  { key: 'normal',  label: 'Blanco',  bg: '#ffffff', border: '#333333', text: '#111111' },
  { key: 'gris',    label: 'Gris',    bg: '#d9d9d9', border: '#333333', text: '#111111' },
  { key: 'azul',    label: 'Azul',    bg: '#cfe0f7', border: '#2b5aa0', text: '#12233f' },
  { key: 'verde',   label: 'Verde',   bg: '#d3efd8', border: '#2f8a44', text: '#123a1c' },
  { key: 'naranja', label: 'Naranja', bg: '#f7ddc4', border: '#c4652f', text: '#5a2f10' },
];
const orgColor = (k) => ORG_COLORES.find(c => c.key === k) || ORG_COLORES[0];
const nuevaCaja = (x, y) => ({ id: Math.random().toString(36).slice(2), texto: '', color: 'normal', x, y });
// Convierte un organigrama viejo (formato árbol) al tablero libre, con ubicación automática.
function arbolAcanvas(root) {
  const cajas = [], conexiones = [];
  let col = 0;
  const walk = (n, depth, parentId) => {
    if (!n) return;
    const id = n.id || Math.random().toString(36).slice(2);
    cajas.push({ id, texto: n.texto || '', color: n.color || 'normal', x: 30 + col * 152, y: 30 + depth * 108 });
    col++;
    if (parentId) conexiones.push({ from: parentId, to: id });
    (n.hijos || []).forEach(h => walk(h, depth + 1, id));
  };
  walk(root, 0, null);
  return { cajas, conexiones };
}
const lienzoDesde = (arbol) => {
  if (arbol && Array.isArray(arbol.cajas)) return { cajas: arbol.cajas, conexiones: Array.isArray(arbol.conexiones) ? arbol.conexiones : [] };
  if (arbol && arbol.id && Array.isArray(arbol.hijos)) return arbolAcanvas(arbol);
  return { cajas: [nuevaCaja(40, 40)], conexiones: [] };
};
const OG_BW = 134, OG_HH = 24; // ancho de caja y media-altura para el centro de las flechas

function Organigramas({ alumno, aulaActiva, esAdmin }) {
  const [orgs, setOrgs] = useState([]);
  const [publicados, setPublicados] = useState([]);
  const [actual, setActual] = useState(null);
  const [titulo, setTitulo] = useState('');
  const [tipoEmpresa, setTipoEmpresa] = useState('');
  const [tipoSocietario, setTipoSocietario] = useState('');
  const [cajas, setCajas] = useState([nuevaCaja(40, 40)]);
  const [conexiones, setConexiones] = useState([]);
  const [bw, setBw] = useState(OG_BW);   // ancho de las cajas (ajustable); la letra escala con esto
  const scrollRef = useRef(null);
  const [sb, setSb] = useState({ thumbW: 0, thumbL: 0, need: false });
  const [modoConectar, setModoConectar] = useState(false);
  const [conFrom, setConFrom] = useState(null);
  const [colorAbierto, setColorAbierto] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const toast = useToast();
  const miAula = esAdmin ? aulaActiva : alumno?.aula_id;
  const soloLectura = actual?.soloLectura;

  const load = async () => {
    if (!miAula) { setLoading(false); return; }
    if (esAdmin) {
      const { data } = await supabase.from('org_organigramas').select('id, titulo, publicada, updated_at')
        .eq('es_admin', true).eq('aula_id', miAula).order('updated_at', { ascending: false });
      setOrgs(data || []);
    } else {
      const [mios, pub] = await Promise.all([
        supabase.from('org_organigramas').select('id, titulo, updated_at').eq('alumno_id', alumno?.id).order('updated_at', { ascending: false }),
        supabase.from('org_organigramas').select('id, titulo, updated_at').eq('es_admin', true).eq('publicada', true).eq('aula_id', miAula).order('updated_at', { ascending: false }),
      ]);
      setOrgs(mios.data || []);
      setPublicados(pub.data || []);
    }
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [miAula]);

  const setTextoCaja = (id, texto) => setCajas(cs => cs.map(c => c.id === id ? { ...c, texto } : c));
  const setColorCaja = (id, color) => { setCajas(cs => cs.map(c => c.id === id ? { ...c, color } : c)); setColorAbierto(null); };
  const quitarCaja = (id) => { setCajas(cs => cs.filter(c => c.id !== id)); setConexiones(xs => xs.filter(k => k.from !== id && k.to !== id)); };
  const agregarCaja = () => setCajas(cs => { const n = cs.length; return [...cs, nuevaCaja(40 + (n % 6) * 150, 40 + Math.floor(n / 6) * 96)]; });

  // Arrastrar una caja por su manija.
  const startDrag = (e, id) => {
    if (soloLectura || modoConectar) return;
    e.preventDefault();
    const caja = cajas.find(c => c.id === id);
    if (!caja) return;
    const sx = e.clientX, sy = e.clientY, ox = caja.x, oy = caja.y;
    const mover = (ev) => {
      const nx = Math.max(0, ox + (ev.clientX - sx));
      const ny = Math.max(0, oy + (ev.clientY - sy));
      setCajas(cs => cs.map(c => c.id === id ? { ...c, x: nx, y: ny } : c));
    };
    const soltar = () => { document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', soltar); };
    document.addEventListener('mousemove', mover);
    document.addEventListener('mouseup', soltar);
  };

  // Redimensionar una caja (ancho y alto) arrastrando la manija de la esquina inferior derecha.
  const startResize = (e, id) => {
    if (soloLectura || modoConectar) return;
    e.preventDefault(); e.stopPropagation();
    const boxEl = e.currentTarget.closest('.og-box');
    const rect = boxEl.getBoundingClientRect();
    const c = cajas.find(x => x.id === id);
    const sx = e.clientX, sy = e.clientY;
    const ow = c.w || rect.width, oh = c.h || rect.height;
    const mover = (ev) => {
      const nw = Math.max(70, Math.round(ow + (ev.clientX - sx)));
      const nh = Math.max(40, Math.round(oh + (ev.clientY - sy)));
      setCajas(cs => cs.map(x => x.id === id ? { ...x, w: nw, h: nh } : x));
    };
    const soltar = () => { document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', soltar); };
    document.addEventListener('mousemove', mover);
    document.addEventListener('mouseup', soltar);
  };

  // Conectar dos cajas: clic en la primera, clic en la segunda (repetir para borrar la línea).
  const clickConectar = (id) => {
    if (!modoConectar) return;
    if (!conFrom) { setConFrom(id); return; }
    if (conFrom === id) { setConFrom(null); return; }
    const from = conFrom, to = id;
    setConexiones(xs => {
      const ya = xs.some(k => (k.from === from && k.to === to) || (k.from === to && k.to === from));
      return ya ? xs.filter(k => !((k.from === from && k.to === to) || (k.from === to && k.to === from))) : [...xs, { from, to }];
    });
    setConFrom(null);
  };
  const escala = bw / OG_BW;
  const hh = OG_HH * escala;
  const centro = (id) => { const c = cajas.find(x => x.id === id); if (!c) return null; return { x: c.x + (c.w || bw) / 2, y: c.y + (c.h ? c.h / 2 : hh) }; };

  // Barra de scroll horizontal propia (las nativas overlay no siempre se ven).
  const refreshSb = () => {
    const el = scrollRef.current; if (!el) return;
    const total = el.scrollWidth, vis = el.clientWidth;
    const need = total > vis + 2;
    const thumbW = need ? Math.max(40, vis * vis / total) : vis;
    const thumbL = need ? (el.scrollLeft / (total - vis)) * (vis - thumbW) : 0;
    setSb({ thumbW, thumbL, need });
  };
  const startBarDrag = (e) => {
    e.preventDefault();
    const el = scrollRef.current; if (!el) return;
    const total = el.scrollWidth, vis = el.clientWidth;
    const thumbW = Math.max(40, vis * vis / total), denom = (vis - thumbW) || 1;
    const sx = e.clientX, sl = el.scrollLeft;
    const mover = (ev) => { el.scrollLeft = sl + (ev.clientX - sx) * (total - vis) / denom; refreshSb(); };
    const up = () => { document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', mover); document.addEventListener('mouseup', up);
  };
  useEffect(() => { const t = setTimeout(refreshSb, 30); return () => clearTimeout(t); }, [loading, miAula, cajas, bw, actual]);

  const nuevoOrg = () => { setActual(null); setTitulo(''); setTipoEmpresa(''); setTipoSocietario(''); setCajas([nuevaCaja(40, 40)]); setConexiones([]); setBw(OG_BW); setColorAbierto(null); setModoConectar(false); setConFrom(null); };
  const cargarOrg = async (id, lectura = false) => {
    const { data } = await supabase.from('org_organigramas').select('*').eq('id', id).single();
    if (!data) return;
    setActual(lectura ? { ...data, soloLectura: true } : data);
    setTitulo(data.titulo || '');
    setTipoEmpresa(data.tipo_empresa || '');
    setTipoSocietario(data.tipo_societario || '');
    const l = lienzoDesde(data.arbol);
    setCajas(l.cajas.length ? l.cajas : [nuevaCaja(40, 40)]); setConexiones(l.conexiones);
    setBw(data.arbol?.bw || OG_BW);
    setColorAbierto(null); setModoConectar(false); setConFrom(null);
  };
  const guardar = async (publicar = null) => {
    if (!titulo.trim()) return toast('Ponele un título al organigrama', 'error');
    setSaving(true);
    const payload = { titulo: titulo.trim(), tipo_empresa: tipoEmpresa, tipo_societario: tipoSocietario, arbol: { cajas, conexiones, bw }, aula_id: miAula, updated_at: new Date().toISOString() };
    if (esAdmin) { payload.es_admin = true; if (publicar !== null) payload.publicada = publicar; }
    else { payload.alumno_id = alumno?.id; }
    let error;
    if (actual?.id && !actual?.soloLectura) {
      ({ error } = await supabase.from('org_organigramas').update(payload).eq('id', actual.id));
    } else {
      const { data, error: e2 } = await supabase.from('org_organigramas').insert(payload).select('id').single();
      error = e2; if (data) setActual({ id: data.id, ...payload });
    }
    setSaving(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(publicar === true ? 'Organigrama publicado ✅' : (publicar === false ? 'Organigrama despublicado' : 'Organigrama guardado ✅'), 'success');
    load();
  };
  const eliminarOrg = async (id) => {
    if (!confirm('¿Eliminar este organigrama?')) return;
    const { error } = await supabase.from('org_organigramas').delete().eq('id', id);
    if (error) return toast('Error: ' + error.message, 'error');
    if (actual?.id === id) nuevoOrg();
    load();
  };

  if (loading) return <div style={{padding:30,textAlign:'center',color:'var(--text2)'}}>Cargando…</div>;
  if (!miAula) return <div style={{padding:30,textAlign:'center',color:'var(--text2)'}}>{esAdmin ? 'Elegí un aula para trabajar.' : 'Todavía no estás en un aula.'}</div>;

  const inpDato = { padding:'6px 10px', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)' };
  const cw = Math.max(760, ...cajas.map(c => c.x + (c.w || bw)), 0) + 60;
  const ch = Math.max(420, ...cajas.map(c => c.y + (c.h || 78)), 0) + 60;

  return (
    <div className="page-content fade-in" style={{paddingTop:8}}>
      {/* Organigramas guardados */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:12}}>
        <button className="btn btn-primary btn-sm" onClick={nuevoOrg}>+ Nuevo organigrama</button>
        {orgs.map(d => (
          <span key={d.id} style={{display:'inline-flex',alignItems:'center',gap:2,border:'1px solid var(--border)',borderRadius:8,padding:'2px 4px 2px 8px',background: actual?.id===d.id?'var(--surface2)':'transparent'}}>
            <span onClick={() => cargarOrg(d.id)} style={{cursor:'pointer',fontSize:'0.82rem',fontWeight: actual?.id===d.id?700:500}}>
              {d.titulo || '(sin título)'}{d.publicada ? ' 📢' : ''}
            </span>
            {esAdmin && <button onClick={() => eliminarOrg(d.id)} title="Eliminar" style={{background:'none',border:'none',cursor:'pointer',fontSize:'0.72rem',opacity:0.6,padding:0}}>🗑️</button>}
          </span>
        ))}
      </div>

      {/* Publicados por el profe (alumno) */}
      {!esAdmin && publicados.length > 0 && (
        <div style={{marginBottom:12}}>
          <div style={{fontSize:'0.75rem',color:'var(--text2)',fontWeight:600,marginBottom:4}}>📢 Publicados por el profe (para ver):</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {publicados.map(d => (
              <button key={d.id} className="btn btn-ghost btn-sm" onClick={() => cargarOrg(d.id, true)}>{d.titulo || '(sin título)'}</button>
            ))}
          </div>
        </div>
      )}

      {/* Título + acciones */}
      {!soloLectura && (
        <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
          <input placeholder="Título (ej: Organigrama empresa industrial)" value={titulo}
            onChange={e => setTitulo(e.target.value)}
            style={{flex:1,minWidth:200,padding:'8px 12px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)',fontWeight:600}} />
          <button className="btn btn-primary" onClick={() => guardar()} disabled={saving}>{saving ? 'Guardando...' : '💾 Guardar'}</button>
          {esAdmin && actual?.id && !actual?.publicada && <button className="btn btn-success" onClick={() => guardar(true)} disabled={saving}>📢 Publicar</button>}
          {esAdmin && actual?.publicada && <button className="btn btn-ghost" onClick={() => guardar(false)} disabled={saving}>Despublicar</button>}
        </div>
      )}
      {soloLectura && <div style={{fontWeight:700,fontSize:'1.05rem',marginBottom:10}}>{titulo}</div>}

      {/* Datos de la empresa */}
      <div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'center',marginBottom:12}}>
        <label style={{display:'flex',gap:6,alignItems:'center',fontSize:'0.8rem',fontWeight:700}}>
          Tipo de empresa:
          <input value={tipoEmpresa} readOnly={soloLectura} onChange={e => setTipoEmpresa(e.target.value)} placeholder="ej: Industrial" style={{...inpDato, fontWeight:400}} />
        </label>
        <label style={{display:'flex',gap:6,alignItems:'center',fontSize:'0.8rem',fontWeight:700}}>
          Tipo societario:
          <input value={tipoSocietario} readOnly={soloLectura} onChange={e => setTipoSocietario(e.target.value)} placeholder="ej: Sociedad Anónima (SA)" style={{...inpDato, fontWeight:400}} />
        </label>
      </div>

      {/* Tablero libre */}
      <div className="card" style={{padding:14}}>
        {!soloLectura && (
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:10}}>
            <button className="btn btn-ghost btn-sm" onClick={agregarCaja}>➕ Caja</button>
            <button className={`btn btn-sm ${modoConectar?'btn-primary':'btn-ghost'}`} onClick={() => { setModoConectar(m => !m); setConFrom(null); }}>{modoConectar ? '✓ Conectando' : '🔗 Conectar'}</button>
            {conexiones.length > 0 && <button className="btn btn-ghost btn-sm" onClick={() => { setConexiones([]); setConFrom(null); }}>Borrar líneas</button>}
            {modoConectar
              ? <span style={{fontSize:'0.72rem',color:'var(--text2)'}}>Clic en una caja y después en otra para unirlas (o repetí el par para borrar la línea).</span>
              : <span style={{fontSize:'0.72rem',color:'var(--text2)'}}>Arrastrá cada caja desde la manija ⠿ de arriba para moverla. Pasá el mouse sobre la caja para el color 🎨 y 🗑️.</span>}
            <label style={{display:'flex',alignItems:'center',gap:6,fontSize:'0.72rem',color:'var(--text2)',marginLeft:'auto'}}>
              📐 Tamaño de cajas
              <input type="range" min="80" max="200" step="2" value={bw} onChange={e => setBw(parseInt(e.target.value))} style={{width:110}} />
            </label>
          </div>
        )}
        <div ref={scrollRef} onScroll={refreshSb} className="scroll-x" style={{overflow:'auto', maxWidth:'100%', maxHeight:'72vh', border:'1px solid var(--border)', borderRadius:8}}>
          <div className="og-canvas" style={{width:cw, height:ch}}>
            <svg width={cw} height={ch} style={{position:'absolute',top:0,left:0,pointerEvents:'none',zIndex:1}}>
              {conexiones.map((k, i) => {
                const a = centro(k.from), b = centro(k.to);
                if (!a || !b) return null;
                return <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#5b6472" strokeWidth="2" />;
              })}
            </svg>
            {cajas.map(c => {
              const col = orgColor(c.color);
              const sel = conFrom === c.id;
              const abierto = colorAbierto === c.id;
              const rows = Math.min(4, Math.max(2, Math.ceil(((c.texto || '').length || 1) / 16)));
              return (
                <div key={c.id} className={`og-box ${sel ? 'og-sel' : ''}`}
                  style={{ left: c.x, top: c.y, width: c.w || bw, height: c.h || undefined, display: 'flex', flexDirection: 'column', background: col.bg, borderColor: col.border, zIndex: sel ? 8 : 5, cursor: modoConectar ? 'pointer' : 'default' }}
                  onClick={() => { if (modoConectar) clickConectar(c.id); }}>
                  {!soloLectura && !modoConectar && <div className="og-handle" onMouseDown={(e) => startDrag(e, c.id)} title="Arrastrá para mover">⠿⠿⠿</div>}
                  <textarea value={c.texto} readOnly={soloLectura} rows={c.h ? undefined : rows}
                    onChange={e => setTextoCaja(c.id, e.target.value)} placeholder={soloLectura ? '' : '...'}
                    style={{ color: col.text, userSelect: 'text', pointerEvents: modoConectar ? 'none' : 'auto', fontSize: (0.68 * escala).toFixed(3) + 'rem', flex: c.h ? 1 : undefined }} />
                  {!soloLectura && !modoConectar && <div onMouseDown={(e) => startResize(e, c.id)} title="Arrastrá para cambiar el tamaño" style={{ position: 'absolute', right: 0, bottom: 0, width: 14, height: 14, cursor: 'nwse-resize', background: 'linear-gradient(135deg, transparent 45%, rgba(0,0,0,0.4) 45%, rgba(0,0,0,0.4) 60%, transparent 60%)', zIndex: 9 }} />}
                  {!soloLectura && (
                    <div className="og-ctrls">
                      <button title="Color" onClick={(e) => { e.stopPropagation(); setColorAbierto(a => a === c.id ? null : c.id); }}
                        style={{ width: 15, height: 15, borderRadius: '50%', background: col.bg, border: `1px solid ${col.border}`, cursor: 'pointer', padding: 0 }} />
                      <button title="Eliminar caja" onClick={(e) => { e.stopPropagation(); quitarCaja(c.id); }}
                        style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '0.78rem', padding: 0, color: 'var(--danger)' }}>🗑️</button>
                    </div>
                  )}
                  {!soloLectura && abierto && (
                    <div style={{ position:'absolute', top:'100%', left:'50%', transform:'translateX(-50%)', marginTop:22, display:'flex', gap:4, padding:6, borderRadius:10, background:'var(--surface)', border:'1px solid var(--border)', boxShadow:'0 4px 14px rgba(0,0,0,0.25)', zIndex:30 }}>
                      {ORG_COLORES.map(cc => (
                        <button key={cc.key} title={cc.label} onClick={(e) => { e.stopPropagation(); setColorCaja(c.id, cc.key); }}
                          style={{ width:20, height:20, borderRadius:'50%', cursor:'pointer', padding:0, background:cc.bg, border: c.color===cc.key ? '2px solid var(--text)' : `1px solid ${cc.border}` }} />
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
        {sb.need && (
          <div style={{ height: 14, marginTop: 6, background: 'var(--surface2)', borderRadius: 7, position: 'relative' }} title="Deslizá para ver el resto del organigrama">
            <div onMouseDown={startBarDrag} style={{ position: 'absolute', top: 0, height: 14, width: sb.thumbW, left: sb.thumbL, background: 'var(--text2)', borderRadius: 7, cursor: 'grab' }} />
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ADMIN EXTENSIONES ────────────────────────────────────────────────
function AdminExtensiones({ aulaActiva }) {
  const [exts, setExts] = useState([]);
  const [videos, setVideos] = useState([]);
  const [alumnos, setAlumnos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filtro, setFiltro] = useState('todas');   // todas | pagado | pendiente | rechazado
  const [modal, setModal] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({ alumno_id: '', video_id: '' });
  const [facturandoId, setFacturandoId] = useState(null);
  const [facturaVer, setFacturaVer] = useState(null);
  const [arcaMsg, setArcaMsg] = useState(null);
  const toast = useToast();

  // Emitir la Factura C de una extensión (misma función de ARCA que en Pagos).
  const facturarExt = async (ext) => {
    if (ext.factura_cae) return;
    if (!confirm(`¿Emitir Factura C por $ ${parseFloat(ext.monto).toLocaleString('es-AR')} de ${ext.alumnos?.nombre || 'este alumno'}?`)) return;
    setFacturandoId(ext.id); setArcaMsg(null);
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.access_token) { setArcaMsg({ ok: false, txt: 'Tu sesión venció. Cerrá sesión y volvé a entrar, y reintentá.' }); setFacturandoId(null); return; }
      const res = await fetch(`${SUPABASE_URL}/functions/v1/facturar-arca?action=facturar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY, Authorization: `Bearer ${session.access_token}` },
        body: JSON.stringify({ tabla: 'extensiones_video', id: ext.id }),
      });
      const txt = await res.text();
      let j = null; try { j = JSON.parse(txt); } catch {}
      console.log('[ARCA facturar ext]', res.status, txt);
      if (j && j.ok) { setArcaMsg({ ok: true, txt: `Factura C ${j.nroFmt || ''} emitida. CAE: ${j.cae}` }); load(); }
      else setArcaMsg({ ok: false, txt: (j && j.error) ? j.error : `HTTP ${res.status}: ${txt.slice(0, 500)}` });
    } catch (e) {
      setArcaMsg({ ok: false, txt: 'No se pudo llamar a la función: ' + (e?.message || e) });
    } finally { setFacturandoId(null); }
  };

  const load = async () => {
    if (!aulaActiva) { setLoading(false); return; }

    // Videos y alumnos del aula (las extensiones no tienen aula: se acotan por ellos).
    const [{ data: vData }, { data: aData }] = await Promise.all([
      supabase.from('videos').select('id, titulo, precio_extension').eq('aula_id', aulaActiva).order('orden'),
      supabase.from('alumnos').select('id, nombre, email').eq('aula_id', aulaActiva).order('nombre'),
    ]);
    setVideos(vData || []);
    setAlumnos(aData || []);

    const idsVideos = (vData || []).map(v => v.id);
    if (!idsVideos.length) { setExts([]); setLoading(false); return; }

    const { data: eData } = await supabase
      .from('extensiones_video')
      .select('*, videos(titulo), alumnos(nombre, email)')
      .in('video_id', idsVideos)
      .order('created_at', { ascending: false });

    setExts(eData || []);
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [aulaActiva]);

  // Habilita 24hs manualmente, sin cobrar. Sirve para destrabar un pago fallido
  // o para darle tiempo extra a un alumno por decisión del docente.
  const habilitarManual = async () => {
    if (!form.alumno_id || !form.video_id) return toast('Elegí alumno y video', 'error');
    setSaving(true);
    const { error } = await supabase.from('extensiones_video').insert({
      video_id: form.video_id,
      alumno_id: form.alumno_id,
      vence_en: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(),
      monto: 0,
      estado: 'pagado',
      mp_payment_id: 'MANUAL',
    });
    setSaving(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast('24hs habilitadas ✅', 'success');
    setModal(false);
    setForm({ alumno_id: '', video_id: '' });
    load();
  };

  const eliminar = async (e) => {
    if (!confirm(`¿Eliminar esta extensión de ${e.alumnos?.nombre}?`)) return;
    const { error } = await supabase.from('extensiones_video').delete().eq('id', e.id);
    if (error) return toast('Error: ' + error.message, 'error');
    toast('Extensión eliminada', 'info');
    load();
  };

  const fmt = (valor) => {
    const d = new Date(valor);
    const tz = 'America/Argentina/Buenos_Aires';
    return `${d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit',timeZone:tz})} ${d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',timeZone:tz})}`;
  };
  const estaVigente = (e) => e.estado === 'pagado' && new Date(e.vence_en) > new Date();

  const filtradas = exts.filter(e => filtro === 'todas' || e.estado === filtro);
  const totalCobrado = exts.filter(e => e.estado === 'pagado').reduce((s, e) => s + (parseFloat(e.monto) || 0), 0);
  const vigentes = exts.filter(estaVigente).length;
  const pendientes = exts.filter(e => e.estado === 'pendiente').length;

  if (!aulaActiva) return <SinAula />;
  if (loading) return <Loading />;

  const chipEstado = (e) => {
    if (e.estado === 'pagado') {
      return estaVigente(e)
        ? <span className="chip chip-green">✅ Activa</span>
        : <span className="chip" style={{background:'var(--surface2)',color:'var(--text2)'}}>Vencida</span>;
    }
    if (e.estado === 'pendiente') return <span className="chip" style={{background:'rgba(255,176,32,0.15)',color:'var(--warning)'}}>⏳ Pendiente</span>;
    return <span className="chip chip-red">❌ Rechazada</span>;
  };

  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">⏱️ Extensiones</div>
          <div className="page-subtitle">Compras de 24hs extra por video</div>
        </div>
        <button className="btn btn-primary" onClick={() => { setForm({alumno_id:'',video_id:''}); setModal(true); }}>
          + Habilitar 24hs manualmente
        </button>
      </div>

      <div className="stats-grid" style={{marginBottom:20}}>
        <div className="stat-card green">
          <span className="stat-icon">💰</span>
          <div className="stat-value" style={{fontSize:'1.3rem'}}>${Math.round(totalCobrado).toLocaleString('es-AR')}</div>
          <div className="stat-label">Total cobrado</div>
        </div>
        <div className="stat-card">
          <span className="stat-icon">✅</span>
          <div className="stat-value">{vigentes}</div>
          <div className="stat-label">Activas ahora</div>
        </div>
        <div className="stat-card">
          <span className="stat-icon">📊</span>
          <div className="stat-value">{exts.filter(e=>e.estado==='pagado').length}</div>
          <div className="stat-label">Compras totales</div>
        </div>
        <div className="stat-card" style={pendientes ? {borderColor:'var(--warning)'} : {}}>
          <span className="stat-icon">⏳</span>
          <div className="stat-value">{pendientes}</div>
          <div className="stat-label">Pendientes</div>
        </div>
      </div>

      {pendientes > 0 && (
        <div style={{background:'rgba(255,176,32,0.1)',border:'1px solid var(--warning)',borderRadius:12,padding:'12px 16px',marginBottom:16,fontSize:'0.85rem'}}>
          ⚠️ Hay {pendientes} {pendientes === 1 ? 'pago pendiente' : 'pagos pendientes'}. Puede ser un pago que quedó a medias.
          Si el alumno dice que pagó, verificá en Mercado Pago y habilitalo manualmente.
        </div>
      )}

      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {[['todas','Todas'],['pagado','Pagadas'],['pendiente','Pendientes'],['rechazado','Rechazadas']].map(([id,label]) => (
          <button key={id} className={`btn btn-sm ${filtro===id?'btn-primary':'btn-ghost'}`} onClick={() => setFiltro(id)}>
            {label}
          </button>
        ))}
      </div>

      {filtradas.length === 0 ? (
        <Empty icon="⏱️" text={exts.length === 0 ? 'Todavía nadie compró extensiones' : 'No hay extensiones con ese filtro'} />
      ) : (
        <div className="card" style={{overflowX:'auto'}}>
          <table>
            <thead><tr>
              <th>Alumno</th><th>Video</th><th>Monto</th><th>Comprada</th><th>Vence</th><th>Estado</th><th></th>
            </tr></thead>
            <tbody>
              {filtradas.map(e => (
                <tr key={e.id}>
                  <td><strong>{e.alumnos?.nombre || '—'}</strong></td>
                  <td style={{color:'var(--text2)',maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.videos?.titulo || '—'}</td>
                  <td>
                    {e.mp_payment_id === 'MANUAL'
                      ? <span style={{color:'var(--text2)',fontSize:'0.8rem'}}>Manual</span>
                      : <strong style={{color:'var(--success)'}}>${Number(e.monto || 0).toLocaleString('es-AR')}</strong>}
                  </td>
                  <td style={{color:'var(--text2)',fontSize:'0.82rem'}}>{fmt(e.created_at)}</td>
                  <td style={{color:'var(--text2)',fontSize:'0.82rem'}}>{e.estado === 'pagado' ? fmt(e.vence_en) : '—'}</td>
                  <td>{chipEstado(e)}</td>
                  <td>
                    <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      {e.estado === 'pagado' && Number(e.monto) > 0 && (
                        e.factura_cae
                          ? <button className="btn btn-ghost btn-sm" title="Ver / imprimir factura" onClick={() => setFacturaVer(e)} style={{color:'var(--success)',fontWeight:700,fontSize:'0.72rem',whiteSpace:'nowrap'}}>🧾 {e.factura_nro}</button>
                          : <button className="btn btn-ghost btn-sm" disabled={facturandoId===e.id} onClick={() => facturarExt(e)}>{facturandoId===e.id ? '⏳...' : '🧾 Facturar'}</button>
                      )}
                      <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={() => eliminar(e)}>🗑️</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {arcaMsg && (
        <div className="card" style={{padding:'12px 16px',marginTop:12,borderColor: arcaMsg.ok?'var(--success)':'var(--danger)',background: arcaMsg.ok?'rgba(67,233,123,0.08)':'rgba(255,71,87,0.08)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
            <div style={{fontWeight:700,color: arcaMsg.ok?'var(--success)':'var(--danger)'}}>{arcaMsg.ok?'Factura ✅':'ARCA ❌ Error'}</div>
            <button className="btn btn-ghost btn-sm" onClick={() => setArcaMsg(null)}>✕</button>
          </div>
          <div style={{fontSize:'0.82rem',whiteSpace:'pre-wrap',wordBreak:'break-word',marginTop:6}}>{arcaMsg.txt}</div>
        </div>
      )}

      {facturaVer && <FacturaModal pago={facturaVer} onClose={() => setFacturaVer(null)} />}

      {modal && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:460}}>
            <div className="modal-header">
              <h3>⏱️ Habilitar 24hs manualmente</h3>
              <button className="modal-close" onClick={() => setModal(false)}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{background:'var(--surface2)',borderRadius:10,padding:12,marginBottom:16,fontSize:'0.84rem',color:'var(--text2)'}}>
                Le da al alumno 24hs de acceso a un video, <strong style={{color:'var(--text)'}}>sin cobrarle</strong>.
                Sirve para destrabar un pago que falló o para darle tiempo extra.
              </div>
              <div className="form-group">
                <label>Alumno *</label>
                <select value={form.alumno_id} onChange={e=>setForm(p=>({...p,alumno_id:e.target.value}))}>
                  <option value="">— Elegir alumno —</option>
                  {alumnos.map(a => <option key={a.id} value={a.id}>{a.nombre}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Video *</label>
                <select value={form.video_id} onChange={e=>setForm(p=>({...p,video_id:e.target.value}))}>
                  <option value="">— Elegir video —</option>
                  {videos.map(v => <option key={v.id} value={v.id}>{v.titulo}</option>)}
                </select>
              </div>
            </div>
            <div className="modal-footer">
