<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#6c63ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SACi">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACi - Sistema de Aprendizaje</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script>
  (function() {
    var t = localStorage.getItem('saci-theme');
    if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    if (t === 'light') document.documentElement.classList.add('light');
  })();
</script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --gold: #f9ca24;
    --text: #e8e8f0;
    --text2: #8888aa;
    --danger: #ff4757;
    --success: #43e97b;
    --warning: #ffa502;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --topbar-bg: rgba(19,19,26,0.85);
    --table-hover: rgba(255,255,255,0.02);
    --tab-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  html.light {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #eef1f8;
    --border: #d0d8ec;
    --accent: #6c63ff;
    --accent2: #e05175;
    --accent3: #2eb86e;
    --gold: #c48a00;
    --text: #0d1b3e;
    --text2: #5a6a8a;
    --danger: #d94f2b;
    --success: #2eb86e;
    --warning: #b86e00;
    --shadow: 0 8px 32px rgba(0,0,0,0.1);
    --topbar-bg: rgba(255,255,255,0.92);
    --table-hover: rgba(0,0,0,0.02);
    --tab-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  @keyframes shimmer { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(108,99,255,0.4); } 50% { box-shadow: 0 0 0 12px rgba(108,99,255,0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes glow { 0%,100% { text-shadow: 0 0 20px rgba(108,99,255,0.3); } 50% { text-shadow: 0 0 40px rgba(108,99,255,0.7); } }

  .fade-in { animation: fadeIn 0.5s ease forwards; }
  .fade-in-scale { animation: fadeInScale 0.4s ease forwards; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Scroll horizontal visible (ej: tablas anchas de Informes) */
  .scroll-x { scrollbar-color: var(--text2) var(--surface2); }
  .scroll-x::-webkit-scrollbar { height: 12px; }
  .scroll-x::-webkit-scrollbar-track { background: var(--surface2); border-radius: 6px; }
  .scroll-x::-webkit-scrollbar-thumb { background: var(--text2); border-radius: 6px; }

  /* Layout */
  .app-shell { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transition: transform 0.3s; }
  .main-content { margin-left: 240px; flex: 1; min-height: 100vh; }
  .topbar { height: 64px; background: var(--topbar-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; z-index: 50; transition: background 0.3s; }
  .page-content { padding: 28px; animation: fadeIn 0.4s ease; }

  /* Logo */
  .logo { padding: 22px 20px 16px; border-bottom: 1px solid var(--border); }
  .logo-text { font-family: 'Space Mono', monospace; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 3s infinite; }
  .logo-sub { font-size: 0.68rem; color: var(--text2); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }

  /* Nav */
  .nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
  .nav-section { font-size: 0.65rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.12em; padding: 12px 10px 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; cursor: pointer; font-size: 0.88rem; font-weight: 500; color: var(--text2); transition: all 0.2s; margin-bottom: 2px; border: 1px solid transparent; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(108,99,255,0.1)); color: var(--accent); border-color: rgba(108,99,255,0.3); }
  .nav-icon { font-size: 1.1rem; width: 22px; text-align: center; }

  /* User card */
  .user-card { margin: 12px 10px; padding: 12px; background: var(--surface2); border-radius: 12px; border: 1px solid var(--border); }
  .user-name { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 0.7rem; color: var(--text2); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.68rem; font-weight: 600; }
  .badge-admin { background: rgba(108,99,255,0.2); color: var(--accent); }
  .badge-alumno { background: rgba(67,233,123,0.2); color: var(--accent3); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 10px; font-size: 0.86rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-family: inherit; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #7c74ff; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,0.4); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: rgba(255,71,87,0.15); color: var(--danger); border: 1px solid rgba(255,71,87,0.3); }
  .btn-danger:hover { background: rgba(255,71,87,0.25); }
  .btn-success { background: rgba(67,233,123,0.15); color: var(--success); border: 1px solid rgba(67,233,123,0.3); }
  .btn-success:hover { background: rgba(67,233,123,0.25); }
  .btn-sm { padding: 5px 12px; font-size: 0.78rem; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
  .card-hover { transition: all 0.2s; }
  .card-hover:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius) var(--radius) 0 0; }
  .stat-card.blue::before { background: linear-gradient(90deg, var(--accent), #a78bfa); }
  .stat-card.pink::before { background: linear-gradient(90deg, var(--accent2), #f97316); }
  .stat-card.green::before { background: linear-gradient(90deg, var(--accent3), #06b6d4); }
  .stat-card.gold::before { background: linear-gradient(90deg, var(--gold), #f97316); }
  .stat-value { font-size: 2rem; font-weight: 700; font-family: 'Space Mono', monospace; }
  .stat-label { font-size: 0.78rem; color: var(--text2); margin-top: 4px; }
  .stat-icon { font-size: 2rem; position: absolute; right: 16px; top: 16px; opacity: 0.3; }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.86rem; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--table-hover); }

  /* Forms */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  input, select, textarea { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.88rem; font-family: inherit; transition: border-color 0.2s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 80px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; animation: fadeIn 0.2s ease; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; animation: fadeInScale 0.3s ease; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-title { font-size: 1.15rem; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text2); font-size: 1.4rem; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; }
  .modal-close:hover { background: var(--surface2); color: var(--text); }

  /* Toast */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
  .toast { padding: 12px 18px; border-radius: 12px; font-size: 0.86rem; font-weight: 500; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease; box-shadow: var(--shadow); max-width: 340px; }
  .toast-success { background: rgba(67,233,123,0.15); border: 1px solid rgba(67,233,123,0.3); color: var(--success); }
  .toast-error { background: rgba(255,71,87,0.15); border: 1px solid rgba(255,71,87,0.3); color: var(--danger); }
  .toast-info { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3); color: var(--accent); }

  /* Login */
  .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.15) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(255,101,132,0.1) 0%, transparent 60%), var(--bg); }
  .login-card { width: 100%; max-width: 400px; animation: fadeInScale 0.5s ease; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo-text { font-family: 'Space Mono', monospace; font-size: 2.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .login-sub { color: var(--text2); font-size: 0.9rem; margin-top: 6px; }
  .divider { height: 1px; background: var(--border); margin: 18px 0; }

  /* Page header */
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 1.5rem; font-weight: 700; }
  .page-subtitle { font-size: 0.85rem; color: var(--text2); margin-top: 2px; }

  /* Video player */
  .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: var(--radius); overflow: hidden; }
  .video-container:fullscreen { width: 100vw; height: 100vh; aspect-ratio: auto; border-radius: 0; }
  .video-container:fullscreen iframe { width: 100%; height: 100%; }
  .video-container:fullscreen .video-watermark-text { font-size: 2rem; }
  .video-container:fullscreen .video-watermark-sub { font-size: 1.2rem; }
  /* Modo "agrandar" propio (sin fullscreen del sistema): el video cubre toda la pantalla dentro de la app y mantiene la marca de agua */
  .video-container.video-agrandado { position: fixed !important; inset: 0 !important; width: 100vw !important; height: 100vh !important; max-width: none !important; margin: 0 !important; aspect-ratio: auto !important; border-radius: 0 !important; z-index: 3000 !important; background: #000 !important; }
  .video-container.video-agrandado .video-watermark-text { font-size: 1.8rem; }
  .video-container.video-agrandado .video-watermark-sub { font-size: 1rem; }
  .video-watermark { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 10; gap: 8px; }
  .video-watermark-text { color: rgba(249,202,36,0.55); font-size: 1.1rem; font-weight: 700; font-family: 'Space Mono', monospace; white-space: nowrap; text-shadow: 0 2px 8px rgba(0,0,0,0.9); transform: rotate(-12deg); letter-spacing: 0.05em; }
  .video-watermark-sub { color: rgba(249,202,36,0.35); font-size: 0.72rem; font-family: 'Space Mono', monospace; white-space: nowrap; text-shadow: 0 1px 4px rgba(0,0,0,0.9); transform: rotate(-12deg); letter-spacing: 0.08em; }

  /* ── Matriz MSA ── */
  .msa-pieza { position: relative; display: inline-flex; align-items: center; justify-content: center; text-align: center;
    min-width: 74px; max-width: 120px; min-height: 46px; padding: 8px 10px; cursor: grab; user-select: none;
    font-size: 0.72rem; font-weight: 700; color: #1a1a1a; line-height: 1.1; word-break: break-word; }
  .msa-pieza:active { cursor: grabbing; }
  .msa-pieza .msa-x { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; border-radius: 50%;
    background: var(--danger); color: #fff; font-size: 0.7rem; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 3; }
  .msa-pieza:hover .msa-x { display: flex; }
  /* Archivo = cilindro con tapa elíptica (símbolo de base de datos) */
  .msa-archivo { background: #7ed0f7; border: 2px solid #2b8fc7; border-radius: 50% / 20%;
    padding-top: 16px; }
  .msa-archivo::before { content: ''; position: absolute; top: 3px; left: 3px; right: 3px; height: 12px;
    border: 2px solid #2b8fc7; border-radius: 50%; background: #a5def9;
    box-shadow: 0 4px 0 -2px #2b8fc7; }
  /* Documento cuadrado */
  .msa-doc_cuadrado { background: #ffe08a; border: 2px solid #d9a72a; border-radius: 3px; }
  /* Documento con pancita: rectángulo con base ondulada (una sola onda), dibujado con SVG */
  .msa-doc_pancita { background: transparent; border: none; border-radius: 0; padding-bottom: 16px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 60' preserveAspectRatio='none'><path d='M4 4 H96 V46 C74 58 26 34 4 46 Z' fill='%23b8f0c8' stroke='%233fa85f' stroke-width='3'/></svg>");
    background-size: 100% 100%; background-repeat: no-repeat; }
  /* Elemento = sin forma específica, solo texto en una etiqueta neutra */
  .msa-elemento { background: #eef0f5; border: 1px dashed #a3a9bd; border-radius: 6px; color: #33384d; }
  .msa-celda { min-height: 54px; padding: 6px; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; transition: background 0.15s; }
  .msa-celda.msa-drop { background: rgba(108,92,231,0.18); outline: 2px dashed var(--accent); outline-offset: -3px; }
  .msa-tabla { border-collapse: collapse; width: 100%; }
  .msa-tabla th, .msa-tabla td { border: 1px solid var(--border); vertical-align: top; }
  .msa-tabla th { background: var(--surface2); padding: 6px 8px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .msa-banco { display: flex; flex-wrap: wrap; gap: 10px; }
  /* CONT (archivo de contabilidad) resaltado en naranja */
  .msa-pieza.msa-cont { background: #e8863a; border-color: #b5611c; color: #fff; }
  .msa-pieza.msa-cont::before { border-color: #b5611c; background: #f2a55f; box-shadow: 0 4px 0 -2px #b5611c; }
  /* Diagrama de Contabilidad */
  .diag-lbl { box-sizing: border-box; display: flex; align-items: center; justify-content: flex-end; text-align: right;
    padding: 4px 8px; font-size: 0.64rem; font-weight: 800; letter-spacing: 0.02em; color: #3a2f00;
    background: #fde047; border: 1px solid #d9a72a; }
  .diag-cell { box-sizing: border-box; display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(120,120,120,0.14); }
  .diag-cell.diag-from { outline: 2px solid var(--accent); outline-offset: -2px; }
  /* Organigrama (árbol jerárquico con conectores) */
  ul.org-tree, .org-tree ul { --org-line: #9aa0b4; list-style: none; margin: 0; padding: 0;
    position: relative; display: flex; justify-content: center; padding-top: 22px; }
  ul.org-tree { padding-top: 0; }
  .org-tree li { list-style: none; position: relative; padding: 22px 8px 0 8px; text-align: center; }
  .org-tree li::before, .org-tree li::after { content: ''; position: absolute; top: 0; right: 50%;
    border-top: 2px solid var(--org-line); width: 50%; height: 22px; }
  .org-tree li::after { right: auto; left: 50%; border-left: 2px solid var(--org-line); }
  .org-tree li::before { border-right: 2px solid var(--org-line); }
  .org-tree li:only-child::after, .org-tree li:only-child::before { display: none; }
  .org-tree li:only-child { padding-top: 0; }
  .org-tree li:first-child::before, .org-tree li:last-child::after { border: 0 none; }
  .org-tree li:last-child::before { border-right: 2px solid var(--org-line); }
  .org-tree ul::before { content: ''; position: absolute; top: 0; left: 50%;
    border-left: 2px solid var(--org-line); width: 0; height: 22px; }
  .org-nodo-wrap { position: relative; display: inline-block; }
  .org-nodo { display: inline-block; border: 1.5px solid #333; border-radius: 4px; padding: 5px 8px;
    min-width: 96px; max-width: 152px; }
  .org-nodo textarea { border: none; background: transparent; resize: none; width: 100%; text-align: center;
    font-size: 0.68rem; font-weight: 700; line-height: 1.14; font-family: inherit; overflow: hidden; }
  .org-ctrls { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    margin-top: 2px; z-index: 15; gap: 4px; padding: 3px 6px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.2); white-space: nowrap; }
  .org-nodo-wrap:hover > .org-ctrls { display: flex; }
  /* Organigrama - tablero libre (arrastrar cajas + conectar a mano) */
  .og-canvas { position: relative; background: #fbfbfd; background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 22px 22px; border-radius: 8px; }
  .og-box { position: absolute; width: 134px; border: 1.5px solid #333; border-radius: 4px; box-sizing: border-box; user-select: none; }
  .og-box .og-handle { cursor: move; text-align: center; font-size: 0.7rem; color: rgba(0,0,0,0.35); line-height: 1; padding: 2px 0 0; }
  .og-box textarea { border: none; background: transparent; resize: none; width: 100%; text-align: center; font-size: 0.68rem; font-weight: 700; line-height: 1.14; font-family: inherit; overflow: hidden; padding: 2px 6px 6px; }
  .og-box .og-ctrls { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); z-index: 20; gap: 6px; padding: 3px 7px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.2); white-space: nowrap; align-items: center; }
  .og-box:hover .og-ctrls, .og-box .og-ctrls:hover { display: flex; }
  .og-box.og-sel { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function subscribirPush(alumnoId) {
  try {
    if (!('Notification' in window) || !('serviceWorker' in navigator)) return;

    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();

        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });

    await supabase.from('push_subscriptions').upsert(
      { alumno_id: alumnoId, endpoint, p256dh: keys.p256dh, auth: keys.auth },
      { onConflict: 'endpoint' }
    );
  } catch {}
}

// ── Precios de plan y estado de pago (se usan en Pagos y en los recordatorios) ──
function precioDePlan(precios, plan) {
  const v = plan ? (precios || {})[plan] : null;
  if (v == null) return { unico: 0, cuotas: 0 };
  if (typeof v === 'number') return { unico: v, cuotas: v };
  const u = parseFloat(v.unico) || 0, c = parseFloat(v.cuotas) || 0;
  return { unico: u, cuotas: c || u };
}
function resumenPagoDe(ps, precios) {
  if (!ps || !ps.length) return { cant: 0, paid: 0, plan: null, esperado: 0, falta: null, completo: null };
  const plan = ps[0].plan || null;   // ps ordenado por fecha desc → el más reciente
  const delPlan = ps.filter(p => p.plan === plan);
  const paid = delPlan.reduce((s, p) => s + (parseFloat(p.monto) || 0), 0);
  const { unico, cuotas } = precioDePlan(precios, plan);
  const pagoContado = unico > 0 && delPlan.some(p => (parseFloat(p.monto) || 0) >= unico);
  let esperado, completo, falta;
  if (pagoContado) { esperado = unico; completo = true; falta = 0; }
  else {
    esperado = cuotas || unico;
    completo = esperado > 0 ? paid >= esperado : null;
    falta = esperado > 0 ? Math.max(0, esperado - paid) : null;
  }
  return { cant: ps.length, paid, plan, esperado, falta, completo };
}

// Genera (si corresponde) la Novedad de recordatorio de pago para un alumno.
// Dispara 3 días antes, 1 día antes y el día del vencimiento. No repite (usa 'ref').
async function generarRecordatorioPagoAlumno(alumnoId, aulaId) {
  try {
    if (!alumnoId || !aulaId) return;
    const h = new Date();
    const hoyISO = `${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}-${String(h.getDate()).padStart(2,'0')}`;
    const { data: aula } = await supabase.from('aulas').select('precios').eq('id', aulaId).single();
    const { data: ps } = await supabase.from('pagos').select('*').eq('alumno_id', alumnoId).order('fecha_pago', { ascending: false });
    if (!ps || !ps.length) return;
    const r = resumenPagoDe(ps, aula?.precios || {});
    if (r.completo !== false) {
      // Ya completó el pago: quitar los recordatorios de pago que le hubieran quedado.
      if (r.completo === true) { try { await supabase.from('novedades').delete().eq('alumno_id', alumnoId).like('ref', `pagovto-${alumnoId}-%`); } catch {} }
      return;
    }
    const futuros = ps.map(p => p.proximo_pago).filter(Boolean).filter(d => d >= hoyISO).sort();
    const vto = futuros[0];
    if (!vto) return;
    const dias = Math.round((Date.parse(vto + 'T00:00:00') - Date.parse(hoyISO + 'T00:00:00')) / 86400000);
    if (![0, 1, 3].includes(dias)) return;
    const ref = `pagovto-${alumnoId}-${vto}-${dias}`;
    const { data: existe } = await supabase.from('novedades').select('id').eq('ref', ref).limit(1);
    if (existe && existe.length) return;
    const cuando = dias === 0 ? 'Hoy vence' : dias === 1 ? 'Falta 1 día para el vencimiento de' : 'Faltan 3 días para el vencimiento de';
    const vtoFmt = new Date(vto + 'T00:00:00').toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric' });
    const faltaTxt = r.falta != null ? ` Te falta $${r.falta.toLocaleString('es-AR')} del plan ${r.plan}.` : '';
    await supabase.from('novedades').insert({
      titulo: '💳 Recordatorio de pago',
      contenido: `${cuando} tu pago (${vtoFmt}).${faltaTxt} Cuando lo abones, este aviso deja de aparecer.`,
      tipo: 'aviso', aula_id: aulaId, alumno_id: alumnoId, ref,
    });
  } catch {}
}

// ¿El alumno tiene un pago cuyo plazo (próximo pago) ya venció y sigue sin completar?
// Solo bloquea si hay precio configurado (si no, no se puede saber si debe → no bloquea).
async function tienePagoVencido(alumnoId, aulaId) {
  try {
    if (!alumnoId || !aulaId) return false;
    const h = new Date();
    const hoyISO = `${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}-${String(h.getDate()).padStart(2,'0')}`;
    const { data: aula } = await supabase.from('aulas').select('precios').eq('id', aulaId).single();
    const { data: ps } = await supabase.from('pagos').select('*').eq('alumno_id', alumnoId).order('fecha_pago', { ascending: false });
    if (!ps || !ps.length) return false;
    const r = resumenPagoDe(ps, aula?.precios || {});
    if (r.completo !== false) return false;   // ya pagó o no hay precio → no bloquea
    return ps.some(p => p.proximo_pago && p.proximo_pago < hoyISO);
  } catch { return false; }
}

// ─── THEME ───────────────────────────────────────────────────────────
const ThemeCtx = createContext(null);
const useTheme = () => useContext(ThemeCtx);

function ThemeProvider({ children }) {
  const [theme, setTheme] = useState(() => {
    const saved = localStorage.getItem('saci-theme');
    if (saved) return saved;
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  });

  useEffect(() => {
    document.documentElement.classList.toggle('light', theme === 'light');
    localStorage.setItem('saci-theme', theme);
    const metaTheme = document.querySelector('meta[name="theme-color"]');
    if (metaTheme) metaTheme.content = theme === 'light' ? '#6c63ff' : '#6c63ff';
  }, [theme]);

  const toggle = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  return <ThemeCtx.Provider value={{ theme, toggle }}>{children}</ThemeCtx.Provider>;
}

// ─── CONTEXT ─────────────────────────────────────────────────────────
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

// ─── TOAST ───────────────────────────────────────────────────────────
let toastId = 0;
const ToastCtx = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = 'info') => {
    const id = ++toastId;
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  }, []);
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast toast-${t.type}`}>
            {icons[t.type]} {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

// Formulario de auto-inscripción del alumno: datos + selfie + DNI (frente/dorso) + T&C.
function RegistroAlumno({ onListo, onCancel, refId }) {
  const [paso, setPaso] = useState(1);
  const [refNombre, setRefNombre] = useState(null);   // nombre del alumno que invitó (si el link trae ?ref=)
  const [nombre, setNombre] = useState('');
  const [email, setEmail] = useState('');
  const [dni, setDni] = useState('');
  const [pass, setPass] = useState('');
  const [pass2, setPass2] = useState('');
  const [selfie, setSelfie] = useState(null);
  const [frente, setFrente] = useState(null);
  const [dorso, setDorso] = useState(null);
  const [dispositivos, setDispositivos] = useState([]);
  const [nuevoDisp, setNuevoDisp] = useState({ tipo: 'celular', id: '' });
  const [acepta, setAcepta] = useState(false);
  const [saving, setSaving] = useState(false);
  const toast = useToast();

  // Si el link trae ?ref=, buscar el nombre del alumno que invitó (para mostrarlo).
  useEffect(() => {
    if (!refId) return;
    (async () => {
      try {
        const { data } = await supabase.from('alumnos').select('nombre').eq('id', refId).single();
        if (data?.nombre) setRefNombre(data.nombre);
      } catch {}
    })();
  }, [refId]);

  const subir = async (userId, file, nombreArch) => {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const path = `${userId}/${nombreArch}.${ext}`;
    const { error } = await supabase.storage.from(BUCKET_DOCS).upload(path, file, { upsert: true, contentType: file.type || 'image/jpeg' });
    if (error) throw new Error(`No se pudo subir la foto (${nombreArch}): ${error.message}`);
    return path;
  };

  const validarPaso1 = () => {
    if (!nombre.trim() || !email.trim() || !dni.trim() || !pass) return 'Completá nombre, email, DNI y contraseña';
    if (pass.length < 6) return 'La contraseña debe tener al menos 6 caracteres';
    if (pass !== pass2) return 'Las contraseñas no coinciden';
    if (!selfie || !frente || !dorso) return 'Subí la selfie y las dos fotos del DNI (frente y dorso)';
    return null;
  };
  const siguienteDe1 = () => { const err = validarPaso1(); if (err) return toast(err, 'error'); setPaso(2); };
  const siguienteDe2 = () => { if (!dispositivos.length) return toast('Agregá al menos un dispositivo', 'error'); setPaso(3); };

  const agregarDisp = () => {
    const id = nuevoDisp.id.trim();
    if (!id) return toast('Ingresá el número del dispositivo', 'error');
    setDispositivos(d => [...d, { tipo: nuevoDisp.tipo, id }]);
    setNuevoDisp({ tipo: nuevoDisp.tipo, id: '' });
  };
  const quitarDisp = (i) => setDispositivos(d => d.filter((_, j) => j !== i));

  const registrar = async () => {
    const err = validarPaso1();
    if (err) { setPaso(1); return toast(err, 'error'); }
    if (!dispositivos.length) { setPaso(2); return toast('Agregá al menos un dispositivo', 'error'); }
    if (!acepta) return toast('Tenés que aceptar los términos y condiciones', 'error');
    setSaving(true);
    try {
      const { data, error } = await supabase.auth.signUp({ email: email.trim().toLowerCase(), password: pass, options: { data: { nombre: nombre.trim() } } });
      if (error) throw new Error(error.message);
      const userId = data.user?.id;
      if (!data.session || !userId) throw new Error('No se pudo iniciar la sesión para subir las fotos. Probá de nuevo o avisá al docente.');
      const selfiePath = await subir(userId, selfie, 'selfie');
      const frentePath = await subir(userId, frente, 'dni_frente');
      const dorsoPath = await subir(userId, dorso, 'dni_dorso');
      const baseRow = {
        nombre: nombre.trim(), email: email.trim().toLowerCase(), dni: dni.trim(), estado: 'pendiente',
        selfie_path: selfiePath, dni_frente_path: frentePath, dni_dorso_path: dorsoPath,
        tyc_aceptado: true, tyc_fecha: new Date().toISOString(), tyc_version: TYC_VERSION,
      };
      // Se intenta guardar con dispositivos + referido; si esas columnas aún no existen, se reintenta sin ellas.
      let ins = await supabase.from('alumnos').insert({ ...baseRow, dispositivos, referido_por: refId || null }).select('*').single();
      if (ins.error) ins = await supabase.from('alumnos').insert(baseRow).select('*').single();
      if (ins.error) throw new Error(ins.error.message);
      const row = ins.data;
      toast('¡Inscripción enviada! Esperá la aprobación del docente 🎉', 'success');
      onListo({ user: data.user, isAdmin: false, alumno: row });
    } catch (err) {
      toast(err.message || 'Error al registrarse', 'error');
    } finally { setSaving(false); }
  };

  const TITULOS = ['Datos personales', 'Registro de dispositivos', 'Términos y condiciones'];

  return (
    <div className="login-page"><div className="login-card" style={{maxWidth:460}}>
      <div className="login-logo"><div className="login-logo-text">SACi</div>
        <div className="login-sub" style={{fontWeight:600}}>Inscripción de nuevo alumno</div>
      </div>

      {/* Indicador de pasos */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4,marginBottom:6}}>
        {[1,2,3].map(n => (
          <React.Fragment key={n}>
            <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:'0.82rem',background: paso>=n ? 'var(--accent)' : 'var(--surface2)', color: paso>=n ? '#fff' : 'var(--text2)'}}>{n}</div>
            {n<3 && <div style={{width:26,height:2,background: paso>n ? 'var(--accent)' : 'var(--border)'}} />}
          </React.Fragment>
        ))}
      </div>
      <div style={{textAlign:'center',fontWeight:700,fontSize:'0.92rem',marginBottom:14}}>Paso {paso} de 3 · {TITULOS[paso-1]}</div>

      {paso === 1 && (
        <>
          {refId && (
            <div style={{background:'rgba(67,233,123,0.10)',border:'1px solid var(--success)',borderRadius:8,padding:'8px 12px',marginBottom:14,fontSize:'0.82rem',color:'var(--text)'}}>
              🎁 {refNombre ? <>Te invitó <b>{refNombre}</b>.</> : 'Entraste por un link de invitación.'} Al inscribirte y hacer tu primer pago, tu invitación le suma un beneficio. ¡Bienvenido/a!
            </div>
          )}
          <div className="form-group"><label>👤 Nombre y apellido</label>
            <input value={nombre} onChange={e => setNombre(e.target.value)} placeholder="Tu nombre completo" /></div>
          <div className="form-group"><label>📧 Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="tu@email.com" /></div>
          <div className="form-group"><label>🪪 DNI</label>
            <input value={dni} onChange={e => setDni(e.target.value)} placeholder="Sin puntos" inputMode="numeric" /></div>
          <div className="form-group"><label>🔑 Contraseña</label>
            <input type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="Mínimo 6 caracteres" /></div>
          <div className="form-group"><label>🔑 Repetir contraseña</label>
            <input type="password" value={pass2} onChange={e => setPass2(e.target.value)} placeholder="••••••••" /></div>
          <FotoInput label="🤳 Selfie (foto de tu cara)" valor={selfie} onFile={setSelfie} captura="user" />
          <FotoInput label="🪪 DNI - Frente" valor={frente} onFile={setFrente} captura="environment" />

              <div>2. Entrá a <b>Red</b> → <b>Wi-Fi</b> → botón <b>Detalles…</b></div>
              <div>3. Andá a la pestaña <b>Hardware</b>: ahí figura la <b>"Dirección MAC"</b>.</div>
              <div style={{marginTop:4,fontSize:'0.72rem',fontStyle:'italic'}}>Atajo: mantené apretada la tecla <b>Opción (⌥)</b> y hacé clic en el ícono de Wi-Fi arriba a la derecha; aparece la "Dirección".</div>
            </div>
          </details>

          <div style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}}>
            <div className="form-group" style={{margin:0}}><label>Tipo</label>
              <select value={nuevoDisp.tipo} onChange={e => setNuevoDisp(d => ({ ...d, tipo: e.target.value }))}>
                <option value="celular">📱 Celular (IMEI)</option>
                <option value="pc">💻 PC (MAC)</option>
              </select></div>
            <div className="form-group" style={{margin:0,flex:1,minWidth:150}}><label>{nuevoDisp.tipo === 'celular' ? 'Número IMEI' : 'Dirección MAC'}</label>
              <input value={nuevoDisp.id} onChange={e => setNuevoDisp(d => ({ ...d, id: e.target.value }))} placeholder={nuevoDisp.tipo === 'celular' ? '15 dígitos' : 'XX:XX:XX:XX:XX:XX'} /></div>
            <button type="button" className="btn btn-ghost" onClick={agregarDisp}>+ Agregar</button>
          </div>
          {dispositivos.length > 0 && (
            <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:6}}>
              {dispositivos.map((d, i) => (
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px',fontSize:'0.82rem'}}>
                  <span>{d.tipo === 'celular' ? '📱 IMEI: ' : '💻 MAC: '}{d.id}</span>
                  <button type="button" className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={() => quitarDisp(i)}>🗑️</button>
                </div>
              ))}
            </div>
          )}
          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button type="button" className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} onClick={() => setPaso(1)}>← Atrás</button>
            <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={siguienteDe2}>Siguiente →</button>
          </div>
        </>
      )}

      {paso === 3 && (
        <>
          <div style={{maxHeight:300,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,padding:12,fontSize:'0.74rem',lineHeight:1.5,color:'var(--text)',whiteSpace:'pre-wrap',background:'var(--surface)'}}>{TYC_TEXTO}</div>
          <label style={{display:'flex',alignItems:'flex-start',gap:8,marginTop:12,cursor:'pointer',fontSize:'0.82rem'}}>
            <input type="checkbox" checked={acepta} onChange={e => {
              if (e.target.checked) {
                const ok = confirm('¿Seguro/a que leíste detenidamente los términos y condiciones, en especial las SANCIONES por divulgar o grabar el contenido de las clases (cláusulas Octava y Novena)?');
                setAcepta(ok);
              } else { setAcepta(false); }
            }} style={{width:'auto',marginTop:3}} />
            <span>Declaro ser mayor de edad y <b>acepto los términos y condiciones</b> (firmo digitalmente con mi nombre, DNI y la fecha de hoy).</span>
          </label>
          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button type="button" className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} onClick={() => setPaso(2)} disabled={saving}>← Atrás</button>
            <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={registrar} disabled={saving || !acepta}>{saving ? '⏳ Enviando...' : '✅ Enviar inscripción'}</button>
          </div>
        </>
      )}
    </div></div>
  );
}

function LoginPage({ onLogin }) {
  const refParam = React.useMemo(() => { try { return new URLSearchParams(window.location.search).get('ref'); } catch { return null; } }, []);
  const [mostrarRegistro, setMostrarRegistro] = useState(!!refParam);
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const [bloqueado, setBloqueado] = useState(null);  // nombre del aula cerrada, si corresponde
  const toast = useToast();
  if (mostrarRegistro) return <RegistroAlumno onListo={onLogin} onCancel={() => setMostrarRegistro(false)} refId={refParam} />;

  const handleLogin = async e => {
    e.preventDefault();
    setLoading(true);
    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      const isAdmin = email === ADMIN_EMAIL;
      let alumno = null;
      if (!isAdmin) {
        const { data: al } = await supabase.from('alumnos').select('*').eq('email', email).single();
        alumno = al;

        // Si el alumno pertenece a un aula cerrada, no puede ingresar.
        if (alumno?.aula_id) {
          const { data: aula } = await supabase.from('aulas').select('nombre, estado').eq('id', alumno.aula_id).single();
          if (aula?.estado === 'cerrada') {
            await supabase.auth.signOut();
            setLoading(false);
            setBloqueado(aula.nombre || '');
            return;
          }
        }
      }
      let pagoVencido = false;
      if (!isAdmin && alumno?.id && alumno?.aula_id) pagoVencido = await tienePagoVencido(alumno.id, alumno.aula_id);
      onLogin({ user: data.user, isAdmin, alumno, pagoVencido });
      toast('¡Bienvenido a SACi! 🎉', 'success');
    } catch (err) {
      toast(err.message || 'Error al iniciar sesión', 'error');
    } finally {
      setLoading(false);
    }
  };

  // Si el alumno pertenece a un aula cerrada, se le muestra este aviso en vez del login.
  if (bloqueado !== null) {
    return (
      <div className="login-page">
        <div className="login-card">
          <div className="card" style={{textAlign:'center',padding:'40px 32px'}}>
            <div style={{fontSize:'3.5rem',marginBottom:16}}>🔒</div>
            <div style={{fontWeight:700,fontSize:'1.3rem',marginBottom:10}}>Tu curso finalizó</div>
            <div style={{color:'var(--text2)',fontSize:'0.92rem',marginBottom:8,lineHeight:1.6}}>
              {bloqueado
                ? <>El aula <strong style={{color:'var(--text)'}}>{bloqueado}</strong> ya no está activa, por lo que el acceso a la plataforma está cerrado.</>
                : <>Tu aula ya no está activa, por lo que el acceso a la plataforma está cerrado.</>}
            </div>
            <div style={{color:'var(--text2)',fontSize:'0.85rem',marginBottom:24}}>
              Si creés que es un error, contactá al docente.
            </div>
            <button className="btn btn-ghost" style={{width:'100%',justifyContent:'center'}}
              onClick={() => { setBloqueado(null); setEmail(''); setPass(''); }}>
              ← Volver
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">

// ─── TOPBAR ───────────────────────────────────────────────────────────
function Topbar({ title, subtitle, onMenuToggle }) {
  const { theme, toggle } = useTheme();
  return (
    <div className="topbar">
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button className="mobile-menu-btn" onClick={onMenuToggle}>☰</button>
        <div>
          <div style={{fontWeight:700,fontSize:'1.05rem'}}>{title}</div>
          {subtitle && <div style={{fontSize:'0.78rem',color:'var(--text2)'}}>{subtitle}</div>}
        </div>
      </div>
      <div className="topbar-right">
        <div className="topbar-date" style={{fontSize:'0.8rem',color:'var(--text2)',fontFamily:'Space Mono'}}>
          {new Date().toLocaleDateString('es-AR', {day:'2-digit',month:'short',year:'numeric'})}
        </div>
        <button
          onClick={toggle}
          title={theme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'}
          style={{background:'none',border:'1px solid var(--border)',cursor:'pointer',color:'var(--text2)',fontSize:'1rem',padding:'6px 10px',borderRadius:'8px',transition:'all 0.2s',lineHeight:1,display:'flex',alignItems:'center',gap:6}}
          onMouseEnter={e => { e.currentTarget.style.background='var(--surface2)'; e.currentTarget.style.color='var(--text)'; }}
          onMouseLeave={e => { e.currentTarget.style.background='none'; e.currentTarget.style.color='var(--text2)'; }}
        >
          {theme === 'dark' ? '☀️' : '🌙'}
          <span style={{fontSize:'0.75rem',fontWeight:600}}>{theme === 'dark' ? 'Claro' : 'Oscuro'}</span>
        </button>
      </div>
    </div>
  );
}

// ─── LOADING ──────────────────────────────────────────────────────────
function Loading() {
  return <div className="loading-center"><div className="spinner" /></div>;
}

// ─── EMPTY STATE ──────────────────────────────────────────────────────
function Empty({ icon = '📭', text = 'Sin datos' }) {
  return (
    <div className="empty-state">
      <div className="empty-icon">{icon}</div>
      <div className="empty-text">{text}</div>
    </div>
  );
}
