// Matriz de Actividades de Control: jerarquía Ciclo → Operación (con Objetivo y
// Tipo de objetivo) → Riesgo → Actividad de control (con columnas opcionales).
function nidCI() { return Math.random().toString(36).slice(2, 9); }
const ciAct = () => ({ id: nidCI(), actividad: '', tipoAct: '', oportunidad: '', responsable: '' });
const ciRie = () => ({ id: nidCI(), riesgo: '', actividades: [ciAct()] });
const ciOpe = () => ({ id: nidCI(), operacion: '', objetivo: '', tipoObjetivo: '', riesgos: [ciRie()] });
const ciCic = () => ({ id: nidCI(), nombre: '', operaciones: [ciOpe()] });
function matActVacia() { return { cols: { tipoAct: true, oportunidad: false, responsable: false }, ciclos: [ciCic()] }; }

function MatrizActividades({ alumno, aulaActiva, esAdmin }) {
  const [lista, setLista] = useState([]);
  const [publicados, setPublicados] = useState([]);
  const [actual, setActual] = useState(null);
  const [titulo, setTitulo] = useState('');
  const [cfg, setCfg] = useState(matActVacia());
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const scrollRef = useRef(null);
  const [sb, setSb] = useState({ thumbW: 0, thumbL: 0, need: false });
  const toast = useToast();
  const miAula = esAdmin ? aulaActiva : alumno?.aula_id;
  const soloLectura = !!actual?.soloLectura;
  const cols = cfg.cols || {};

  // Barra de scroll horizontal propia (las nativas overlay no siempre se ven).
  const refreshSb = () => {
    const el = scrollRef.current; if (!el) return;
    const total = el.scrollWidth, vis = el.clientWidth;
    const need = total > vis + 2;
    const thumbW = need ? Math.max(40, vis * vis / total) : vis;
    const thumbL = need ? (el.scrollLeft / (total - vis)) * (vis - thumbW) : 0;
    setSb({ thumbW, thumbL, need });
  };
  const startBarDrag = (e) => {
    e.preventDefault();
    const el = scrollRef.current; if (!el) return;
    const total = el.scrollWidth, vis = el.clientWidth;
    const thumbW = Math.max(40, vis * vis / total), denom = (vis - thumbW) || 1;
    const sx = e.clientX, sl = el.scrollLeft;
    const mover = (ev) => { el.scrollLeft = sl + (ev.clientX - sx) * (total - vis) / denom; refreshSb(); };
    const up = () => { document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', mover); document.addEventListener('mouseup', up);
  };
  useEffect(() => { const t = setTimeout(refreshSb, 30); return () => clearTimeout(t); }, [loading, miAula, cfg, actual]);

  const load = async () => {
    if (!miAula) { setLoading(false); return; }
    try {
      if (esAdmin) {
        const { data } = await supabase.from('ci_matrices').select('id, titulo, publicada, updated_at').eq('es_admin', true).eq('tipo', 'actividades').eq('aula_id', miAula).order('updated_at', { ascending: false });
        setLista(data || []);
      } else {
        const [mios, pub] = await Promise.all([
          supabase.from('ci_matrices').select('id, titulo, updated_at').eq('alumno_id', alumno?.id).eq('tipo', 'actividades').order('updated_at', { ascending: false }),
          supabase.from('ci_matrices').select('id, titulo, updated_at').eq('es_admin', true).eq('publicada', true).eq('tipo', 'actividades').eq('aula_id', miAula).order('updated_at', { ascending: false }),
        ]);
        setLista(mios.data || []); setPublicados(pub.data || []);
      }
    } catch {}
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [miAula]);

  const nuevo = () => { setActual(null); setTitulo(''); setCfg(matActVacia()); };
  const cargar = async (id, lectura = false) => {
    const { data } = await supabase.from('ci_matrices').select('*').eq('id', id).single();
    if (!data) return;
    setActual(lectura ? { ...data, soloLectura: true } : data);
    setTitulo(data.titulo || '');
    setCfg({ ...matActVacia(), ...(data.config || {}) });
  };
  const guardar = async (publicar = null) => {
    if (!titulo.trim()) return toast('Ponele un título a la matriz', 'error');
    setSaving(true);
    const payload = { titulo: titulo.trim(), tipo: 'actividades', config: cfg, aula_id: miAula, updated_at: new Date().toISOString() };
    if (esAdmin) { payload.es_admin = true; if (publicar !== null) payload.publicada = publicar; }
    else payload.alumno_id = alumno?.id;
    let error;
    if (actual?.id && !actual?.soloLectura) ({ error } = await supabase.from('ci_matrices').update(payload).eq('id', actual.id));
    else { const { data, error: e2 } = await supabase.from('ci_matrices').insert(payload).select('id').single(); error = e2; if (data) setActual({ id: data.id, ...payload }); }
    setSaving(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(publicar === true ? 'Matriz publicada ✅' : publicar === false ? 'Matriz despublicada' : 'Matriz guardada ✅', 'success');
    load();
  };
  const eliminar = async (id) => { if (!confirm('¿Eliminar esta matriz?')) return; const { error } = await supabase.from('ci_matrices').delete().eq('id', id); if (error) return toast('Error: ' + error.message, 'error'); if (actual?.id === id) nuevo(); load(); };

  // ── Editores de la jerarquía ──
  const setCol = (k, v) => setCfg(c => ({ ...c, cols: { ...c.cols, [k]: v } }));
  const setCiclos = (fn) => setCfg(c => ({ ...c, ciclos: fn(c.ciclos) }));
  const mapC = (cid, fn) => setCiclos(cs => cs.map(c => c.id === cid ? fn(c) : c));
  const mapO = (cid, oid, fn) => mapC(cid, c => ({ ...c, operaciones: c.operaciones.map(o => o.id === oid ? fn(o) : o) }));
  const mapR = (cid, oid, rid, fn) => mapO(cid, oid, o => ({ ...o, riesgos: o.riesgos.map(r => r.id === rid ? fn(r) : r) }));
  const addCiclo = () => setCiclos(cs => [...cs, ciCic()]);
  const delCiclo = (cid) => setCiclos(cs => cs.length > 1 ? cs.filter(c => c.id !== cid) : cs);
  const setCicloNombre = (cid, nombre) => mapC(cid, c => ({ ...c, nombre }));
  const addOper = (cid) => mapC(cid, c => ({ ...c, operaciones: [...c.operaciones, ciOpe()] }));
  const delOper = (cid, oid) => mapC(cid, c => ({ ...c, operaciones: c.operaciones.length > 1 ? c.operaciones.filter(o => o.id !== oid) : c.operaciones }));
  const setOper = (cid, oid, patch) => mapO(cid, oid, o => ({ ...o, ...patch }));
  const addRie = (cid, oid) => mapO(cid, oid, o => ({ ...o, riesgos: [...o.riesgos, ciRie()] }));
  const delRie = (cid, oid, rid) => mapO(cid, oid, o => ({ ...o, riesgos: o.riesgos.length > 1 ? o.riesgos.filter(r => r.id !== rid) : o.riesgos }));
  const setRie = (cid, oid, rid, riesgo) => mapR(cid, oid, rid, r => ({ ...r, riesgo }));
  const addAct = (cid, oid, rid) => mapR(cid, oid, rid, r => ({ ...r, actividades: [...r.actividades, ciAct()] }));
  const delAct = (cid, oid, rid, aid) => mapR(cid, oid, rid, r => ({ ...r, actividades: r.actividades.length > 1 ? r.actividades.filter(a => a.id !== aid) : r.actividades }));
  const setAct = (cid, oid, rid, aid, patch) => mapR(cid, oid, rid, r => ({ ...r, actividades: r.actividades.map(a => a.id === aid ? { ...a, ...patch } : a) }));

  const rCount = r => Math.max(1, r.actividades.length);
  const oCount = o => Math.max(1, o.riesgos.reduce((s, r) => s + rCount(r), 0));
  const cCount = c => Math.max(1, c.operaciones.reduce((s, o) => s + oCount(o), 0));

  if (loading) return <div style={{ padding: 30, textAlign: 'center', color: 'var(--text2)' }}>Cargando…</div>;
  if (!miAula) return <div style={{ padding: 30, textAlign: 'center', color: 'var(--text2)' }}>{esAdmin ? 'Elegí un aula para trabajar.' : 'Todavía no estás en un aula.'}</div>;

  const th = { border: '1px solid var(--border)', padding: '5px 8px', fontSize: '0.72rem', fontWeight: 700, textAlign: 'center', background: '#f5c518', color: '#1a1a1a', whiteSpace: 'nowrap' };
  const tdBase = { border: '1px solid var(--border)', padding: 4, verticalAlign: 'top', background: 'var(--surface)' };
  const tdCiclo = { ...tdBase, background: 'var(--surface2)', minWidth: 150, maxWidth: 170 };
  const ancho = { operacion: 150, objetivo: 150, tipoObjetivo: 100, riesgo: 190, actividad: 240, tipoAct: 100, oportunidad: 110, responsable: 120 };
  const taStyle = (w) => ({ width: w, minWidth: w, border: '1px solid transparent', borderRadius: 6, background: 'transparent', color: 'var(--text)', fontSize: '0.76rem', fontFamily: 'inherit', resize: 'vertical', padding: '4px 6px', minHeight: 46, lineHeight: 1.3 });
  const Ctrl = ({ onAdd, onDel, addLabel, canDel }) => (
    !soloLectura ? <div style={{ display: 'flex', gap: 4, marginTop: 4, flexWrap: 'wrap' }}>
      <button onClick={onAdd} className="btn btn-ghost btn-sm" style={{ fontSize: '0.66rem', padding: '2px 6px' }}>{addLabel}</button>
      {canDel && <button onClick={onDel} className="btn btn-ghost btn-sm" style={{ fontSize: '0.66rem', padding: '2px 6px', color: 'var(--danger)' }}>🗑️</button>}
    </div> : null
  );

  const filas = [];
  cfg.ciclos.forEach(c => c.operaciones.forEach((o, oi) => o.riesgos.forEach((r, ri) => r.actividades.forEach((a, ai) => {
    const fCiclo = oi === 0 && ri === 0 && ai === 0;
    const fOper = ri === 0 && ai === 0;
    const fRie = ai === 0;
    filas.push(
      <tr key={a.id}>
        {fCiclo && (
          <td rowSpan={cCount(c)} style={tdCiclo}>
            <textarea value={c.nombre} readOnly={soloLectura} onChange={e => setCicloNombre(c.id, e.target.value)} placeholder="Ciclo (ej: Devolución de ventas…)" style={{ ...taStyle(150), fontWeight: 700, color: 'var(--accent2)', textAlign: 'center' }} />
            <Ctrl onAdd={() => addOper(c.id)} onDel={() => delCiclo(c.id)} addLabel="+ Operación" canDel={cfg.ciclos.length > 1} />
          </td>
        )}
        {fOper && (
          <td rowSpan={oCount(o)} style={tdBase}>
            <textarea value={o.operacion} readOnly={soloLectura} onChange={e => setOper(c.id, o.id, { operacion: e.target.value })} placeholder="Operación" style={taStyle(ancho.operacion)} />
            <Ctrl onAdd={() => addRie(c.id, o.id)} onDel={() => delOper(c.id, o.id)} addLabel="+ Riesgo" canDel={c.operaciones.length > 1} />
          </td>
        )}
        {fOper && <td rowSpan={oCount(o)} style={tdBase}><textarea value={o.objetivo} readOnly={soloLectura} onChange={e => setOper(c.id, o.id, { objetivo: e.target.value })} placeholder="Objetivo" style={taStyle(ancho.objetivo)} /></td>}
        {fOper && <td rowSpan={oCount(o)} style={tdBase}><textarea value={o.tipoObjetivo} readOnly={soloLectura} onChange={e => setOper(c.id, o.id, { tipoObjetivo: e.target.value })} placeholder="Tipo de objetivo" style={taStyle(ancho.tipoObjetivo)} /></td>}
        {fRie && (
          <td rowSpan={rCount(r)} style={tdBase}>
            <textarea value={r.riesgo} readOnly={soloLectura} onChange={e => setRie(c.id, o.id, r.id, e.target.value)} placeholder="Riesgo" style={taStyle(ancho.riesgo)} />
            <Ctrl onAdd={() => addAct(c.id, o.id, r.id)} onDel={() => delRie(c.id, o.id, r.id)} addLabel="+ Actividad" canDel={o.riesgos.length > 1} />
          </td>
        )}
        <td style={tdBase}>
          <textarea value={a.actividad} readOnly={soloLectura} onChange={e => setAct(c.id, o.id, r.id, a.id, { actividad: e.target.value })} placeholder="Actividad de control" style={taStyle(ancho.actividad)} />
          {!soloLectura && r.actividades.length > 1 && <div style={{ textAlign: 'right' }}><button onClick={() => delAct(c.id, o.id, r.id, a.id)} className="btn btn-ghost btn-sm" style={{ fontSize: '0.66rem', padding: '2px 6px', color: 'var(--danger)' }}>🗑️ actividad</button></div>}
        </td>
        {cols.tipoAct && <td style={tdBase}><textarea value={a.tipoAct} readOnly={soloLectura} onChange={e => setAct(c.id, o.id, r.id, a.id, { tipoAct: e.target.value })} placeholder="Proceso / Sistema / Estructura" style={taStyle(ancho.tipoAct)} /></td>}
        {cols.oportunidad && <td style={tdBase}><textarea value={a.oportunidad} readOnly={soloLectura} onChange={e => setAct(c.id, o.id, r.id, a.id, { oportunidad: e.target.value })} placeholder="Preventivo / Detectivo" style={taStyle(ancho.oportunidad)} /></td>}
        {cols.responsable && <td style={tdBase}><textarea value={a.responsable} readOnly={soloLectura} onChange={e => setAct(c.id, o.id, r.id, a.id, { responsable: e.target.value })} placeholder="Responsable" style={taStyle(ancho.responsable)} /></td>}
      </tr>
    );
  }))));

  return (
    <div className="page-content fade-in" style={{ paddingTop: 8 }}>
      {/* Matrices guardadas */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center', marginBottom: 12 }}>
        <button className="btn btn-primary btn-sm" onClick={nuevo}>+ Nueva matriz</button>
        {lista.map(d => (
          <span key={d.id} style={{ display: 'inline-flex', alignItems: 'center', gap: 2, border: '1px solid var(--border)', borderRadius: 8, padding: '2px 4px 2px 8px', background: actual?.id === d.id ? 'var(--surface2)' : 'transparent' }}>
            <span onClick={() => cargar(d.id)} style={{ cursor: 'pointer', fontSize: '0.82rem', fontWeight: actual?.id === d.id ? 700 : 500 }}>{d.titulo || '(sin título)'}{d.publicada ? ' 📢' : ''}</span>
            {esAdmin && <button onClick={() => eliminar(d.id)} title="Eliminar" style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '0.72rem', opacity: 0.6, padding: 0 }}>🗑️</button>}
          </span>
        ))}
      </div>
      {!esAdmin && publicados.length > 0 && (
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center', marginBottom: 12 }}>
          <span style={{ fontSize: '0.76rem', color: 'var(--text2)', fontWeight: 600 }}>📢 Del docente:</span>
          {publicados.map(d => <button key={d.id} className="btn btn-ghost btn-sm" onClick={() => cargar(d.id, true)}>{d.titulo || '(sin título)'}</button>)}
        </div>
      )}

      <input value={titulo} onChange={e => setTitulo(e.target.value)} placeholder="Título (ej: Matriz de Actividades de Control — Ventas)" disabled={soloLectura}
        style={{ width: '100%', fontWeight: 700, fontSize: '1rem', padding: '8px 12px', borderRadius: 8, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', marginBottom: 12 }} />

      {/* Columnas opcionales */}
      {!soloLectura && (
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', alignItems: 'center', marginBottom: 12, fontSize: '0.8rem' }}>
          <span style={{ color: 'var(--text2)', fontWeight: 600 }}>Columnas opcionales:</span>
          <label style={{ display: 'flex', alignItems: 'center', gap: 5, cursor: 'pointer' }}><input type="checkbox" checked={!!cols.tipoAct} onChange={e => setCol('tipoAct', e.target.checked)} style={{ width: 'auto' }} /> Tipo de actividad</label>
          <label style={{ display: 'flex', alignItems: 'center', gap: 5, cursor: 'pointer' }}><input type="checkbox" checked={!!cols.oportunidad} onChange={e => setCol('oportunidad', e.target.checked)} style={{ width: 'auto' }} /> Oportunidad</label>
          <label style={{ display: 'flex', alignItems: 'center', gap: 5, cursor: 'pointer' }}><input type="checkbox" checked={!!cols.responsable} onChange={e => setCol('responsable', e.target.checked)} style={{ width: 'auto' }} /> Responsable</label>
        </div>
      )}

      {/* Tabla */}
      <div ref={scrollRef} onScroll={refreshSb} style={{ overflow: 'auto', maxWidth: '100%', border: '1px solid var(--border)', borderRadius: 8 }}>
        <table style={{ borderCollapse: 'collapse', minWidth: 'max-content' }}>
          <thead>
            <tr>
              <th style={th}>Ciclo</th>
              <th style={th}>Operación</th>
              <th style={th}>Objetivo</th>
              <th style={th}>Tipo de objetivo</th>
              <th style={th}>Riesgo</th>
              <th style={th}>Actividad de control</th>
              {cols.tipoAct && <th style={th}>Tipo de actividad</th>}
              {cols.oportunidad && <th style={th}>Oportunidad</th>}
              {cols.responsable && <th style={th}>Responsable</th>}
            </tr>
          </thead>
          <tbody>{filas}</tbody>
        </table>
      </div>
      {sb.need && (
        <div style={{ height: 14, marginTop: 6, background: 'var(--surface2)', borderRadius: 7, position: 'relative' }} title="Deslizá para ver el resto de la matriz">
          <div onMouseDown={startBarDrag} style={{ position: 'absolute', top: 0, height: 14, width: sb.thumbW, left: sb.thumbL, background: 'var(--text2)', borderRadius: 7, cursor: 'grab' }} />
        </div>
      )}

      {!soloLectura && (
        <div style={{ display: 'flex', gap: 8, marginTop: 14, flexWrap: 'wrap' }}>
          <button className="btn btn-ghost" onClick={addCiclo}>+ Agregar ciclo</button>
          <button className="btn btn-primary" onClick={() => guardar()} disabled={saving}>{saving ? '⏳ Guardando…' : '💾 Guardar matriz'}</button>
          {esAdmin && actual?.id && !actual?.soloLectura && (
            actual.publicada
              ? <button className="btn btn-ghost" onClick={() => guardar(false)} disabled={saving}>Despublicar</button>
              : <button className="btn btn-ghost" onClick={() => guardar(true)} disabled={saving}>📢 Publicar a los alumnos</button>
          )}
        </div>
      )}
      {soloLectura && <div style={{ marginTop: 12, fontSize: '0.8rem', color: 'var(--text2)' }}>👁 Estás viendo una matriz del docente (solo lectura).</div>}
    </div>
  );
}

// Matriz de Riesgos: 4 cuadrantes fijos donde el alumno ubica cada riesgo
// según Impacto (eje X) y Probabilidad de materialización (eje Y).
const CUAD = [
  { n: 'I', nombre: 'Riesgos de Atención Inmediata', color: '#e5484d' },
  { n: 'II', nombre: 'Riesgos de Atención Periódica', color: '#f0932b' },
  { n: 'III', nombre: 'Riesgos Controlados', color: '#2bad4e' },
  { n: 'IV', nombre: 'Riesgos de Seguimiento', color: '#2f6fed' },
];
function cuadranteDe(x, y) { if (y >= 5 && x >= 5) return CUAD[0]; if (y >= 5 && x < 5) return CUAD[1]; if (y < 5 && x < 5) return CUAD[2]; return CUAD[3]; }
function matRieVacia() { return { riesgos: [] }; }

function MatrizRiesgos({ alumno, aulaActiva, esAdmin }) {
  const [lista, setLista] = useState([]);
  const [publicados, setPublicados] = useState([]);
  const [actual, setActual] = useState(null);
  const [titulo, setTitulo] = useState('');
  const [cfg, setCfg] = useState(matRieVacia());
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const chartRef = useRef(null);
  const toast = useToast();
  const miAula = esAdmin ? aulaActiva : alumno?.aula_id;
  const soloLectura = !!actual?.soloLectura;

  const load = async () => {
    if (!miAula) { setLoading(false); return; }
    try {
      if (esAdmin) {
        const { data } = await supabase.from('ci_matrices').select('id, titulo, publicada, updated_at').eq('es_admin', true).eq('tipo', 'riesgos').eq('aula_id', miAula).order('updated_at', { ascending: false });
        setLista(data || []);
      } else {
        const [mios, pub] = await Promise.all([
          supabase.from('ci_matrices').select('id, titulo, updated_at').eq('alumno_id', alumno?.id).eq('tipo', 'riesgos').order('updated_at', { ascending: false }),
          supabase.from('ci_matrices').select('id, titulo, updated_at').eq('es_admin', true).eq('publicada', true).eq('tipo', 'riesgos').eq('aula_id', miAula).order('updated_at', { ascending: false }),
        ]);
        setLista(mios.data || []); setPublicados(pub.data || []);
      }
    } catch {}
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [miAula]);

  const nuevo = () => { setActual(null); setTitulo(''); setCfg(matRieVacia()); };
  const cargar = async (id, lectura = false) => {
    const { data } = await supabase.from('ci_matrices').select('*').eq('id', id).single();
    if (!data) return;
    setActual(lectura ? { ...data, soloLectura: true } : data);
    setTitulo(data.titulo || '');
    setCfg({ ...matRieVacia(), ...(data.config || {}) });
  };
  const guardar = async (publicar = null) => {
    if (!titulo.trim()) return toast('Ponele un título a la matriz', 'error');
    setSaving(true);
    const payload = { titulo: titulo.trim(), tipo: 'riesgos', config: cfg, aula_id: miAula, updated_at: new Date().toISOString() };
    if (esAdmin) { payload.es_admin = true; if (publicar !== null) payload.publicada = publicar; }
    else payload.alumno_id = alumno?.id;
    let error;
    if (actual?.id && !actual?.soloLectura) ({ error } = await supabase.from('ci_matrices').update(payload).eq('id', actual.id));
    else { const { data, error: e2 } = await supabase.from('ci_matrices').insert(payload).select('id').single(); error = e2; if (data) setActual({ id: data.id, ...payload }); }
    setSaving(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(publicar === true ? 'Matriz publicada ✅' : publicar === false ? 'Matriz despublicada' : 'Matriz guardada ✅', 'success');
    load();
  };
  const eliminar = async (id) => { if (!confirm('¿Eliminar esta matriz?')) return; const { error } = await supabase.from('ci_matrices').delete().eq('id', id); if (error) return toast('Error: ' + error.message, 'error'); if (actual?.id === id) nuevo(); load(); };

  const addRiesgo = () => setCfg(c => { const n = c.riesgos.length; return { ...c, riesgos: [...c.riesgos, { id: nidCI(), nombre: '', x: 2.5 + (n % 2) * 5, y: 7.5 - (Math.floor(n / 2) % 2) * 5 }] }; });
  const delRiesgo = (id) => setCfg(c => ({ ...c, riesgos: c.riesgos.filter(r => r.id !== id) }));
  const setNombre = (id, nombre) => setCfg(c => ({ ...c, riesgos: c.riesgos.map(r => r.id === id ? { ...r, nombre } : r) }));
  const startDragDot = (e, id) => {
    if (soloLectura || !chartRef.current) return;
    e.preventDefault();
    const rect = chartRef.current.getBoundingClientRect();
    const mover = (ev) => {
      let x = ((ev.clientX - rect.left) / rect.width) * 10;
      let y = (1 - (ev.clientY - rect.top) / rect.height) * 10;
      x = Math.max(0, Math.min(10, x)); y = Math.max(0, Math.min(10, y));
      setCfg(c => ({ ...c, riesgos: c.riesgos.map(r => r.id === id ? { ...r, x, y } : r) }));
    };
    const up = () => { document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', mover); document.addEventListener('mouseup', up);
  };

  if (loading) return <div style={{ padding: 30, textAlign: 'center', color: 'var(--text2)' }}>Cargando…</div>;
  if (!miAula) return <div style={{ padding: 30, textAlign: 'center', color: 'var(--text2)' }}>{esAdmin ? 'Elegí un aula para trabajar.' : 'Todavía no estás en un aula.'}</div>;

  const CH = 440;  // lado del gráfico
  const quadStyle = (bg, pos) => ({ position: 'absolute', width: '50%', height: '50%', ...pos, background: bg, display: 'flex', alignItems: pos.top === 0 ? 'flex-start' : 'flex-end', justifyContent: 'center', padding: 8, boxSizing: 'border-box' });
  const quadLbl = { fontSize: '0.72rem', fontWeight: 700, textAlign: 'center', lineHeight: 1.2 };

  return (
    <div className="page-content fade-in" style={{ paddingTop: 8 }}>
      {/* Matrices guardadas */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center', marginBottom: 12 }}>
        <button className="btn btn-primary btn-sm" onClick={nuevo}>+ Nueva matriz</button>
        {lista.map(d => (
          <span key={d.id} style={{ display: 'inline-flex', alignItems: 'center', gap: 2, border: '1px solid var(--border)', borderRadius: 8, padding: '2px 4px 2px 8px', background: actual?.id === d.id ? 'var(--surface2)' : 'transparent' }}>
            <span onClick={() => cargar(d.id)} style={{ cursor: 'pointer', fontSize: '0.82rem', fontWeight: actual?.id === d.id ? 700 : 500 }}>{d.titulo || '(sin título)'}{d.publicada ? ' 📢' : ''}</span>
            {esAdmin && <button onClick={() => eliminar(d.id)} title="Eliminar" style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '0.72rem', opacity: 0.6, padding: 0 }}>🗑️</button>}
          </span>
        ))}
      </div>
      {!esAdmin && publicados.length > 0 && (
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center', marginBottom: 12 }}>
          <span style={{ fontSize: '0.76rem', color: 'var(--text2)', fontWeight: 600 }}>📢 Del docente:</span>
          {publicados.map(d => <button key={d.id} className="btn btn-ghost btn-sm" onClick={() => cargar(d.id, true)}>{d.titulo || '(sin título)'}</button>)}
        </div>
      )}

      <input value={titulo} onChange={e => setTitulo(e.target.value)} placeholder="Título (ej: Matriz de Riesgos — Ventas)" disabled={soloLectura}
        style={{ width: '100%', fontWeight: 700, fontSize: '1rem', padding: '8px 12px', borderRadius: 8, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', marginBottom: 14 }} />

      <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap', alignItems: 'flex-start' }}>
        {/* Gráfico */}
        <div style={{ display: 'flex', gap: 6 }}>
          {/* Eje Y (rótulo + escala) */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
            <div style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)', fontWeight: 700, fontSize: '0.82rem', height: CH, display: 'flex', alignItems: 'center', color: 'var(--text)' }}>Probabilidad de Materialización</div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'space-between', height: CH, fontSize: '0.7rem', color: 'var(--text2)', paddingRight: 2 }}>
            <span>10</span><span>5</span><span>0</span>
          </div>
          <div>
            <div ref={chartRef} style={{ position: 'relative', width: CH, height: CH, border: '2px solid #333', boxSizing: 'border-box', background: 'var(--surface)' }}>
              {/* Cuadrantes */}
              <div style={quadStyle('rgba(240,147,43,0.16)', { top: 0, left: 0 })}><span style={{ ...quadLbl, color: '#b06a10' }}>II · {CUAD[1].nombre}</span></div>
              <div style={quadStyle('rgba(229,72,77,0.16)', { top: 0, right: 0 })}><span style={{ ...quadLbl, color: '#b5232a' }}>I · {CUAD[0].nombre}</span></div>
              <div style={quadStyle('rgba(43,173,78,0.16)', { bottom: 0, left: 0 })}><span style={{ ...quadLbl, color: '#1c7d38' }}>III · {CUAD[2].nombre}</span></div>
              <div style={quadStyle('rgba(47,111,237,0.16)', { bottom: 0, right: 0 })}><span style={{ ...quadLbl, color: '#1f4fb0' }}>IV · {CUAD[3].nombre}</span></div>
              {/* Ejes divisorios */}
              <div style={{ position: 'absolute', left: '50%', top: 0, bottom: 0, width: 2, background: '#333', transform: 'translateX(-1px)' }} />
              <div style={{ position: 'absolute', top: '50%', left: 0, right: 0, height: 2, background: '#333', transform: 'translateY(-1px)' }} />
              {/* Puntos */}
              {cfg.riesgos.map((r, i) => (
                <div key={r.id} onMouseDown={e => startDragDot(e, r.id)}
                  title={r.nombre || `Riesgo ${i + 1}`}
                  style={{ position: 'absolute', left: `${(r.x / 10) * 100}%`, top: `${(1 - r.y / 10) * 100}%`, transform: 'translate(-50%,-50%)', width: 26, height: 26, borderRadius: '50%', background: '#2f4bd6', border: '2px solid #fff', boxShadow: '0 1px 4px rgba(0,0,0,0.4)', color: '#fff', fontSize: '0.72rem', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: soloLectura ? 'default' : 'grab', zIndex: 5 }}>
                  {i + 1}
                </div>
              ))}
            </div>
            {/* Eje X (escala + rótulo) */}
            <div style={{ display: 'flex', justifyContent: 'space-between', width: CH, fontSize: '0.7rem', color: 'var(--text2)', marginTop: 2 }}><span>0</span><span>5</span><span>10</span></div>
            <div style={{ textAlign: 'center', width: CH, fontWeight: 700, fontSize: '0.82rem', marginTop: 2 }}>Impacto del Riesgo</div>
          </div>
        </div>

        {/* Lista de riesgos */}
        <div style={{ flex: 1, minWidth: 260 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <div style={{ fontWeight: 700, fontSize: '0.9rem' }}>Riesgos</div>
            {!soloLectura && <button className="btn btn-primary btn-sm" onClick={addRiesgo}>+ Agregar riesgo</button>}
          </div>
          {cfg.riesgos.length === 0 && <div style={{ fontSize: '0.82rem', color: 'var(--text2)', padding: '10px 0' }}>Agregá un riesgo y arrastrá su punto al cuadrante que corresponda.</div>}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {cfg.riesgos.map((r, i) => {
              const q = cuadranteDe(r.x, r.y);
              return (
                <div key={r.id} style={{ display: 'flex', alignItems: 'center', gap: 8, border: '1px solid var(--border)', borderRadius: 8, padding: '6px 8px' }}>
                  <span style={{ flexShrink: 0, width: 24, height: 24, borderRadius: '50%', background: '#2f4bd6', color: '#fff', fontSize: '0.72rem', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{i + 1}</span>
                  <input value={r.nombre} readOnly={soloLectura} onChange={e => setNombre(r.id, e.target.value)} placeholder={`Riesgo ${i + 1}`} style={{ flex: 1, minWidth: 100, border: '1px solid var(--border)', borderRadius: 6, padding: '4px 8px', background: 'var(--surface)', color: 'var(--text)', fontSize: '0.8rem' }} />
                  <span style={{ flexShrink: 0, fontSize: '0.68rem', fontWeight: 700, color: '#fff', background: q.color, borderRadius: 6, padding: '2px 7px' }}>{q.n}</span>
                  {!soloLectura && <button onClick={() => delRiesgo(r.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--danger)', fontSize: '0.8rem' }}>🗑️</button>}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {!soloLectura && (
        <div style={{ display: 'flex', gap: 8, marginTop: 16, flexWrap: 'wrap' }}>
          <button className="btn btn-primary" onClick={() => guardar()} disabled={saving}>{saving ? '⏳ Guardando…' : '💾 Guardar matriz'}</button>
          {esAdmin && actual?.id && !actual?.soloLectura && (
            actual.publicada
              ? <button className="btn btn-ghost" onClick={() => guardar(false)} disabled={saving}>Despublicar</button>
              : <button className="btn btn-ghost" onClick={() => guardar(true)} disabled={saving}>📢 Publicar a los alumnos</button>
          )}
        </div>
      )}
      {soloLectura && <div style={{ marginTop: 12, fontSize: '0.8rem', color: 'var(--text2)' }}>👁 Estás viendo una matriz del docente (solo lectura).</div>}
    </div>
  );
}

// ─── INFORMES PARA LA DIRECCIÓN ───────────────────────────────────────
// Constructor de informes de doble entrada (editor libre): el usuario define
// las variables (filas, períodos, niveles de columnas) y el sistema arma el
// cuadro con encabezados anidados y calcula Totales y Variación %.
function nidInf() { return Math.random().toString(36).slice(2, 9); }
function infVacio() {
  return {
    filaHeader: '',
    colHeader: '',
    filas: [{ id: nidInf(), nombre: '' }],
    filaTotal: true,
    perHeader: '',
    periodos: [{ id: nidInf(), nombre: '' }, { id: nidInf(), nombre: '' }],
    niveles: [{ id: nidInf(), nombre: '', valores: [{ id: nidInf(), nombre: '' }] }],
    calc: { totalCol: true, totalUnid: false, variacion: false, composicion: false, acumulado: false },
    varBase: '', varComp: '',
    datos: {},
  };
}

function InformesDireccion({ alumno, aulaActiva, esAdmin }) {
  const [lista, setLista] = useState([]);
  const [publicados, setPublicados] = useState([]);
  const [actual, setActual] = useState(null);
  const [titulo, setTitulo] = useState('');
  const [cfg, setCfg] = useState(infVacio());
  const [defOpen, setDefOpen] = useState(true);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const toast = useToast();
  const miAula = esAdmin ? aulaActiva : alumno?.aula_id;
  const soloLectura = !!actual?.soloLectura;

  const load = async () => {
    if (!miAula) { setLoading(false); return; }
    try {
      if (esAdmin) {
        const { data } = await supabase.from('inf_informes').select('id, titulo, publicada, updated_at').eq('es_admin', true).eq('aula_id', miAula).order('updated_at', { ascending: false });
        setLista(data || []);
      } else {
        const [mios, pub] = await Promise.all([
          supabase.from('inf_informes').select('id, titulo, updated_at').eq('alumno_id', alumno?.id).order('updated_at', { ascending: false }),
          supabase.from('inf_informes').select('id, titulo, updated_at').eq('es_admin', true).eq('publicada', true).eq('aula_id', miAula).order('updated_at', { ascending: false }),
        ]);
        setLista(mios.data || []); setPublicados(pub.data || []);
      }
    } catch {}
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [miAula]);

  const nuevo = () => { setActual(null); setTitulo(''); setCfg(infVacio()); setDefOpen(true); };
  const cargar = async (id, lectura = false) => {
    const { data } = await supabase.from('inf_informes').select('*').eq('id', id).single();
    if (!data) return;
    setActual(lectura ? { ...data, soloLectura: true } : data);
    setTitulo(data.titulo || '');
    setCfg({ ...infVacio(), ...(data.config || {}) });
    setDefOpen(false);
  };
  const guardar = async (publicar = null) => {
    if (!titulo.trim()) return toast('Ponele un título al informe', 'error');
    setSaving(true);
    const payload = { titulo: titulo.trim(), config: cfg, aula_id: miAula, updated_at: new Date().toISOString() };
    if (esAdmin) { payload.es_admin = true; if (publicar !== null) payload.publicada = publicar; }
    else payload.alumno_id = alumno?.id;
    let error;
    if (actual?.id && !actual?.soloLectura) ({ error } = await supabase.from('inf_informes').update(payload).eq('id', actual.id));
    else { const { data, error: e2 } = await supabase.from('inf_informes').insert(payload).select('id').single(); error = e2; if (data) setActual({ id: data.id, ...payload }); }
    setSaving(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(publicar === true ? 'Informe publicado ✅' : publicar === false ? 'Informe despublicado' : 'Informe guardado ✅', 'success');
    load();
  };
  const eliminar = async (id) => { if (!confirm('¿Eliminar este informe?')) return; const { error } = await supabase.from('inf_informes').delete().eq('id', id); if (error) return toast('Error: ' + error.message, 'error'); if (actual?.id === id) nuevo(); load(); };

  // ── Editores de la definición ──
  const setFila = (id, nombre) => setCfg(c => ({ ...c, filas: c.filas.map(f => f.id === id ? { ...f, nombre } : f) }));
  const addFila = () => setCfg(c => ({ ...c, filas: [...c.filas, { id: nidInf(), nombre: '' }] }));
  const delFila = (id) => setCfg(c => ({ ...c, filas: c.filas.length > 1 ? c.filas.filter(f => f.id !== id) : c.filas }));
  const setPer = (id, nombre) => setCfg(c => ({ ...c, periodos: c.periodos.map(p => p.id === id ? { ...p, nombre } : p) }));
  const addPer = () => setCfg(c => ({ ...c, periodos: [...c.periodos, { id: nidInf(), nombre: '' }] }));
  const delPer = (id) => setCfg(c => ({ ...c, periodos: c.periodos.length > 1 ? c.periodos.filter(p => p.id !== id) : c.periodos }));
  const setNivelNombre = (id, nombre) => setCfg(c => ({ ...c, niveles: c.niveles.map(n => n.id === id ? { ...n, nombre } : n) }));
  const addNivel = () => setCfg(c => ({ ...c, niveles: [...c.niveles, { id: nidInf(), nombre: '', valores: [{ id: nidInf(), nombre: '' }] }] }));
  const delNivel = (id) => setCfg(c => ({ ...c, niveles: c.niveles.filter(n => n.id !== id) }));
  const setValor = (nId, vId, nombre) => setCfg(c => ({ ...c, niveles: c.niveles.map(n => n.id === nId ? { ...n, valores: n.valores.map(v => v.id === vId ? { ...v, nombre } : v) } : n) }));
  const setValorTipo = (nId, vId, tipo) => setCfg(c => ({ ...c, niveles: c.niveles.map(n => n.id === nId ? { ...n, valores: n.valores.map(v => v.id === vId ? { ...v, tipo } : v) } : n) }));
  const addValor = (nId) => setCfg(c => ({ ...c, niveles: c.niveles.map(n => n.id === nId ? { ...n, valores: [...n.valores, { id: nidInf(), nombre: '' }] } : n) }));
  const delValor = (nId, vId) => setCfg(c => ({ ...c, niveles: c.niveles.map(n => n.id === nId ? { ...n, valores: n.valores.length > 1 ? n.valores.filter(v => v.id !== vId) : n.valores } : n) }));
  const setCalc = (k, v) => setCfg(c => ({ ...c, calc: { ...c.calc, [k]: v } }));
  const setDato = (key, val) => setCfg(c => ({ ...c, datos: { ...c.datos, [key]: val } }));

  // ── Estructura calculada ──
  const nivelesActivos = cfg.niveles.filter(n => (n.valores || []).some(v => true) && n.valores.length);
  const dataLeaves = React.useMemo(() => {
    let leaves = [{ key: '', path: [] }];
    for (const niv of cfg.niveles) {
      const vals = niv.valores || [];
      if (!vals.length) continue;
      const next = [];
      for (const l of leaves) for (const v of vals) next.push({ key: l.key ? l.key + '_' + v.id : v.id, path: [...l.path, v.id] });
      leaves = next;
    }
    return (leaves[0] && leaves[0].path.length) ? leaves : [];
  }, [cfg.niveles]);

  const nivelRows = nivelesActivos.length;
  const headerRows = 1 + nivelRows;

  // Clasificación de columnas por tipo, para NO mezclar $ con unidades en los totales.
  const valorTipo = (vid) => { for (const niv of cfg.niveles) { const v = (niv.valores || []).find(x => x.id === vid); if (v) return v.tipo || ''; } return ''; };
  const leafTipo = (leaf) => { for (const vid of leaf.path) { const t = valorTipo(vid); if (t) return t; } return ''; };
  const hayTipos = dataLeaves.some(l => leafTipo(l));                                   // ¿marcó $ / unidades?
  const moneyLeaves = hayTipos ? dataLeaves.filter(l => leafTipo(l) === 'monto') : dataLeaves;  // sin marcar → todas
  const unitLeaves = dataLeaves.filter(l => leafTipo(l) === 'unidad');

  const efTotal = cfg.calc.totalCol && moneyLeaves.length > 0;
  const efUnid = cfg.calc.totalUnid && unitLeaves.length > 0;
  const efComp = cfg.calc.composicion && moneyLeaves.length > 0;
  const efAcum = cfg.calc.acumulado && moneyLeaves.length > 0;
  const varColCount = dataLeaves.length + (efTotal ? 1 : 0) + (efUnid ? 1 : 0);
  const perColCount = varColCount + (efComp ? 1 : 0) + (efAcum ? 1 : 0);
  const showVar = cfg.calc.variacion && cfg.periodos.length >= 2;
  const P0 = cfg.periodos.find(p => p.id === cfg.varBase) || cfg.periodos[0];
  const P1 = cfg.periodos.find(p => p.id === cfg.varComp) || cfg.periodos[1] || cfg.periodos[0];

  // ── Cálculos ──
  const dkey = (perId, leafKey, filaId) => `${perId}::${leafKey}::${filaId}`;
  const num = (k) => { const v = parseFloat(cfg.datos[k]); return isNaN(v) ? 0 : v; };
  const hayAlguno = (keys) => keys.some(k => { const v = cfg.datos[k]; return v !== undefined && v !== '' && !isNaN(parseFloat(v)); });
  const sumaFila = (perId, filaId, leaves) => { const ks = leaves.map(l => dkey(perId, l.key, filaId)); return hayAlguno(ks) ? ks.reduce((s, k) => s + num(k), 0) : null; };
  const sumaCol = (perId, leaves) => { const ks = []; cfg.filas.forEach(f => leaves.forEach(l => ks.push(dkey(perId, l.key, f.id)))); return hayAlguno(ks) ? ks.reduce((s, k) => s + num(k), 0) : null; };
  const totFila$ = (perId, filaId) => sumaFila(perId, filaId, moneyLeaves);
  const totFilaU = (perId, filaId) => sumaFila(perId, filaId, unitLeaves);
  const totColLeaf = (perId, leafKey) => { const ks = cfg.filas.map(f => dkey(perId, leafKey, f.id)); return hayAlguno(ks) ? ks.reduce((s, k) => s + num(k), 0) : null; };
  const totCol$ = (perId) => sumaCol(perId, moneyLeaves);
  const totColU = (perId) => sumaCol(perId, unitLeaves);
  const vari = (viejo, nuevo) => (viejo == null || nuevo == null || viejo === 0) ? null : (nuevo - viejo) / viejo;
  // % de composición: cuánto pesa la fila sobre el total ($) del período.
  const compPer = (perId, filaId) => { const t = totFila$(perId, filaId); const g = totCol$(perId); return (t == null || !g) ? null : t / g; };
  // Acumulado: suma corrida del total ($) del período hacia abajo (en el orden de las filas).
  const acumPer = (perId, filaId) => { let sum = 0; for (const f of cfg.filas) { const t = totFila$(perId, f.id); if (t != null) sum += t; if (f.id === filaId) return (t == null) ? null : sum; } return null; };
  const fmtN = (x) => x == null ? '' : x.toLocaleString('es-AR', { maximumFractionDigits: 2 });
  const fmtP = (x) => x == null ? '' : (x * 100).toLocaleString('es-AR', { maximumFractionDigits: 0 }) + '%';

  if (loading) return <div style={{ padding: 30, textAlign: 'center', color: 'var(--text2)' }}>Cargando…</div>;
  if (!miAula) return <div style={{ padding: 30, textAlign: 'center', color: 'var(--text2)' }}>{esAdmin ? 'Elegí un aula para trabajar.' : 'Todavía no estás en un aula.'}</div>;

  // Estilos de tabla
  const thBase = { border: '1px solid var(--border)', padding: '3px 7px', fontSize: '0.7rem', fontWeight: 700, textAlign: 'center', whiteSpace: 'nowrap' };
  const stPer = { ...thBase, background: '#e8a200', color: '#1a1a1a' };
  const stVar = { ...thBase, background: '#8f9296', color: '#fff' };
  const stNiv = { ...thBase, background: 'var(--surface2)', color: 'var(--text)' };
  const stTot = { ...thBase, background: '#243447', color: '#fff' };
  const stComp = { ...thBase, background: '#3a4658', color: '#fff' };
  const stCorner = { ...thBase, background: 'var(--surface2)' };
  const tdData = { border: '1px solid var(--border)', padding: 0, textAlign: 'center' };
  const tdCalc = { border: '1px solid var(--border)', padding: '3px 7px', textAlign: 'center', fontSize: '0.74rem', fontWeight: 700, background: '#243447', color: '#fff', whiteSpace: 'nowrap' };
  const tdVar = { border: '1px solid var(--border)', padding: '3px 7px', textAlign: 'center', fontSize: '0.74rem', fontWeight: 600, background: 'rgba(143,146,150,0.12)', whiteSpace: 'nowrap' };
  const tdComp = { border: '1px solid var(--border)', padding: '3px 7px', textAlign: 'center', fontSize: '0.74rem', fontWeight: 700, background: 'rgba(58,70,88,0.12)', color: 'var(--text)', whiteSpace: 'nowrap' };
  const tdRowH = { border: '1px solid var(--border)', padding: '3px 9px', fontSize: '0.76rem', fontWeight: 700, textAlign: 'left', whiteSpace: 'nowrap' };
  const inpCell = { width: 52, border: 'none', background: 'transparent', textAlign: 'center', fontSize: '0.74rem', padding: '4px 2px', color: 'var(--text)' };
  // Ancho de la primera columna: se ajusta al título más largo (períodos / columnas / filas).
  const lblLen = Math.max((cfg.perHeader || '').length, (cfg.colHeader || '').length, (cfg.filaHeader || '').length, 7);
  const cornerW = Math.min(300, Math.max(150, lblLen * 8 + 46));
  // Alto mínimo de la celda con diagonal, para que no quede apretada con pocos niveles.
  const cornerH = Math.max(46, nivelRows * 26);

  // Celdas de encabezado de niveles para UN bloque (período o variación)
  const nivelCells = (i, prefix) => {
    const niv = nivelesActivos[i];
    const sizesAfter = nivelesActivos.slice(i + 1).reduce((a, n) => a * n.valores.length, 1);
    const repeat = nivelesActivos.slice(0, i).reduce((a, n) => a * n.valores.length, 1);
    const cells = [];
    for (let r = 0; r < repeat; r++) niv.valores.forEach(v => cells.push(<th key={`${prefix}-${r}-${v.id}`} colSpan={sizesAfter} style={stNiv}>{v.nombre || '—'}</th>));
    return cells;
  };

  // Fila de datos de un bloque (período o variación) para una fila dada
  const celdasDeFila = (fila, perId, esVar) => {
    const out = [];
    dataLeaves.forEach(l => {
      if (esVar) {
        const v = vari(num0Null(P0.id, l.key, fila.id), num0Null(P1.id, l.key, fila.id));
        out.push(<td key={`${perId}-${l.key}-${fila.id}`} style={tdVar}>{fmtP(v)}</td>);
      } else {
        const k = dkey(perId, l.key, fila.id);
        out.push(<td key={k} style={tdData}><input value={cfg.datos[k] ?? ''} onChange={e => setDato(k, e.target.value)} disabled={soloLectura} inputMode="decimal" style={inpCell} /></td>);
      }
    });
    if (efTotal) {
      if (esVar) { const v = vari(totFila$(P0.id, fila.id), totFila$(P1.id, fila.id)); out.push(<td key={`vt-${fila.id}`} style={{ ...tdVar, fontWeight: 700 }}>{fmtP(v)}</td>); }
      else out.push(<td key={`t-${perId}-${fila.id}`} style={tdCalc}>{fmtN(totFila$(perId, fila.id))}</td>);
    }
    if (efUnid) {
      if (esVar) { const v = vari(totFilaU(P0.id, fila.id), totFilaU(P1.id, fila.id)); out.push(<td key={`vu-${fila.id}`} style={{ ...tdVar, fontWeight: 700 }}>{fmtP(v)}</td>); }
      else out.push(<td key={`u-${perId}-${fila.id}`} style={tdCalc}>{fmtN(totFilaU(perId, fila.id))}</td>);
    }
    if (!esVar && efComp) out.push(<td key={`c-${perId}-${fila.id}`} style={tdComp}>{fmtP(compPer(perId, fila.id))}</td>);
    if (!esVar && efAcum) out.push(<td key={`a-${perId}-${fila.id}`} style={tdCalc}>{fmtN(acumPer(perId, fila.id))}</td>);
    return out;
  };
  // valor puntual (para variación por celda) devolviendo null si no cargado
  function num0Null(perId, leafKey, filaId) { const raw = cfg.datos[dkey(perId, leafKey, filaId)]; if (raw === undefined || raw === '' || isNaN(parseFloat(raw))) return null; return parseFloat(raw); }

  const guardados = esAdmin ? lista : lista;

  return (
    <div className="page-content fade-in" style={{ paddingTop: 8 }}>
      {/* Informes guardados */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center', marginBottom: 12 }}>
        <button className="btn btn-primary btn-sm" onClick={nuevo}>+ Nuevo informe</button>
        {guardados.map(d => (
          <span key={d.id} style={{ display: 'inline-flex', alignItems: 'center', gap: 2, border: '1px solid var(--border)', borderRadius: 8, padding: '2px 4px 2px 8px', background: actual?.id === d.id ? 'var(--surface2)' : 'transparent' }}>
            <span onClick={() => cargar(d.id)} style={{ cursor: 'pointer', fontSize: '0.82rem', fontWeight: actual?.id === d.id ? 700 : 500 }}>{d.titulo || '(sin título)'}{d.publicada ? ' 📢' : ''}</span>
            {esAdmin && <button onClick={() => eliminar(d.id)} title="Eliminar" style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '0.72rem', opacity: 0.6, padding: 0 }}>🗑️</button>}
          </span>
        ))}
      </div>
      {!esAdmin && publicados.length > 0 && (
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center', marginBottom: 12 }}>
          <span style={{ fontSize: '0.76rem', color: 'var(--text2)', fontWeight: 600 }}>📢 Del docente:</span>
          {publicados.map(d => <button key={d.id} className="btn btn-ghost btn-sm" onClick={() => cargar(d.id, true)}>{d.titulo || '(sin título)'}</button>)}
        </div>
      )}

      {/* Título */}
      <input value={titulo} onChange={e => setTitulo(e.target.value)} placeholder="Título del informe (ej: Ventas 2019 vs 2018 por sucursal)" disabled={soloLectura}
        style={{ width: '100%', fontWeight: 700, fontSize: '1rem', padding: '8px 12px', borderRadius: 8, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', marginBottom: 12 }} />

      {/* Panel de definición de variables */}
      {!soloLectura && (
        <div className="card" style={{ padding: 0, marginBottom: 16, borderColor: 'var(--accent)' }}>
          <div onClick={() => setDefOpen(o => !o)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', padding: '12px 16px', background: 'rgba(108,99,255,0.06)' }}>
            <div style={{ fontWeight: 700 }}>⚙️ 1) Definí las variables</div>
            <span>{defOpen ? '▲' : '▼'}</span>
          </div>
          {defOpen && (
            <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 18 }}>
              {/* Filas */}
              <div>
                <div style={{ fontWeight: 700, fontSize: '0.84rem', marginBottom: 6 }}>📋 Filas (lo que va a la izquierda)</div>
                <div style={{ fontSize: '0.74rem', color: 'var(--text2)', marginBottom: 6 }}>Encabezado de la esquina (3 títulos):</div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8, flexWrap: 'wrap' }}>
                  <span style={{ fontSize: '0.76rem', color: 'var(--text2)' }}>Períodos (⬆ franja de arriba):</span>
                  <input value={cfg.perHeader} onChange={e => setCfg(c => ({ ...c, perHeader: e.target.value }))} placeholder="Ej: Años" style={{ padding: '5px 9px', borderRadius: 7, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', fontSize: '0.8rem', width: 130 }} />
                  <span style={{ fontSize: '0.76rem', color: 'var(--text2)' }}>Columnas (↗):</span>
                  <input value={cfg.colHeader} onChange={e => setCfg(c => ({ ...c, colHeader: e.target.value }))} placeholder="Ej: Sucursal" style={{ padding: '5px 9px', borderRadius: 7, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', fontSize: '0.8rem', width: 130 }} />
                  <span style={{ fontSize: '0.76rem', color: 'var(--text2)' }}>Filas (↙):</span>
                  <input value={cfg.filaHeader} onChange={e => setCfg(c => ({ ...c, filaHeader: e.target.value }))} placeholder="Ej: Clientes" style={{ padding: '5px 9px', borderRadius: 7, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', fontSize: '0.8rem', width: 130 }} />
                  <label style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: '0.78rem', cursor: 'pointer' }}>
                    <input type="checkbox" checked={cfg.filaTotal} onChange={e => setCfg(c => ({ ...c, filaTotal: e.target.checked }))} style={{ width: 'auto' }} /> Fila de Total
                  </label>
                </div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {cfg.filas.map(f => (
                    <span key={f.id} style={{ display: 'inline-flex', alignItems: 'center', gap: 2, border: '1px solid var(--border)', borderRadius: 7, padding: '2px 4px 2px 6px' }}>
                      <input value={f.nombre} onChange={e => setFila(f.id, e.target.value)} placeholder="fila…" style={{ border: 'none', background: 'transparent', color: 'var(--text)', fontSize: '0.78rem', width: 96 }} />
                      <button onClick={() => delFila(f.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.5, fontSize: '0.7rem' }}>✕</button>
                    </span>
                  ))}
                  <button className="btn btn-ghost btn-sm" onClick={addFila}>+ fila</button>
                </div>
              </div>

              {/* Períodos */}
              <div>
                <div style={{ fontWeight: 700, fontSize: '0.84rem', marginBottom: 6 }}>📅 Períodos / bloques a comparar (columnas grandes)</div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {cfg.periodos.map((p, i) => (
                    <span key={p.id} style={{ display: 'inline-flex', alignItems: 'center', gap: 2, border: '1px solid var(--border)', borderRadius: 7, padding: '2px 4px 2px 6px' }}>
                      <span style={{ fontSize: '0.7rem', color: 'var(--text2)', fontWeight: 700 }}>({i + 1})</span>
                      <input value={p.nombre} onChange={e => setPer(p.id, e.target.value)} placeholder="Ej: Año 2018" style={{ border: 'none', background: 'transparent', color: 'var(--text)', fontSize: '0.78rem', width: 100 }} />
                      <button onClick={() => delPer(p.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.5, fontSize: '0.7rem' }}>✕</button>
                    </span>
                  ))}
                  <button className="btn btn-ghost btn-sm" onClick={addPer}>+ período</button>
                </div>
              </div>

              {/* Niveles de columnas */}
              <div>
                <div style={{ fontWeight: 700, fontSize: '0.84rem', marginBottom: 6 }}>🧱 Niveles de las columnas (se abren de mayor a menor)</div>
                <div style={{ fontSize: '0.74rem', color: 'var(--text2)', marginBottom: 8 }}>Cada nivel se aplica dentro de cada período. Ej: Sucursal → Rubro → Medida (Q/$).</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {cfg.niveles.map((n, i) => (
                    <div key={n.id} style={{ border: '1px solid var(--border)', borderRadius: 8, padding: 10 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
                        <span style={{ fontSize: '0.72rem', color: 'var(--text2)', fontWeight: 700 }}>Nivel {i + 1}</span>
                        <input value={n.nombre} onChange={e => setNivelNombre(n.id, e.target.value)} placeholder="Nombre del nivel (ej: Sucursal)" style={{ padding: '4px 8px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', fontSize: '0.78rem', flex: 1, minWidth: 120 }} />
                        <button onClick={() => delNivel(n.id)} className="btn btn-ghost btn-sm" style={{ color: 'var(--danger)' }}>🗑️</button>
                      </div>
                      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                        {n.valores.map(v => (
                          <span key={v.id} style={{ display: 'inline-flex', alignItems: 'center', gap: 2, border: '1px solid var(--border)', borderRadius: 7, padding: '2px 4px 2px 6px', background: 'var(--surface2)' }}>
                            <input value={v.nombre} onChange={e => setValor(n.id, v.id, e.target.value)} placeholder="valor…" style={{ border: 'none', background: 'transparent', color: 'var(--text)', fontSize: '0.76rem', width: 70 }} />
                            <select value={v.tipo || ''} onChange={e => setValorTipo(n.id, v.id, e.target.value)} title="¿Esta columna es plata o cantidad?" style={{ border: '1px solid var(--border)', borderRadius: 5, background: 'var(--surface)', color: 'var(--text)', fontSize: '0.68rem', padding: '1px 2px' }}>
                              <option value="">tipo</option>
                              <option value="monto">$ pesos</option>
                              <option value="unidad"># unidades</option>
                            </select>
                            <button onClick={() => delValor(n.id, v.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.5, fontSize: '0.68rem' }}>✕</button>
                          </span>

                  <label style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: '0.8rem', cursor: 'pointer' }} title="Suma las columnas marcadas como $ pesos">
                    <input type="checkbox" checked={cfg.calc.totalCol} onChange={e => setCalc('totalCol', e.target.checked)} style={{ width: 'auto' }} /> Total en $
                  </label>
                  <label style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: '0.8rem', cursor: 'pointer' }} title="Suma las columnas marcadas como # unidades">
                    <input type="checkbox" checked={cfg.calc.totalUnid} onChange={e => setCalc('totalUnid', e.target.checked)} style={{ width: 'auto' }} /> Total en unidades
                  </label>
                  <label style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: '0.8rem', cursor: 'pointer' }}>
                    <input type="checkbox" checked={cfg.calc.variacion} onChange={e => setCalc('variacion', e.target.checked)} style={{ width: 'auto' }} /> Variación %
                  </label>
                  <label style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: '0.8rem', cursor: 'pointer' }} title="Cuánto pesa cada fila sobre el total del período">
                    <input type="checkbox" checked={cfg.calc.composicion} onChange={e => setCalc('composicion', e.target.checked)} style={{ width: 'auto' }} /> % de composición
                  </label>
                  <label style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: '0.8rem', cursor: 'pointer' }} title="Suma corrida del total, fila por fila (ideal para meses)">
                    <input type="checkbox" checked={cfg.calc.acumulado} onChange={e => setCalc('acumulado', e.target.checked)} style={{ width: 'auto' }} /> Acumulado (mes a mes)
                  </label>
                </div>
                {cfg.calc.variacion && cfg.periodos.length >= 2 && (
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap', marginTop: 10, fontSize: '0.8rem' }}>
                    <span style={{ color: 'var(--text2)' }}>Comparar:</span>
                    <select value={cfg.varComp || (P1 && P1.id) || ''} onChange={e => setCfg(c => ({ ...c, varComp: e.target.value }))} style={{ padding: '4px 8px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', fontSize: '0.78rem' }}>
                      {cfg.periodos.map((p, i) => <option key={p.id} value={p.id}>{p.nombre || `Período ${i + 1}`}</option>)}
                    </select>
                    <span style={{ color: 'var(--text2)' }}>contra (base):</span>
                    <select value={cfg.varBase || (P0 && P0.id) || ''} onChange={e => setCfg(c => ({ ...c, varBase: e.target.value }))} style={{ padding: '4px 8px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', fontSize: '0.78rem' }}>
                      {cfg.periodos.map((p, i) => <option key={p.id} value={p.id}>{p.nombre || `Período ${i + 1}`}</option>)}
                    </select>
                    <span style={{ color: 'var(--text2)', fontSize: '0.72rem' }}>La variación se calcula (comparado − base) / base.</span>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Cuadro generado */}
      <div style={{ fontWeight: 700, fontSize: '0.84rem', marginBottom: 8 }}>📊 2) Completá el cuadro</div>
      {perColCount === 0 ? (
        <div className="card" style={{ padding: 20, textAlign: 'center', color: 'var(--text2)', fontSize: '0.85rem' }}>
          Agregá al menos un nivel de columnas con un valor para dibujar el cuadro.
        </div>
      ) : (
        <div className="scroll-x" style={{ overflowX: 'auto', maxWidth: '100%', paddingBottom: 10, border: '1px solid var(--border)', borderRadius: 8 }}>
          <table style={{ borderCollapse: 'collapse', minWidth: 'max-content' }}>
            <thead>
              <tr>
                {/* Franja de arriba: título de los períodos (ej: AÑOS) */}
                <th rowSpan={nivelRows > 0 ? 1 : headerRows} style={{ ...stCorner, width: cornerW, minWidth: cornerW, textAlign: 'left', padding: '4px 10px' }}>{cfg.perHeader || ''}</th>
                {cfg.periodos.map((p, i) => <th key={p.id} colSpan={perColCount} style={stPer}>{(p.nombre || '—')} ({i + 1})</th>)}
                {showVar && <th colSpan={varColCount} style={stVar}>VARIACIÓN % ({(P1.nombre || '2')} / {(P0.nombre || '1')})</th>}
              </tr>
              {nivelesActivos.map((niv, i) => (
                <tr key={niv.id}>
                  {/* Celda de la esquina con diagonal: columnas (↗) y filas (↙) */}
                  {i === 0 && (
                    <th rowSpan={nivelRows} style={{ ...stCorner, width: cornerW, minWidth: cornerW, height: cornerH, padding: 0, position: 'relative', backgroundImage: 'linear-gradient(to top right, transparent calc(50% - 0.7px), var(--text2) calc(50% - 0.7px), var(--text2) calc(50% + 0.7px), transparent calc(50% + 0.7px))' }}>
                      <span style={{ position: 'absolute', top: 5, right: 10, fontSize: '0.7rem', fontWeight: 700 }}>{cfg.colHeader || ''}</span>
                      <span style={{ position: 'absolute', bottom: 5, left: 10, fontSize: '0.7rem', fontWeight: 700 }}>{cfg.filaHeader || ''}</span>
                    </th>
                  )}
                  {cfg.periodos.map(p => (
                    <React.Fragment key={p.id}>
                      {nivelCells(i, `${p.id}-${i}`)}
                      {i === 0 && efTotal && <th rowSpan={nivelRows} style={stTot}>Total $</th>}
                      {i === 0 && efUnid && <th rowSpan={nivelRows} style={stTot}>Total u.</th>}
                      {i === 0 && efComp && <th rowSpan={nivelRows} style={stComp}>% comp.</th>}
                      {i === 0 && efAcum && <th rowSpan={nivelRows} style={stTot}>Acum.</th>}
                    </React.Fragment>
                  ))}
                  {showVar && (
                    <React.Fragment>
                      {nivelCells(i, `var-${i}`)}
                      {i === 0 && efTotal && <th rowSpan={nivelRows} style={stTot}>Total $</th>}
                      {i === 0 && efUnid && <th rowSpan={nivelRows} style={stTot}>Total u.</th>}
                    </React.Fragment>
                  )}
                </tr>
              ))}
            </thead>
            <tbody>
              {cfg.filas.map(fila => (
                <tr key={fila.id}>
                  <td style={tdRowH}>{fila.nombre || '—'}</td>
                  {cfg.periodos.map(p => <React.Fragment key={p.id}>{celdasDeFila(fila, p.id, false)}</React.Fragment>)}
                  {showVar && <React.Fragment>{celdasDeFila(fila, 'var', true)}</React.Fragment>}
                </tr>
              ))}
              {cfg.filaTotal && (
                <tr>
                  <td style={{ ...tdRowH, background: 'var(--surface2)' }}>TOTAL</td>
                  {cfg.periodos.map(p => (
                    <React.Fragment key={p.id}>
                      {dataLeaves.map(l => <td key={`tc-${p.id}-${l.key}`} style={tdCalc}>{fmtN(totColLeaf(p.id, l.key))}</td>)}
                      {efTotal && <td style={tdCalc}>{fmtN(totCol$(p.id))}</td>}
                      {efUnid && <td style={tdCalc}>{fmtN(totColU(p.id))}</td>}
                      {efComp && <td style={tdComp}>{fmtP(totCol$(p.id) ? 1 : null)}</td>}
                      {efAcum && <td style={tdCalc}>{fmtN(totCol$(p.id))}</td>}
                    </React.Fragment>
                  ))}
                  {showVar && (
                    <React.Fragment>
                      {dataLeaves.map(l => <td key={`tv-${l.key}`} style={{ ...tdVar, fontWeight: 700 }}>{fmtP(vari(totColLeaf(P0.id, l.key), totColLeaf(P1.id, l.key)))}</td>)}
                      {efTotal && <td style={{ ...tdVar, fontWeight: 700 }}>{fmtP(vari(totCol$(P0.id), totCol$(P1.id)))}</td>}
                      {efUnid && <td style={{ ...tdVar, fontWeight: 700 }}>{fmtP(vari(totColU(P0.id), totColU(P1.id)))}</td>}
                    </React.Fragment>
                  )}
                </tr>
              )}
            </tbody>
          </table>
        </div>
      )}

      {/* Acciones */}
      {!soloLectura && (
        <div style={{ display: 'flex', gap: 8, marginTop: 16, flexWrap: 'wrap' }}>
          <button className="btn btn-primary" onClick={() => guardar()} disabled={saving}>{saving ? '⏳ Guardando…' : '💾 Guardar informe'}</button>
          {esAdmin && actual?.id && !actual?.soloLectura && (
            actual.publicada
              ? <button className="btn btn-ghost" onClick={() => guardar(false)} disabled={saving}>Despublicar</button>
              : <button className="btn btn-ghost" onClick={() => guardar(true)} disabled={saving}>📢 Publicar a los alumnos</button>
          )}
        </div>
      )}
      {soloLectura && <div style={{ marginTop: 12, fontSize: '0.8rem', color: 'var(--text2)' }}>👁 Estás viendo un informe del docente (solo lectura).</div>}
    </div>
  );
}

// ─── MATRIZ MSA ───────────────────────────────────────────────────────
// Pieza visual: dibuja un archivo (cilindro), doc cuadrado o doc con pancita.
function MsaPieza({ pieza, onDragStart, onRemove, extra, style }) {
  return (
    <div
      className={`msa-pieza msa-${pieza.tipo}${extra ? ' ' + extra : ''}`}
      draggable={!!onDragStart}
      onDragStart={onDragStart ? (e) => onDragStart(e, pieza) : undefined}
      title={pieza.nombre}
      style={style}>
      {onRemove && <span className="msa-x" onClick={(e) => { e.stopPropagation(); onRemove(); }}>✕</span>}
      <span>{pieza.nombre}</span>
    </div>
  );
}

// Columnas de la matriz. key = dónde se guardan las piezas / el texto.
const MSA_COLS = [
  { key: 'proceso', label: 'Proceso', tipo: 'texto' },
  { key: 'subproceso', label: 'Subproceso', tipo: 'texto' },
  { key: 'sector', label: 'Sector', tipo: 'texto' },
  { key: 'in_arch', label: 'Input · Archivos', tipo: 'piezas' },
  { key: 'in_doc', label: 'Input · Doc/Elem', tipo: 'piezas' },
  { key: 'actividades', label: 'Actividades', tipo: 'texto' },
  { key: 'out_arch', label: 'Output · Archivos', tipo: 'piezas' },
  { key: 'out_doc', label: 'Output · Doc/Elem', tipo: 'piezas' },
];

// Colores predefinidos para el texto de las celdas (Proceso, Subproceso, Sector, Actividades).
// hex null = color normal del tema (sin color especial). Elegidos para leerse bien en claro y oscuro.
const MSA_PALETA = [
  { hex: null,      label: 'Normal' },
  { hex: '#dc2626', label: 'Rojo' },
  { hex: '#2563eb', label: 'Azul' },
  { hex: '#16a34a', label: 'Verde' },
  { hex: '#ea580c', label: 'Naranja' },
  { hex: '#7c3aed', label: 'Violeta' },
];

function filaVacia() {
  return { id: Math.random().toString(36).slice(2), proceso: '', subproceso: '', sector: '', in_arch: [], in_doc: [], actividades: '', out_arch: [], out_doc: [] };
}

// Editor de la matriz: banco de piezas arriba + tabla abajo. Se usa en admin y alumno.
function MsaEditor({ alumno, aulaActiva, esAdmin, embebido }) {
  const [piezas, setPiezas] = useState([]);
  const [matrices, setMatrices] = useState([]);
  const [publicadas, setPublicadas] = useState([]);  // matrices del admin (para el alumno)
  const [actual, setActual] = useState(null);         // matriz que se está editando
  const [filas, setFilas] = useState([filaVacia()]);
  const [titulo, setTitulo] = useState('');
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [dragOver, setDragOver] = useState(null);
  const [nuevaPieza, setNuevaPieza] = useState({ nombre: '', tipo: 'archivo' });
  const [verBanco, setVerBanco] = useState(true);
  const [piezaSel, setPiezaSel] = useState(null);  // pieza elegida por clic para colocar tocando una celda
  const [bancoExp, setBancoExp] = useState(false); // banco desplegado (ver más) o compacto
  const [anchos, setAnchos] = useState({});        // ancho por columna (px)
  const [colores, setColores] = useState({});      // color de texto por celda: { "filaId_colKey": "#hex" }
  const [colorAbierto, setColorAbierto] = useState(null); // celda cuya paleta de color está abierta ("filaId_colKey")
  const fileImportRef = useRef();
  const resizAviso = useRef(null);                 // datos del arrastre de ancho en curso
  const toast = useToast();

  const miAula = esAdmin ? aulaActiva : alumno?.aula_id;

  const load = async () => {
    if (!miAula) { setLoading(false); return; }
    // Piezas base + las propias del alumno.
    const { data: pz } = await supabase.from('msa_piezas').select('*').order('created_at');
    setPiezas((pz || []).filter(p => p.es_base || p.creado_por === alumno?.id));

    if (esAdmin) {
      const { data } = await supabase.from('msa_matrices').select('id, titulo, publicada, updated_at')
        .eq('es_admin', true).eq('aula_id', miAula).order('updated_at', { ascending: false });
      setMatrices(data || []);
    } else {
      // El alumno ve: sus propias matrices + las publicadas por el admin de su aula.
      const [mias, pub] = await Promise.all([
        supabase.from('msa_matrices').select('id, titulo, updated_at').eq('alumno_id', alumno?.id).order('updated_at', { ascending: false }),
        supabase.from('msa_matrices').select('id, titulo, updated_at').eq('es_admin', true).eq('publicada', true).eq('aula_id', miAula).order('updated_at', { ascending: false }),
      ]);
      setMatrices(mias.data || []);
      setPublicadas(pub.data || []);
    }
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [miAula]);

  // Al arrastrar cerca del borde de la pantalla, deslizamos la página sola.
  useEffect(() => {
    const onDrag = (e) => {
      const m = 90, v = 22, h = window.innerHeight;
      if (e.clientY < m) window.scrollBy(0, -v);
      else if (e.clientY > h - m) window.scrollBy(0, v);
    };
    document.addEventListener('dragover', onDrag);
    return () => document.removeEventListener('dragover', onDrag);
  }, []);

  const bancoPorTipo = (tipo) => piezas.filter(p => p.tipo === tipo);

  // Colocar en una celda la pieza elegida por clic (alternativa al arrastre).
  const colocarPieza = (filaId, colKey) => {
    if (!piezaSel || soloLectura) return;
    setFilas(fs => fs.map(f => f.id === filaId
      ? { ...f, [colKey]: [...f[colKey], { nombre: piezaSel.nombre, tipo: piezaSel.tipo, uid: Math.random().toString(36).slice(2) }] }
      : f));
    setPiezaSel(null);
  };

  // ── Drag & drop ──
  const onDragStart = (e, pieza) => {
    e.dataTransfer.setData('application/json', JSON.stringify({ nombre: pieza.nombre, tipo: pieza.tipo }));
    e.dataTransfer.effectAllowed = 'copy';
  };
  const onDrop = (e, filaId, colKey) => {
    e.preventDefault();
    setDragOver(null);
    try {
      const p = JSON.parse(e.dataTransfer.getData('application/json'));
      setFilas(fs => fs.map(f => f.id === filaId
        ? { ...f, [colKey]: [...f[colKey], { ...p, uid: Math.random().toString(36).slice(2) }] }
        : f));
    } catch {}
  };
  const quitarPieza = (filaId, colKey, uid) => {
    setFilas(fs => fs.map(f => f.id === filaId ? { ...f, [colKey]: f[colKey].filter(p => p.uid !== uid) } : f));
  };
  const setTexto = (filaId, colKey, valor) => {
    setFilas(fs => fs.map(f => f.id === filaId ? { ...f, [colKey]: valor } : f));
  };

  const agregarFila = () => setFilas(fs => [...fs, filaVacia()]);
  const quitarFila = (id) => setFilas(fs => fs.length > 1 ? fs.filter(f => f.id !== id) : fs);

  // Arrastrar el borde de una columna para cambiar su ancho (como en Excel).
  const iniciarResize = (e, colKey) => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = anchos[colKey] || e.target.parentElement.offsetWidth;
    const mover = (ev) => {
      const nuevo = Math.max(70, startW + (ev.clientX - startX));
      setAnchos(a => ({ ...a, [colKey]: nuevo }));
    };
    const soltar = () => {
      document.removeEventListener('mousemove', mover);
      document.removeEventListener('mouseup', soltar);
    };
    document.addEventListener('mousemove', mover);
    document.addEventListener('mouseup', soltar);
  };

  // Color del texto de una celda concreta. color=null vuelve al color normal del tema.
  const setColorCelda = (filaId, colKey, color) => {
    const cellKey = `${filaId}_${colKey}`;
    setColores(c => {
      const nuevo = { ...c };
      if (color) nuevo[cellKey] = color;
      else delete nuevo[cellKey];
      return nuevo;
    });
    setColorAbierto(null);
  };

  // ── Nueva MSA / cargar / guardar ──
  const nuevaMatriz = () => { setActual(null); setTitulo(''); setFilas([filaVacia()]); setAnchos({}); setColores({}); };

  const cargarMatriz = async (id, soloLectura = false) => {
    const { data } = await supabase.from('msa_matrices').select('*').eq('id', id).single();
    if (!data) return;
    setActual(soloLectura ? { ...data, soloLectura: true } : data);
    setTitulo(data.titulo);
    const cont = Array.isArray(data.contenido) ? data.contenido : [];
    setFilas(cont.length ? cont.map(f => ({ ...filaVacia(), ...f })) : [filaVacia()]);
    // Anchos y colores se guardan dentro del contenido como propiedades especiales.
    const meta = (data.contenido && !Array.isArray(data.contenido)) ? data.contenido : {};
    setAnchos(data.anchos_meta || meta.__anchos || {});
    setColores(data.colores_meta || meta.__colores || {});
  };

  const guardar = async (publicar = null) => {
    if (!titulo.trim()) return toast('Ponele un título a la matriz', 'error');
    setSaving(true);
    const payload = {
      titulo: titulo.trim(),
      contenido: filas,
      anchos_meta: anchos,
      colores_meta: colores,
      aula_id: miAula,
      updated_at: new Date().toISOString(),
    };
    if (esAdmin) {
      payload.es_admin = true;
      if (publicar !== null) payload.publicada = publicar;
    } else {
      payload.alumno_id = alumno?.id;
    }
    let error;
    if (actual?.id && !actual?.soloLectura) {
      ({ error } = await supabase.from('msa_matrices').update(payload).eq('id', actual.id));
    } else {
      const { data, error: e2 } = await supabase.from('msa_matrices').insert(payload).select('id').single();
      error = e2;
      if (data) setActual({ id: data.id, ...payload });
    }
    setSaving(false);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(publicar === true ? 'Matriz publicada ✅' : (publicar === false ? 'Matriz despublicada' : 'Matriz guardada ✅'), 'success');
    load();
  };

  // Editar el nombre de una pieza del banco.
  const editarPieza = async (pieza) => {
    const nuevoNombre = prompt('Nuevo nombre de la pieza:', pieza.nombre);
    if (nuevoNombre === null) return;
    const nombre = nuevoNombre.trim().toUpperCase();
    if (!nombre) return toast('El nombre no puede estar vacío', 'error');
    const { error } = await supabase.from('msa_piezas').update({ nombre }).eq('id', pieza.id);
    if (error) return toast('Error: ' + error.message, 'error');
    setPiezas(p => p.map(x => x.id === pieza.id ? { ...x, nombre } : x));
    toast('Pieza actualizada ✅', 'success');
  };

  // Eliminar una pieza del banco (las ya usadas en matrices guardadas no se tocan).
  const eliminarPieza = async (pieza) => {
    if (!confirm(`¿Eliminar la pieza "${pieza.nombre}" del banco?\n\nLas matrices que ya la usaron no se modifican.`)) return;
    const { error } = await supabase.from('msa_piezas').delete().eq('id', pieza.id);
    if (error) return toast('Error: ' + error.message, 'error');
    setPiezas(p => p.filter(x => x.id !== pieza.id));
    toast('Pieza eliminada', 'info');
  };

  const crearPieza = async () => {
    if (!nuevaPieza.nombre.trim()) return toast('Poné un nombre', 'error');
    const { data, error } = await supabase.from('msa_piezas').insert({
      nombre: nuevaPieza.nombre.trim().toUpperCase(),
      tipo: nuevaPieza.tipo,
      es_base: esAdmin,                    // admin crea piezas base; alumno crea propias
      creado_por: esAdmin ? null : alumno?.id,
    }).select('*').single();
    if (error) return toast('Error: ' + error.message, 'error');
    setPiezas(p => [...p, data]);
    setNuevaPieza({ nombre: '', tipo: nuevaPieza.tipo });
    toast('Pieza creada ✅', 'success');
  };

  // Descarga una plantilla de Excel de ejemplo para importar piezas.
  const descargarPlantillaPiezas = () => {
    const ws = XLSX.utils.aoa_to_sheet([
      ['nombre', 'tipo'],
      ['ART REP', 'archivo'],
      ['STOCK', 'archivo'],
      ['OC', 'manual'],
      ['LR', 'manual'],
      ['FACTURA', 'sistema'],
      ['REMITO', 'sistema'],
      ['MERCADERIA', 'elemento'],
      ['MATERIA PRIMA', 'elemento'],
    ]);
    ws['!cols'] = [{ wch: 22 }, { wch: 14 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Piezas');
    XLSX.writeFile(wb, 'plantilla_piezas_MSA.xlsx');
  };

  // Importa piezas desde un Excel. Mapea los tipos amigables a los internos.
  const importarPiezas = async (file) => {
    const mapaTipo = {
      'archivo': 'archivo',
      'manual': 'doc_cuadrado', 'doc_cuadrado': 'doc_cuadrado', 'cuadrado': 'doc_cuadrado',
      'sistema': 'doc_pancita', 'doc_pancita': 'doc_pancita', 'pancita': 'doc_pancita',
      'elemento': 'elemento', 'elementos': 'elemento',
    };
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      if (!rows.length) return toast('El Excel está vacío', 'error');

      const nuevas = [];
      const errores = [];
      rows.forEach((r, i) => {
        const nombre = String(r.nombre ?? r.Nombre ?? '').trim().toUpperCase();
        const tipoRaw = String(r.tipo ?? r.Tipo ?? '').trim().toLowerCase();
        const tipo = mapaTipo[tipoRaw];
        if (!nombre) { errores.push(`Fila ${i + 2}: sin nombre`); return; }
        if (!tipo) { errores.push(`Fila ${i + 2}: tipo inválido ("${tipoRaw}")`); return; }
        nuevas.push({ nombre, tipo, es_base: true, creado_por: null });
      });

      if (!nuevas.length) return toast('No se pudo importar ninguna pieza. Revisá el formato.', 'error');

      const { data, error } = await supabase.from('msa_piezas').insert(nuevas).select('*');
      if (error) return toast('Error al guardar: ' + error.message, 'error');

      setPiezas(p => [...p, ...(data || [])]);
      toast(`${data.length} piezas importadas ✅${errores.length ? ` (${errores.length} con error)` : ''}`, 'success');
      if (errores.length) console.warn('Filas con error:', errores);
    } catch (err) {
      toast('No se pudo leer el Excel: ' + err.message, 'error');
    }
  };

  if (!miAula) return <SinAula />;
  if (loading) return <Loading />;

  const soloLectura = !!actual?.soloLectura;

  return (
    <div className="page-content fade-in">
      {!embebido && (
        <div className="page-header">
          <div>
            <div className="page-title">🧩 Matriz de Sistema Administrativo</div>
            <div className="page-subtitle">Armá la MSA arrastrando archivos y documentos</div>
          </div>
          <button className="btn btn-primary" onClick={nuevaMatriz}>+ Nueva MSA</button>
        </div>
      )}
      {embebido && (
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div style={{fontSize:'0.9rem',color:'var(--text2)'}}>Armá la MSA arrastrando archivos y documentos a las celdas.</div>
          <button className="btn btn-primary btn-sm" onClick={nuevaMatriz}>+ Nueva MSA</button>
        </div>
      )}

      {/* Selector de matrices guardadas */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:200}}>
            <label style={{fontSize:'0.78rem',color:'var(--text2)',fontWeight:600}}>{esAdmin ? 'Mis matrices' : 'Mis prácticas'}</label>
            <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:6,maxHeight:140,overflowY:'auto'}}>
              {matrices.length === 0 && <span style={{fontSize:'0.82rem',color:'var(--text2)'}}>Todavía no guardaste ninguna</span>}
              {matrices.map(m => (
                <button key={m.id} className="btn btn-ghost btn-sm" style={{justifyContent:'space-between'}} onClick={() => cargarMatriz(m.id)}>
                  <span>{m.titulo}</span>
                  {esAdmin && (m.publicada ? <span className="chip chip-green" style={{fontSize:'0.6rem'}}>Publicada</span> : <span className="chip" style={{fontSize:'0.6rem',background:'var(--surface2)',color:'var(--text2)'}}>Borrador</span>)}
                </button>
              ))}
            </div>
          </div>
          {!esAdmin && (
            <div style={{flex:1,minWidth:200}}>
