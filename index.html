// ADMIN NOVEDADES
// ═══════════════════════════════════════════════════════════════════════
function AdminNovedades({ aulaActiva }) {
  const [novedades, setNovedades] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ titulo: '', contenido: '', tipo: 'info', destacado: false, link: '' });
  const toast = useToast();

  const TIPOS = {
    info:    { label: 'Información', color: 'var(--accent)',  bg: 'rgba(108,99,255,0.12)', icon: 'ℹ️' },
    aviso:   { label: 'Aviso',       color: 'var(--warning)', bg: 'rgba(255,165,2,0.12)',  icon: '⚠️' },
    tarea:   { label: 'Tarea',       color: 'var(--accent2)', bg: 'rgba(255,101,132,0.12)',icon: '📋' },
    logro:   { label: 'Logro',       color: 'var(--success)', bg: 'rgba(67,233,123,0.12)', icon: '🏆' },
  };

  const load = async () => {
    if (!aulaActiva) { setLoading(false); return; }
    const { data } = await supabase
      .from('novedades')
      .select('*, likes_novedades(count)')
      .eq('aula_id', aulaActiva)
      .order('created_at', { ascending: false });
    // Ocultar del panel del admin las novedades dirigidas a un alumno puntual (recordatorios automáticos).
    setNovedades((data || []).filter(n => !n.alumno_id));
    setLoading(false);
  };

  useEffect(() => { setLoading(true); load(); }, [aulaActiva]);

  const save = async () => {
    if (!form.titulo.trim()) return toast('El título es requerido', 'error');
    if (!form.contenido.trim()) return toast('El contenido es requerido', 'error');
    setSaving(true);
    try {
      const payload = { titulo: form.titulo, contenido: form.contenido, tipo: form.tipo, destacado: form.destacado, aula_id: aulaActiva };
      if ((form.link || '').trim()) payload.link = form.link.trim();
      const { error } = editing
        ? await supabase.from('novedades').update(payload).eq('id', editing)
        : await supabase.from('novedades').insert(payload);
      if (error) throw new Error(error.message);
      if (!editing) notificarAlumnos(`📢 ${form.titulo}`, form.contenido.slice(0, 100));
      toast(editing ? 'Novedad actualizada ✏️' : 'Novedad publicada 📢', 'success');
      setModal(false); setEditing(null); setForm({ titulo: '', contenido: '', tipo: 'info', destacado: false, link: '' });
      load();
    } catch (err) { toast(err.message, 'error'); }
    finally { setSaving(false); }
  };

  const remove = async id => {
    if (!confirm('¿Eliminar esta novedad?')) return;
    await supabase.from('novedades').delete().eq('id', id);
    toast('Novedad eliminada', 'info'); load();
  };

  const openEdit = n => {
    setForm({ titulo: n.titulo, contenido: n.contenido, tipo: n.tipo || 'info', destacado: n.destacado || false, link: n.link || '' });
    setEditing(n.id); setModal(true);
  };

  const fmtDate = iso => {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  };

  if (!aulaActiva) return <SinAula />;
  if (loading) return <Loading />;

  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">📢 Novedades</div>
          <div className="page-subtitle">Muro de comunicados y avisos</div>
        </div>
        <button className="btn btn-primary" onClick={() => { setForm({ titulo: '', contenido: '', tipo: 'info', destacado: false, link: '' }); setEditing(null); setModal(true); }}>
          ➕ Nueva novedad
        </button>
      </div>

      {novedades.length === 0 && <Empty icon="📢" text="No hay novedades publicadas aún" />}

      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {novedades.map(n => {
          const cfg = TIPOS[n.tipo] || TIPOS.info;
          const likes = n.likes_novedades?.[0]?.count || 0;
          return (
            <div key={n.id} className="card" style={{ borderLeft: `4px solid ${cfg.color}`, background: n.destacado ? cfg.bg : 'var(--surface)', position: 'relative' }}>
              {n.destacado && (
                <div style={{ position: 'absolute', top: 12, right: 12, fontSize: '0.68rem', fontWeight: 700, background: cfg.color, color: '#fff', padding: '2px 8px', borderRadius: 20 }}>
                  ⭐ DESTACADO
                </div>
              )}
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                <span style={{ fontSize: '1.4rem' }}>{cfg.icon}</span>
                <div>
                  <div style={{ fontWeight: 700, fontSize: '1rem' }}>{n.titulo}</div>
                  <div style={{ fontSize: '0.73rem', color: 'var(--text2)', marginTop: 2 }}>
                    {fmtDate(n.created_at)} · <span style={{ color: cfg.color, fontWeight: 600 }}>{cfg.label}</span> · 👍 {likes} me gusta
                  </div>
                </div>
              </div>
              <div style={{ color: 'var(--text2)', fontSize: '0.88rem', lineHeight: 1.6, whiteSpace: 'pre-wrap', marginBottom: n.link ? 10 : 12 }}>{n.contenido}</div>
              {n.link && (
                <a href={normalizarUrl(n.link)} target="_blank" rel="noopener noreferrer" style={{ display:'inline-flex', alignItems:'center', gap:6, fontSize:'0.82rem', color: cfg.color, textDecoration:'none', background: cfg.bg, padding:'5px 12px', borderRadius:20, marginBottom:12, border:`1px solid ${cfg.color}`, fontWeight:600 }}>
                  🔗 Ver enlace
                </a>
              )}
              <div style={{ display: 'flex', gap: 8, borderTop: '1px solid var(--border)', paddingTop: 10 }}>
                <button className="btn btn-ghost btn-sm" onClick={() => openEdit(n)}>✏️ Editar</button>
                <button className="btn btn-danger btn-sm" onClick={() => remove(n.id)}>🗑️ Eliminar</button>
              </div>
            </div>
          );
        })}
      </div>

      {modal && (
        <Modal title={editing ? '✏️ Editar novedad' : '📢 Nueva novedad'} onClose={() => setModal(false)}>
          <div className="form-group">
            <label>Tipo</label>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {Object.entries(TIPOS).map(([k, v]) => (
                <label key={k} style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', padding: '8px 12px', border: `2px solid ${form.tipo === k ? v.color : 'var(--border)'}`, borderRadius: 10, background: form.tipo === k ? v.bg : 'transparent', fontSize: '0.82rem', fontWeight: 600, transition: 'all 0.15s' }}>
                  <input type="radio" name="tipo" value={k} checked={form.tipo === k} onChange={() => setForm(p => ({ ...p, tipo: k }))} style={{ width: 'auto', margin: 0 }} />
                  {v.icon} {v.label}
                </label>
              ))}
            </div>
          </div>
          <div className="form-group">
            <label>Título</label>
            <input value={form.titulo} onChange={e => setForm(p => ({ ...p, titulo: e.target.value }))} placeholder="Título de la novedad..." />
          </div>
          <div className="form-group">
            <label>Contenido</label>
            <textarea value={form.contenido} onChange={e => setForm(p => ({ ...p, contenido: e.target.value }))} placeholder="Escribí el mensaje para los alumnos..." style={{ minHeight: 120 }} />
          </div>
          <div className="form-group">
            <label>🔗 Enlace (opcional)</label>
            <input type="text" value={form.link} onChange={e => setForm(p => ({ ...p, link: e.target.value }))} placeholder="https://... (dejar vacío si no hay enlace)" />
          </div>
          <div className="form-group">
            <label style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', textTransform: 'none', letterSpacing: 0 }}>
              <input type="checkbox" checked={form.destacado} onChange={e => setForm(p => ({ ...p, destacado: e.target.checked }))} style={{ width: 'auto', margin: 0, accentColor: 'var(--accent)' }} />
              <span style={{ fontWeight: 600 }}>⭐ Destacar esta novedad</span>
              <span style={{ color: 'var(--text2)', fontWeight: 400, fontSize: '0.78rem' }}>(aparece primero y resaltada)</span>
            </label>
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>
            <button className="btn btn-ghost" onClick={() => setModal(false)} disabled={saving}>Cancelar</button>
            <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? '⏳ Publicando...' : '📢 Publicar'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// ALUMNO MURO DE NOVEDADES
// ═══════════════════════════════════════════════════════════════════════
function AlumnoMuro({ alumno }) {
  const [novedades, setNovedades] = useState([]);
  const [loading, setLoading] = useState(true);
  const [liking, setLiking] = useState({});
  const [misLikes, setMisLikes] = useState({});
  const [misRef, setMisRef] = useState(null);   // { total, activos } de amigos referidos
  const toast = useToast();

  const miLink = `${window.location.origin}?ref=${alumno?.id || ''}`;
  const copiarLink = async () => {
    try { await navigator.clipboard.writeText(miLink); toast('¡Link copiado! Compartilo con tu amigo 📲', 'success'); }
    catch { toast('Copiá el link a mano', 'info'); }
  };

  // Contar los amigos que este alumno ya refirió (para mostrarle el progreso).
  useEffect(() => {
    if (!alumno?.id) return;
    (async () => {
      try {
        const { data } = await supabase.from('alumnos').select('estado').eq('referido_por', alumno.id);
        setMisRef({ total: (data || []).length, activos: (data || []).filter(a => a.estado === 'activo').length });
      } catch {}
    })();
  }, [alumno]);

  const TIPOS = {
    info:    { label: 'Información', color: 'var(--accent)',  bg: 'rgba(108,99,255,0.10)', icon: 'ℹ️' },
    aviso:   { label: 'Aviso',       color: 'var(--warning)', bg: 'rgba(255,165,2,0.10)',  icon: '⚠️' },
    tarea:   { label: 'Tarea',       color: 'var(--accent2)', bg: 'rgba(255,101,132,0.10)',icon: '📋' },
    logro:   { label: 'Logro',       color: 'var(--success)', bg: 'rgba(67,233,123,0.10)', icon: '🏆' },
  };

  const load = async () => {
    // El alumno solo ve las novedades de SU aula.
    const miAula = alumno?.aula_id;
    if (!miAula) { setNovedades([]); setLoading(false); return; }
    // Si hoy corresponde, generar el recordatorio de vencimiento de pago de este alumno.
    if (alumno?.id) await generarRecordatorioPagoAlumno(alumno.id, miAula);
    const { data: novs } = await supabase
      .from('novedades')
      .select('*')
      .eq('aula_id', miAula)
      .order('destacado', { ascending: false })
      .order('created_at', { ascending: false });
    // Ve las del aula (sin alumno) + las dirigidas a este alumno (recordatorios de pago).
    const visibles = (novs || []).filter(n => !n.alumno_id || n.alumno_id === alumno?.id);

    if (visibles.length && alumno?.id) {
      // Obtener likes de cada novedad + si ya le di like
      const ids = visibles.map(n => n.id);
      const { data: allLikes } = await supabase
        .from('likes_novedades')
        .select('novedad_id, alumno_id')
        .in('novedad_id', ids);

      const countMap = {};
      const myMap = {};
      (allLikes || []).forEach(l => {
        countMap[l.novedad_id] = (countMap[l.novedad_id] || 0) + 1;
        if (l.alumno_id === alumno.id) myMap[l.novedad_id] = true;
      });

      setNovedades(visibles.map(n => ({ ...n, _likes: countMap[n.id] || 0 })));
      setMisLikes(myMap);
    } else {
      setNovedades(visibles);
    }
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const toggleLike = async (novedad) => {
    if (!alumno?.id) return toast('Necesitás estar registrado como alumno', 'error');
    const yaLe = misLikes[novedad.id];
    setLiking(p => ({ ...p, [novedad.id]: true }));

    if (yaLe) {
      await supabase.from('likes_novedades').delete()
        .eq('novedad_id', novedad.id).eq('alumno_id', alumno.id);
      setMisLikes(p => { const n = { ...p }; delete n[novedad.id]; return n; });
      setNovedades(p => p.map(n => n.id === novedad.id ? { ...n, _likes: Math.max(0, (n._likes || 0) - 1) } : n));
    } else {
      const { error } = await supabase.from('likes_novedades').insert({ novedad_id: novedad.id, alumno_id: alumno.id });
      if (!error) {
        setMisLikes(p => ({ ...p, [novedad.id]: true }));
        setNovedades(p => p.map(n => n.id === novedad.id ? { ...n, _likes: (n._likes || 0) + 1 } : n));
      }
    }
    setLiking(p => ({ ...p, [novedad.id]: false }));
  };

  const fmtDate = iso => {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diff = Math.floor((now - d) / 60000);
    if (diff < 1) return 'ahora mismo';
    if (diff < 60) return `hace ${diff} min`;
    if (diff < 1440) return `hace ${Math.floor(diff / 60)}h`;
    if (diff < 10080) return `hace ${Math.floor(diff / 1440)} día${Math.floor(diff / 1440) !== 1 ? 's' : ''}`;
    return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
  };

  if (loading) return <Loading />;

  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">📢 Novedades</div>
          <div className="page-subtitle">Comunicados y avisos del curso</div>
        </div>
      </div>

      {/* Invitá a un amigo */}
      <div className="card" style={{padding:'16px 20px',marginBottom:20,borderColor:'var(--success)',background:'rgba(67,233,123,0.06)'}}>
        <div style={{fontWeight:700,marginBottom:6}}>🎁 Invitá a un amigo y ganás</div>
        <div style={{fontSize:'0.84rem',color:'var(--text2)',marginBottom:12}}>
          Compartí tu link. Cuando tu amigo se inscribe por él y hace su primer pago, te ganás un <b>5% de descuento</b> en tu próxima cuota. Vale por hasta <b>2 amigos</b> (hasta 10%).
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <input readOnly value={miLink} onFocus={e => e.target.select()} style={{flex:1,minWidth:200,fontSize:'0.8rem'}} />
          <button className="btn btn-primary btn-sm" onClick={copiarLink}>📋 Copiar link</button>
        </div>
        {misRef && (
          <div style={{fontSize:'0.8rem',color:'var(--text2)',marginTop:10}}>
            Amigos que ya sumaste: <b style={{color:'var(--success)'}}>{misRef.activos}</b>{misRef.total > misRef.activos ? ` (${misRef.total - misRef.activos} esperando aprobación)` : ''}
          </div>
        )}
      </div>

      {novedades.length === 0 && <Empty icon="📢" text="No hay novedades publicadas aún" />}

      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        {novedades.map(n => {
          const cfg = TIPOS[n.tipo] || TIPOS.info;
          const yaDiLike = !!misLikes[n.id];
          const cargando = !!liking[n.id];
          return (
            <div key={n.id} style={{
              background: n.destacado ? cfg.bg : 'var(--surface)',
              border: `1px solid ${n.destacado ? cfg.color : 'var(--border)'}`,
              borderLeft: `5px solid ${cfg.color}`,
              borderRadius: 'var(--radius)',
              padding: 20,
              animation: 'fadeIn 0.4s ease',
              position: 'relative',
            }}>
              {n.destacado && (
                <div style={{ position: 'absolute', top: 12, right: 12, fontSize: '0.68rem', fontWeight: 700, background: cfg.color, color: '#fff', padding: '3px 10px', borderRadius: 20, letterSpacing: '0.04em' }}>
                  ⭐ DESTACADO
                </div>
              )}

              {/* Header */}
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 12 }}>
                <div style={{ width: 44, height: 44, borderRadius: 12, background: cfg.bg, border: `2px solid ${cfg.color}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.4rem', flexShrink: 0 }}>
                  {cfg.icon}
                </div>
                <div style={{ flex: 1, minWidth: 0, paddingRight: n.destacado ? 80 : 0 }}>
                  <div style={{ fontWeight: 700, fontSize: '1.05rem', lineHeight: 1.3 }}>{n.titulo}</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 4, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: '0.72rem', color: cfg.color, fontWeight: 700, background: cfg.bg, padding: '2px 8px', borderRadius: 20 }}>{cfg.label}</span>
                    <span style={{ fontSize: '0.72rem', color: 'var(--text2)' }}>{fmtDate(n.created_at)}</span>
                  </div>
                </div>
              </div>

              {/* Contenido */}
              <div style={{ color: 'var(--text)', fontSize: '0.9rem', lineHeight: 1.7, whiteSpace: 'pre-wrap', marginBottom: n.link ? 10 : 16, paddingLeft: 56 }}>
                {n.contenido}
              </div>

              {/* Enlace */}
              {n.link && (
                <div style={{ paddingLeft: 56, marginBottom: 16 }}>
                  <a href={normalizarUrl(n.link)} target="_blank" rel="noopener noreferrer" style={{ display:'inline-flex', alignItems:'center', gap:8, fontSize:'0.88rem', color: cfg.color, textDecoration:'none', background: cfg.bg, padding:'8px 16px', borderRadius:20, border:`1.5px solid ${cfg.color}`, fontWeight:700, transition:'opacity 0.15s' }}
                    onMouseOver={e => e.currentTarget.style.opacity='0.8'}
                    onMouseOut={e => e.currentTarget.style.opacity='1'}
                  >
                    🔗 Ver enlace
                  </a>
                </div>
              )}

              {/* Footer con like */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, paddingTop: 12, borderTop: '1px solid var(--border)', paddingLeft: 56 }}>
                <button
                  onClick={() => !cargando && toggleLike(n)}
                  disabled={cargando}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 7,
                    padding: '7px 16px', borderRadius: 20,
                    border: `2px solid ${yaDiLike ? cfg.color : 'var(--border)'}`,
                    background: yaDiLike ? cfg.bg : 'transparent',
                    color: yaDiLike ? cfg.color : 'var(--text2)',
                    fontWeight: 700, fontSize: '0.85rem',
                    cursor: cargando ? 'not-allowed' : 'pointer',
                    transition: 'all 0.2s',
                    fontFamily: 'inherit',
                  }}
                >
                  <span style={{ fontSize: '1.1rem' }}>{yaDiLike ? '👍' : '👍'}</span>
                  <span>{yaDiLike ? 'Me gustó' : 'Me gusta'}</span>
                  {n._likes > 0 && (
                    <span style={{ background: yaDiLike ? cfg.color : 'var(--border)', color: yaDiLike ? '#fff' : 'var(--text2)', borderRadius: 20, padding: '1px 7px', fontSize: '0.75rem', fontWeight: 700, marginLeft: 2 }}>
                      {n._likes}
                    </span>
                  )}
                </button>
                {yaDiLike && (
                  <span style={{ fontSize: '0.75rem', color: 'var(--text2)', fontStyle: 'italic' }}>
                    ✓ Leído
                  </span>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════
function App() {
  const [auth, setAuth] = useState(null);
  const [page, setPage] = useState(null);
  const [loading, setLoading] = useState(true);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [preview, setPreview] = useState(null);        // alumno que el admin está "viendo como"
  const [previewModal, setPreviewModal] = useState(false);
  const [previewLista, setPreviewLista] = useState([]);
  const [previewBusca, setPreviewBusca] = useState('');
  const [masOpen, setMasOpen] = useState(false);   // menú "Más" de la barra inferior (celular)
  // Aula en la que el admin está trabajando. Se guarda como preferencia local (no es dato de negocio).
  const [aulaActiva, setAulaActivaState] = useState(() => localStorage.getItem('saci_aula_activa') || null);
  const [aulasLista, setAulasLista] = useState([]);
  const setAulaActiva = (id) => {
    setAulaActivaState(id);
    if (id) localStorage.setItem('saci_aula_activa', id);
    else localStorage.removeItem('saci_aula_activa');
  };
  const toast = useToast();

  // Cargar la lista de aulas (para el selector de arriba)
  useEffect(() => {
    if (!auth?.isAdmin) return;
    supabase.from('aulas').select('id, nombre, estado').order('created_at', { ascending: false })
      .then(({ data }) => setAulasLista(data || []));
  }, [auth, page]);

  // Deshabilitar clic derecho para alumnos (también en modo vista-alumno)
  useEffect(() => {
    if (!auth) return;
    const esAlumno = !auth.isAdmin || preview;
    if (!esAlumno) return;
    const block = e => e.preventDefault();
    document.addEventListener('contextmenu', block);
    return () => document.removeEventListener('contextmenu', block);
  }, [auth, preview]);

  // Abrir el modal de "Ver como alumno": carga la lista de alumnos activos
  const abrirPreview = async () => {
    setPreviewModal(true);
    setPreviewBusca('');
    const { data } = await supabase.from('alumnos').select('id, nombre, email, aula_id').eq('estado','activo').order('nombre');
    setPreviewLista(data || []);
  };
  // Entrar en modo vista-alumno con el alumno elegido
  const entrarPreview = (al) => {
    setPreview(al);
    setPreviewModal(false);
    setPage('muro');
    setSidebarOpen(false);
    toast(`👁 Viendo como ${al.nombre}`, 'info');
  };
  // Salir del modo vista-alumno y volver a admin
  const salirPreview = () => {
    setPreview(null);
    setPage('dashboard');
    setSidebarOpen(false);
    toast('Volviste a la vista de Administrador', 'info');
  };

  useEffect(() => {
    supabase.auth.getSession().then(async ({ data }) => {
      if (data?.session?.user) {
        const u = data.session.user;
        const isAdmin = u.email === ADMIN_EMAIL;
        let alumno = null;
        if (!isAdmin) {
          const { data: al } = await supabase.from('alumnos').select('*').eq('email', u.email).single();
          alumno = al;

          // Si el aula del alumno fue cerrada, se cierra su sesión aunque la tuviera guardada.
          if (alumno?.aula_id) {
            const { data: aula } = await supabase.from('aulas').select('estado').eq('id', alumno.aula_id).single();
            if (aula?.estado === 'cerrada') {
              await supabase.auth.signOut();
              setAuth(null);
              setLoading(false);
              return;
            }
          }
        }
        let pagoVencido = false;
        if (!isAdmin && alumno?.id && alumno?.aula_id) pagoVencido = await tienePagoVencido(alumno.id, alumno.aula_id);
        const a = { user: u, isAdmin, alumno, pagoVencido };
        setAuth(a);
        setPage(isAdmin ? 'dashboard' : 'muro');
        if (!isAdmin && alumno?.id) subscribirPush(alumno.id);
      }
      setLoading(false);
    });
  }, []);

  const handleLogin = a => {
    setAuth(a);
    setPage(a.isAdmin ? 'dashboard' : 'muro');
    if (!a.isAdmin && a.alumno?.id) subscribirPush(a.alumno.id);
  };
  const handleLogout = async () => { await supabase.auth.signOut(); setAuth(null); setPreview(null); setPage(null); toast('Sesión cerrada 👋', 'info'); };

  if (loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:'Space Mono',fontSize:'2rem',fontWeight:700,background:'linear-gradient(135deg,#6c63ff,#ff6584)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:20}}>SACi</div>
        <div className="spinner" style={{margin:'0 auto'}} />
      </div>
    </div>
  );

  if (!auth) return <LoginPage onLogin={handleLogin} />;

  // Alumno que todavía no fue aprobado (pendiente) o fue rechazado: no entra a la app.
  if (!auth.isAdmin && !(auth.alumno && auth.alumno.estado === 'activo'))
    return <PantallaEspera alumno={auth.alumno} onLogout={handleLogout} />;

  // Alumno con un pago vencido sin regularizar: no entra hasta hablar con el docente.
  if (!auth.isAdmin && auth.pagoVencido)
    return <PantallaBloqueoPago onLogout={handleLogout} />;

  // Si el admin está en modo "ver como alumno", la app se comporta como ese alumno.
  const enPreview = !!(auth.isAdmin && preview);
  const authEfectivo = enPreview
    ? { user: auth.user, isAdmin: false, alumno: preview }
    : auth;
  const { isAdmin, alumno, user } = authEfectivo;

  const PAGE_MAP = {
    dashboard: <AdminDashboard setPage={setPage} aulaActiva={aulaActiva} />,
    aulas: <AdminAulas aulaActiva={aulaActiva} setAulaActiva={setAulaActiva} />,
    'novedades-admin': <AdminNovedades aulaActiva={aulaActiva} />,
    gantt: <AdminPlanificacion aulaActiva={aulaActiva} />,
    alumnos: <AdminAlumnos aulaActiva={aulaActiva} />,
    inscripciones: <AprobarInscripciones />,
    pagos: <AdminPagos aulaActiva={aulaActiva} />,
    extensiones: <AdminExtensiones aulaActiva={aulaActiva} />,
    msa: <SalaDeJuegos aulaActiva={aulaActiva} esAdmin={true} />,
    'mis-msa': <SalaDeJuegos alumno={alumno} esAdmin={false} />,
    videos: <AdminVideos aulaActiva={aulaActiva} />,
    materiales: <AdminMateriales aulaActiva={aulaActiva} />,
    evaluaciones: <AdminEvaluaciones aulaActiva={aulaActiva} />,
    'mis-gantt': <AlumnoPlanificacion alumno={alumno} />,
    'mis-videos': <AlumnoVideos alumno={alumno} user={user} />,
    'mis-materiales': <AlumnoMateriales alumno={alumno} user={user} />,
    'mis-evaluaciones': <AlumnoEvaluaciones alumno={alumno} />,
    'mis-pagos': <AlumnoPagos alumno={alumno} />,
    muro: <AlumnoMuro alumno={alumno} />,
  };

  const titles = {
    dashboard: ['📊 Dashboard', 'Resumen general'],
    aulas: ['🏫 Aulas', 'Gestión de aulas y cohortes'],
    'novedades-admin': ['📢 Novedades', 'Gestión de novedades'],
    gantt: ['📅 Planificación', 'Cronograma mensual del curso'],
    'mis-gantt': ['📅 Mi Planificación', 'Tu cronograma personal'],
    alumnos: ['👥 Alumnos', 'Gestión de alumnos'],
    inscripciones: ['🆕 Inscripciones', 'Aprobar alumnos nuevos'],
    pagos: ['💳 Pagos', 'Control de pagos'],
    extensiones: ['⏱️ Extensiones', 'Compras de 24hs extra'],
    msa: ['🎮 Sala de Juegos', 'Herramientas para tus clases'],
    'mis-msa': ['🎮 Sala de Juegos', 'Practicá los temas de la materia'],
    videos: ['🎬 Videos', 'Biblioteca de videos'],
    materiales: ['📄 Materiales', 'Recursos educativos'],
    evaluaciones: ['📝 Evaluaciones', 'Gestión de exámenes'],
    'mis-videos': ['🎬 Videos', `Hola, ${alumno?.nombre || user?.email?.split('@')[0]} 👋`],
    'mis-materiales': ['📄 Materiales', 'Recursos disponibles'],
    'mis-evaluaciones': ['📝 Evaluaciones', 'Tus exámenes'],
    'mis-pagos': ['💳 Mis Pagos', 'Historial de pagos'],
    muro: ['📢 Novedades', 'Últimas novedades del curso'],
  };
  const [title, subtitle] = titles[page] || ['SACi', ''];

  // En el celular la barra de abajo tiene lugar acotado. Mostramos los principales
  // y el resto (incluido Salir) va en el menú "Más".
  const bottomNav = !isAdmin ? [
    { id: 'muro', icon: '📢', label: 'Novedades' },
    { id: 'mis-videos', icon: '🎬', label: 'Videos' },
    { id: 'mis-materiales', icon: '📄', label: 'Material' },
    { id: 'mis-gantt', icon: '📅', label: 'Plan.' },
    { id: '__mas', icon: '☰', label: 'Más' },
  ] : [
    { id: 'dashboard', icon: '📊', label: 'Inicio' },
    { id: 'novedades-admin', icon: '📢', label: 'Novedades' },
    { id: 'alumnos', icon: '👥', label: 'Alumnos' },
    { id: 'videos', icon: '🎬', label: 'Videos' },
    { id: '__mas', icon: '☰', label: 'Más' },
  ];

  // Opciones que aparecen al tocar "Más".
  const masItems = !isAdmin ? [
    { id: 'mis-evaluaciones', icon: '📝', label: 'Evaluaciones' },
    { id: 'mis-pagos', icon: '💳', label: 'Mis Pagos' },
    enPreview
      ? { id: 'salir-preview', icon: '↩️', label: 'Volver a Admin' }
      : { id: 'logout', icon: '🚪', label: 'Cerrar sesión' },
  ] : [
    { id: 'aulas', icon: '🏫', label: 'Aulas' },
    { id: 'inscripciones', icon: '🆕', label: 'Inscripciones' },
    { id: 'gantt', icon: '📅', label: 'Planificación' },
    { id: 'pagos', icon: '💳', label: 'Pagos' },
    { id: 'materiales', icon: '📄', label: 'Materiales' },
    { id: 'evaluaciones', icon: '📝', label: 'Evaluaciones' },
    { id: 'extensiones', icon: '⏱️', label: 'Extensiones' },
    { id: 'logout', icon: '🚪', label: 'Cerrar sesión' },
  ];

  return (
    <div className="app-shell">
      <div className={`mobile-overlay ${sidebarOpen ? 'active' : ''}`} onClick={() => setSidebarOpen(false)} />
      <Sidebar page={page} setPage={p => { setPage(p); setSidebarOpen(false); }} isAdmin={isAdmin} user={user} alumno={alumno} onLogout={handleLogout} className={sidebarOpen ? 'open' : ''} onPreview={enPreview ? salirPreview : abrirPreview} enPreview={enPreview} />
      <div className="main-content">
        {enPreview && (
          <div style={{background:'linear-gradient(135deg,#ffb020,#ff8c00)',color:'#1a1a1a',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,fontWeight:600,flexWrap:'wrap'}}>
            <span>👁 Estás viendo la app como <strong>{preview.nombre}</strong> (vista de alumno)</span>
            <button className="btn btn-sm" style={{background:'#1a1a1a',color:'#fff',whiteSpace:'nowrap'}} onClick={salirPreview}>↩️ Volver a Administrador</button>
          </div>
        )}
        <Topbar title={title} subtitle={subtitle} onMenuToggle={() => setSidebarOpen(p => !p)} />
        {/* Barra de aula activa: le recuerda al admin en qué aula está trabajando */}
        {isAdmin && !enPreview && aulasLista.length > 0 && (
          <div style={{
            background: aulaActiva ? 'rgba(108,92,231,0.12)' : 'rgba(255,176,32,0.12)',
            borderBottom: `1px solid ${aulaActiva ? 'var(--accent)' : 'var(--warning)'}`,
            padding: '8px 16px',
            display: 'flex',
            alignItems: 'center',
            gap: 10,
            flexWrap: 'wrap',
            fontSize: '0.85rem'
          }}>
            <span style={{fontWeight:600}}>🏫 Aula:</span>
            <select
              value={aulaActiva || ''}
              onChange={e => setAulaActiva(e.target.value || null)}
              style={{padding:'4px 10px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)',fontSize:'0.85rem',fontWeight:600,cursor:'pointer'}}>
              <option value="">— Ninguna seleccionada —</option>
              {aulasLista.filter(a => a.estado !== 'cerrada').map(a => (
                <option key={a.id} value={a.id}>{a.nombre}</option>
              ))}
            </select>
            {!aulaActiva && (
              <span style={{color:'var(--warning)',fontSize:'0.78rem'}}>
                Elegí un aula para trabajar en ella
              </span>
            )}
          </div>
        )}
        {PAGE_MAP[page] || <Empty icon="🔍" text="Página no encontrada" />}
      </div>
      {auth && (
        <nav className="bottom-nav">
          <div className="bottom-nav-items">
            {bottomNav.map(item => (
              <button key={item.id} className={`bottom-nav-item ${page === item.id ? 'active' : ''} ${item.id==='__mas' && masOpen ? 'active' : ''}`}
                onClick={() => {
                  if (item.id === '__mas') setMasOpen(o => !o);
                  else { setMasOpen(false); setPage(item.id); }
                }}>
                <span className="bnav-icon">{item.icon}</span>
                <span>{item.label}</span>
              </button>
            ))}
          </div>
        </nav>
      )}

      {/* Panel "Más": se abre desde la barra inferior en el celular */}
      {auth && masOpen && (
        <>
          <div onClick={() => setMasOpen(false)}
            style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1400}} />
          <div style={{position:'fixed',left:0,right:0,bottom:64,zIndex:1401,background:'var(--surface)',borderTop:'1px solid var(--border)',borderRadius:'16px 16px 0 0',padding:'12px 8px calc(12px + env(safe-area-inset-bottom))',boxShadow:'0 -8px 30px rgba(0,0,0,0.4)'}}>
            <div style={{width:40,height:4,borderRadius:2,background:'var(--border)',margin:'0 auto 12px'}} />
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {masItems.map(item => (
                <button key={item.id}
                  onClick={() => {
                    setMasOpen(false);
                    if (item.id === 'logout') handleLogout();
                    else if (item.id === 'salir-preview') salirPreview();
                    else setPage(item.id);
                  }}
                  style={{
                    display:'flex',flexDirection:'column',alignItems:'center',gap:6,
                    padding:'14px 8px',borderRadius:12,border:'1px solid var(--border)',
                    background: page===item.id ? 'var(--accent)' : 'var(--surface2)',
                    color: item.id==='logout' ? 'var(--danger)' : (page===item.id ? '#fff' : 'var(--text)'),
                    cursor:'pointer',fontSize:'0.75rem',fontWeight:600,textAlign:'center'
                  }}>
                  <span style={{fontSize:'1.4rem',lineHeight:1}}>{item.icon}</span>
                  <span>{item.label}</span>
                </button>
              ))}
            </div>
          </div>
        </>
      )}

      {previewModal && (
        <div className="modal-overlay" onClick={() => setPreviewModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:480}}>
            <div className="modal-header">
              <h3>👁 Ver la app como un alumno</h3>
              <button className="btn btn-ghost btn-sm" onClick={() => setPreviewModal(false)}>✕</button>
            </div>
            <div className="modal-body">
              <p style={{color:'var(--text2)',marginBottom:12,fontSize:'0.9rem'}}>
                Elegí un alumno para ver la plataforma tal como la ve él (sus videos, materiales, pagos, etc.). No modificás nada: es solo para mirar.
              </p>
              <input className="input" placeholder="🔍 Buscar alumno..." value={previewBusca}
                onChange={e => setPreviewBusca(e.target.value)} style={{marginBottom:12}} />
              <div style={{maxHeight:320,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>
                {previewLista
                  .filter(a => a.nombre?.toLowerCase().includes(previewBusca.toLowerCase()))
                  .map(a => (
                    <button key={a.id} className="btn btn-ghost" style={{justifyContent:'flex-start',gap:10,textAlign:'left'}}
                      onClick={() => entrarPreview(a)}>
                      <span style={{fontSize:'1.2rem'}}>👤</span>
                      <span>
                        <div style={{fontWeight:600}}>{a.nombre}</div>
                        {a.email && <div style={{fontSize:'0.75rem',color:'var(--text2)'}}>{a.email}</div>}
                      </span>
                    </button>
                  ))}
                {previewLista.filter(a => a.nombre?.toLowerCase().includes(previewBusca.toLowerCase())).length === 0 && (
                  <div style={{textAlign:'center',color:'var(--text2)',padding:20}}>No se encontraron alumnos</div>
                )}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ThemeProvider><ToastProvider><App /></ToastProvider></ThemeProvider>
);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
