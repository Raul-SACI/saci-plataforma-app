                onDragEnd={() => { setDragTema(null); setDragOverTema(null); }}
                onDrop={e => { e.preventDefault(); if (dragTema) reorderTemas(dragTema, t.id); setDragTema(null); setDragOverTema(null); }}
                style={{marginBottom:14,opacity:isDragging?0.4:1,outline:isDragOver?'2px dashed var(--accent)':'2px solid transparent',borderRadius:12,transition:'opacity 0.15s, outline 0.1s'}}
              >
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:isOpen?'12px 12px 0 0':'12px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:`4px solid ${t.color||'var(--accent)'}`,cursor:'pointer'}} onClick={() => toggleTema(t.id)}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <span style={{fontSize:'1rem',color:'var(--text2)',cursor:'grab',userSelect:'none'}} title="Arrastrar para reordenar">⠿</span>
                    <span style={{fontSize:'1.2rem'}}>📂</span>
                    <div>
                      <div style={{fontWeight:700,color:t.color||'var(--accent)'}}>{t.nombre}</div>
                      {t.descripcion && <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:1}}>{t.descripcion}</div>}
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:'0.78rem',color:'var(--text2)'}}>{tVids.length} videos</span>
                    <button className="btn btn-ghost btn-sm" onClick={e => { e.stopPropagation(); openEditTema(t); }}>✏️</button>
                    <button className="btn btn-danger btn-sm" onClick={e => { e.stopPropagation(); deleteTema(t.id); }}>🗑️</button>
                    <span style={{color:'var(--text2)'}}>{isOpen?'▲':'▼'}</span>
                  </div>
                </div>
                {isOpen && (
                  <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',overflow:'hidden'}}>
                    {tVids.length === 0 ? (
                      <div style={{padding:'16px 20px',color:'var(--text2)',fontSize:'0.84rem',fontStyle:'italic',background:'var(--surface)',display:'flex',alignItems:'center',gap:12}}>
                        Sin videos en este tema.
                        <button className="btn btn-ghost btn-sm" onClick={() => { setForm({titulo:'',descripcion:'',bunny_id:'',url_externa:'',orden:videos.length,tema_id:t.id,max_vistas:'',publicar_en:'',vence_en:'',precio_extension:'',para_todos:true,alumnos_ids:[]}); setEditing(null); setSelectedFile(null); setTab('bunny'); setModal(true); }}>➕ Agregar</button>
                      </div>
                    ) : (
                      <table style={{width:'100%',borderCollapse:'collapse'}}>
                        <thead><tr style={{background:'var(--surface2)'}}>
                          {['#','Título','Vista previa',''].map(h => <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)'}}>{h}</th>)}
                        </tr></thead>
                        <tbody>
                          {tVids.map(v => (
                            <tr key={v.id} style={{borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                              <td style={{padding:'10px 16px',fontFamily:'Space Mono',color:'var(--text2)',fontSize:'0.82rem'}}>{v.orden}</td>
                              <td style={{padding:'10px 16px'}}><strong style={{fontSize:'0.88rem'}}>{v.titulo}</strong>{v.publicar_en && new Date(v.publicar_en) > new Date() && <span className="chip chip-yellow" style={{marginLeft:8,fontSize:'0.68rem'}}>⏰ {new Date(v.publicar_en).toLocaleDateString('es-AR',{day:'2-digit',month:'short'})} {new Date(v.publicar_en).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>}{v.descripcion&&<><br/><span style={{fontSize:'0.75rem',color:'var(--text2)'}}>{v.descripcion}</span></>}</td>
                              <td style={{padding:'10px 16px'}}>{(v.bunny_id||v.bunny_video_id)&&<img src={`https://${BUNNY_CDN}/${v.bunny_id||v.bunny_video_id}/thumbnail.jpg`} style={{height:40,borderRadius:6,objectFit:'cover'}} onError={e=>e.target.style.display='none'} />}</td>
                              <td style={{padding:'10px 16px'}}><div style={{display:'flex',gap:6}}><button className="btn btn-ghost btn-sm" onClick={() => verStats(v)}>👁️</button><button className="btn btn-ghost btn-sm" onClick={() => openEdit(v)}>✏️</button><button className="btn btn-danger btn-sm" onClick={() => remove(v.id)}>🗑️</button></div></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    )}
                  </div>
                )}
              </div>
            );
          })}
          {videos.filter(v => !v.tema_id).length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:expandedTemas['sin-tema']?'12px 12px 0 0':'12px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:'4px solid var(--border)',cursor:'pointer'}} onClick={() => toggleTema('sin-tema')}>
                <div style={{fontWeight:600,color:'var(--text2)'}}>📁 Sin tema asignado</div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:'0.78rem',color:'var(--text2)'}}>{videos.filter(v=>!v.tema_id).length} videos</span>
                  <span style={{color:'var(--text2)'}}>{expandedTemas['sin-tema']?'▲':'▼'}</span>
                </div>
              </div>
              {expandedTemas['sin-tema'] && (
                <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',overflow:'hidden'}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <tbody>
                      {videos.filter(v=>!v.tema_id).map(v => (
                        <tr key={v.id} style={{borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                          <td style={{padding:'10px 16px',fontFamily:'Space Mono',color:'var(--text2)',fontSize:'0.82rem'}}>{v.orden}</td>
                          <td style={{padding:'10px 16px'}}><strong style={{fontSize:'0.88rem'}}>{v.titulo}</strong>{v.publicar_en && new Date(v.publicar_en) > new Date() && <span className="chip chip-yellow" style={{marginLeft:8,fontSize:'0.68rem'}}>⏰ {new Date(v.publicar_en).toLocaleDateString('es-AR',{day:'2-digit',month:'short'})} {new Date(v.publicar_en).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>}</td>
                          <td style={{padding:'10px 16px'}}>{(v.bunny_id||v.bunny_video_id)&&<img src={`https://${BUNNY_CDN}/${v.bunny_id||v.bunny_video_id}/thumbnail.jpg`} style={{height:40,borderRadius:6,objectFit:'cover'}} onError={e=>e.target.style.display='none'} />}</td>
                          <td style={{padding:'10px 16px'}}><div style={{display:'flex',gap:6}}><button className="btn btn-ghost btn-sm" onClick={() => verStats(v)}>👁️</button><button className="btn btn-ghost btn-sm" onClick={() => openEdit(v)}>✏️ Asignar tema</button><button className="btn btn-danger btn-sm" onClick={() => remove(v.id)}>🗑️</button></div></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {vistaTab === 'lista' && (
        videos.length === 0 ? <Empty icon="🎬" text="No hay videos" /> : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Título</th><th>Tema</th><th>Fuente</th><th>Vista previa</th><th>Acciones</th></tr></thead>
              <tbody>
                {videos.map(v => (
                  <tr key={v.id}>
                    <td style={{fontFamily:'Space Mono',color:'var(--text2)'}}>{v.orden}</td>
                    <td><strong>{v.titulo}</strong>{v.publicar_en && new Date(v.publicar_en) > new Date() && <span className="chip chip-yellow" style={{marginLeft:8,fontSize:'0.68rem'}}>⏰ {new Date(v.publicar_en).toLocaleDateString('es-AR',{day:'2-digit',month:'short'})} {new Date(v.publicar_en).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>}</td>
                    <td style={{color:'var(--text2)',fontSize:'0.82rem'}}>{temas.find(t=>t.id===v.tema_id)?.nombre||'—'}</td>
                    <td>{(v.bunny_id||v.bunny_video_id)?<span className="chip chip-blue">Bunny</span>:v.url_externa?<span className="chip chip-green">URL</span>:'—'}</td>
                    <td>{(v.bunny_id||v.bunny_video_id)&&<img src={`https://${BUNNY_CDN}/${v.bunny_id||v.bunny_video_id}/thumbnail.jpg`} style={{height:44,borderRadius:6,objectFit:'cover'}} onError={e=>e.target.style.display='none'} />}</td>
                    <td><div style={{display:'flex',gap:6}}><button className="btn btn-ghost btn-sm" onClick={() => verStats(v)}>👁️</button><button className="btn btn-ghost btn-sm" onClick={() => openEdit(v)}>✏️</button><button className="btn btn-danger btn-sm" onClick={() => remove(v.id)}>🗑️</button></div></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      )}

            {/* Modal estadísticas de visualizaciones */}
      {statsModal && (
        <Modal title={`👁️ Visualizaciones — ${statsModal.titulo}`} onClose={() => { setStatsModal(null); setStatsData([]); }}>
          {statsLoading ? (
            <div style={{textAlign:'center',padding:'30px 0',color:'var(--text2)'}}>⏳ Cargando...</div>
          ) : (
            <>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:20}}>
                <div style={{background:'var(--surface2)',borderRadius:12,padding:'14px',textAlign:'center'}}>
                  <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.6rem',color:'var(--accent)'}}>{statsData.length}</div>
                  <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:4}}>Total vistas</div>
                </div>
                <div style={{background:'var(--surface2)',borderRadius:12,padding:'14px',textAlign:'center'}}>
                  <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.6rem',color:'var(--success)'}}>
                    {new Set(statsData.filter(v=>v.alumno_id).map(v=>v.alumno_id)).size}
                  </div>
                  <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:4}}>Alumnos únicos</div>
                </div>
                <div style={{background:'var(--surface2)',borderRadius:12,padding:'14px',textAlign:'center'}}>
                  <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.6rem',color:'var(--accent2)'}}>
                    {statsData.length > 0 ? new Date(statsData[0].created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) : '—'}
                  </div>
                  <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:4}}>Última vista</div>
                </div>
              </div>
              {statsData.length === 0 ? (
                <div style={{textAlign:'center',padding:'30px 0',color:'var(--text2)'}}>
                  <div style={{fontSize:'2rem',marginBottom:8}}>👁️</div>
                  <div>Este video no tiene visualizaciones aún</div>
                </div>
              ) : (
                <div style={{maxHeight:380,overflowY:'auto'}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead>
                      <tr style={{background:'var(--surface2)',position:'sticky',top:0}}>
                        {['Alumno','Email','Fecha y hora'].map(h => (
                          <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)'}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {statsData.map((v, i) => {
                        const d = new Date(v.created_at);
                        return (
                          <tr key={i} style={{borderTop:'1px solid var(--border)'}}>
                            <td style={{padding:'10px 14px'}}>
                              <div style={{display:'flex',alignItems:'center',gap:10}}>
                                <div style={{width:30,height:30,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:'0.78rem',color:'white',flexShrink:0}}>
                                  {(v.alumnos?.nombre||'?')[0].toUpperCase()}
                                </div>
                                <strong style={{fontSize:'0.86rem'}}>{v.alumnos?.nombre||'Anónimo'}</strong>
                              </div>

              <label>💳 Precio para extender 24hs (opcional)</label>

              <button type="button" onClick={() => setForm(p => ({ ...p, para_todos: false }))} className={`btn btn-sm ${!form.para_todos ? 'btn-primary' : 'btn-ghost'}`} style={{flex:1,justifyContent:'center'}}>Solo algunos</button>
            </div>
            {!form.para_todos && (
              <div style={{border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px',maxHeight:200,overflowY:'auto'}}>
                {listaAlumnos.length === 0 ? (
                  <div style={{fontSize:'0.8rem',color:'var(--text2)'}}>No hay alumnos cargados.</div>
                ) : listaAlumnos.map(a => (

                    <input type="checkbox" checked={form.alumnos_ids.includes(a.id)} onChange={e => setForm(p => ({ ...p, alumnos_ids: e.target.checked ? [...p.alumnos_ids, a.id] : p.alumnos_ids.filter(x => x !== a.id) }))} style={{width:'auto'}} />
                    <span style={{fontSize:'0.85rem'}}>{a.nombre} <span style={{color:'var(--text2)',fontSize:'0.75rem'}}>{a.email}</span></span>
                  </label>
                ))}
                <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:6}}>Seleccionados: {form.alumnos_ids.length}</div>
              </div>
            )}
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => setModal(false)} disabled={uploading}>Cancelar</button>
            <button className="btn btn-primary" onClick={save} disabled={uploading}>{uploading ? '⏳ Subiendo...' : '💾 Guardar'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// Agrupa materiales por subtema (los "sin subtema" primero, después ordenados natural/numérico: 2024, 2025...).
function agruparPorSubtema(lista) {
  const g = {};
  (lista || []).forEach(m => { const k = (m.subtema || '').trim(); (g[k] = g[k] || []).push(m); });
  return Object.keys(g)
    .sort((a, b) => a === '' ? -1 : b === '' ? 1 : a.localeCompare(b, 'es', { numeric: true }))
    .map(k => ({ subtema: k, items: g[k] }));
}

function AdminMateriales({ aulaActiva }) {
  const TIPO_INFO = {
    pdf:   { icon: '📕', label: 'PDF',    accept: '.pdf' },
    word:  { icon: '📘', label: 'Word',   accept: '.doc,.docx' },
    excel: { icon: '📗', label: 'Excel',  accept: '.xls,.xlsx' },
    link:  { icon: '🔗', label: 'Link',   accept: null },
    video: { icon: '🎬', label: 'Video',  accept: 'video/*' },
    imagen:{ icon: '🖼️', label: 'Imagen', accept: 'image/*' },
  };
  const TEMA_COLORS = ['#6c63ff','#ff6584','#43e97b','#f9ca24','#06b6d4','#f97316','#a78bfa','#ec4899'];
  const [temas, setTemas] = useState([]);
  const [mats, setMats] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [temaModal, setTemaModal] = useState(false);
  const [statsModal, setStatsModal] = useState(null);
  const [statsData, setStatsData] = useState([]);
  const [statsLoading, setStatsLoading] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [uploadPct, setUploadPct] = useState(0);
  const [form, setForm] = useState({ unidad: '', descripcion: '', url: '', tipo: 'pdf', permite_descarga: true, semana: '', tema_id: '', subtema: '', max_vistas: '', publicar_en: '' });
  const [temaForm, setTemaForm] = useState({ nombre: '', descripcion: '', color: '#6c63ff', orden: 0 });
  const [editing, setEditing] = useState(null);
  const [editingTema, setEditingTema] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [selectedFile, setSelectedFile] = useState(null);
  const [selectedFiles, setSelectedFiles] = useState([]);
  const [bulkProgress, setBulkProgress] = useState(null);
  const [expandedTemas, setExpandedTemas] = useState({});
  const [subCerr, setSubCerr] = useState({});   // subtemas cerrados (por defecto abiertos)
  const [vistaTab, setVistaTab] = useState('temas');
  const [dragTema, setDragTema] = useState(null);
  const [dragOverTema, setDragOverTema] = useState(null);
  const fileRef = useRef();
  const toast = useToast();

  const load = async () => {
    if (!aulaActiva) { setLoading(false); return; }
    const [{ data: tData }, { data: mData, error }] = await Promise.all([
      supabase.from('temas_materiales').select('*').eq('aula_id', aulaActiva).order('orden', { ascending: true }),
      supabase.from('materiales').select('*').eq('aula_id', aulaActiva).order('orden', { ascending: true }),
    ]);
    if (error) console.error('materiales error:', error);
    setTemas(tData || []);
    setMats(mData || []);
    setLoading(false);
    // Temas cerrados por defecto (el usuario los abre tocando cada uno).
  };
  useEffect(() => { setLoading(true); load(); }, [aulaActiva]);

  const uploadFile = async (file) => {
    setUploading(true); setUploadPct(0);
    try {
      const ext = file.name.split('.').pop().toLowerCase();
      const path = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
      const xhr = new XMLHttpRequest();
      const { data: urlData } = supabase.storage.from('materiales').getPublicUrl(path);
      xhr.upload.onprogress = e => { if (e.lengthComputable) setUploadPct(Math.round(e.loaded/e.total*100)); };
      const { error } = await supabase.storage.from('materiales').upload(path, file);
      if (error) throw error;
      let tipo = 'otro';
      if (['pdf'].includes(ext)) tipo = 'pdf';
      else if (['doc','docx'].includes(ext)) tipo = 'word';
      else if (['xls','xlsx'].includes(ext)) tipo = 'excel';
      else if (['jpg','jpeg','png','gif','webp'].includes(ext)) tipo = 'imagen';
      else if (['mp4','webm','mov'].includes(ext)) tipo = 'video';
      setForm(p => ({ ...p, url: urlData.publicUrl, tipo }));
      toast('Archivo subido ✅', 'success');
    } catch (err) { toast('Error al subir: ' + err.message, 'error'); }
    finally { setUploading(false); }
  };

  const save = async () => {
    if (!form.unidad && !form.titulo) return toast('El título es requerido', 'error');
    let url = form.url;
    if (selectedFile) { url = await uploadFile(selectedFile); if (!url) return; }
    if (!url && !form.url) return toast('Seleccioná un archivo o ingresá una URL', 'error');
    const payload = {
      unidad: form.unidad || form.titulo,
      descripcion: form.descripcion || null,
      url: form.url || url,
      tipo: form.tipo,
      permite_descarga: form.permite_descarga,
      semana: form.semana || null,
      tema_id: form.tema_id || null,
      subtema: form.subtema ? form.subtema.trim() : null,
      max_vistas: form.max_vistas ? parseInt(form.max_vistas) : null,
      publicar_en: form.publicar_en ? new Date(form.publicar_en).toISOString() : null,
      aula_id: aulaActiva,
    };
    const { error } = editing
      ? await supabase.from('materiales').update(payload).eq('id', editing)
      : await supabase.from('materiales').insert(payload);
    if (error) return toast(error.message, 'error');
    if (!editing) notificarAlumnos('📄 Nuevo material disponible', form.unidad || form.titulo);
    if (!editing && !(form.publicar_en && new Date(form.publicar_en) > new Date())) {
      const nombreMat = form.unidad || form.titulo;
      crearNovedadAuto(aulaActiva, { titulo: '📄 Nuevo material: ' + nombreMat, contenido: 'Se subió un nuevo material: ' + nombreMat + '. Entrá a la sección Materiales para verlo.' });
    }
    toast(editing ? 'Material actualizado ✏️' : 'Material guardado ✅', 'success');
    setModal(false); setEditing(null); setSelectedFile(null); setSelectedFiles([]);
    setForm({ unidad: '', descripcion: '', url: '', tipo: 'pdf', permite_descarga: true, semana: '', tema_id: '', max_vistas: '', publicar_en: '' });
    load();
  };

  const bulkSave = async () => {
    if (!selectedFiles.length) return;
    const prefix = form.unidad.trim();
    let done = 0, errors = 0;
    setBulkProgress({ current: 0, total: selectedFiles.length, name: '' });
    for (const file of selectedFiles) {
      setBulkProgress({ current: done + errors + 1, total: selectedFiles.length, name: file.name });
      try {
        const ext = file.name.split('.').pop().toLowerCase();
        const path = `${Date.now()}_${Math.random().toString(36).slice(2,8)}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
        const { error: upErr } = await supabase.storage.from('materiales').upload(path, file);
        if (upErr) throw upErr;
        const { data: urlData } = supabase.storage.from('materiales').getPublicUrl(path);
        let tipo = 'pdf';
        if (['doc','docx'].includes(ext)) tipo = 'word';
        else if (['xls','xlsx'].includes(ext)) tipo = 'excel';
        else if (['jpg','jpeg','png','gif','webp'].includes(ext)) tipo = 'imagen';
        else if (['mp4','webm','mov'].includes(ext)) tipo = 'video';
        const cleanName = file.name.replace(/\.[^.]+$/, '');
        const { error: dbErr } = await supabase.from('materiales').insert({
          unidad: prefix ? `${prefix} - ${cleanName}` : cleanName,
          descripcion: form.descripcion || null,
          url: urlData.publicUrl,
          tipo,
          permite_descarga: form.permite_descarga,
          semana: form.semana || null,
          tema_id: form.tema_id || null,
          subtema: form.subtema ? form.subtema.trim() : null,
          max_vistas: form.max_vistas ? parseInt(form.max_vistas) : null,
          publicar_en: form.publicar_en ? new Date(form.publicar_en).toISOString() : null,
          aula_id: aulaActiva,
        });
        if (dbErr) throw dbErr;
        done++;
      } catch (err) {
        errors++;
        console.error(`Error subiendo ${file.name}:`, err);
      }
    }
    setBulkProgress(null);
    if (done > 0 && !(form.publicar_en && new Date(form.publicar_en) > new Date()))
      crearNovedadAuto(aulaActiva, { titulo: '📄 Nuevos materiales', contenido: 'Se subieron ' + done + ' materiales nuevos. Entrá a la sección Materiales para verlos.' });
    toast(errors > 0 ? `${done} subidos, ${errors} con error` : `✅ ${done} materiales subidos`, errors > 0 ? 'error' : 'success');
    setModal(false); setSelectedFiles([]); setSelectedFile(null);
    setForm({ unidad: '', descripcion: '', url: '', tipo: 'pdf', permite_descarga: true, semana: '', tema_id: '', max_vistas: '', publicar_en: '' });
    load();
  };

  const saveTema = async () => {
    if (!temaForm.nombre) return toast('El nombre del tema es requerido', 'error');
    const { error } = editingTema
      ? await supabase.from('temas_materiales').update(temaForm).eq('id', editingTema)
      : await supabase.from('temas_materiales').insert({ ...temaForm, aula_id: aulaActiva });
    if (error) return toast(error.message, 'error');
    toast(editingTema ? 'Tema actualizado ✏️' : 'Tema creado ✅', 'success');
    setTemaModal(false); setEditingTema(null);
    setTemaForm({ nombre: '', descripcion: '', color: '#6c63ff', orden: 0 });
    load();
  };

  const deleteTema = async id => {
    if (!confirm('¿Eliminar tema? Los materiales quedarán sin tema.')) return;
    await supabase.from('temas_materiales').delete().eq('id', id);
    toast('Tema eliminado', 'info'); load();
  };

  const openEditTema = t => {
    setTemaForm({ nombre: t.nombre, descripcion: t.descripcion || '', color: t.color || '#6c63ff', orden: t.orden || 0 });
    setEditingTema(t.id); setTemaModal(true);
  };

  const toggleTema = id => setExpandedTemas(p => ({ ...p, [id]: !p[id] }));

  const reorderTemas = async (fromId, toId) => {
    if (fromId === toId) return;
    const fromIdx = temas.findIndex(t => t.id === fromId);
    const toIdx = temas.findIndex(t => t.id === toId);
    const newOrder = [...temas];
    const [moved] = newOrder.splice(fromIdx, 1);
    newOrder.splice(toIdx, 0, moved);
    setTemas(newOrder);
    await Promise.all(newOrder.map((t, i) =>
      supabase.from('temas_materiales').update({ orden: i }).eq('id', t.id)
    ));
  };

  const toggleDescarga = async (id, val) => {
    await supabase.from('materiales').update({ permite_descarga: val }).eq('id', id);
    load();
  };

  const openEdit = m => {
    setForm({ unidad: m.unidad || m.titulo || '', descripcion: m.descripcion || '', url: m.url || '', tipo: m.tipo || 'pdf', permite_descarga: m.permite_descarga !== false, semana: m.semana || '', tema_id: m.tema_id || '', subtema: m.subtema || '', max_vistas: m.max_vistas != null ? String(m.max_vistas) : '', publicar_en: m.publicar_en ? new Date(m.publicar_en).toISOString().slice(0,16) : '' });
    setEditing(m.id); setSelectedFile(null); setSelectedFiles([]); setModal(true);
  };

  const remove = async id => {
    if (!confirm('¿Eliminar material?')) return;
    await supabase.from('materiales').delete().eq('id', id);
    toast('Material eliminado', 'info'); load();
  };

  const verStats = async mat => {
    setStatsModal(mat); setStatsLoading(true); setStatsData([]);
    const { data } = await supabase
      .from('visualizaciones_materiales')
      .select('*, alumnos(nombre, email)')
      .eq('material_id', mat.id)
      .order('created_at', { ascending: false });
    setStatsData(data || []); setStatsLoading(false);
  };

  if (!aulaActiva) return <SinAula />;
  if (loading) return <Loading />;

  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">📄 Materiales</div>
          <div className="page-subtitle">{temas.length} temas · {mats.length} materiales</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost" onClick={() => { setTemaForm({nombre:'',descripcion:'',color:'#6c63ff',orden:temas.length}); setEditingTema(null); setTemaModal(true); }}>📂 Nuevo tema</button>
          <button className="btn btn-primary" onClick={() => { setForm({unidad:'',descripcion:'',url:'',tipo:'pdf',permite_descarga:true,semana:'',tema_id:''}); setEditing(null); setSelectedFile(null); setSelectedFiles([]); setModal(true); }}>➕ Nuevo material</button>
        </div>
      </div>

      <div className="tabs">
        <button className={`tab ${vistaTab==='temas'?'active':''}`} onClick={() => setVistaTab('temas')}>📂 Por Temas</button>
        <button className={`tab ${vistaTab==='lista'?'active':''}`} onClick={() => setVistaTab('lista')}>📋 Lista completa</button>
      </div>

      {vistaTab === 'temas' && (
        <div>
          {temas.length === 0 && mats.length === 0 && <Empty icon="📄" text="No hay materiales. Creá un tema para empezar." />}
          {temas.map(t => {
            const tMats = mats.filter(m => m.tema_id === t.id);
            const isOpen = expandedTemas[t.id];
            const isDragging = dragTema === t.id;
            const isDragOver = dragOverTema === t.id && dragTema !== t.id;
            return (
              <div
                key={t.id}
                draggable
                onDragStart={() => setDragTema(t.id)}
                onDragOver={e => { e.preventDefault(); setDragOverTema(t.id); }}
                onDragEnd={() => { setDragTema(null); setDragOverTema(null); }}
                onDrop={e => { e.preventDefault(); if (dragTema) reorderTemas(dragTema, t.id); setDragTema(null); setDragOverTema(null); }}
                style={{marginBottom:14,opacity:isDragging?0.4:1,outline:isDragOver?'2px dashed var(--accent)':'2px solid transparent',borderRadius:12,transition:'opacity 0.15s, outline 0.1s'}}
              >
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:isOpen?'12px 12px 0 0':'12px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:`4px solid ${t.color||'var(--accent)'}`,cursor:'pointer'}} onClick={() => toggleTema(t.id)}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <span style={{fontSize:'1rem',color:'var(--text2)',cursor:'grab',userSelect:'none'}} title="Arrastrar para reordenar">⠿</span>
                    <span style={{fontSize:'1.2rem'}}>📂</span>
                    <div>
                      <div style={{fontWeight:700,color:t.color||'var(--accent)'}}>{t.nombre}</div>
                      {t.descripcion && <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:1}}>{t.descripcion}</div>}
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:'0.78rem',color:'var(--text2)'}}>{tMats.length} materiales</span>
                    <button className="btn btn-ghost btn-sm" onClick={e => { e.stopPropagation(); openEditTema(t); }}>✏️</button>
                    <button className="btn btn-danger btn-sm" onClick={e => { e.stopPropagation(); deleteTema(t.id); }}>🗑️</button>
                    <span style={{color:'var(--text2)'}}>{isOpen?'▲':'▼'}</span>
                  </div>
                </div>
                {isOpen && (
                  <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',overflow:'hidden'}}>
                    {tMats.length === 0 ? (
                      <div style={{padding:'16px 20px',color:'var(--text2)',fontSize:'0.84rem',fontStyle:'italic',background:'var(--surface)',display:'flex',alignItems:'center',gap:12}}>
                        Sin materiales en este tema.
                        <button className="btn btn-ghost btn-sm" onClick={() => { setForm({unidad:'',descripcion:'',url:'',tipo:'pdf',permite_descarga:true,semana:'',tema_id:t.id}); setEditing(null); setSelectedFile(null); setSelectedFiles([]); setModal(true); }}>➕ Agregar</button>
                      </div>
                    ) : (
                      <table style={{width:'100%',borderCollapse:'collapse'}}>
                        <thead><tr style={{background:'var(--surface2)'}}>
                          {['Tipo','Título','Descarga',''].map(h => <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)'}}>{h}</th>)}
                        </tr></thead>
                        <tbody>
                          {agruparPorSubtema(tMats).map(g => {
                            const subKey = `${t.id}__${g.subtema}`;
                            const subAbierto = g.subtema === '' || !subCerr[subKey];
                            return (
                            <React.Fragment key={g.subtema || '_sin_'}>
                              {g.subtema && (
                                <tr style={{background:'var(--surface2)',cursor:'pointer'}} onClick={() => setSubCerr(s => ({ ...s, [subKey]: !s[subKey] }))}>
                                  <td colSpan={4} style={{padding:'8px 16px',fontWeight:700,fontSize:'0.78rem',color:t.color||'var(--accent)'}}>{subAbierto ? '▼' : '▶'} 📁 {g.subtema} <span style={{color:'var(--text2)',fontWeight:400}}>({g.items.length})</span></td>
                                </tr>
                              )}
                              {subAbierto && g.items.map(m => {
                            const ti = TIPO_INFO[m.tipo] || { icon:'📄' };
                            return (
                              <tr key={m.id} style={{borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                                <td style={{padding:'10px 16px'}}><span style={{fontSize:'1.3rem'}}>{ti.icon}</span></td>
                                <td style={{padding:'10px 16px'}}><strong style={{fontSize:'0.88rem'}}>{m.unidad||m.titulo}</strong>{m.publicar_en && new Date(m.publicar_en) > new Date() && <span className="chip chip-yellow" style={{marginLeft:8,fontSize:'0.68rem'}}>⏰ {new Date(m.publicar_en).toLocaleDateString('es-AR',{day:'2-digit',month:'short'})} {new Date(m.publicar_en).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>}{m.descripcion&&<><br/><span style={{fontSize:'0.75rem',color:'var(--text2)'}}>{m.descripcion}</span></>}</td>
                                <td style={{padding:'10px 16px'}}>
                                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                                    <div onClick={() => toggleDescarga(m.id,!m.permite_descarga)} style={{width:38,height:20,borderRadius:10,background:m.permite_descarga!==false?'var(--success)':'var(--border)',cursor:'pointer',position:'relative',transition:'background 0.3s',flexShrink:0}}>
                                      <div style={{position:'absolute',top:2,left:m.permite_descarga!==false?19:2,width:16,height:16,borderRadius:'50%',background:'white',transition:'left 0.3s'}} />
                                    </div>
                                    <span style={{fontSize:'0.72rem',color:'var(--text2)'}}>{m.permite_descarga!==false?'🔓':'🔒'}</span>
                                  </div>
                                </td>
                                <td style={{padding:'10px 16px'}}>
                                  <div style={{display:'flex',gap:6}}>
                                    <button className="btn btn-ghost btn-sm" onClick={() => window.open(m.url,'_blank')}>👁️ Ver</button>
                                    <button className="btn btn-ghost btn-sm" onClick={() => verStats(m)} title="Visualizaciones">📊</button>
                                    <button className="btn btn-ghost btn-sm" onClick={() => openEdit(m)}>✏️</button>
                                    <button className="btn btn-danger btn-sm" onClick={() => remove(m.id)}>🗑️</button>
                                  </div>
                                </td>
                              </tr>
                            );
                              })}
                            </React.Fragment>
                            );
                          })}
                        </tbody>
                      </table>
                    )}
                  </div>
                )}
              </div>
            );
          })}
          {mats.filter(m=>!m.tema_id).length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:expandedTemas['sin-tema']?'12px 12px 0 0':'12px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:'4px solid var(--border)',cursor:'pointer'}} onClick={() => toggleTema('sin-tema')}>
                <div style={{fontWeight:600,color:'var(--text2)'}}>📁 Sin tema asignado</div>
                <span style={{color:'var(--text2)'}}>{expandedTemas['sin-tema']?'▲':'▼'}</span>
              </div>
              {expandedTemas['sin-tema'] && (
                <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',overflow:'hidden'}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <tbody>
                      {mats.filter(m=>!m.tema_id).map(m => {
                        const ti = TIPO_INFO[m.tipo]||{icon:'📄'};
                        return (
                          <tr key={m.id} style={{borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                            <td style={{padding:'10px 16px'}}><span style={{fontSize:'1.3rem'}}>{ti.icon}</span></td>
                            <td style={{padding:'10px 16px'}}><strong style={{fontSize:'0.88rem'}}>{m.unidad||m.titulo}</strong>{m.publicar_en && new Date(m.publicar_en) > new Date() && <span className="chip chip-yellow" style={{marginLeft:8,fontSize:'0.68rem'}}>⏰ {new Date(m.publicar_en).toLocaleDateString('es-AR',{day:'2-digit',month:'short'})} {new Date(m.publicar_en).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>}</td>
                            <td style={{padding:'10px 16px'}}>
                              <div style={{display:'flex',gap:6}}>
                                <button className="btn btn-ghost btn-sm" onClick={() => verStats(m)}>📊</button>
                                <button className="btn btn-ghost btn-sm" onClick={() => openEdit(m)}>✏️</button>
                                <button className="btn btn-danger btn-sm" onClick={() => remove(m.id)}>🗑️</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {vistaTab === 'lista' && (
        mats.length === 0 ? <Empty icon="📄" text="No hay materiales" /> : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Tipo</th><th>Título</th><th>Tema</th><th>Descarga</th><th>Acciones</th></tr></thead>
              <tbody>
                {mats.map(m => {
                  const ti = TIPO_INFO[m.tipo]||{icon:'📄'};
                  return (
                    <tr key={m.id}>
                      <td style={{fontSize:'1.3rem'}}>{ti.icon}</td>
                      <td><strong>{m.unidad||m.titulo}</strong>{m.publicar_en && new Date(m.publicar_en) > new Date() && <span className="chip chip-yellow" style={{marginLeft:8,fontSize:'0.68rem'}}>⏰ {new Date(m.publicar_en).toLocaleDateString('es-AR',{day:'2-digit',month:'short'})} {new Date(m.publicar_en).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>}</td>
                      <td style={{color:'var(--text2)',fontSize:'0.82rem'}}>{temas.find(t=>t.id===m.tema_id)?.nombre||'—'}</td>
                      <td><span className={`chip ${m.permite_descarga!==false?'chip-green':'chip-red'}`}>{m.permite_descarga!==false?'🔓':'🔒'}</span></td>
                      <td>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-ghost btn-sm" onClick={() => verStats(m)}>📊</button>
                          <button className="btn btn-ghost btn-sm" onClick={() => openEdit(m)}>✏️</button>
                          <button className="btn btn-danger btn-sm" onClick={() => remove(m.id)}>🗑️</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )
      )}

      {/* Stats modal */}
      {statsModal && (
        <Modal title={`📊 Visualizaciones — ${statsModal.unidad || statsModal.titulo}`} onClose={() => { setStatsModal(null); setStatsData([]); }}>
          {statsLoading ? (
            <div style={{textAlign:'center',padding:'30px 0',color:'var(--text2)'}}>⏳ Cargando...</div>
          ) : (
            <>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:20}}>
                <div style={{background:'var(--surface2)',borderRadius:12,padding:'14px',textAlign:'center'}}>
                  <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.6rem',color:'var(--accent)'}}>{statsData.length}</div>
                  <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:4}}>Total vistas</div>
                </div>
                <div style={{background:'var(--surface2)',borderRadius:12,padding:'14px',textAlign:'center'}}>
                  <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.6rem',color:'var(--success)'}}>
                    {new Set(statsData.filter(v=>v.alumno_id).map(v=>v.alumno_id)).size}
                  </div>
                  <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:4}}>Alumnos únicos</div>
                </div>
                <div style={{background:'var(--surface2)',borderRadius:12,padding:'14px',textAlign:'center'}}>
                  <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.1rem',color:'var(--accent2)'}}>
                    {statsData.length > 0 ? new Date(statsData[0].created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) : '—'}
                  </div>
                  <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:4}}>Última vista</div>
                </div>
              </div>
              {statsData.length === 0 ? (
                <div style={{textAlign:'center',padding:'30px 0',color:'var(--text2)'}}>
                  <div style={{fontSize:'2rem',marginBottom:8}}>📊</div>
                  <div>Este material no tiene visualizaciones aún</div>
                </div>
              ) : (
                <div style={{maxHeight:360,overflowY:'auto'}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead>
                      <tr style={{background:'var(--surface2)',position:'sticky',top:0}}>
                        {['Alumno','Email','Fecha y hora'].map(h => (
                          <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)'}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {statsData.map((v, i) => {
                        const d = new Date(v.created_at);
                        return (
                          <tr key={i} style={{borderTop:'1px solid var(--border)'}}>
                            <td style={{padding:'10px 14px'}}>
                              <div style={{display:'flex',alignItems:'center',gap:10}}>
                                <div style={{width:30,height:30,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:'0.78rem',color:'white',flexShrink:0}}>
                                  {(v.alumnos?.nombre||'?')[0].toUpperCase()}
                                </div>
                                <strong style={{fontSize:'0.86rem'}}>{v.alumnos?.nombre||'Anónimo'}</strong>
                              </div>
                            </td>
                            <td style={{padding:'10px 14px',color:'var(--text2)',fontSize:'0.82rem'}}>{v.alumnos?.email||'—'}</td>
                            <td style={{padding:'10px 14px',fontFamily:'Space Mono',fontSize:'0.78rem',color:'var(--text2)'}}>
                              {d.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})}
                              {' '}<span style={{color:'var(--accent)'}}>{d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </>
          )}
        </Modal>
      )}

      {/* Modal nuevo/editar tema */}
      {temaModal && (
        <Modal title={editingTema ? '✏️ Editar tema' : '📂 Nuevo tema'} onClose={() => setTemaModal(false)}>
          <div className="form-group">
            <label>Nombre del tema</label>
            <input placeholder="Ej: Unidad 1 - Introducción" value={temaForm.nombre} onChange={e => setTemaForm(p=>({...p,nombre:e.target.value}))} />
          </div>
          <div className="form-group">
            <label>Descripción (opcional)</label>
            <textarea value={temaForm.descripcion} onChange={e => setTemaForm(p=>({...p,descripcion:e.target.value}))} />
          </div>
          <div className="form-group">
            <label>Color</label>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginTop:6}}>
              {TEMA_COLORS.map(c => (
                <div key={c} onClick={() => setTemaForm(p=>({...p,color:c}))} style={{width:34,height:34,borderRadius:'50%',background:c,cursor:'pointer',border:temaForm.color===c?'3px solid white':'3px solid transparent',outline:temaForm.color===c?`2px solid ${c}`:'none'}} />
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => setTemaModal(false)}>Cancelar</button>
            <button className="btn btn-primary" onClick={saveTema}>💾 Guardar tema</button>
          </div>
        </Modal>
      )}

      {/* Modal nuevo/editar material */}
      {modal && (
        <Modal title={editing ? '✏️ Editar material' : selectedFiles.length > 1 ? `📦 Subir ${selectedFiles.length} archivos` : '➕ Nuevo material'} onClose={() => { setModal(false); setSelectedFiles([]); }}>
          <div className="form-group">
            <label>{selectedFiles.length > 1 ? 'Prefijo del título (opcional)' : 'Título'}</label>
            <input value={form.unidad} onChange={e => setForm(p=>({...p,unidad:e.target.value}))} placeholder={selectedFiles.length > 1 ? 'Ej: Examenes 2025 → genera "Examenes 2025 - nombre_archivo"' : 'Nombre del material'} />
          </div>
          <div className="form-group"><label>Descripción</label><textarea value={form.descripcion} onChange={e => setForm(p=>({...p,descripcion:e.target.value}))} placeholder="Opcional" /></div>
          <div className="form-group">
            <label>📂 Tema</label>
            <select value={form.tema_id} onChange={e => setForm(p=>({...p,tema_id:e.target.value}))}>
              <option value="">-- Sin tema --</option>
              {temas.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label>📁 Subtema (opcional, ej: 2024)</label>
            <input list="lista-subtemas" value={form.subtema || ''} onChange={e => setForm(p=>({...p,subtema:e.target.value}))} placeholder="Escribí uno nuevo o elegí de la lista" />
            <datalist id="lista-subtemas">
              {[...new Set(mats.filter(m => (!form.tema_id || m.tema_id === form.tema_id) && m.subtema).map(m => m.subtema.trim()))].map(s => <option key={s} value={s} />)}
            </datalist>
            <div style={{fontSize:'0.72rem',color:'var(--text2)',marginTop:4}}>Agrupa los materiales dentro del tema (por ejemplo, por año).</div>
          </div>
          <div className="form-group">
            <label>📅 Semana</label>
            <select value={form.semana} onChange={e => setForm(p=>({...p,semana:e.target.value}))}>
              <option value="">-- Sin asignar --</option>
              {['Semana 1','Semana 2','Semana 3','Semana 4','Semana 5','Semana 6'].map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          {selectedFiles.length <= 1 && (
            <div className="form-group">
              <label>Tipo de archivo</label>
              <select value={form.tipo} onChange={e => setForm(p=>({...p,tipo:e.target.value}))}>
                {Object.entries(TIPO_INFO).map(([k,v]) => <option key={k} value={k}>{v.icon} {v.label}</option>)}
              </select>
            </div>
          )}
          <div className="form-group">
            <label>📎 {selectedFiles.length > 1 ? `${selectedFiles.length} archivos seleccionados` : 'Subir archivo'}</label>
            <input ref={fileRef} type="file" multiple style={{display:'none'}} accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.mp4,.webm"
              onChange={e => {
                const files = Array.from(e.target.files);
                if (files.length > 1) { setSelectedFiles(files); setSelectedFile(null); setForm(p=>({...p,url:''})); }
                else if (files.length === 1) { setSelectedFiles([]); uploadFile(files[0]); }
              }} />
            {selectedFiles.length > 1 ? (
              <div>
                <div style={{maxHeight:160,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,marginBottom:8}}>
                  {selectedFiles.map((f,i) => (
                    <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',borderBottom:i<selectedFiles.length-1?'1px solid var(--border)':'none',fontSize:'0.82rem'}}>
                      <span>{f.name.split('.').pop().toLowerCase()==='pdf'?'📕':['doc','docx'].includes(f.name.split('.').pop().toLowerCase())?'📘':['xls','xlsx'].includes(f.name.split('.').pop().toLowerCase())?'📗':'📄'}</span>
                      <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text)'}}>{f.name}</span>
                      <span style={{color:'var(--text2)',flexShrink:0}}>{(f.size/1024).toFixed(0)} KB</span>
                    </div>
                  ))}
                </div>
                <button className="btn btn-ghost btn-sm" onClick={() => { setSelectedFiles([]); fileRef.current.value=''; }}>✕ Limpiar selección</button>
              </div>
            ) : (
              <>
                <button className="btn btn-ghost" style={{width:'100%',justifyContent:'center',marginBottom:8}} onClick={() => fileRef.current.click()} disabled={uploading}>
                  {uploading ? `⏳ Subiendo... ${uploadPct}%` : '📤 Seleccionar archivo(s)'}
                </button>
                {form.url && <div style={{fontSize:'0.78rem',color:'var(--success)',background:'rgba(67,233,123,0.1)',padding:'6px 10px',borderRadius:8}}>✅ {form.url.split('/').pop().slice(0,50)}</div>}
              </>
            )}
          </div>
          {selectedFiles.length <= 1 && (
            <div className="form-group">
              <label>O pegar URL externa</label>
              <input type="url" placeholder="https://..." value={form.url} onChange={e => setForm(p=>({...p,url:e.target.value}))} />
            </div>
          )}
          <div className="form-group">
            <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
              <input type="checkbox" checked={form.permite_descarga} onChange={e => setForm(p=>({...p,permite_descarga:e.target.checked}))} style={{width:'auto'}} />
              Permitir descarga por el alumno
            </label>
          </div>

          </div>
          {bulkProgress && (
            <div style={{marginBottom:12}}>

              <div className="progress-bar"><div className="progress-fill" style={{width:`${Math.round(bulkProgress.current/bulkProgress.total*100)}%`}} /></div>
            </div>

          {uploading && <div className="progress-bar" style={{marginBottom:8}}><div className="progress-fill" style={{width:`${uploadPct}%`}} /></div>}
          <div className="form-group">
            <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
              <input type="checkbox" checked={!!form.publicar_en} onChange={e=>setForm(p=>({...p,publicar_en:e.target.checked?new Date(Date.now()+3600000).toISOString().slice(0,16):''}))} style={{width:'auto'}} />
              ⏰ Programar publicación
            </label>
            {form.publicar_en && (
              <div style={{marginTop:8}}>
                <input type="datetime-local" value={form.publicar_en} min={new Date().toISOString().slice(0,16)} onChange={e=>setForm(p=>({...p,publicar_en:e.target.value}))} />
                <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:4}}>El contenido será visible para los alumnos a partir de esta fecha y hora</div>
              </div>
            )}
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => { setModal(false); setSelectedFiles([]); }} disabled={uploading||!!bulkProgress}>Cancelar</button>
            {selectedFiles.length > 1
              ? <button className="btn btn-primary" onClick={bulkSave} disabled={!!bulkProgress}>{bulkProgress ? `⏳ ${bulkProgress.current}/${bulkProgress.total}...` : `📦 Subir ${selectedFiles.length} archivos`}</button>
              : <button className="btn btn-primary" onClick={save} disabled={uploading}>{uploading ? '⏳ Subiendo...' : '💾 Guardar'}</button>
            }
          </div>
        </Modal>
      )}
    </div>
  );
}


// ─── ADMIN EVALUACIONES ──────────────────────────────────────────────
function AdminEvaluaciones({ aulaActiva }) {
  const [evals, setEvals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const emptyForm = { titulo: '', descripcion: '', link_google: '', fecha_limite: '', tema: '', visible: true, publicar_en: '' };
  const [form, setForm] = useState(emptyForm);
  const toast = useToast();
  const today = new Date().toISOString().split('T')[0];

  const load = async () => {
    if (!aulaActiva) { setLoading(false); return; }
    const { data, error } = await supabase
      .from('evaluaciones')
      .select('id, titulo, descripcion, link_google, fecha_limite, tema, visible, estado, publicar_en')
      .eq('aula_id', aulaActiva)
      .order('id', { ascending: false });
    if (error) console.error('EVAL:', error);
    setEvals(data || []); setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [aulaActiva]);

  const save = async () => {
    if (!form.titulo) return toast('El título es requerido', 'error');
    if (!form.link_google) return toast('El link de Google Forms es requerido', 'error');
    const payload = {
      titulo: form.titulo,
      descripcion: form.descripcion || null,
      link_google: form.link_google || null,
      fecha_limite: form.fecha_limite ? new Date(form.fecha_limite).toISOString() : null,
      tema: form.tema || null,
      visible: form.visible,
      estado: 'disponible',
      publicar_en: form.publicar_en ? new Date(form.publicar_en).toISOString() : null,
      aula_id: aulaActiva,
    };
    const { error } = editing
      ? await supabase.from('evaluaciones').update(payload).eq('id', editing)
      : await supabase.from('evaluaciones').insert(payload);
    if (error) return toast(error.message, 'error');
    if (!editing && form.visible !== false && !(form.publicar_en && new Date(form.publicar_en) > new Date()))
      crearNovedadAuto(aulaActiva, { titulo: '📝 Nueva evaluación: ' + form.titulo, contenido: 'Hay una nueva evaluación disponible: ' + form.titulo + '. Entrá a la sección Evaluaciones.', tipo: 'tarea' });
    toast(editing ? 'Evaluación actualizada ✏️' : 'Evaluación agregada ✅', 'success');
    setModal(false); setEditing(null); setForm(emptyForm); load();
  };

  const remove = async id => {
    if (!confirm('¿Eliminar esta evaluación?')) return;
    await supabase.from('evaluaciones').delete().eq('id', id);
    toast('Evaluación eliminada', 'info'); load();
  };

  // Convierte una fecha guardada a formato para el input datetime-local, usando la hora LOCAL (no UTC).
  const aInputLocal = (valor) => {
    if (!valor) return '';
    const d = new Date(valor);
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  };

  const openEdit = ev => {
    setForm({ titulo: ev.titulo, descripcion: ev.descripcion || '', link_google: ev.link_google || '', fecha_limite: aInputLocal(ev.fecha_limite), tema: ev.tema || '', visible: ev.visible !== false, publicar_en: aInputLocal(ev.publicar_en) });
    setEditing(ev.id); setModal(true);
  };

  const toggleVisible = async (id, visible) => {
    await supabase.from('evaluaciones').update({ visible: !visible }).eq('id', id);
    load();
  };

  const isVencida = ev => ev.fecha_limite && new Date(ev.fecha_limite) < new Date();
  const isProxVencer = ev => ev.fecha_limite && new Date(ev.fecha_limite) >= new Date() && new Date(ev.fecha_limite) <= new Date(Date.now() + 3*24*60*60*1000);

  if (!aulaActiva) return <SinAula />;
  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">📝 Evaluaciones</div>
          <div className="page-subtitle">{evals.filter(e=>e.visible!==false).length} activas · {evals.filter(e=>isVencida(e)).length} vencidas</div>
        </div>
        <button className="btn btn-primary" onClick={() => { setForm(emptyForm); setEditing(null); setModal(true); }}>➕ Nueva evaluación</button>
      </div>

      {evals.length === 0 ? <Empty icon="📝" text="No hay evaluaciones. Agregá un link de Google Forms para empezar." /> : (
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {evals.map(ev => {
            const vencida = isVencida(ev);
            const proxVencer = isProxVencer(ev);
            return (
              <div key={ev.id} className="card" style={{opacity: !ev.visible ? 0.6 : 1, borderLeft: `4px solid ${vencida ? 'var(--danger)' : proxVencer ? 'var(--warning)' : 'var(--accent)'}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:6}}>
                      <div style={{fontWeight:700,fontSize:'1rem'}}>{ev.titulo}</div>
                      {ev.publicar_en && new Date(ev.publicar_en) > new Date() && <span className="chip chip-yellow" style={{marginLeft:8,fontSize:'0.68rem'}}>⏰ {new Date(ev.publicar_en).toLocaleDateString('es-AR',{day:'2-digit',month:'short'})} {new Date(ev.publicar_en).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>}
                      {ev.tema && <span className="chip chip-blue">{ev.tema}</span>}
                      {vencida && <span className="chip chip-red">⏰ Vencida</span>}
                      {proxVencer && !vencida && <span className="chip chip-yellow">⚠️ Vence pronto</span>}
                      {!ev.visible && <span className="chip" style={{background:'var(--surface2)',color:'var(--text2)'}}>👁️ Oculta</span>}
                    </div>
                    {ev.descripcion && <div style={{fontSize:'0.84rem',color:'var(--text2)',marginBottom:8}}>{ev.descripcion}</div>}
                    <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                      <a href={ev.link_google} target="_blank" rel="noreferrer" style={{fontSize:'0.82rem',color:'var(--accent)',display:'flex',alignItems:'center',gap:4}}>
                        🔗 Ver formulario
                      </a>
                      {ev.fecha_limite && (
                        <span style={{fontSize:'0.82rem',color: vencida ? 'var(--danger)' : proxVencer ? 'var(--warning)' : 'var(--text2)',display:'flex',alignItems:'center',gap:4}}>
                          📅 Fecha límite: <strong>{new Date(ev.fecha_limite).toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric',timeZone:'America/Argentina/Buenos_Aires'})} a las {new Date(ev.fecha_limite).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Argentina/Buenos_Aires'})} hs</strong>
                        </span>
                      )}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
                    <div onClick={() => toggleVisible(ev.id, ev.visible)} style={{width:40,height:22,borderRadius:11,background:ev.visible!==false?'var(--success)':'var(--border)',cursor:'pointer',position:'relative',transition:'background 0.3s'}} title={ev.visible!==false?'Visible para alumnos':'Oculta para alumnos'}>
                      <div style={{position:'absolute',top:3,left:ev.visible!==false?21:3,width:16,height:16,borderRadius:'50%',background:'white',transition:'left 0.3s'}} />
                    </div>
                    <button className="btn btn-ghost btn-sm" onClick={() => openEdit(ev)}>✏️</button>
                    <button className="btn btn-danger btn-sm" onClick={() => remove(ev.id)}>🗑️</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modal && (
        <Modal title={editing ? '✏️ Editar evaluación' : '➕ Nueva evaluación'} onClose={() => { setModal(false); setEditing(null); setForm(emptyForm); }}>
          <div className="form-group">
            <label>Título</label>
            <input placeholder="Ej: Parcial 1 — Unidad 1 y 2" value={form.titulo} onChange={e => setForm(p=>({...p,titulo:e.target.value}))} />
          </div>
          <div className="form-group">
            <label>Descripción (opcional)</label>
            <textarea placeholder="Instrucciones, temas que entran, puntaje..." value={form.descripcion} onChange={e => setForm(p=>({...p,descripcion:e.target.value}))} style={{minHeight:70}} />
          </div>
          <div className="form-group">
            <label>Tema / Unidad (opcional)</label>
            <input placeholder="Ej: Unidad 1, Parcial 1..." value={form.tema} onChange={e => setForm(p=>({...p,tema:e.target.value}))} />
          </div>
          <div className="form-group">
            <label>🔗 Link de Google Forms</label>
            <input type="url" placeholder="https://docs.google.com/forms/d/..." value={form.link_google} onChange={e => setForm(p=>({...p,link_google:e.target.value}))} />
            <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:4}}>Pegá el link del formulario de Google Forms</div>
          </div>
          <div className="form-group">
            <label>📅 Fecha y hora límite (opcional)</label>
            <input type="datetime-local" value={form.fecha_limite} onChange={e => setForm(p=>({...p,fecha_limite:e.target.value}))} />
            <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:4}}>Después de esta fecha y hora el link se mostrará como vencido para los alumnos</div>

          <div className="form-group">
            <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
              <input type="checkbox" checked={form.visible} onChange={e => setForm(p=>({...p,visible:e.target.checked}))} style={{width:'auto'}} />

            </label>

          <div className="form-group">
            <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
              <input type="checkbox" checked={!!form.publicar_en} onChange={e=>setForm(p=>({...p,publicar_en:e.target.checked?new Date(Date.now()+3600000).toISOString().slice(0,16):''}))} style={{width:'auto'}} />
              ⏰ Programar publicación

            {form.publicar_en && (
              <div style={{marginTop:8}}>
                <input type="datetime-local" value={form.publicar_en} min={new Date().toISOString().slice(0,16)} onChange={e=>setForm(p=>({...p,publicar_en:e.target.value}))} />
