// ─── ADMIN ALUMNOS ────────────────────────────────────────────────────
function AdminAlumnos() {
  const [alumnos, setAlumnos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(false);
  const [pwModal, setPwModal] = useState(null);
  const [newPw, setNewPw] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [form, setForm] = useState({ nombre: '', email: '', telefono: '', estado: 'activo', password: '' });
  const [editing, setEditing] = useState(null);
  const toast = useToast();
  const fileRef = useRef();

  const load = async () => {
    const { data } = await supabase.from('alumnos').select('*').order('created_at', { ascending: false });
    setAlumnos(data || []);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const callEdge = async (action, payload) => {
    const { data: { session } } = await supabase.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/manage-users`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session?.access_token}` },
      body: JSON.stringify({ action, ...payload })
    });
    return res.json();
  };

  const save = async () => {
    if (!form.nombre || !form.email) return toast('Nombre y email requeridos', 'error');
    if (!editing && !form.password) return toast('La contraseña es requerida', 'error');
    if (!editing && form.password.length < 6) return toast('Mínimo 6 caracteres', 'error');
    setSaving(true);
    try {
      if (editing) {
        const updatePayload = { nombre: form.nombre, estado: form.estado };
        if (form.telefono !== undefined) updatePayload.telefono = form.telefono;
        const { error } = await supabase.from('alumnos').update(updatePayload).eq('id', editing);
        if (error) throw new Error(error.message);
        toast('Alumno actualizado ✏️', 'success');
      } else {
        // 1. Crear usuario en Supabase Auth
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email: form.email,
          password: form.password,
          options: { data: { nombre: form.nombre } }
        });
        if (authError) throw new Error(authError.message);
        // 2. Insertar en tabla alumnos
        const insertPayload = { nombre: form.nombre, email: form.email, estado: form.estado || 'activo' };
        if (form.telefono) insertPayload.telefono = form.telefono;
        const { error: dbError } = await supabase.from('alumnos').insert(insertPayload);
        if (dbError) throw new Error(dbError.message);
        toast('Alumno creado con acceso a la plataforma ✅', 'success');
      }
      setModal(false); setEditing(null); setForm({ nombre: '', email: '', telefono: '', estado: 'activo', password: '' });
      load();
    } catch (err) { toast(err.message, 'error'); }
    finally { setSaving(false); }
  };

  const changePassword = async () => {
    if (!newPw || newPw.length < 6) return toast('Mínimo 6 caracteres', 'error');
    setSaving(true);
    try {
      // Note: password change for other users requires admin/service role.
      // This will show a note to the admin to do it from Supabase dashboard,
      // or use the Edge Function if deployed.
      const result = await callEdge('change_password', { email: pwModal.email, password: newPw });
      if (result && result.error) {
        // Fallback message if Edge Function not deployed
        toast('Para cambiar contraseñas de alumnos, desplegá la Edge Function manage-users o usá el panel de Supabase Auth', 'error');
      } else {
        toast('Contraseña actualizada 🔑', 'success');
        setPwModal(null); setNewPw('');
      }
    }catch (err) { toast(err.message, 'error'); }
    finally { setSaving(false); }
  };

  const remove = async id => {
    if (!confirm('¿Eliminar alumno?')) return;
    await supabase.from('alumnos').delete().eq('id', id);
    toast('Alumno eliminado', 'info'); load();
  };

  const importExcel = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const wb = XLSX.read(ev.target.result, { type: 'binary' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws);
        const mapped = rows.map(r => ({
          nombre: r.nombre || r.Nombre || '',
          email: r.email || r.Email || '',
          telefono: r.telefono || r.Telefono || '',
          estado: r.estado || 'activo'
        })).filter(r => r.email);
        if (!mapped.length) return toast('No se encontraron datos válidos', 'error');
        const { error } = await supabase.from('alumnos').insert(mapped);
        if (error) toast(error.message, 'error');
        else { toast(`${mapped.length} alumnos importados ✅`, 'info'); load(); }
      } catch { toast('Error al leer el archivo', 'error'); }
    };
    reader.readAsBinaryString(file);
    e.target.value = '';
  };

  const openEdit = a => { setForm({ nombre: a.nombre, email: a.email, telefono: a.telefono || '', estado: a.estado, password: '' }); setEditing(a.id); setModal(true); };
  const filtered = alumnos.filter(a => `${a.nombre} ${a.email}`.toLowerCase().includes(search.toLowerCase()));

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">👥 Alumnos</div>
          <div className="page-subtitle">{alumnos.length} alumnos registrados</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importExcel} />
          <button className="btn btn-ghost" onClick={() => fileRef.current.click()}>📥 Importar Excel</button>
          <button className="btn btn-primary" onClick={() => { setForm({ nombre: '', email: '', telefono: '', estado: 'activo', password: '' }); setEditing(null); setModal(true); }}>➕ Nuevo alumno</button>
        </div>
      </div>
      <div className="search-bar" style={{marginBottom:16}}>
        <span className="search-icon">🔍</span>
        <input placeholder="Buscar por nombre o email..." value={search} onChange={e => setSearch(e.target.value)} />
      </div>
      <div className="table-wrap">
        {filtered.length === 0 ? <Empty icon="👥" text="No hay alumnos" /> : (
          <table>
            <thead><tr><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>
              {filtered.map(a => (
                <tr key={a.id}>
                  <td><strong>{a.nombre}</strong></td>
                  <td style={{color:'var(--text2)'}}>{a.email}</td>
                  <td style={{color:'var(--text2)'}}>{a.telefono || '—'}</td>
                  <td><span className={`chip ${a.estado === 'activo' ? 'chip-green' : 'chip-red'}`}>{a.estado}</span></td>
                  <td>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-ghost btn-sm" onClick={() => openEdit(a)}>✏️ Editar</button>
                      <button className="btn btn-ghost btn-sm" title="Cambiar contraseña" onClick={() => { setPwModal(a); setNewPw(''); setShowPw(false); }}>🔑</button>
                      <button className="btn btn-danger btn-sm" onClick={() => remove(a.id)}>🗑️</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {modal && (
        <Modal title={editing ? '✏️ Editar alumno' : '➕ Nuevo alumno'} onClose={() => setModal(false)}>
          {!editing && (
            <div style={{background:'rgba(108,99,255,0.08)',border:'1px solid rgba(108,99,255,0.25)',borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:'0.82rem',color:'var(--text2)'}}>
              🔐 Se creará el usuario en Supabase Auth y el registro en la plataforma automáticamente.
            </div>
          )}
          <div className="form-group">
            <label>Nombre completo</label>
            <input value={form.nombre} onChange={e => setForm(p => ({ ...p, nombre: e.target.value }))} placeholder="Ej: Juan Pérez" />
          </div>
          <div className="form-group">
            <label>Email</label>
            <input type="email" value={form.email} onChange={e => setForm(p => ({ ...p, email: e.target.value }))} placeholder="alumno@email.com" disabled={!!editing} style={editing ? {opacity:0.5,cursor:'not-allowed'} : {}} />
          </div>
          <div className="form-group">
            <label>Teléfono</label>
            <input value={form.telefono} onChange={e => setForm(p => ({ ...p, telefono: e.target.value }))} placeholder="Opcional" />
          </div>
          {!editing && (
            <div className="form-group">
              <label>🔑 Contraseña de acceso</label>
              <div style={{position:'relative'}}>
                <input type={showPw ? 'text' : 'password'} value={form.password} onChange={e => setForm(p => ({ ...p, password: e.target.value }))} placeholder="Mínimo 6 caracteres" style={{paddingRight:44}} />
                <button type="button" onClick={() => setShowPw(v => !v)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:'1.1rem'}}>{showPw ? '🙈' : '👁️'}</button>
              </div>
            </div>
          )}
          {editing && (
            <div className="form-group">
              <label>Estado</label>
              <select value={form.estado} onChange={e => setForm(p => ({ ...p, estado: e.target.value }))}>
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
              </select>
            </div>
          )}
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => setModal(false)} disabled={saving}>Cancelar</button>
            <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? '⏳ Guardando...' : '💾 Guardar'}</button>
          </div>
        </Modal>
      )}

      {pwModal && (
        <Modal title={`🔑 Cambiar contraseña`} onClose={() => setPwModal(null)}>
          <div style={{color:'var(--text2)',fontSize:'0.84rem',marginBottom:16}}>
            Nueva contraseña para <strong style={{color:'var(--text)'}}>{pwModal.nombre}</strong> ({pwModal.email})
          </div>
          <div className="form-group">
            <label>Nueva contraseña</label>
            <div style={{position:'relative'}}>
              <input type={showPw ? 'text' : 'password'} value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="Mínimo 6 caracteres" style={{paddingRight:44}} autoFocus />
              <button type="button" onClick={() => setShowPw(v => !v)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:'1.1rem'}}>{showPw ? '🙈' : '👁️'}</button>
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => setPwModal(null)} disabled={saving}>Cancelar</button>
            <button className="btn btn-primary" onClick={changePassword} disabled={saving}>{saving ? '⏳ Cambiando...' : '🔑 Actualizar contraseña'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── ADMIN PAGOS ──────────────────────────────────────────────────────
function AdminPagos() {
  const today = new Date().toISOString().split('T')[0];
  const PLANES = ['Parcial', 'Final', 'Cursado Completo'];
  const emptyForm = { alumno_id: '', plan: 'Cursado Completo', monto: '', fecha_pago: today, proximo_pago: '', notas: '' };

  const [pagos, setPagos] = useState([]);
  const [alumnos, setAlumnos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState(emptyForm);
  const [filterAlumno, setFilterAlumno] = useState('');
  const toast = useToast();

  const load = async () => {
    const [p, a] = await Promise.all([
      supabase.from('pagos').select('*, alumnos(nombre, email)').order('fecha_pago', { ascending: false }),
      supabase.from('alumnos').select('id, nombre, estado').order('nombre'),
    ]);
    setPagos(p.data || []); setAlumnos(a.data || []); setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const save = async () => {
    if (!form.alumno_id) return toast('Seleccioná un alumno', 'error');
    if (!form.monto || isNaN(parseFloat(form.monto))) return toast('Ingresá un importe válido', 'error');
    if (!form.plan) return toast('Seleccioná el tipo de plan', 'error');
    const payload = {
      alumno_id: form.alumno_id,
      plan: form.plan,
      monto: parseFloat(form.monto),
      fecha_pago: form.fecha_pago || today,
      proximo_pago: form.proximo_pago || null,
      notas: form.notas || null,
    };
    const { error } = editing
      ? await supabase.from('pagos').update(payload).eq('id', editing)
      : await supabase.from('pagos').insert(payload);
    if (error) return toast(error.message, 'error');
    // Si tiene próximo pago, crear recordatorio automático
    if (!editing && form.proximo_pago && form.alumno_id) {
      await supabase.from('recordatorios').insert({
        alumno_id: form.alumno_id,
        fecha: form.proximo_pago,
        mensaje: `Próximo pago — ${form.plan} — $${parseFloat(form.monto).toLocaleString('es-AR')}`,
      });
    }
    toast(editing ? 'Pago actualizado ✏️' : 'Pago registrado 💳', 'success');
    setModal(false); setEditing(null); setForm(emptyForm); load();
  };

  const remove = async id => {
    if (!confirm('¿Eliminar este pago?')) return;
    await supabase.from('pagos').delete().eq('id', id);
    toast('Pago eliminado', 'info'); load();
  };

  const openEdit = p => {
    setForm({
      alumno_id: p.alumno_id,
      plan: p.plan || 'Cursado Completo',
      monto: p.monto?.toString() || '',
      fecha_pago: p.fecha_pago || today,
      proximo_pago: p.proximo_pago || '',
      notas: p.notas || '',
    });
    setEditing(p.id); setModal(true);
  };

  const totalCobrado = pagos.reduce((s, p) => s + (parseFloat(p.monto) || 0), 0);
  const proximosVenc = pagos.filter(p => p.proximo_pago && p.proximo_pago >= today);
  const filtered = filterAlumno ? pagos.filter(p => p.alumno_id === filterAlumno) : pagos;

  const planColor = plan => {
    if (plan === 'Parcial') return 'chip-yellow';
    if (plan === 'Final') return 'chip-green';
    return 'chip-blue';
  };

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">💳 Pagos</div>
          <div className="page-subtitle">Total cobrado: <strong style={{color:'var(--success)'}}>$ {totalCobrado.toLocaleString('es-AR', {minimumFractionDigits:2})}</strong></div>
        </div>
        <button className="btn btn-primary" onClick={() => { setForm(emptyForm); setEditing(null); setModal(true); }}>➕ Registrar pago</button>
      </div>

      {/* Stats rápidas */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}}>
        {PLANES.map(plan => {
          const planPagos = pagos.filter(p => p.plan === plan);
          const planTotal = planPagos.reduce((s,p) => s + (parseFloat(p.monto)||0), 0);
          return (
            <div key={plan} className="card" style={{padding:'14px 18px'}}>
              <div style={{fontSize:'0.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)',marginBottom:6}}>{plan}</div>
              <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.1rem'}}>$ {planTotal.toLocaleString('es-AR',{minimumFractionDigits:2})}</div>
              <div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:2}}>{planPagos.length} pago{planPagos.length!==1?'s':''}</div>
            </div>
          );
        })}
        {proximosVenc.length > 0 && (
          <div className="card" style={{padding:'14px 18px',borderColor:'var(--accent2)'}}>
            <div style={{fontSize:'0.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--accent2)',marginBottom:6}}>🔔 Próximos pagos</div>
            <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.1rem'}}>{proximosVenc.length}</div>
            <div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:2}}>pendientes</div>
          </div>
        )}
      </div>

      {/* Filtro por alumno */}
      <div style={{display:'flex',gap:12,marginBottom:16,alignItems:'center'}}>
        <select value={filterAlumno} onChange={e => setFilterAlumno(e.target.value)} style={{flex:1,maxWidth:300}}>
          <option value="">Todos los alumnos</option>
          {alumnos.map(a => <option key={a.id} value={a.id}>{a.nombre}</option>)}
        </select>
        {filterAlumno && <button className="btn btn-ghost btn-sm" onClick={() => setFilterAlumno('')}>✕ Quitar filtro</button>}
        <span style={{fontSize:'0.82rem',color:'var(--text2)'}}>{filtered.length} registros</span>
      </div>

      {/* Tabla */}
      <div className="table-wrap">
        {filtered.length === 0 ? <Empty icon="💳" text="No hay pagos registrados" /> : (
          <table>
            <thead>
              <tr>
                <th>Alumno</th>
                <th>Plan</th>
                <th>Importe</th>
                <th>Fecha de pago</th>
                <th>Próximo pago</th>
                <th>Notas</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => {
                const vencHoy = p.proximo_pago === today;
                const vencProx = p.proximo_pago && p.proximo_pago > today;
                const vencPasado = p.proximo_pago && p.proximo_pago < today;
                return (
                  <tr key={p.id}>
                    <td>
                      <strong>{p.alumnos?.nombre || '—'}</strong>
                      <br/><span style={{fontSize:'0.73rem',color:'var(--text2)'}}>{p.alumnos?.email}</span>
                    </td>
                    <td><span className={`chip ${planColor(p.plan)}`}>{p.plan || '—'}</span></td>
                    <td style={{fontFamily:'Space Mono',fontWeight:700,color:'var(--success)'}}>
                      {p.monto ? `$ ${parseFloat(p.monto).toLocaleString('es-AR',{minimumFractionDigits:2})}` : '—'}
                    </td>
                    <td style={{color:'var(--text2)',fontSize:'0.84rem'}}>
                      {p.fecha_pago ? new Date(p.fecha_pago+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'}) : '—'}
                    </td>
                    <td>
                      {p.proximo_pago ? (
                        <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:'0.82rem',fontWeight:600,color:vencHoy?'var(--danger)':vencPasado?'var(--text2)':'var(--accent2)'}}>
                          {vencHoy?'🔴':vencPasado?'✅':' 🔔'}
                          {new Date(p.proximo_pago+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})}
                        </span>
                      ) : <span style={{color:'var(--text2)',fontSize:'0.82rem'}}>—</span>}
                    </td>
                    <td style={{maxWidth:160,color:'var(--text2)',fontSize:'0.8rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.notas||'—'}</td>
                    <td>
                      <div style={{display:'flex',gap:6}}>
                        <button className="btn btn-ghost btn-sm" onClick={() => openEdit(p)}>✏️</button>
                        <button className="btn btn-danger btn-sm" onClick={() => remove(p.id)}>🗑️</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {modal && (
        <Modal title={editing ? '✏️ Editar pago' : '➕ Registrar pago'} onClose={() => { setModal(false); setEditing(null); setForm(emptyForm); }}>
          {/* Alumno */}
          <div className="form-group">
            <label>Alumno</label>
            <select value={form.alumno_id} onChange={e => setForm(p => ({ ...p, alumno_id: e.target.value }))}>
              <option value="">-- Seleccionar alumno --</option>
              {alumnos.map(a => <option key={a.id} value={a.id}>{a.nombre}</option>)}
            </select>
          </div>

          {/* Plan */}
          <div className="form-group">
            <label>Tipo de plan</label>
            <div style={{display:'flex',gap:8,marginTop:4}}>
              {PLANES.map(plan => (
                <label key={plan} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'10px 14px',border:`2px solid ${form.plan===plan?'var(--accent)':'var(--border)'}`,borderRadius:10,flex:1,justifyContent:'center',background:form.plan===plan?'rgba(108,99,255,0.1)':'transparent',fontSize:'0.84rem',fontWeight:600,transition:'all 0.15s'}}>
                  <input type="radio" name="plan" value={plan} checked={form.plan===plan} onChange={() => setForm(p=>({...p,plan}))} style={{width:'auto',margin:0}} />
                  {plan === 'Parcial' ? '💰' : plan === 'Final' ? '✅' : '📚'} {plan}
                </label>
              ))}
            </div>
          </div>

          {/* Importe */}
          <div className="form-group">
            <label>💵 Importe ($)</label>
            <div style={{position:'relative'}}>
              <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',fontFamily:'Space Mono',fontWeight:700}}>$</span>
              <input type="number" min="0" step="0.01" placeholder="0.00" value={form.monto} onChange={e => setForm(p => ({ ...p, monto: e.target.value }))} style={{paddingLeft:28}} />
            </div>
          </div>

          {/* Fechas en grid */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="form-group">
              <label>📅 Fecha de pago</label>
              <input type="date" value={form.fecha_pago} onChange={e => setForm(p => ({ ...p, fecha_pago: e.target.value }))} />
            </div>
            <div className="form-group">
              <label>🔔 Próximo pago</label>
              <input type="date" value={form.proximo_pago} onChange={e => setForm(p => ({ ...p, proximo_pago: e.target.value }))} />
              <div style={{fontSize:'0.72rem',color:'var(--text2)',marginTop:3}}>Se crea un recordatorio automático</div>
            </div>
          </div>

          {/* Notas */}
          <div className="form-group">
            <label>📝 Notas (opcional)</label>
            <textarea placeholder="Ej: Pago primera cuota, descuento especial..." value={form.notas} onChange={e => setForm(p => ({ ...p, notas: e.target.value }))} style={{minHeight:70}} />
          </div>

          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => { setModal(false); setEditing(null); setForm(emptyForm); }}>Cancelar</button>
            <button className="btn btn-primary" onClick={save}>💾 Guardar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── ADMIN VIDEOS ─────────────────────────────────────────────────────
function AdminVideos() {
  const TEMA_COLORS = ['#6c63ff','#ff6584','#43e97b','#f9ca24','#06b6d4','#f97316','#a78bfa','#ec4899'];
  const [temas, setTemas] = useState([]);
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [uploading, setUploading] = useState(false);
  const [uploadPct, setUploadPct] = useState(0);
  const [modal, setModal] = useState(false);
  const [temaModal, setTemaModal] = useState(false);
  const [form, setForm] = useState({ titulo: '', descripcion: '', bunny_id: '', url_externa: '', orden: 0, semana: '', tema_id: '' });
  const [temaForm, setTemaForm] = useState({ nombre: '', descripcion: '', color: '#6c63ff', orden: 0 });
  const [editing, setEditing] = useState(null);
  const [editingTema, setEditingTema] = useState(null);
  const [bunnyVideos, setBunnyVideos] = useState([]);
  const [tab, setTab] = useState('bunny');
  const [vistaTab, setVistaTab] = useState('temas');
  const [expandedTemas, setExpandedTemas] = useState({});
  const [selectedFile, setSelectedFile] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef();
  const toast = useToast();

  const load = async () => {
    const [{ data: tData }, { data: vData }] = await Promise.all([
      supabase.from('temas_videos').select('*').order('orden'),
      supabase.from('videos').select('*').order('orden'),
    ]);
    setTemas(tData || []); setVideos(vData || []); setLoading(false);
    const exp = {};
    (tData || []).forEach(t => exp[t.id] = true);
    exp['sin-tema'] = true;
    setExpandedTemas(p => Object.keys(p).length === 0 ? exp : p);
  };

  const loadBunny = async () => {
    try {
      const res = await fetch(`https://video.bunnycdn.com/library/${BUNNY_LIBRARY}/videos?page=1&itemsPerPage=50`, {
        headers: { AccessKey: BUNNY_API_KEY }
      });
      const d = await res.json();
      setBunnyVideos(d.items || []);
    } catch { toast('No se pudo conectar con Bunny CDN', 'error'); }
  };

  useEffect(() => { load(); loadBunny(); }, []);

  const uploadToBunny = async (file) => {
    if (!file) return null;
    setUploading(true); setUploadPct(5);
    try {
      // 1. Crear video en Bunny
      const createRes = await fetch(`https://video.bunnycdn.com/library/${BUNNY_LIBRARY}/videos`, {
        method: 'POST',
        headers: { AccessKey: BUNNY_API_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: form.titulo || file.name })
      });
      const created = await createRes.json();
      if (!created.guid) throw new Error('No se pudo crear el video en Bunny');
      setUploadPct(20);
      // 2. Subir el archivo
      const uploadRes = await fetch(`https://video.bunnycdn.com/library/${BUNNY_LIBRARY}/videos/${created.guid}`, {
        method: 'PUT',
        headers: { AccessKey: BUNNY_API_KEY, 'Content-Type': 'application/octet-stream' },
        body: file
      });
      setUploadPct(90);
      if (!uploadRes.ok) throw new Error('Error al subir el video');
      setUploadPct(100);
      toast('Video subido a Bunny ✅', 'success');
      await loadBunny();
      return created.guid;
    } catch (err) {
      toast(err.message, 'error'); return null;
    } finally {
      setTimeout(() => { setUploading(false); setUploadPct(0); }, 600);
    }
  };

  const save = async () => {
    if (!form.titulo) return toast('Título requerido', 'error');
    if (!form.semana) return toast('Seleccioná la semana', 'error');
    let bunny_id = form.bunny_id;
    let url_externa = form.url_externa;

    if (tab === 'upload' && selectedFile) {
      bunny_id = await uploadToBunny(selectedFile);
      if (!bunny_id) return;
    }
    if (tab === 'bunny' && !bunny_id) return toast('Seleccioná un video de Bunny', 'error');
    if (tab === 'url' && !url_externa) return toast('Ingresá una URL', 'error');

    const payload = { titulo: form.titulo, descripcion: form.descripcion, bunny_id, bunny_video_id: bunny_id, url_externa, orden: form.orden, semana: form.semana, tema_id: form.tema_id || null };
    const { error } = editing
      ? await supabase.from('videos').update(payload).eq('id', editing)
      : await supabase.from('videos').insert(payload);
    if (error) return toast(error.message, 'error');
    toast(editing ? 'Video actualizado ✏️' : 'Video agregado 🎬', 'success');
    setModal(false); setEditing(null); setSelectedFile(null);
    setForm({ titulo: '', descripcion: '', bunny_id: '', url_externa: '', orden: 0, semana: '', tema_id: '' }); load();
  };

  const saveTema = async () => {
    if (!temaForm.nombre) return toast('Nombre requerido', 'error');
    const { error } = editingTema
      ? await supabase.from('temas_videos').update(temaForm).eq('id', editingTema)
      : await supabase.from('temas_videos').insert(temaForm);
    if (error) return toast(error.message, 'error');
    toast(editingTema ? 'Tema actualizado ✏️' : 'Tema creado ✅', 'success');
    setTemaModal(false); setEditingTema(null); setTemaForm({ nombre: '', descripcion: '', color: '#6c63ff', orden: 0 }); load();
  };

  const deleteTema = async id => {
    if (!confirm('¿Eliminar tema? Los videos asociados quedarán sin tema.')) return;
    await supabase.from('temas_videos').delete().eq('id', id);
    toast('Tema eliminado', 'info'); load();
  };

  const openEditTema = t => {
    setTemaForm({ nombre: t.nombre, descripcion: t.descripcion || '', color: t.color || '#6c63ff', orden: t.orden || 0 });
    setEditingTema(t.id); setTemaModal(true);
  };

  const toggleTema = id => setExpandedTemas(p => ({ ...p, [id]: !p[id] }));

  const remove = async id => {
    if (!confirm('¿Eliminar video?')) return;
    await supabase.from('videos').delete().eq('id', id);
    toast('Video eliminado', 'info'); load();
  };

  const openEdit = v => {
    setForm({ titulo: v.titulo, descripcion: v.descripcion || '', bunny_id: v.bunny_id || v.bunny_video_id || '', url_externa: v.url_externa || '', orden: v.orden || 0, semana: v.semana || '', tema_id: v.tema_id || '' });
    setEditing(v.id); setSelectedFile(null);
    setTab(v.url_externa ? 'url' : 'bunny');
    setModal(true);
  };

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <GanttChart isAdmin={true} />
      <div className="page-header">
        <div>
          <div className="page-title">🎬 Videos</div>
          <div className="page-subtitle">{temas.length} temas · {videos.length} videos</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost" onClick={() => { setTemaForm({nombre:'',descripcion:'',color:'#6c63ff',orden:temas.length}); setEditingTema(null); setTemaModal(true); }}>📂 Nuevo tema</button>
          <button className="btn btn-primary" onClick={() => { setForm({titulo:'',descripcion:'',bunny_id:'',url_externa:'',orden:videos.length,semana:'',tema_id:''}); setEditing(null); setSelectedFile(null); setTab('bunny'); setModal(true); }}>➕ Agregar video</button>
        </div>
      </div>

      <div className="tabs">
        <button className={`tab ${vistaTab==='temas'?'active':''}`} onClick={() => setVistaTab('temas')}>📂 Por Temas</button>
        <button className={`tab ${vistaTab==='lista'?'active':''}`} onClick={() => setVistaTab('lista')}>🎬 Lista completa</button>
      </div>

      {vistaTab === 'temas' && (
        <div>
          {temas.length === 0 && videos.length === 0 && <Empty icon="🎬" text="No hay videos. Crea un tema para empezar a organizar." />}
          {temas.map(t => {
            const tVids = videos.filter(v => v.tema_id === t.id);
            const isOpen = expandedTemas[t.id];
            return (
              <div key={t.id} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:isOpen?'12px 12px 0 0':'12px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:`4px solid ${t.color||'var(--accent)'}`,cursor:'pointer'}} onClick={() => toggleTema(t.id)}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <span style={{fontSize:'1.2rem'}}>📂</span>
                    <div>
                      <div style={{fontWeight:700,color:t.color||'var(--accent)'}}>{t.nombre}</div>
                      {t.descripcion && <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:1}}>{t.descripcion}</div>}
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:'0.78rem',color:'var(--text2)'}}>{tVids.length} videos</span>
                    <button className="btn btn-ghost btn-sm" onClick={e => { e.stopPropagation(); openEditTema(t); }}>✏️</button>
                    <button className="btn btn-danger btn-sm" onClick={e => { e.stopPropagation(); deleteTema(t.id); }}>🗑️</button>
                    <span style={{color:'var(--text2)'}}>{isOpen?'▲':'▼'}</span>
                  </div>
                </div>
                {isOpen && (
                  <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',overflow:'hidden'}}>
                    {tVids.length === 0 ? (
                      <div style={{padding:'16px 20px',color:'var(--text2)',fontSize:'0.84rem',fontStyle:'italic',background:'var(--surface)',display:'flex',alignItems:'center',gap:12}}>
                        Sin videos en este tema.
                        <button className="btn btn-ghost btn-sm" onClick={() => { setForm({titulo:'',descripcion:'',bunny_id:'',url_externa:'',orden:videos.length,semana:'',tema_id:t.id}); setEditing(null); setSelectedFile(null); setTab('bunny'); setModal(true); }}>➕ Agregar</button>
                      </div>
                    ) : (
                      <table style={{width:'100%',borderCollapse:'collapse'}}>
                        <thead><tr style={{background:'var(--surface2)'}}>
                          {['#','Título','Semana','Vista previa',''].map(h => <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)'}}>{h}</th>)}
                        </tr></thead>
                        <tbody>
                          {tVids.map(v => (
                            <tr key={v.id} style={{borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                              <td style={{padding:'10px 16px',fontFamily:'Space Mono',color:'var(--text2)',fontSize:'0.82rem'}}>{v.orden}</td>
                              <td style={{padding:'10px 16px'}}><strong style={{fontSize:'0.88rem'}}>{v.titulo}</strong>{v.descripcion&&<><br/><span style={{fontSize:'0.75rem',color:'var(--text2)'}}>{v.descripcion}</span></>}</td>
                              <td style={{padding:'10px 16px'}}>{v.semana&&<span className="chip chip-blue">{v.semana}</span>}</td>
                              <td style={{padding:'10px 16px'}}>{(v.bunny_id||v.bunny_video_id)&&<img src={`https://${BUNNY_CDN}/${v.bunny_id||v.bunny_video_id}/thumbnail.jpg`} style={{height:40,borderRadius:6,objectFit:'cover'}} onError={e=>e.target.style.display='none'} />}</td>
                              <td style={{padding:'10px 16px'}}><div style={{display:'flex',gap:6}}><button className="btn btn-ghost btn-sm" onClick={() => openEdit(v)}>✏️</button><button className="btn btn-danger btn-sm" onClick={() => remove(v.id)}>🗑️</button></div></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    )}
                  </div>
                )}
              </div>
            );
          })}
          {videos.filter(v => !v.tema_id).length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:expandedTemas['sin-tema']?'12px 12px 0 0':'12px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:'4px solid var(--border)',cursor:'pointer'}} onClick={() => toggleTema('sin-tema')}>
                <div style={{fontWeight:600,color:'var(--text2)'}}>📁 Sin tema asignado</div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:'0.78rem',color:'var(--text2)'}}>{videos.filter(v=>!v.tema_id).length} videos</span>
                  <span style={{color:'var(--text2)'}}>{expandedTemas['sin-tema']?'▲':'▼'}</span>
                </div>
              </div>
              {expandedTemas['sin-tema'] && (
                <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',overflow:'hidden'}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <tbody>
                      {videos.filter(v=>!v.tema_id).map(v => (
                        <tr key={v.id} style={{borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                          <td style={{padding:'10px 16px',fontFamily:'Space Mono',color:'var(--text2)',fontSize:'0.82rem'}}>{v.orden}</td>
                          <td style={{padding:'10px 16px'}}><strong style={{fontSize:'0.88rem'}}>{v.titulo}</strong></td>
                          <td style={{padding:'10px 16px'}}>{v.semana&&<span className="chip chip-blue">{v.semana}</span>}</td>
                          <td style={{padding:'10px 16px'}}>{(v.bunny_id||v.bunny_video_id)&&<img src={`https://${BUNNY_CDN}/${v.bunny_id||v.bunny_video_id}/thumbnail.jpg`} style={{height:40,borderRadius:6,objectFit:'cover'}} onError={e=>e.target.style.display='none'} />}</td>
                          <td style={{padding:'10px 16px'}}><div style={{display:'flex',gap:6}}><button className="btn btn-ghost btn-sm" onClick={() => openEdit(v)}>✏️ Asignar tema</button><button className="btn btn-danger btn-sm" onClick={() => remove(v.id)}>🗑️</button></div></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {vistaTab === 'lista' && (
        videos.length === 0 ? <Empty icon="🎬" text="No hay videos" /> : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Título</th><th>Tema</th><th>Semana</th><th>Fuente</th><th>Vista previa</th><th>Acciones</th></tr></thead>
              <tbody>
                {videos.map(v => (
                  <tr key={v.id}>
                    <td style={{fontFamily:'Space Mono',color:'var(--text2)'}}>{v.orden}</td>
                    <td><strong>{v.titulo}</strong></td>
                    <td style={{color:'var(--text2)',fontSize:'0.82rem'}}>{temas.find(t=>t.id===v.tema_id)?.nombre||'—'}</td>
                    <td>{v.semana&&<span className="chip chip-blue">{v.semana}</span>}</td>
                    <td>{(v.bunny_id||v.bunny_video_id)?<span className="chip chip-blue">Bunny</span>:v.url_externa?<span className="chip chip-green">URL</span>:'—'}</td>
                    <td>{(v.bunny_id||v.bunny_video_id)&&<img src={`https://${BUNNY_CDN}/${v.bunny_id||v.bunny_video_id}/thumbnail.jpg`} style={{height:44,borderRadius:6,objectFit:'cover'}} onError={e=>e.target.style.display='none'} />}</td>
                    <td><div style={{display:'flex',gap:6}}><button className="btn btn-ghost btn-sm" onClick={() => openEdit(v)}>✏️</button><button className="btn btn-danger btn-sm" onClick={() => remove(v.id)}>🗑️</button></div></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      )}

      {temaModal && (
        <Modal title={editingTema ? '✏️ Editar tema' : '📂 Nuevo tema'} onClose={() => setTemaModal(false)}>
          <div className="form-group"><label>Nombre del tema</label><input placeholder="Ej: Unidad 1 - Introducción" value={temaForm.nombre} onChange={e => setTemaForm(p=>({...p,nombre:e.target.value}))} /></div>
          <div className="form-group"><label>Descripción (opcional)</label><textarea placeholder="Descripción breve..." value={temaForm.descripcion} onChange={e => setTemaForm(p=>({...p,descripcion:e.target.value}))} /></div>
          <div className="form-group">
            <label>Color</label>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginTop:6}}>
              {TEMA_COLORS.map(c => (
                <div key={c} onClick={() => setTemaForm(p=>({...p,color:c}))} style={{width:34,height:34,borderRadius:'50%',background:c,cursor:'pointer',border:temaForm.color===c?'3px solid white':'3px solid transparent',outline:temaForm.color===c?`2px solid ${c}`:'none',transition:'all 0.15s'}} />
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => setTemaModal(false)}>Cancelar</button>
            <button className="btn btn-primary" onClick={saveTema}>💾 Guardar tema</button>
          </div>
        </Modal>
      )}

      {modal && (
        <Modal title={editing ? '✏️ Editar video' : '➕ Agregar video'} onClose={() => setModal(false)}>
          <div className="form-group"><label>Título</label><input value={form.titulo} onChange={e => setForm(p => ({ ...p, titulo: e.target.value }))} placeholder="Nombre del video" /></div>
          <div className="form-group">
            <label>📂 Tema</label>
            <select value={form.tema_id} onChange={e => setForm(p => ({ ...p, tema_id: e.target.value }))}>
              <option value="">-- Sin tema --</option>
              {temas.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label>📅 Semana</label>
            <select value={form.semana} onChange={e => setForm(p => ({ ...p, semana: e.target.value }))}>
              <option value="">-- Seleccionar semana --</option>
              {['Semana 1','Semana 2','Semana 3','Semana 4','Semana 5','Semana 6'].map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div className="form-group"><label>Descripción</label><textarea value={form.descripcion} onChange={e => setForm(p => ({ ...p, descripcion: e.target.value }))} placeholder="Opcional" /></div>
          <div style={{marginBottom:14}}>
            <label>Fuente del video</label>
            <div className="tabs" style={{marginBottom:0,marginTop:8}}>
              <button className={`tab ${tab==='bunny'?'active':''}`} onClick={() => setTab('bunny')}>🎬 Seleccionar de Bunny</button>
              <button className={`tab ${tab==='upload'?'active':''}`} onClick={() => setTab('upload')}>⬆️ Subir video</button>
              <button className={`tab ${tab==='url'?'active':''}`} onClick={() => setTab('url')}>🔗 URL externa</button>
            </div>
          </div>
          {tab === 'bunny' && (
            <div className="form-group">
              <label>Video de Bunny {bunnyVideos.length > 0 && <span style={{color:'var(--accent)'}}>({bunnyVideos.length} disponibles)</span>}</label>
              {bunnyVideos.length > 0 ? (
                <select value={form.bunny_id} onChange={e => setForm(p => ({ ...p, bunny_id: e.target.value }))}>
                  <option value="">-- Seleccionar --</option>
                  {bunnyVideos.map(b => <option key={b.guid} value={b.guid}>{b.title} ({b.guid.slice(0,8)}…)</option>)}
                </select>
              ) : <input placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" value={form.bunny_id} onChange={e => setForm(p => ({ ...p, bunny_id: e.target.value }))} />}
              {form.bunny_id && <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:6,fontFamily:'Space Mono'}}>{form.bunny_id}</div>}
            </div>
          )}
          {tab === 'upload' && (
            <div className="form-group">
              <label>Subir video a Bunny</label>
              <div className={`upload-area ${dragOver ? 'drag-over' : ''}`} onDragOver={e => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={e => { e.preventDefault(); setDragOver(false); setSelectedFile(e.dataTransfer.files[0]); }} onClick={() => fileRef.current.click()}>
                <input ref={fileRef} type="file" accept="video/*" style={{display:'none'}} onChange={e => setSelectedFile(e.target.files[0])} />
                {selectedFile ? <div><div style={{fontSize:'2rem',marginBottom:6}}>🎬</div><div style={{fontWeight:600,color:'var(--accent)'}}>{selectedFile.name}</div><div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:4}}>{(selectedFile.size/1024/1024).toFixed(1)} MB</div></div>
                : <div><div className="upload-icon">📹</div><div style={{fontWeight:600}}>Arrastrá o hacé click para subir</div><div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:4}}>MP4, MOV, AVI, MKV</div></div>}
              </div>
              {uploading && <div style={{marginTop:10}}><div style={{fontSize:'0.82rem',color:'var(--text2)',marginBottom:6}}>⏳ Subiendo a Bunny... {uploadPct}%</div><div className="progress-bar"><div className="progress-fill" style={{width:`${uploadPct}%`}} /></div></div>}
            </div>
          )}
          {tab === 'url' && (
            <div className="form-group">
              <label>URL del video</label>
              <input type="url" placeholder="https://youtube.com/... o cualquier URL de video" value={form.url_externa} onChange={e => setForm(p => ({ ...p, url_externa: e.target.value }))} />
              <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:6}}>YouTube, Vimeo, Google Drive, o enlace directo a MP4</div>
            </div>
          )}
          <div className="form-group"><label>Orden</label><input type="number" value={form.orden} onChange={e => setForm(p => ({ ...p, orden: parseInt(e.target.value) || 0 }))} /></div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => setModal(false)} disabled={uploading}>Cancelar</button>
            <button className="btn btn-primary" onClick={save} disabled={uploading}>{uploading ? '⏳ Subiendo...' : '💾 Guardar'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function AdminMateriales() {
  const TIPO_INFO = {
    pdf:   { icon: '📕', label: 'PDF',   accept: '.pdf' },
    word:  { icon: '📘', label: 'Word',  accept: '.doc,.docx' },
    excel: { icon: '📗', label: 'Excel', accept: '.xls,.xlsx' },
    link:  { icon: '🔗', label: 'Link',  accept: null },
    video: { icon: '🎬', label: 'Video', accept: 'video/*' },
    imagen:{ icon: '🖼️', label: 'Imagen',accept: 'image/*' },
  };
  const TEMA_COLORS = ['#6c63ff','#ff6584','#43e97b','#f9ca24','#06b6d4','#f97316','#a78bfa','#ec4899'];

  const [temas, setTemas] = useState([]);
  const [mats, setMats] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [temaModal, setTemaModal] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [uploadPct, setUploadPct] = useState(0);
  const [form, setForm] = useState({ titulo: '', descripcion: '', url: '', tipo: 'pdf', permite_descarga: true, semana: '', tema_id: '' });
  const [temaForm, setTemaForm] = useState({ nombre: '', descripcion: '', color: '#6c63ff', orden: 0 });
  const [editing, setEditing] = useState(null);
  const [editingTema, setEditingTema] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [selectedFile, setSelectedFile] = useState(null);
  const [expandedTemas, setExpandedTemas] = useState({});
  const [vistaTab, setVistaTab] = useState('temas');
  const fileRef = useRef();
  const toast = useToast();

  const load = async () => {
    const [{ data: tData }, { data: mData, error }] = await Promise.all([
      supabase.from('temas_materiales').select('*').order('orden', { ascending: true }),
      supabase.from('materiales').select('*').order('orden', { ascending: true }),
    ]);
    if (error) console.error('materiales error:', error);
    setTemas(tData || []);
    setMats(mData || []);
    setLoading(false);
    // Expand all temas by default
    const exp = {};
    (tData || []).forEach(t => exp[t.id] = true);
    exp['sin-tema'] = true;
    setExpandedTemas(p => Object.keys(p).length === 0 ? exp : p);
  };
  useEffect(() => { load(); }, []);

  const uploadFile = async (file) => {
    if (!file) return null;
    const ext = file.name.split('.').pop();
    const path = `materiales/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    setUploading(true); setUploadPct(10);
    const { error } = await supabase.storage.from('materiales').upload(path, file, { cacheControl: '3600', upsert: false });
    setUploadPct(80);
    if (error) { setUploading(false); toast('Error al subir archivo: ' + error.message, 'error'); return null; }
    const { data } = supabase.storage.from('materiales').getPublicUrl(path);
    setUploadPct(100);
    setTimeout(() => { setUploading(false); setUploadPct(0); }, 500);
    return data.publicUrl;
  };

  const detectTipo = (file) => {
    const name = file.name.toLowerCase();
    if (name.endsWith('.pdf')) return 'pdf';
    if (name.match(/\.docx?$/)) return 'word';
    if (name.match(/\.xlsx?$/)) return 'excel';
    if (name.match(/\.(jpg|jpeg|png|gif|webp)$/)) return 'imagen';
    if (name.match(/\.(mp4|mov|avi|mkv)$/)) return 'video';
    return 'pdf';
  };

  const handleFileSelect = (file) => {
    if (!file) return;
    setSelectedFile(file);
    setForm(p => ({ ...p, tipo: detectTipo(file), titulo: p.titulo || file.name.replace(/\.[^.]+$/, '') }));
  };

  const save = async () => {
    if (!form.titulo && !form.unidad) return toast('El título es requerido', 'error');
    let url = form.url;
    if (selectedFile) {
      url = await uploadFile(selectedFile);
      if (!url) return;
    }
    if (!url) return toast('Seleccioná un archivo o ingresá una URL', 'error');
    const payload = {
      unidad: form.unidad || form.titulo,
      descripcion: form.descripcion,
      url,
      tipo: form.tipo,
      permite_descarga: form.permite_descarga,
      semana: form.semana || null,
      tema_id: form.tema_id || null,
    };
    const { error } = editing
      ? await supabase.from('materiales').update(payload).eq('id', editing)
      : await supabase.from('materiales').insert(payload);
    if (error) return toast(error.message, 'error');
    toast(editing ? 'Material actualizado ✏️' : 'Material guardado ✅', 'success');
    setModal(false); setEditing(null); setSelectedFile(null);
    setForm({ unidad: '', descripcion: '', url: '', tipo: 'pdf', permite_descarga: true, semana: '', tema_id: '' });
    load();
  };

  const saveTema = async () => {
    if (!temaForm.nombre) return toast('El nombre del tema es requerido', 'error');
    const payload = { nombre: temaForm.nombre, descripcion: temaForm.descripcion, color: temaForm.color, orden: temaForm.orden };
    const { error } = editingTema
      ? await supabase.from('temas_materiales').update(payload).eq('id', editingTema)
      : await supabase.from('temas_materiales').insert(payload);
    if (error) return toast(error.message, 'error');
    toast(editingTema ? 'Tema actualizado ✏️' : 'Tema creado ✅', 'success');
    setTemaModal(false); setEditingTema(null);
    setTemaForm({ nombre: '', descripcion: '', color: '#6c63ff', orden: 0 });
    load();
  };

  const deleteTema = async (id) => {
    if (!confirm('¿Eliminar tema? Los materiales asociados quedarán sin tema.')) return;
    await supabase.from('temas_materiales').delete().eq('id', id);
    toast('Tema eliminado', 'info'); load();
  };

  const openEditTema = (t) => {
    setTemaForm({ nombre: t.nombre, descripcion: t.descripcion || '', color: t.color || '#6c63ff', orden: t.orden || 0 });
    setEditingTema(t.id); setTemaModal(true);
  };

  const toggleTema = (id) => setExpandedTemas(p => ({ ...p, [id]: !p[id] }));

  const toggleDescarga = async (id, val) => {
    await supabase.from('materiales').update({ permite_descarga: val }).eq('id', id);
    setMats(p => p.map(m => m.id === id ? { ...m, permite_descarga: val } : m));
    toast(val ? 'Descarga habilitada 🔓' : 'Solo visualización 🔒', 'info');
  };

  const remove = async id => {
    if (!confirm('¿Eliminar material?')) return;
    await supabase.from('materiales').delete().eq('id', id);
    toast('Material eliminado', 'info'); load();
  };

  const openEdit = m => {
    setForm({ unidad: m.unidad || m.titulo || '', descripcion: m.descripcion || '', url: m.url || '', tipo: m.tipo || 'pdf', permite_descarga: m.permite_descarga !== false, semana: m.semana || '', tema_id: m.tema_id || '' });
    setEditing(m.id); setSelectedFile(null); setModal(true);
  };

  if (loading) return <Loading />;

  const MatRow = ({ m }) => {
    const ti = TIPO_INFO[m.tipo] || { icon: '📄', label: m.tipo?.toUpperCase() };
    return (
      <tr key={m.id}>
        <td><span style={{fontSize:'1.4rem'}}>{ti.icon}</span></td>
        <td><strong>{m.unidad || m.titulo}</strong></td>
        <td style={{color:'var(--text2)',fontSize:'0.82rem',maxWidth:160}}>{m.descripcion || '—'}</td>
        <td style={{color:'var(--text2)',fontSize:'0.82rem'}}>{temas.find(t=>t.id===m.tema_id)?.nombre || '—'}</td>
        <td>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div onClick={() => toggleDescarga(m.id, !m.permite_descarga)} style={{width:40,height:22,borderRadius:11,background:m.permite_descarga!==false?'var(--success)':'var(--border)',cursor:'pointer',position:'relative',transition:'background 0.3s',flexShrink:0}}>
              <div style={{position:'absolute',top:3,left:m.permite_descarga!==false?21:3,width:16,height:16,borderRadius:'50%',background:'white',transition:'left 0.3s'}} />
            </div>
            <span style={{fontSize:'0.75rem',color:'var(--text2)'}}>{m.permite_descarga!==false?'🔓 Libre':'🔒 Solo ver'}</span>
          </div>
        </td>
        <td>
          <div style={{display:'flex',gap:6}}>
            <button className="btn btn-ghost btn-sm" onClick={() => window.open(m.url,'_blank')}>👁️ Ver</button>
            <button className="btn btn-ghost btn-sm" onClick={() => openEdit(m)}>✏️</button>
            <button className="btn btn-danger btn-sm" onClick={() => remove(m.id)}>🗑️</button>
          </div>
        </td>
      </tr>
    );
  };

  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">📄 Materiales</div>
          <div className="page-subtitle">{temas.length} temas · {mats.length} materiales</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost" onClick={() => { setTemaForm({nombre:'',descripcion:'',color:'#6c63ff',orden:temas.length}); setEditingTema(null); setTemaModal(true); }}>📂 Nuevo tema</button>
          <button className="btn btn-primary" onClick={() => { setForm({unidad:'',descripcion:'',url:'',tipo:'pdf',permite_descarga:true,semana:'',tema_id:''}); setEditing(null); setSelectedFile(null); setModal(true); }}>➕ Nuevo material</button>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs">
        <button className={`tab ${vistaTab==='temas'?'active':''}`} onClick={() => setVistaTab('temas')}>📂 Por Temas</button>
        <button className={`tab ${vistaTab==='lista'?'active':''}`} onClick={() => setVistaTab('lista')}>📋 Lista completa</button>
      </div>

      {/* Vista por Temas */}
      {vistaTab === 'temas' && (
        <div>
          {temas.length === 0 && mats.length === 0 && <Empty icon="📄" text="No hay materiales. Creá un tema para empezar a organizar." />}

          {temas.map(t => {
            const tMats = mats.filter(m => m.tema_id === t.id);
            const isOpen = expandedTemas[t.id];
            return (
              <div key={t.id} style={{marginBottom:14}}>
                {/* Header del tema */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:isOpen?'12px 12px 0 0':'12px',background:'var(--surface)',border:`1px solid var(--border)`,borderLeft:`4px solid ${t.color||'var(--accent)'}`,cursor:'pointer'}} onClick={() => toggleTema(t.id)}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <span style={{fontSize:'1.2rem'}}>📂</span>
                    <div>
                      <div style={{fontWeight:700,color:t.color||'var(--accent)'}}>{t.nombre}</div>
                      {t.descripcion && <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:1}}>{t.descripcion}</div>}
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:'0.78rem',color:'var(--text2)'}}>{tMats.length} materiales</span>
                    <button className="btn btn-ghost btn-sm" onClick={e => { e.stopPropagation(); openEditTema(t); }}>✏️</button>
                    <button className="btn btn-danger btn-sm" onClick={e => { e.stopPropagation(); deleteTema(t.id); }}>🗑️</button>
                    <span style={{color:'var(--text2)',fontSize:'0.9rem'}}>{isOpen?'▲':'▼'}</span>
                  </div>
                </div>
                {/* Materiales del tema */}
                {isOpen && (
                  <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',overflow:'hidden'}}>
                    {tMats.length === 0 ? (
                      <div style={{padding:'18px 20px',color:'var(--text2)',fontSize:'0.84rem',fontStyle:'italic',background:'var(--surface)'}}>
                        Sin materiales en este tema.
                        <button className="btn btn-ghost btn-sm" style={{marginLeft:10}} onClick={() => { setForm({unidad:'',descripcion:'',url:'',tipo:'pdf',permite_descarga:true,semana:'',tema_id:t.id}); setEditing(null); setSelectedFile(null); setModal(true); }}>➕ Agregar</button>
                      </div>
                    ) : (
                      <table style={{width:'100%',borderCollapse:'collapse'}}>
                        <thead><tr style={{background:'var(--surface2)'}}><th style={{padding:'10px 16px',textAlign:'left',fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)'}}>Tipo</th><th style={{padding:'10px 16px',textAlign:'left',fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)'}}>Título</th><th style={{padding:'10px 16px',textAlign:'left',fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)'}}>Descripción</th><th style={{padding:'10px 16px',textAlign:'left',fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)'}}>Descarga</th><th style={{padding:'10px 16px',textAlign:'left',fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text2)'}}></th></tr></thead>
                        <tbody>
                          {tMats.map(m => {
                            const ti = TIPO_INFO[m.tipo] || { icon:'📄', label: m.tipo?.toUpperCase() };
                            return (
                              <tr key={m.id} style={{borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                                <td style={{padding:'10px 16px'}}><span style={{fontSize:'1.3rem'}}>{ti.icon}</span></td>
                                <td style={{padding:'10px 16px'}}><strong style={{fontSize:'0.88rem'}}>{m.unidad||m.titulo}</strong></td>
                                <td style={{padding:'10px 16px',color:'var(--text2)',fontSize:'0.8rem',maxWidth:160}}>{m.descripcion||'—'}</td>
                                <td style={{padding:'10px 16px'}}>
                                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                                    <div onClick={() => toggleDescarga(m.id,!m.permite_descarga)} style={{width:38,height:20,borderRadius:10,background:m.permite_descarga!==false?'var(--success)':'var(--border)',cursor:'pointer',position:'relative',transition:'background 0.3s',flexShrink:0}}>
                                      <div style={{position:'absolute',top:2,left:m.permite_descarga!==false?19:2,width:16,height:16,borderRadius:'50%',background:'white',transition:'left 0.3s'}} />
                                    </div>
                                    <span style={{fontSize:'0.72rem',color:'var(--text2)'}}>{m.permite_descarga!==false?'🔓':'🔒'}</span>
                                  </div>
                                </td>
                                <td style={{padding:'10px 16px'}}>
                                  <div style={{display:'flex',gap:6}}>
                                    <button className="btn btn-ghost btn-sm" onClick={() => window.open(m.url,'_blank')}>👁️</button>
                                    <button className="btn btn-ghost btn-sm" onClick={() => openEdit(m)}>✏️</button>
                                    <button className="btn btn-danger btn-sm" onClick={() => remove(m.id)}>🗑️</button>
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    )}
                  </div>
                )}
              </div>
            );
          })}

          {/* Materiales sin tema */}
          {mats.filter(m => !m.tema_id).length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:expandedTemas['sin-tema']?'12px 12px 0 0':'12px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:'4px solid var(--border)',cursor:'pointer'}} onClick={() => toggleTema('sin-tema')}>
                <div style={{fontWeight:600,color:'var(--text2)'}}>📁 Sin tema asignado</div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:'0.78rem',color:'var(--text2)'}}>{mats.filter(m=>!m.tema_id).length} materiales</span>
                  <span style={{color:'var(--text2)',fontSize:'0.9rem'}}>{expandedTemas['sin-tema']?'▲':'▼'}</span>
                </div>
              </div>
              {expandedTemas['sin-tema'] && (
                <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',overflow:'hidden'}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <tbody>
                      {mats.filter(m=>!m.tema_id).map(m => {
                        const ti = TIPO_INFO[m.tipo]||{icon:'📄',label:m.tipo?.toUpperCase()};
                        return (
                          <tr key={m.id} style={{borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                            <td style={{padding:'10px 16px'}}><span style={{fontSize:'1.3rem'}}>{ti.icon}</span></td>
                            <td style={{padding:'10px 16px'}}><strong style={{fontSize:'0.88rem'}}>{m.unidad||m.titulo}</strong></td>
                            <td style={{padding:'10px 16px',color:'var(--text2)',fontSize:'0.8rem'}}>{m.descripcion||'—'}</td>
                            <td style={{padding:'10px 16px'}}>
                              <div style={{display:'flex',gap:6}}>
                                <button className="btn btn-ghost btn-sm" onClick={() => window.open(m.url,'_blank')}>👁️</button>
                                <button className="btn btn-ghost btn-sm" onClick={() => openEdit(m)}>✏️ Asignar tema</button>
                                <button className="btn btn-danger btn-sm" onClick={() => remove(m.id)}>🗑️</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* Vista lista completa */}
      {vistaTab === 'lista' && (
        mats.length === 0 ? <Empty icon="📄" text="No hay materiales" /> : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Tipo</th><th>Título</th><th>Descripción</th><th>Tema</th><th>Descarga</th><th>Acciones</th></tr></thead>
              <tbody>{mats.map(m => <MatRow key={m.id} m={m} />)}</tbody>
            </table>
          </div>
        )
      )}

      {/* Modal nuevo/editar tema */}
      {temaModal && (
        <Modal title={editingTema ? '✏️ Editar tema' : '📂 Nuevo tema'} onClose={() => setTemaModal(false)}>
          <div className="form-group">
            <label>Nombre del tema</label>
            <input placeholder="Ej: Unidad 1 - Introducción" value={temaForm.nombre} onChange={e => setTemaForm(p => ({...p, nombre: e.target.value}))} />
          </div>
          <div className="form-group">
            <label>Descripción (opcional)</label>
            <textarea placeholder="Descripción breve del tema..." value={temaForm.descripcion} onChange={e => setTemaForm(p => ({...p, descripcion: e.target.value}))} />
          </div>
          <div className="form-group">
            <label>Color del tema</label>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginTop:6}}>
              {TEMA_COLORS.map(c => (
                <div key={c} onClick={() => setTemaForm(p => ({...p, color: c}))} style={{width:34,height:34,borderRadius:'50%',background:c,cursor:'pointer',border:temaForm.color===c?`3px solid white`:'3px solid transparent',outline:temaForm.color===c?`2px solid ${c}`:'none',transition:'all 0.15s'}} />
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => setTemaModal(false)}>Cancelar</button>
            <button className="btn btn-primary" onClick={saveTema}>💾 Guardar tema</button>
          </div>
        </Modal>
      )}

      {modal && (
        <Modal title={editing ? '✏️ Editar material' : '➕ Nuevo material'} onClose={() => setModal(false)}>
          {/* Drop zone */}
          {!editing && (
            <div
              className={`upload-area ${dragOver ? 'drag-over' : ''}`}
              style={{marginBottom:16}}
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={e => { e.preventDefault(); setDragOver(false); handleFileSelect(e.dataTransfer.files[0]); }}
              onClick={() => fileRef.current.click()}
            >
              <input ref={fileRef} type="file" style={{display:'none'}} accept=".pdf,.doc,.docx,.xls,.xlsx,image/*,video/*" onChange={e => handleFileSelect(e.target.files[0])} />
              {selectedFile ? (
                <div>
                  <div style={{fontSize:'2rem',marginBottom:6}}>{TIPO_INFO[form.tipo]?.icon || '📄'}</div>
                  <div style={{fontWeight:600,color:'var(--accent)'}}>{selectedFile.name}</div>
                  <div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:4}}>{(selectedFile.size / 1024 / 1024).toFixed(2)} MB</div>
                </div>
              ) : (
                <div>
                  <div className="upload-icon">📂</div>
                  <div style={{fontWeight:600}}>Arrastrá o hacé click para subir</div>
                  <div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:4}}>PDF · Word · Excel · Imágenes · Videos</div>
                </div>
              )}
            </div>
          )}

          {/* O URL manual */}
          {!selectedFile && (
            <div className="form-group">
              <label>{editing ? 'URL del archivo' : 'O ingresá una URL externa'}</label>
              <input type="url" placeholder="https://..." value={form.url} onChange={e => setForm(p => ({ ...p, url: e.target.value }))} />
            </div>
          )}

          <div className="form-group">
            <label>Nombre / Unidad</label>
            <input value={form.unidad || ''} onChange={e => setForm(p => ({ ...p, unidad: e.target.value }))} placeholder="Nombre del material" />
          </div>
          <div className="form-group">
            <label>Descripción</label>
            <textarea value={form.descripcion} onChange={e => setForm(p => ({ ...p, descripcion: e.target.value }))} placeholder="Opcional" />
          </div>
          <div className="form-group">
            <label>Tipo</label>
            <select value={form.tipo} onChange={e => setForm(p => ({ ...p, tipo: e.target.value }))}>
              {Object.entries(TIPO_INFO).map(([k, v]) => <option key={k} value={k}>{v.icon} {v.label}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label>📂 Tema</label>
            <select value={form.tema_id} onChange={e => setForm(p => ({ ...p, tema_id: e.target.value }))}>
              <option value="">-- Sin tema --</option>
              {temas.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label>📅 Semana</label>
            <select value={form.semana} onChange={e => setForm(p => ({ ...p, semana: e.target.value }))}>
              <option value="">-- Sin asignar --</option>
              {['Semana 1','Semana 2','Semana 3','Semana 4','Semana 5','Semana 6'].map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>

          {/* Toggle descarga */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',background:'var(--surface2)',borderRadius:10,marginBottom:16}}>
            <div>
              <div style={{fontWeight:600,fontSize:'0.88rem'}}>Permitir descarga</div>
              <div style={{fontSize:'0.75rem',color:'var(--text2)'}}>Si está desactivado, los alumnos solo podrán visualizar</div>
            </div>
            <div
              onClick={() => setForm(p => ({ ...p, permite_descarga: !p.permite_descarga }))}
              style={{width:44,height:24,borderRadius:12,background: form.permite_descarga ? 'var(--success)' : 'var(--border)',cursor:'pointer',position:'relative',transition:'background 0.3s',flexShrink:0}}
            >
              <div style={{position:'absolute',top:3,left: form.permite_descarga ? 23 : 3,width:18,height:18,borderRadius:'50%',background:'white',transition:'left 0.3s'}} />
            </div>
          </div>

          {uploading && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:'0.82rem',color:'var(--text2)',marginBottom:6}}>⏳ Subiendo archivo... {uploadPct}%</div>
              <div className="progress-bar"><div className="progress-fill" style={{width:`${uploadPct}%`}} /></div>
            </div>
          )}

          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={() => setModal(false)} disabled={uploading}>Cancelar</button>
            <button className="btn btn-primary" onClick={save} disabled={uploading}>{uploading ? '⏳ Subiendo...' : '💾 Guardar'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── ADMIN EVALUACIONES ──────────────────────────────────────────────
function AdminEvaluaciones() {
  const [evals, setEvals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [viewModal, setViewModal] = useState(null);
  const [form, setForm] = useState({ titulo: '', meta: '', link: '', estado: 'activo', preguntas: [], semana: '' });
  const [editing, setEditing] = useState(null);
  const toast = useToast();

  const load = async () => {
    const { data } = await supabase.from('evaluaciones').select('*').order('created_at', { ascending: false });
    setEvals(data || []); setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const addPregunta = () => setForm(p => ({ ...p, preguntas: [...p.preguntas, { texto: '', opciones: ['', '', '', ''], correcta: 0 }] }));
  const remPregunta = i => setForm(p => ({ ...p, preguntas: p.preguntas.filter((_, j) => j !== i) }));
  const updPregunta = (i, field, val) => setForm(p => ({ ...p, preguntas: p.preguntas.map((q, j) => j === i ? { ...q, [field]: val } : q) }));
  const updOpcion = (i, k, val) => setForm(p => ({ ...p, preguntas: p.preguntas.map((q, j) => j === i ? { ...q, opciones: q.opciones.map((o, l) => l === k ? val : o) } : q) }));

  const save = async () => {
    if (!form.titulo) return toast('Título requerido', 'error');
    const data = { titulo: form.titulo, meta: form.meta || '', link: form.link || '', estado: form.estado || 'activo', semana: form.semana || null, preguntas: form.preguntas };
    const { error } = editing
      ? await supabase.from('evaluaciones').update(data).eq('id', editing)
      : await supabase.from('evaluaciones').insert(data);
    if (error) return toast(error.message, 'error');
    toast('Evaluación guardada 📝', 'success');
    setModal(false); setEditing(null); setForm({ titulo: '', meta: '', link: '', estado: 'activo', preguntas: [], semana: '' }); load();
  };

  const remove = async id => {
    if (!confirm('¿Eliminar evaluación?')) return;
    await supabase.from('evaluaciones').delete().eq('id', id);
    toast('Evaluación eliminada', 'info'); load();
  };

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">📝 Evaluaciones</div>
          <div className="page-subtitle">{evals.length} evaluaciones</div>
        </div>
        <button className="btn btn-primary" onClick={() => { setForm({ titulo: '', descripcion: '', preguntas: [] }); setEditing(null); setModal(true); }}>➕ Nueva evaluación</button>
      </div>
      <div className="grid-2">
        {evals.length === 0 ? <Empty icon="📝" text="No hay evaluaciones" /> : evals.map(ev => (
          <div key={ev.id} className="card card-hover">
            <div style={{fontWeight:700,fontSize:'1rem'}}>{ev.titulo}</div>
            {ev.descripcion && <div style={{fontSize:'0.82rem',color:'var(--text2)',marginTop:4}}>{ev.descripcion}</div>}
            <div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:8}}>{(ev.preguntas || []).length} preguntas</div>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <button className="btn btn-ghost btn-sm" onClick={() => { setForm({ titulo: ev.titulo, descripcion: ev.descripcion || '', preguntas: ev.preguntas || [] }); setEditing(ev.id); setModal(true); }}>✏️ Editar</button>
              <button className="btn btn-success btn-sm" onClick={() => setViewModal(ev)}>👁️ Ver</button>
              <button className="btn btn-danger btn-sm" onClick={() => remove(ev.id)}>🗑️</button>
            </div>
          </div>
        ))}
      </div>
      {modal && (
        <Modal title={editing ? '✏️ Editar evaluación' : '➕ Nueva evaluación'} onClose={() => setModal(false)}>
          <div className="form-group"><label>Título</label><input value={form.titulo} onChange={e => setForm(p => ({ ...p, titulo: e.target.value }))} /></div>
          <div className="form-group"><label>Meta / Descripción</label><textarea value={form.meta} onChange={e => setForm(p => ({ ...p, meta: e.target.value }))} placeholder="Objetivo de la evaluación" /></div>
          <div className="form-group"><label>Link de referencia</label><input value={form.link} onChange={e => setForm(p => ({ ...p, link: e.target.value }))} placeholder="https://... (opcional)" /></div>
          <div className="form-group">
            <label>Estado</label>
            <select value={form.estado} onChange={e => setForm(p => ({ ...p, estado: e.target.value }))}>
              <option value="activo">Activo</option>
              <option value="inactivo">Inactivo</option>
            </select>
          </div>
          <div className="form-group">
            <label>📅 Semana</label>
            <select value={form.semana} onChange={e => setForm(p => ({ ...p, semana: e.target.value }))}>
              <option value="">-- Sin asignar --</option>
              {['Semana 1','Semana 2','Semana 3','Semana 4','Semana 5','Semana 6'].map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <strong>Preguntas ({form.preguntas.length})</strong>
            <button className="btn btn-ghost btn-sm" onClick={addPregunta}>➕ Agregar pregunta</button>
          </div>
          {form.preguntas.map((q, i) => (
            <div key={i} className="question-card" style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <strong style={{fontSize:'0.82rem'}}>Pregunta {i + 1}</strong>
                <button className="btn btn-danger btn-sm" onClick={() => remPregunta(i)}>✕</button>
              </div>
              <input style={{marginBottom:8}} placeholder="Texto de la pregunta" value={q.texto} onChange={e => updPregunta(i, 'texto', e.target.value)} />
              {q.opciones.map((op, k) => (
                <div key={k} style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
                  <input type="radio" name={`q${i}`} checked={q.correcta === k} onChange={() => updPregunta(i, 'correcta', k)} />
                  <input placeholder={`Opción ${k + 1}`} value={op} onChange={e => updOpcion(i, k, e.target.value)} />
                  {q.correcta === k && <span style={{color:'var(--success)',fontSize:'0.8rem'}}>✓ Correcta</span>}
                </div>
              ))}
            </div>
          ))}
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button className="btn btn-ghost" onClick={() => setModal(false)}>Cancelar</button>
            <button className="btn btn-primary" onClick={save}>💾 Guardar</button>
          </div>
        </Modal>
      )}
      {viewModal && (
        <Modal title={`📝 ${viewModal.titulo}`} onClose={() => setViewModal(null)}>
          {(viewModal.preguntas || []).map((q, i) => (
            <div key={i} className="question-card" style={{marginBottom:10}}>
              <div style={{fontWeight:600,marginBottom:8}}>P{i+1}: {q.texto}</div>
              {q.opciones.map((op, k) => (
                <div key={k} style={{fontSize:'0.84rem',padding:'4px 0',color: q.correcta === k ? 'var(--success)' : 'var(--text2)'}}>
                  {q.correcta === k ? '✅' : '○'} {op}
                </div>
              ))}
            </div>
          ))}
        </Modal>
      )}
    </div>
  );
}
