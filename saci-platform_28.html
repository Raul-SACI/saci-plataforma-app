<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACi - Sistema de Aprendizaje</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --gold: #f9ca24;
    --text: #e8e8f0;
    --text2: #8888aa;
    --danger: #ff4757;
    --success: #43e97b;
    --warning: #ffa502;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  @keyframes shimmer { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(108,99,255,0.4); } 50% { box-shadow: 0 0 0 12px rgba(108,99,255,0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes glow { 0%,100% { text-shadow: 0 0 20px rgba(108,99,255,0.3); } 50% { text-shadow: 0 0 40px rgba(108,99,255,0.7); } }

  .fade-in { animation: fadeIn 0.5s ease forwards; }
  .fade-in-scale { animation: fadeInScale 0.4s ease forwards; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Layout */
  .app-shell { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transition: transform 0.3s; }
  .main-content { margin-left: 240px; flex: 1; min-height: 100vh; }
  .topbar { height: 64px; background: rgba(19,19,26,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; z-index: 50; }
  .page-content { padding: 28px; animation: fadeIn 0.4s ease; }

  /* Logo */
  .logo { padding: 22px 20px 16px; border-bottom: 1px solid var(--border); }
  .logo-text { font-family: 'Space Mono', monospace; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 3s infinite; }
  .logo-sub { font-size: 0.68rem; color: var(--text2); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }

  /* Nav */
  .nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
  .nav-section { font-size: 0.65rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.12em; padding: 12px 10px 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; cursor: pointer; font-size: 0.88rem; font-weight: 500; color: var(--text2); transition: all 0.2s; margin-bottom: 2px; border: 1px solid transparent; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(108,99,255,0.1)); color: var(--accent); border-color: rgba(108,99,255,0.3); }
  .nav-icon { font-size: 1.1rem; width: 22px; text-align: center; }

  /* User card */
  .user-card { margin: 12px 10px; padding: 12px; background: var(--surface2); border-radius: 12px; border: 1px solid var(--border); }
  .user-name { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 0.7rem; color: var(--text2); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.68rem; font-weight: 600; }
  .badge-admin { background: rgba(108,99,255,0.2); color: var(--accent); }
  .badge-alumno { background: rgba(67,233,123,0.2); color: var(--accent3); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 10px; font-size: 0.86rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-family: inherit; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #7c74ff; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,0.4); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: rgba(255,71,87,0.15); color: var(--danger); border: 1px solid rgba(255,71,87,0.3); }
  .btn-danger:hover { background: rgba(255,71,87,0.25); }
  .btn-success { background: rgba(67,233,123,0.15); color: var(--success); border: 1px solid rgba(67,233,123,0.3); }
  .btn-success:hover { background: rgba(67,233,123,0.25); }
  .btn-sm { padding: 5px 12px; font-size: 0.78rem; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
  .card-hover { transition: all 0.2s; }
  .card-hover:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius) var(--radius) 0 0; }
  .stat-card.blue::before { background: linear-gradient(90deg, var(--accent), #a78bfa); }
  .stat-card.pink::before { background: linear-gradient(90deg, var(--accent2), #f97316); }
  .stat-card.green::before { background: linear-gradient(90deg, var(--accent3), #06b6d4); }
  .stat-card.gold::before { background: linear-gradient(90deg, var(--gold), #f97316); }
  .stat-value { font-size: 2rem; font-weight: 700; font-family: 'Space Mono', monospace; }
  .stat-label { font-size: 0.78rem; color: var(--text2); margin-top: 4px; }
  .stat-icon { font-size: 2rem; position: absolute; right: 16px; top: 16px; opacity: 0.3; }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.86rem; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* Forms */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  input, select, textarea { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.88rem; font-family: inherit; transition: border-color 0.2s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 80px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; animation: fadeIn 0.2s ease; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; animation: fadeInScale 0.3s ease; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-title { font-size: 1.15rem; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text2); font-size: 1.4rem; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; }
  .modal-close:hover { background: var(--surface2); color: var(--text); }

  /* Toast */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
  .toast { padding: 12px 18px; border-radius: 12px; font-size: 0.86rem; font-weight: 500; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease; box-shadow: var(--shadow); max-width: 340px; }
  .toast-success { background: rgba(67,233,123,0.15); border: 1px solid rgba(67,233,123,0.3); color: var(--success); }
  .toast-error { background: rgba(255,71,87,0.15); border: 1px solid rgba(255,71,87,0.3); color: var(--danger); }
  .toast-info { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3); color: var(--accent); }

  /* Login */
  .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.15) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(255,101,132,0.1) 0%, transparent 60%), var(--bg); }
  .login-card { width: 100%; max-width: 400px; animation: fadeInScale 0.5s ease; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo-text { font-family: 'Space Mono', monospace; font-size: 2.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .login-sub { color: var(--text2); font-size: 0.9rem; margin-top: 6px; }
  .divider { height: 1px; background: var(--border); margin: 18px 0; }

  /* Page header */
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 1.5rem; font-weight: 700; }
  .page-subtitle { font-size: 0.85rem; color: var(--text2); margin-top: 2px; }

  /* Video player */
  .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: var(--radius); overflow: hidden; }
  .video-watermark { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 10; gap: 8px; }
  .video-watermark-text { color: rgba(249,202,36,0.55); font-size: 1.1rem; font-weight: 700; font-family: 'Space Mono', monospace; white-space: nowrap; text-shadow: 0 2px 8px rgba(0,0,0,0.9); transform: rotate(-12deg); letter-spacing: 0.05em; }
  .video-watermark-sub { color: rgba(249,202,36,0.35); font-size: 0.72rem; font-family: 'Space Mono', monospace; white-space: nowrap; text-shadow: 0 1px 4px rgba(0,0,0,0.9); transform: rotate(-12deg); letter-spacing: 0.08em; }
  
  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 0.9rem; }

  /* Chip */
  .chip { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
  .chip-green { background: rgba(67,233,123,0.15); color: var(--success); }
  .chip-red { background: rgba(255,71,87,0.15); color: var(--danger); }
  .chip-yellow { background: rgba(249,202,36,0.15); color: var(--gold); }
  .chip-blue { background: rgba(108,99,255,0.15); color: var(--accent); }

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

  /* Search */
  .search-bar { position: relative; }
  .search-bar input { padding-left: 38px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 1rem; }

  /* Loading */
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-center { display: flex; justify-content: center; align-items: center; padding: 60px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 22px; width: fit-content; }
  .tab { padding: 7px 16px; border-radius: 9px; font-size: 0.84rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text2); border: none; background: none; font-family: inherit; }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  /* Progress */
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.5s ease; }

  /* Topbar right */
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .topbar-user { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 10px; border-radius: 10px; transition: background 0.2s; }
  .topbar-user:hover { background: var(--surface2); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: white; flex-shrink: 0; }

  /* Notification dot */
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); position: absolute; top: -2px; right: -2px; }

  /* Upload area */
  .upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-area:hover, .upload-area.drag-over { border-color: var(--accent); background: rgba(108,99,255,0.05); }
  .upload-icon { font-size: 2.5rem; margin-bottom: 10px; }

  /* Evaluation */
  .question-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .option-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; cursor: pointer; border: 1px solid var(--border); margin-bottom: 8px; transition: all 0.2s; background: var(--surface); }
  .option-item:hover { border-color: var(--accent); background: rgba(108,99,255,0.05); }
  .option-item.selected { border-color: var(--accent); background: rgba(108,99,255,0.1); }
  .option-item.correct { border-color: var(--success); background: rgba(67,233,123,0.1); }
  .option-item.incorrect { border-color: var(--danger); background: rgba(255,71,87,0.1); }

  /* Payment status */
  .payment-row td:first-child { font-family: 'Space Mono', monospace; font-size: 0.78rem; }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main-content { margin-left: 0; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

// ─── CONFIG ──────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://qonptlakubiiseoglkdm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fHe2xHAHL37_RDw4STDRZg_EDv8itlN';
const BUNNY_LIBRARY = '645418';
const BUNNY_CDN = 'vz-b64e5e9d-a67.b-cdn.net';
const BUNNY_API_KEY = '31ebdf0b-51c7-4388-8d3e0f3cdc7f-dad7-49dd';
const ADMIN_EMAIL = 'admin@saci.com';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── CONTEXT ─────────────────────────────────────────────────────────
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

// ─── TOAST ───────────────────────────────────────────────────────────
let toastId = 0;
const ToastCtx = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = 'info') => {
    const id = ++toastId;
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  }, []);
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast toast-${t.type}`}>
            {icons[t.type]} {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

// ─── MODAL ────────────────────────────────────────────────────────────
function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─── LOGIN PAGE ──────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const toast = useToast();

  const handleLogin = async e => {
    e.preventDefault();
    setLoading(true);
    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      const isAdmin = email === ADMIN_EMAIL;
      let alumno = null;
      if (!isAdmin) {
        const { data: al } = await supabase.from('alumnos').select('*').eq('email', email).single();
        alumno = al;
      }
      onLogin({ user: data.user, isAdmin, alumno });
      toast('¡Bienvenido a SACi! 🎉', 'success');
    } catch (err) {
      toast(err.message || 'Error al iniciar sesión', 'error');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="login-page">

// ─── TOPBAR ───────────────────────────────────────────────────────────
function Topbar({ title, subtitle }) {
  return (
    <div className="topbar">
      <div>
        <div style={{fontWeight:700,fontSize:'1.05rem'}}>{title}</div>
        {subtitle && <div style={{fontSize:'0.78rem',color:'var(--text2)'}}>{subtitle}</div>}
      </div>
      <div className="topbar-right">
        <div style={{fontSize:'0.8rem',color:'var(--text2)',fontFamily:'Space Mono'}}>
          {new Date().toLocaleDateString('es-AR', {day:'2-digit',month:'short',year:'numeric'})}
        </div>
      </div>
    </div>
  );
}

// ─── LOADING ──────────────────────────────────────────────────────────
function Loading() {
  return <div className="loading-center"><div className="spinner" /></div>;
}

// ─── EMPTY STATE ──────────────────────────────────────────────────────
function Empty({ icon = '📭', text = 'Sin datos' }) {
  return (
    <div className="empty-state">
      <div className="empty-icon">{icon}</div>
      <div className="empty-text">{text}</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// ADMIN PAGES
// ═══════════════════════════════════════════════════════════════════════


// ─── GANTT CHART ──────────────────────────────────────────────────────
function GanttChart({ isAdmin }) {
  const SEMANAS = ['Semana 1','Semana 2','Semana 3','Semana 4','Semana 5','Semana 6'];
  const COLORS = {
    videos:      { bg: 'rgba(108,99,255,0.25)', border: '#6c63ff', icon: '🎬', label: 'Videos' },
    materiales:  { bg: 'rgba(67,233,123,0.2)',  border: '#43e97b', icon: '📄', label: 'Materiales' },
    evaluaciones:{ bg: 'rgba(255,101,132,0.2)', border: '#ff6584', icon: '📝', label: 'Evaluaciones' },
  };

  const [data, setData] = useState({ videos: [], materiales: [], evaluaciones: [] });
  const [loading, setLoading] = useState(true);
  const [hover, setHover] = useState(null);

  useEffect(() => {
    (async () => {
      const [v, m, e] = await Promise.all([
        supabase.from('videos').select('titulo, semana'),
        supabase.from('materiales').select('unidad, semana'),
        supabase.from('evaluaciones').select('titulo, semana').not('semana', 'is', null),
      ]);
      setData({ videos: v.data || [], materiales: m.data || [], evaluaciones: e.data || [] });
      setLoading(false);
    })();
  }, []);

  const countBySemana = (items, semana) => items.filter(i => i.semana === semana);

  if (loading) return <div style={{padding:20,textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}} /></div>;

  const hasAnyData = data.videos.length > 0 || data.materiales.length > 0 || data.evaluaciones.length > 0;

  return (
    <div className="card" style={{marginBottom:28}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontWeight:700,fontSize:'1.05rem'}}>📅 Diagrama de Gantt — Planificación semanal</div>
          <div style={{fontSize:'0.8rem',color:'var(--text2)',marginTop:2}}>Distribución de contenidos por semana</div>
        </div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          {Object.entries(COLORS).map(([k,v]) => (
            <div key={k} style={{display:'flex',alignItems:'center',gap:6,fontSize:'0.78rem'}}>
              <div style={{width:12,height:12,borderRadius:3,background:v.bg,border:`2px solid ${v.border}`}} />
              {v.icon} {v.label}
            </div>
          ))}
        </div>
      </div>

      {!hasAnyData ? (
        <div style={{textAlign:'center',padding:'30px 0',color:'var(--text2)',fontSize:'0.88rem'}}>
          📭 No hay contenidos asignados a semanas aún
        </div>
      ) : (
        <div style={{overflowX:'auto'}}>
          {/* Header semanas */}
          <div style={{display:'grid',gridTemplateColumns:'120px repeat(6, 1fr)',gap:4,marginBottom:8}}>
            <div />
            {SEMANAS.map((s,i) => (
              <div key={s} style={{textAlign:'center',fontSize:'0.72rem',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',padding:'4px 2px',borderRadius:6,background:'var(--surface2)'}}>
                S{i+1}
                <div style={{fontSize:'0.65rem',fontWeight:400,marginTop:1}}>Sem {i+1}</div>
              </div>
            ))}
          </div>

          {/* Rows */}
          {Object.entries(COLORS).map(([tipo, cfg]) => (
            <div key={tipo} style={{display:'grid',gridTemplateColumns:'120px repeat(6, 1fr)',gap:4,marginBottom:4,alignItems:'center'}}>
              {/* Label */}
              <div style={{fontSize:'0.78rem',fontWeight:600,color:'var(--text2)',display:'flex',alignItems:'center',gap:6}}>
                <span>{cfg.icon}</span> {cfg.label}
              </div>
              {/* Cells */}
              {SEMANAS.map((semana, si) => {
                const items = countBySemana(data[tipo], semana);
                const hasItems = items.length > 0;
                const hKey = `${tipo}-${si}`;
                return (
                  <div
                    key={semana}
                    onMouseEnter={() => setHover(hKey)}
                    onMouseLeave={() => setHover(null)}
                    style={{
                      height:44,
                      borderRadius:8,
                      background: hasItems ? cfg.bg : 'var(--surface2)',
                      border: `2px solid ${hasItems ? cfg.border : 'var(--border)'}`,
                      display:'flex',
                      alignItems:'center',
                      justifyContent:'center',
                      cursor: hasItems ? 'pointer' : 'default',
                      transition:'all 0.2s',
                      position:'relative',
                      transform: hover === hKey && hasItems ? 'scale(1.05)' : 'scale(1)',
                      boxShadow: hover === hKey && hasItems ? `0 4px 16px ${cfg.border}44` : 'none',
                    }}
                  >
                    {hasItems ? (
                      <>
                        <div style={{textAlign:'center'}}>
                          <div style={{fontSize:'1rem',lineHeight:1}}>{cfg.icon}</div>
                          <div style={{fontSize:'0.65rem',fontWeight:700,color:cfg.border,marginTop:2}}>{items.length} {items.length === 1 ? 'ítem' : 'ítems'}</div>
                        </div>
                        {/* Tooltip */}
                        {hover === hKey && (
                          <div style={{
                            position:'absolute',
                            bottom:'calc(100% + 8px)',
                            left:'50%',
                            transform:'translateX(-50%)',
                            background:'var(--surface)',
                            border:`1px solid ${cfg.border}`,
                            borderRadius:10,
                            padding:'10px 14px',
                            zIndex:100,
                            minWidth:160,
                            boxShadow:'0 8px 24px rgba(0,0,0,0.4)',
                            animation:'fadeInScale 0.15s ease',
                          }}>
                            <div style={{fontWeight:700,fontSize:'0.78rem',color:cfg.border,marginBottom:8}}>{semana} — {cfg.label}</div>
                            {items.map((it,idx) => (
                              <div key={idx} style={{fontSize:'0.74rem',color:'var(--text2)',padding:'2px 0',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:6}}>
                                <span style={{color:cfg.border}}>•</span> {(it.titulo||it.unidad)?.slice(0,30)}{(it.titulo||it.unidad)?.length > 30 ? '…' : ''}
                              </div>
                            ))}
                          </div>
                        )}
                      </>
                    ) : (
                      <div style={{fontSize:'0.7rem',color:'var(--border)'}}>—</div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}

          {/* Progress bar total */}
          <div style={{marginTop:16,padding:'12px 0',borderTop:'1px solid var(--border)'}}>
            <div style={{fontSize:'0.75rem',color:'var(--text2)',marginBottom:8,fontWeight:600}}>PROGRESO GENERAL DEL CURSO</div>
            <div style={{display:'grid',gridTemplateColumns:'120px repeat(6, 1fr)',gap:4}}>
              <div />
              {SEMANAS.map((semana, si) => {
                const total = countBySemana(data.videos, semana).length +
                              countBySemana(data.materiales, semana).length +
                              countBySemana(data.evaluaciones, semana).length;
                const maxTotal = Math.max(...SEMANAS.map(s =>
                  countBySemana(data.videos, s).length +
                  countBySemana(data.materiales, s).length +
                  countBySemana(data.evaluaciones, s).length
                ), 1);
                const pct = Math.round((total / maxTotal) * 100);
                return (
                  <div key={semana} style={{textAlign:'center'}}>
                    <div style={{height:6,background:'var(--surface2)',borderRadius:3,overflow:'hidden',marginBottom:4}}>
                      <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg, #6c63ff, #ff6584)`,borderRadius:3,transition:'width 0.5s ease'}} />
                    </div>
                    <div style={{fontSize:'0.65rem',color:'var(--text2)'}}>{total} ítems</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
