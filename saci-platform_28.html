// ─── ALUMNO VIDEOS ────────────────────────────────────────────────────
function AlumnoVideos({ alumno, user }) {
  const [temas, setTemas] = useState([]);
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [current, setCurrent] = useState(null);
  const [expandedTemas, setExpandedTemas] = useState({});

  useEffect(() => {
    Promise.all([
      supabase.from('temas_videos').select('*').order('orden'),
      supabase.from('videos').select('*').order('orden'),
    ]).then(([{ data: tData }, { data: vData }]) => {
      setTemas(tData || []);
      setVideos(vData || []);
      setLoading(false);
      if (vData?.length) setCurrent(vData[0]);
      const exp = {};
      (tData || []).forEach(t => exp[t.id] = true);
      exp['sin-tema'] = true;
      setExpandedTemas(exp);
    });
  }, []);

  const getEmbedUrl = (v) => {
    const bid = v.bunny_id || v.bunny_video_id;
    if (bid) return `https://iframe.mediadelivery.net/embed/${BUNNY_LIBRARY}/${bid}?autoplay=false&loop=false&muted=false&preload=false`;
    if (v.url_externa) {
      const url = v.url_externa;
      const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
      if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}`;
      const vmMatch = url.match(/vimeo\.com\/(\d+)/);
      if (vmMatch) return `https://player.vimeo.com/video/${vmMatch[1]}`;
      return url;
    }
    return null;
  };

  const toggleTema = id => setExpandedTemas(p => ({ ...p, [id]: !p[id] }));
  const embedUrl = current ? getEmbedUrl(current) : null;
  const watermarkName = alumno?.nombre || user?.email?.split('@')[0] || 'SACi';

  const VideoItem = ({ v }) => {
    const bid = v.bunny_id || v.bunny_video_id;
    return (
      <div onClick={() => setCurrent(v)} style={{display:'flex',gap:10,padding:'8px 10px',borderRadius:8,cursor:'pointer',background:current?.id===v.id?'var(--surface2)':'transparent',border:current?.id===v.id?'1px solid var(--accent)':'1px solid transparent',marginBottom:3,transition:'all 0.2s'}}>
        {bid ? <img src={`https://${BUNNY_CDN}/${bid}/thumbnail.jpg`} style={{width:58,height:36,borderRadius:5,objectFit:'cover',flexShrink:0}} onError={e=>e.target.style.display='none'} />
          : <div style={{width:58,height:36,borderRadius:5,background:'var(--surface2)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>🎬</div>}
        <div style={{overflow:'hidden',flex:1}}>
          <div style={{fontSize:'0.8rem',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:current?.id===v.id?'var(--accent)':'var(--text)'}}>{v.titulo}</div>
          {v.descripcion && <div style={{fontSize:'0.7rem',color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.descripcion}</div>}
        </div>
      </div>
    );
  };

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">🎬 Mis Videos</div>
          <div className="page-subtitle">{videos.length} videos disponibles</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:20}}>
        {/* Player */}
        <div>
          {current ? (
            <>
              <div className="video-container" style={{marginBottom:16}}>
                {embedUrl ? (
                  <iframe src={embedUrl} style={{width:'100%',height:'100%',border:'none'}} allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture" allowFullScreen />
                ) : <Empty icon="🎬" text="Video no disponible" />}
                <div className="video-watermark">
                  <div className="video-watermark-text">{watermarkName}</div>
                  <div className="video-watermark-sub">{alumno?.email || user?.email || ''}</div>
                </div>
              </div>
              <div className="card">
                <div style={{fontWeight:700,fontSize:'1.1rem',marginBottom:6}}>{current.titulo}</div>
                {current.descripcion && <div style={{color:'var(--text2)',fontSize:'0.88rem'}}>{current.descripcion}</div>}
              </div>
            </>
          ) : <Empty icon="🎬" text="No hay videos disponibles" />}
        </div>
        {/* Sidebar */}
        <div>
          <div style={{fontWeight:700,marginBottom:10,color:'var(--text2)',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.08em'}}>Contenido</div>
          {temas.map(t => {
            const tVids = videos.filter(v => v.tema_id === t.id);
            if (!tVids.length) return null;
            const isOpen = expandedTemas[t.id];
            return (
              <div key={t.id} style={{marginBottom:8}}>
                <div onClick={() => toggleTema(t.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',padding:'8px 10px',borderRadius:8,background:'var(--surface2)',marginBottom:isOpen?4:0,borderLeft:`3px solid ${t.color||'var(--accent)'}`}}>
                  <span style={{fontSize:'0.8rem',fontWeight:700,color:t.color||'var(--accent)'}}>{t.nombre}</span>
                  <span style={{color:'var(--text2)',fontSize:'0.75rem'}}>{isOpen?'▲':'▼'} {tVids.length}</span>
                </div>
                {isOpen && tVids.map(v => <VideoItem key={v.id} v={v} />)}
              </div>
            );
          })}
          {videos.filter(v => !v.tema_id).length > 0 && (
            <div style={{marginBottom:8}}>
              <div onClick={() => toggleTema('sin-tema')} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',padding:'8px 10px',borderRadius:8,background:'var(--surface2)',marginBottom:expandedTemas['sin-tema']?4:0}}>
                <span style={{fontSize:'0.8rem',fontWeight:700,color:'var(--text2)'}}>Videos generales</span>
                <span style={{color:'var(--text2)',fontSize:'0.75rem'}}>{expandedTemas['sin-tema']?'▲':'▼'}</span>
              </div>
              {expandedTemas['sin-tema'] && videos.filter(v=>!v.tema_id).map(v => <VideoItem key={v.id} v={v} />)}
            </div>
          )}
          {videos.length === 0 && <Empty icon="🎬" text="No hay videos" />}
        </div>
      </div>
    </div>
  );
}

// ─── ALUMNO MATERIALES ────────────────────────────────────────────────
function AlumnoMateriales() {
  const TIPO_INFO = {
    pdf:   { icon: '📕', label: 'PDF' },
    word:  { icon: '📘', label: 'Word' },
    excel: { icon: '📗', label: 'Excel' },
    link:  { icon: '🔗', label: 'Link' },
    video: { icon: '🎬', label: 'Video' },
    imagen:{ icon: '🖼️', label: 'Imagen' },
    doc:   { icon: '📝', label: 'Doc' },
  };
  const [temas, setTemas] = useState([]);
  const [mats, setMats] = useState([]);
  const [loading, setLoading] = useState(true);
  const [preview, setPreview] = useState(null);
  const [expandedTemas, setExpandedTemas] = useState({});
  const toast = useToast();

  useEffect(() => {
    Promise.all([
      supabase.from('temas_materiales').select('*').order('orden', { ascending: true }),
      supabase.from('materiales').select('*').order('orden', { ascending: true }),
    ]).then(([{ data: tData }, { data: mData, error }]) => {
      if (error) console.error('mat err:', error);
      setTemas(tData || []);
      setMats(mData || []);
      setLoading(false);
      // Expand all by default
      const exp = {};
      (tData || []).forEach(t => exp[t.id] = true);
      exp['sin-tema'] = true;
      setExpandedTemas(exp);
    });
  }, []);

  const toggleTema = (id) => setExpandedTemas(p => ({ ...p, [id]: !p[id] }));

  const openMaterial = (m) => {
    if (m.tipo === 'pdf' || m.tipo === 'imagen') {
      setPreview(m);
    } else {
      window.open(m.url, '_blank');
    }
  };

  const download = async (m) => {
    try {
      const res = await fetch(m.url);
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (m.unidad || m.titulo) + (m.tipo === 'pdf' ? '.pdf' : m.tipo === 'word' ? '.docx' : m.tipo === 'excel' ? '.xlsx' : '');
      a.click();
      URL.revokeObjectURL(a.href);
    } catch { toast('Error al descargar', 'error'); }
  };

  const MatCard = ({ m }) => {
    const ti = TIPO_INFO[m.tipo] || { icon: '📄', label: m.tipo };
    const puedeDescargar = m.permite_descarga !== false;
    return (
      <div className="card card-hover fade-in" style={{display:'flex',flexDirection:'column',gap:0}}>
        <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
          <div style={{fontSize:'2.2rem',lineHeight:1,flexShrink:0}}>{ti.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:'0.95rem'}}>{m.unidad || m.titulo}</div>
            {m.descripcion && <div style={{fontSize:'0.8rem',color:'var(--text2)',marginTop:3,lineHeight:1.4}}>{m.descripcion}</div>}
            <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap',alignItems:'center'}}>
              <span className="chip chip-blue">{ti.label}</span>
              {!puedeDescargar && <span className="chip chip-yellow" style={{fontSize:'0.68rem'}}>🔒 Solo visualización</span>}
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginTop:14,borderTop:'1px solid var(--border)',paddingTop:12}}>
          <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center'}} onClick={() => openMaterial(m)}>
            👁️ Visualizar
          </button>
          {puedeDescargar && (
            <button className="btn btn-success btn-sm" style={{flex:1,justifyContent:'center'}} onClick={() => download(m)}>
              ⬇️ Descargar
            </button>
          )}
        </div>
      </div>
    );
  };

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header"><div><div className="page-title">📄 Materiales</div><div className="page-subtitle">{mats.length} materiales disponibles</div></div></div>

      {mats.length === 0 && <Empty icon="📄" text="No hay materiales disponibles aún" />}

      {/* Materiales agrupados por tema */}
      {temas.map(t => {
        const tMats = mats.filter(m => m.tema_id === t.id);
        if (!tMats.length) return null;
        const isOpen = expandedTemas[t.id];
        return (
          <div key={t.id} style={{marginBottom:14}}>
            <div onClick={() => toggleTema(t.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px',borderRadius:isOpen?'12px 12px 0 0':'12px',background:'var(--surface)',border:`1px solid var(--border)`,borderLeft:`4px solid ${t.color||'var(--accent)'}`,cursor:'pointer',transition:'all 0.2s'}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:'1.3rem'}}>📂</span>
                <div>
                  <div style={{fontWeight:700,color:t.color||'var(--accent)'}}>{t.nombre}</div>
                  {t.descripcion && <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:2}}>{t.descripcion}</div>}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span className="chip chip-blue">{tMats.length} materiales</span>
                <span style={{color:'var(--text2)',fontSize:'1rem'}}>{isOpen?'▲':'▼'}</span>
              </div>
            </div>
            {isOpen && (
              <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',padding:16,background:'var(--surface)'}}>
                <div className="grid-2">
                  {tMats.map(m => <MatCard key={m.id} m={m} />)}
                </div>
              </div>
            )}
          </div>
        );
      })}

      {/* Materiales sin tema */}
      {mats.filter(m => !m.tema_id).length > 0 && (
        <div style={{marginBottom:14}}>
          <div onClick={() => toggleTema('sin-tema')} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px',borderRadius:expandedTemas['sin-tema']?'12px 12px 0 0':'12px',background:'var(--surface)',border:'1px solid var(--border)',borderLeft:'4px solid var(--border)',cursor:'pointer'}}>
            <div style={{fontWeight:600,color:'var(--text2)'}}>📁 Otros materiales</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span className="chip chip-blue">{mats.filter(m=>!m.tema_id).length}</span>
              <span style={{color:'var(--text2)',fontSize:'1rem'}}>{expandedTemas['sin-tema']?'▲':'▼'}</span>
            </div>
          </div>
          {expandedTemas['sin-tema'] && (
            <div style={{border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 12px 12px',padding:16,background:'var(--surface)'}}>
              <div className="grid-2">
                {mats.filter(m=>!m.tema_id).map(m => <MatCard key={m.id} m={m} />)}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Preview modal */}
      {preview && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setPreview(null)}>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,width:'90vw',maxWidth:900,height:'85vh',display:'flex',flexDirection:'column',animation:'fadeInScale 0.3s ease'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 22px',borderBottom:'1px solid var(--border)'}}>
              <div style={{fontWeight:700}}>{preview.unidad || preview.titulo}</div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                {preview.permite_descarga !== false && (
                  <button className="btn btn-success btn-sm" onClick={() => download(preview)}>⬇️ Descargar</button>
                )}
                <button className="modal-close" onClick={() => setPreview(null)}>✕</button>
              </div>
            </div>
            <div style={{flex:1,overflow:'hidden',borderRadius:'0 0 18px 18px'}}>
              {preview.tipo === 'pdf' ? (
                <iframe src={preview.url + '#toolbar=' + (preview.permite_descarga !== false ? '1' : '0')} style={{width:'100%',height:'100%',border:'none'}} />
              ) : preview.tipo === 'imagen' ? (
                <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#000',padding:20}}>
                  <img src={preview.url} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:8}} />
                </div>
              ) : null}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
// ─── ALUMNO EVALUACIONES ─────────────────────────────────────────────
function AlumnoEvaluaciones({ alumno }) {
  const [evals, setEvals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [active, setActive] = useState(null);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [score, setScore] = useState(null);
  const toast = useToast();

  useEffect(() => {
    supabase.from('evaluaciones').select('*').order('created_at').then(({ data }) => { setEvals(data || []); setLoading(false); });
  }, []);

  const startEval = ev => { setActive(ev); setAnswers({}); setSubmitted(false); setScore(null); };

  const submit = async () => {
    const preguntas = active.preguntas || [];
    let correct = 0;
    preguntas.forEach((q, i) => { if (answers[i] === q.correcta) correct++; });
    const pct = preguntas.length ? Math.round((correct / preguntas.length) * 100) : 0;
    setScore({ correct, total: preguntas.length, pct });
    setSubmitted(true);
    await supabase.from('resultados_evaluaciones').insert({ evaluacion_id: active.id, alumno_id: alumno?.id, respuestas: answers, puntaje: pct });
    toast(`Evaluación enviada — ${pct}% ✅`, 'success');
  };

  if (loading) return <Loading />;
  if (active) {
    const preguntas = active.preguntas || [];
    return (
      <div className="page-content fade-in">
        <div className="page-header">
          <div>
            <div className="page-title">📝 {active.titulo}</div>
            <div className="page-subtitle">{preguntas.length} preguntas</div>
          </div>
          <button className="btn btn-ghost" onClick={() => setActive(null)}>← Volver</button>
        </div>
        {submitted && score && (
          <div className="card" style={{marginBottom:20,background: score.pct >= 60 ? 'rgba(67,233,123,0.1)' : 'rgba(255,71,87,0.1)',border:`1px solid ${score.pct >= 60 ? 'var(--success)' : 'var(--danger)'}`}}>
            <div style={{fontWeight:700,fontSize:'1.2rem',marginBottom:8}}>{score.pct >= 60 ? '🎉 ¡Aprobado!' : '😔 No aprobado'}</div>
            <div style={{fontSize:'2rem',fontFamily:'Space Mono',fontWeight:700,color: score.pct >= 60 ? 'var(--success)' : 'var(--danger)'}}>{score.pct}%</div>
            <div style={{color:'var(--text2)',marginTop:6}}>{score.correct} de {score.total} correctas</div>
            <div style={{marginTop:12}}><div className="progress-bar"><div className="progress-fill" style={{width:`${score.pct}%`,background: score.pct >= 60 ? 'var(--success)' : 'var(--danger)'}} /></div></div>
          </div>
        )}
        {preguntas.map((q, i) => (
          <div key={i} className="question-card">
            <div style={{fontWeight:600,marginBottom:12}}>P{i+1}: {q.texto}</div>
            {q.opciones.map((op, k) => {
              let cls = 'option-item';
              if (submitted) {
                if (k === q.correcta) cls += ' correct';
                else if (answers[i] === k && k !== q.correcta) cls += ' incorrect';
              } else if (answers[i] === k) cls += ' selected';
              return (
                <div key={k} className={cls} onClick={() => !submitted && setAnswers(a => ({ ...a, [i]: k }))}>
                  <span style={{width:22,height:22,borderRadius:'50%',border:'2px solid',borderColor:'currentColor',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.7rem',flexShrink:0}}>
                    {submitted && k === q.correcta ? '✓' : submitted && answers[i] === k && k !== q.correcta ? '✗' : String.fromCharCode(65+k)}
                  </span>
                  {op}
                </div>
              );
            })}
          </div>
        ))}
        {!submitted && (
          <button className="btn btn-primary" style={{marginTop:8}} onClick={submit} disabled={Object.keys(answers).length < preguntas.length}>
            🚀 Enviar respuestas ({Object.keys(answers).length}/{preguntas.length})
          </button>
        )}
      </div>
    );
  }

  return (
    <div className="page-content fade-in">
      <div className="page-header"><div><div className="page-title">📝 Evaluaciones</div></div></div>
      {evals.length === 0 ? <Empty icon="📝" text="No hay evaluaciones disponibles" /> : (
        <div className="grid-2">
          {evals.map(ev => (
            <div key={ev.id} className="card card-hover">
              <div style={{fontWeight:700,fontSize:'1rem',marginBottom:4}}>{ev.titulo}</div>
              {ev.meta && <div style={{fontSize:'0.82rem',color:'var(--text2)',marginBottom:10}}>{ev.meta}</div>}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span className="chip chip-blue">{(ev.preguntas || []).length} preguntas</span>
                <button className="btn btn-primary btn-sm" onClick={() => startEval(ev)}>📝 Comenzar</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── ALUMNO PAGOS ─────────────────────────────────────────────────────
function AlumnoPagos({ alumno }) {
  const [pagos, setPagos] = useState([]);
  const [loading, setLoading] = useState(true);
  const today = new Date().toISOString().split('T')[0];

  useEffect(() => {
    if (!alumno?.id) { setLoading(false); return; }
    supabase.from('pagos').select('*').eq('alumno_id', alumno.id)
      .order('fecha_pago', { ascending: false })
      .then(({ data }) => { setPagos(data || []); setLoading(false); });
  }, [alumno]);

  const totalPagado = pagos.reduce((s, p) => s + (parseFloat(p.monto) || 0), 0);
  const proximosPagos = pagos.filter(p => p.proximo_pago && p.proximo_pago >= today);

  const planColor = plan => {
    if (plan === 'Parcial') return 'chip-yellow';
    if (plan === 'Final') return 'chip-green';
    return 'chip-blue';
  };

  if (loading) return <Loading />;
  return (
    <div className="page-content fade-in">
      <div className="page-header"><div><div className="page-title">💳 Mis Pagos</div></div></div>

      <div className="stats-grid" style={{maxWidth:500,marginBottom:20}}>
        <div className="stat-card green"><span className="stat-icon">💵</span><div className="stat-value" style={{fontSize:'1.1rem'}}>$ {totalPagado.toLocaleString('es-AR',{minimumFractionDigits:2})}</div><div className="stat-label">Total abonado</div></div>
        <div className="stat-card gold"><span className="stat-icon">📋</span><div className="stat-value">{pagos.length}</div><div className="stat-label">Pagos registrados</div></div>
      </div>

      {/* Próximos vencimientos */}
      {proximosPagos.length > 0 && (
        <div className="card" style={{marginBottom:20,borderColor:'var(--accent2)',background:'rgba(255,101,132,0.05)'}}>
          <div style={{fontWeight:700,marginBottom:12,color:'var(--accent2)',display:'flex',alignItems:'center',gap:8}}>🔔 Próximos vencimientos</div>
          {proximosPagos.map(p => (
            <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
              <div>
                <span className={`chip ${planColor(p.plan)}`} style={{marginRight:8}}>{p.plan}</span>
                {p.notas && <span style={{fontSize:'0.82rem',color:'var(--text2)'}}>{p.notas}</span>}
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'Space Mono',fontWeight:700,color:'var(--accent2)'}}>
                  {new Date(p.proximo_pago+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})}
                </div>
                {p.proximo_pago === today && <div style={{fontSize:'0.72rem',color:'var(--danger)',fontWeight:700}}>🔴 ¡Hoy!</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Historial de pagos */}
      {pagos.length === 0 ? <Empty icon="💳" text="No hay registros de pagos aún" /> : (
        <div>
          <div style={{fontWeight:700,marginBottom:12,color:'var(--text2)',fontSize:'0.8rem',textTransform:'uppercase',letterSpacing:'0.08em'}}>Historial de pagos</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {pagos.map(p => (
              <div key={p.id} className="card" style={{padding:'14px 18px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
                  <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                    <span className={`chip ${planColor(p.plan)}`}>{p.plan === 'Parcial' ? '💰' : p.plan === 'Final' ? '✅' : '📚'} {p.plan || '—'}</span>
                    {p.notas && <span style={{fontSize:'0.82rem',color:'var(--text2)'}}>{p.notas}</span>}
                  </div>
                  <div style={{fontFamily:'Space Mono',fontWeight:700,fontSize:'1.1rem',color:'var(--success)'}}>
                    {p.monto ? `$ ${parseFloat(p.monto).toLocaleString('es-AR',{minimumFractionDigits:2})}` : '—'}
                  </div>
                </div>
                <div style={{display:'flex',gap:20,marginTop:10,flexWrap:'wrap'}}>
                  <div style={{fontSize:'0.8rem',color:'var(--text2)'}}>
                    <span style={{fontWeight:600}}>Fecha de pago:</span>{' '}
                    {p.fecha_pago ? new Date(p.fecha_pago+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}) : '—'}
                  </div>
                  {p.proximo_pago && (
                    <div style={{fontSize:'0.8rem',color:p.proximo_pago < today ? 'var(--text2)' : 'var(--accent2)'}}>
                      <span style={{fontWeight:600}}>Próximo pago:</span>{' '}
                      {new Date(p.proximo_pago+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})}
                      {p.proximo_pago < today && ' ✅'}
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════
function App() {
  const [auth, setAuth] = useState(null);
  const [page, setPage] = useState(null);
  const [loading, setLoading] = useState(true);
  const toast = useToast();

  useEffect(() => {
    supabase.auth.getSession().then(async ({ data }) => {
      if (data?.session?.user) {
        const u = data.session.user;
        const isAdmin = u.email === ADMIN_EMAIL;
        let alumno = null;
        if (!isAdmin) {
          const { data: al } = await supabase.from('alumnos').select('*').eq('email', u.email).single();
          alumno = al;
        }
        const a = { user: u, isAdmin, alumno };
        setAuth(a);
        setPage(isAdmin ? 'dashboard' : 'mis-videos');
      }
      setLoading(false);
    });
  }, []);

  const handleLogin = a => { setAuth(a); setPage(a.isAdmin ? 'dashboard' : 'mis-videos'); };
  const handleLogout = async () => { await supabase.auth.signOut(); setAuth(null); setPage(null); toast('Sesión cerrada 👋', 'info'); };

  if (loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:'Space Mono',fontSize:'2rem',fontWeight:700,background:'linear-gradient(135deg,#6c63ff,#ff6584)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:20}}>SACi</div>
        <div className="spinner" style={{margin:'0 auto'}} />
      </div>
    </div>
  );

  if (!auth) return <LoginPage onLogin={handleLogin} />;

  const { isAdmin, alumno, user } = auth;

  const PAGE_MAP = {
    dashboard: <AdminDashboard />,
    gantt: <div className="page-content fade-in"><GanttChart isAdmin={true} /></div>,
    alumnos: <AdminAlumnos />,
    pagos: <AdminPagos />,
    videos: <AdminVideos />,
    materiales: <AdminMateriales />,
    evaluaciones: <AdminEvaluaciones />,
    'mis-gantt': <div className="page-content fade-in"><GanttChart isAdmin={false} /></div>,
    'mis-videos': <AlumnoVideos alumno={alumno} user={user} />,
    'mis-materiales': <AlumnoMateriales />,
    'mis-evaluaciones': <AlumnoEvaluaciones alumno={alumno} />,
    'mis-pagos': <AlumnoPagos alumno={alumno} />,
  };

  const titles = {
    dashboard: ['📊 Dashboard', 'Resumen general'],
    gantt: ['📅 Planificación', 'Diagrama de Gantt'],
    'mis-gantt': ['📅 Planificación', 'Cronograma del curso'],
    alumnos: ['👥 Alumnos', 'Gestión de alumnos'],
    pagos: ['💳 Pagos', 'Control de pagos'],
    videos: ['🎬 Videos', 'Biblioteca de videos'],
    materiales: ['📄 Materiales', 'Recursos educativos'],
    evaluaciones: ['📝 Evaluaciones', 'Gestión de exámenes'],
    'mis-videos': ['🎬 Videos', `Hola, ${alumno?.nombre || user?.email?.split('@')[0]} 👋`],
    'mis-materiales': ['📄 Materiales', 'Recursos disponibles'],
    'mis-evaluaciones': ['📝 Evaluaciones', 'Tus exámenes'],
    'mis-pagos': ['💳 Mis Pagos', 'Historial de pagos'],
  };
  const [title, subtitle] = titles[page] || ['SACi', ''];

  return (
    <div className="app-shell">
      <Sidebar page={page} setPage={setPage} isAdmin={isAdmin} user={user} alumno={alumno} onLogout={handleLogout} />
      <div className="main-content">
        <Topbar title={title} subtitle={subtitle} />
        {PAGE_MAP[page] || <Empty icon="🔍" text="Página no encontrada" />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App /></ToastProvider>
);
</script>
</body>
